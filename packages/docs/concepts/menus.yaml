_ref:
  path: templates/general.yaml.njk
  vars:
    pageId: menus
    pageTitle: Menus
    section: Concepts
    filePath: concepts/menus.yaml
    content:
      - id: menu_filter_alert
        type: Alert
        properties:
          type: info
          showIcon: false
          message: The menu items are filtered according to pages the user is authorized to see. This can be controlled by making pages public or private, or by assigning roles to authenticated users. See <a href = "/protected-pages-apis">protected pages and APIs</a> and <a href = "/roles">roles</a> for more on how to set this up.

      - id: md1
        type: MarkdownWithCode
        properties:
          content: |
            Menu objects describe links to pages, within the app or external. Menu lists are filtered to only show pages that the user is authorized to see as a result of public, private or role based access controlled (RBAC) configuration. Blocks such as [PageSiderMenu](/PageSiderMenu) render menu links. If no menu defined, a default menu is created, containing links to all pages defined in the app.

            By default blocks using a menu, like `PageSiderMenu`, will use the menu with `id: default`. This means that if you create a menu object with `id: default`, this will be used unless another menu is configured and referenced under the block properties, allowing for page specific menu configurations.

            More than one menu can be configured in an app. As an example, this can be used when two logically different sections in the app need different menus.

            The menu objects can be referenced by using the [`_menu`](/_menu) operator.

            The schema for a menu object is:

            - `id: string`: __Required__ - A identifier for the menu. If it is `default`, it will be used as default by blocks, like [PageHeaderMenu](/PageHeaderMenu), which display a menu.
            - `links: object[]`: An array of `MenuLink` or `MenuGroup` objects that form the links in the menu. `MenuGroups` can be two levels deep.

            The schema for a `MenuLink` is:
            - `id: string`: __Required__ - A identifier for the link unique to the menu.
            - `type: string`: __Required__ - The type should be `MenuLink`.
            - `pageId: string`: The id of the page to link to. Used as the menu item title if no title is provided.
            - `url: string`: An external url to link to.
            - `class: string | array | object`: CSS classes (including Tailwind utilities) for the item. Flat applies to the item wrapper; use an object with dot-prefixed slot keys (`.element`, `.icon`, `.label`) to target specific parts.
            - `style: object`: CSS styles for the item. Flat applies to the wrapper; use dot-prefixed slot keys (`.element`, `.icon`, `.label`) to target specific parts.
            -  `properties: object`: The properties of the menu link. These are:
                - `title: string`: The title to display for the link.
                - `icon: string | object`: The name of a [React Icon](https://react-icons.github.io/react-icons/search) or properties of an Icon block to use as the icon for the link.
                - `danger: boolean`: Apply danger style (switches the item onto antd's `dangerItem*` token set).
                - `disabled: boolean`: Disable the item — blocks clicks and applies a greyed style.
                - `tooltip: string`: Tooltip text shown when the menu is collapsed.
                - `extra: string`: Free-form right-aligned label on the item (e.g. `beta`, `soon`). For real keyboard shortcuts use `shortcut`, which both renders a kbd badge AND wires the key handler. When both are set, `shortcut` sits to the far right of `extra`.
                - `shortcut: string`: Keyboard shortcut for this menu item. Renders a kbd badge floated to the far right of the item AND wires the key handler (fires `onSelect` when pressed). Use `mod` for Cmd/Ctrl. Supports sequences like `g s` and multi-key combos like `mod+shift+q`.

            The schema for a `MenuGroup` is:
            - `id: string`: __Required__ - A identifier for the group unique to the menu.
            - `type: string`: __Required__ - The type should be `MenuGroup`.
            - `class: string | array | object`: CSS classes for the group's title row. Use the `.popup` slot key (object form) to style the floating SubMenu popup.
            - `style: object`: CSS styles for the group's title row. Use dot-prefixed slot keys to target specific parts.
            -  `properties: object`: The properties of the menu group. These are:
                - `title: string`: The title to display for the group.
                - `icon: string | object`: The name of a [React Icon](https://react-icons.github.io/react-icons/search) or properties of an Icon block to use as the icon for the group.
                - `disabled: boolean`: Disable the group — blocks expansion and applies a greyed style.
                - `tooltip: string`: Tooltip text shown when the menu is collapsed.
            - `links: object[]`: An array of `MenuLink` or `MenuGroup` objects that should be grouped together in the group.

            The schema for a `MenuDivider` is:
            - `id: string`: __Required__ - A identifier for the divider unique to the menu.
            - `type: string`: __Required__ - The type should be `MenuDivider`.
            - `class: string | array | object`: CSS classes for the divider line.
            - `style: object`: CSS styles for the divider line.
            -  `properties: object`: The properties of the divider. These are:
                - `dashed: boolean`: Render the divider as a dashed line.

            ###### Menus example:
            ```yaml
            lowdefy: LOWDEFY_VERSION
            menus:
              - id: default
                links:
                  - id: page1
                    type: MenuLink
                    pageId: page1
                    properties:
                      title: Page 1
                      icon: AiOutlineFile
                  - id: top-group
                    properties:
                      title: Group
                      icon: AiOutlineGroup
                    links:
                      - id: page2
                        type: MenuLink
                        pageId: page2 # pageId will be used as link title
                      - id: external
                        type: MenuLink
                        url: https://external.com
                        properties:
                          title: External site
                      - id: nested-group
                        type: MenuGroup
                        properties:
                          title: Nested Group
                        links:
                          - id: page3
                            type: MenuLink
                            pageId: page3
                            properties:
                              title: Page 3
              - id: page-1-and-3
                links:
                  - id: page1
                    type: MenuLink
                    pageId: page1
                    properties:
                      title: Page 1
                      icon: AiOutlineFile
                  - id: page3
                    type: MenuLink
                    pageId: page3
                    properties:
                      title: Page 3
                      icon: AiOutlineControl
            ```

            We can make use of [protected pages and APIs](/protected-pages-apis) and [roles](/roles) to filter the menu items according to the pages that the user has access to.

            ###### lowdefy.yaml
            ```yaml
            lowdefy: LOWDEFY_VERSION

            auth:
              # ...
              pages:
                protected: true
                public:
                  - login
                  - '404'
                roles:
                  admin:
                    - page2
                    - page3
                  user:
                    - page1

            menus:
              - id: default
                links:
                  - id: page1
                    type: MenuLink
                    pageId: page1
                    properties:
                      title: Page 1
                      icon: AiOutlineFile
                  - id: page2
                    type: MenuLink
                    pageId: page2 # pageId will be used as link title
                  - id: page3
                    type: MenuLink
                    pageId: page3
                    properties:
                      title: Page 3
              ```

              In the example above, public users can only view the `login` and `404` pages, all other pages require the user to be logged in. If the authorized user had been given only the `user` role, they will only be able to see `page1`. In order to see `page2` and `page3`, the authorized user will need to have the `admin` role assigned to them. The menu will be filtered accordingly and will only contain the menu items that the user has access to.
