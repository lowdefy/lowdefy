_ref:
  path: templates/operators.yaml.njk
  transformer: templates/operatorsMethodTransformer.js
  vars:
    pageId: _module
    pageTitle: _module
    filePath: operators/_module.yaml
    env: Build Only
    types: |
      ```
      _module.var: (key: string): any
      _module.pageId: (pageId: string): string
      _module.pageId: (arguments: { id: string, module: string }): string
      _module.connectionId: (connectionId: string): string
      _module.connectionId: (arguments: { id: string, module: string }): string
      _module.endpointId: (endpointId: string): string
      _module.endpointId: (arguments: { id: string, module: string }): string
      _module.id: (true): string
      _module.id: (arguments: { module: string }): string
      ```
    description: |
      The `_module` operator family provides access to module-scoped values during the build. These operators are only available inside module config files — they have no effect in app-level config.

      `_module.var` and the ID operators (`_module.pageId`, `_module.connectionId`, `_module.endpointId`, `_module.id`) all resolve during the walker pass — the same phase as `_var` and `_ref`. They work at any depth within module files.

      > The `_module` operators are build-time operators: they are evaluated when the app configuration is being built. They can be used anywhere in module configuration files.

      See [Modules](/modules) for an overview of the module system.

    methods:
      - name: var
        types: |
          ```
          (key: string): any
          ```
        description: |
          The `_module.var` operator gets a value from the module entry's `vars` object — the values passed by the app developer in `lowdefy.yaml`, merged with defaults declared in `module.lowdefy.yaml`.

          Unlike `_var`, which requires threading variables through each `_ref`, `_module.var` works at any depth within module files. It accesses the same vars regardless of `_ref` nesting.

          Defaults are declared in `module.lowdefy.yaml` and applied at registration time. If the consumer does not provide a value, the manifest default is used. Vars with `properties` are merged at the property level — only overridden keys change.

        arguments: |
          ###### string
          The key in the module entry's `vars` object. Dot notation is supported for nested access (e.g., `theme.colors.primary`).

        examples: |
          ###### Simple string access:
          ```yaml
          collection:
            _module.var: collection
          ```
          If the app provides `vars: { collection: "team_users" }`, returns `"team_users"`.

          ###### Nested path access:
          ```yaml
          primary_color:
            _module.var: theme.colors.primary
          ```
          Accesses nested values using dot notation. If the module manifest declares defaults via `properties`, unset values resolve to their defaults.

      - name: pageId
        types: |
          ```
          (pageId: string): string
          (arguments: { id: string, module: string }): string
          ```
        description: |
          Resolves a page ID to its fully scoped ID. The string form references the current module's own pages. The object form references a page in a dependency module.

        arguments: |
          ###### string
          The module-local page ID (as declared in the module's page definition).

          ###### object
            - `id: string`: The page ID in the target module.
            - `module: string`: The abstract dependency name (as declared in the module's `dependencies`).

        examples: |
          ###### Link to a sibling page:
          ```yaml
          - id: view_details
            type: Link
            params:
              pageId:
                _module.pageId: user-edit
          ```
          In a module entry with `id: team-users`, resolves to `team-users/user-edit`.

          ###### Link to a page in another module:
          ```yaml
          - id: view_contact
            type: Link
            params:
              pageId:
                _module.pageId:
                  id: contact-detail
                  module: contacts
          ```
          If the `contacts` dependency is wired to an entry with `id: contacts`, resolves to `contacts/contact-detail`.

      - name: connectionId
        types: |
          ```
          (connectionId: string): string
          (arguments: { id: string, module: string }): string
          ```
        description: |
          Resolves a connection ID to its scoped or remapped ID. The string form references the current module's connections. The object form references a connection in a dependency module.

        arguments: |
          ###### string
          The module-local connection ID (as declared in the module's connection definition).

          ###### object
            - `id: string`: The connection ID in the target module.
            - `module: string`: The abstract dependency name (as declared in the module's `dependencies`).

        examples: |
          ###### Reference a module connection:
          ```yaml
          connectionId:
            _module.connectionId: users-db
          ```
          In a module entry with `id: team-users`, resolves to `team-users/users-db`.

          If the app remaps the connection (`connections: { users-db: my-app-mongodb }`), resolves to `my-app-mongodb` instead.

          ###### Reference a connection in another module:
          ```yaml
          connectionId:
            _module.connectionId:
              id: contacts-db
              module: contacts
          ```
          Resolves to the target module's scoped or remapped connection ID.

      - name: endpointId
        types: |
          ```
          (endpointId: string): string
          (arguments: { id: string, module: string }): string
          ```
        description: |
          Resolves an API endpoint ID to its fully scoped ID. The string form references the current module's endpoints. The object form references an endpoint in a dependency module.

        arguments: |
          ###### string
          The module-local endpoint ID (as declared in the module's API definition).

          ###### object
            - `id: string`: The endpoint ID in the target module.
            - `module: string`: The abstract dependency name (as declared in the module's `dependencies`).

        examples: |
          ###### Call a module API endpoint:
          ```yaml
          - id: call_invite
            type: CallAPI
            params:
              endpointId:
                _module.endpointId: invite-user
          ```
          In a module entry with `id: team-users`, resolves to `team-users/invite-user`.

          ###### Call an API in another module:
          ```yaml
          - id: log_event
            type: CallAPI
            params:
              endpointId:
                _module.endpointId:
                  id: log-event
                  module: events
          ```
          Resolves to the target module's scoped endpoint ID.

      - name: id
        types: |
          ```
          (true): string
          (arguments: { module: string }): string
          ```
        description: |
          Returns the raw module entry ID. The `true` form returns the current module's entry ID. The object form returns a dependency module's entry ID.

        arguments: |
          ###### boolean
          Pass `true` to return the current module entry ID.

          ###### object
            - `module: string`: The abstract dependency name (as declared in the module's `dependencies`).

        examples: |
          ###### Use in a label:
          ```yaml
          label:
            _string.concat:
              - _module.id: true
              - " - User Admin"
          ```
          In a module entry with `id: team-users`, returns `"team-users - User Admin"`.

          ###### Get a dependency's entry ID:
          ```yaml
          contactsEntry:
            _module.id:
              module: contacts
          ```
          Returns the concrete entry ID that the `contacts` dependency is wired to.
