_ref:
  path: templates/operators.yaml.njk
  transformer: templates/operatorsMethodTransformer.js
  vars:
    pageId: _jst
    pageTitle: _jst
    filePath: operators/_jst.yaml
    experimental: true
    types: |
      ```
      (template: string): string
      ```
    description: |
      The `_jst` operator is a one-line shorthand for a [`_js`](/_js) function whose body is a JavaScript [template literal](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Template_literals). It evaluates the template against the same runtime context as `_js` (`request`, `state`, `event`, etc.) and returns the resulting string.

      `_jst` is intended for the most common use case — interpolating a value or two into a label — without the ceremony of `return` and backticks:

      ```yaml
      _jst: Updates (${request('get_counts.0.update') ?? 0})
      ```

      At build time, `_jst` is rewritten to `_js` with the value wrapped as `` return `<template>`; ``. Runtime behavior, performance, and bundling are identical to `_js`.

      #### When to use which operator

      | Operator | Best for |
      | --- | --- |
      | [`_string.format`](/_string#format) | Declarative interpolation. Static analysis sees the placeholders. No JS runtime cost. |
      | `_jst` | One-line JS template literals when you want full JS expressions inline. |
      | [`_js`](/_js) | Multi-statement logic, `args` pre-resolution, anything beyond a template literal. |

      #### Available context

      Inside the `${...}` interpolations, the same functions are available as in [`_js`](/_js):

      - **Client**: `actions`, `args` (always `undefined` for `_jst`), `event`, `input`, `location`, `lowdefyGlobal`, `request`, `state`, `urlQuery`, `user`
      - **Server**: `args`, `item`, `payload`, `secrets`, `state`, `step`, `user`

      #### Limitations

      - **String form only.** If you need pre-resolved `args` or multi-statement logic, use [`_js`](/_js) directly.
      - **No declarative visibility.** Like `_js`, the function body is opaque to refMap and other static-analysis tools. For declarative-only configs, prefer [`_string.format`](/_string#format).
      - **Backticks** in the template are escaped automatically; you can include them as-is.

    arguments: |
      ###### string
      A JavaScript template-literal body, **without** the surrounding backticks. May contain any number of `${...}` interpolations referencing the runtime context functions listed above.
    examples: |
      ###### Label with a fallback count:
      ```yaml
      _jst: Updates (${request('get_counts.0.update') ?? 0})
      ```

      ###### Greeting:
      ```yaml
      _jst: Hello ${user('name') ?? 'guest'}!
      ```

      ###### Multi-line:
      ```yaml
      _jst: |
        ${state('first_name')} ${state('last_name')}
        ${state('email')}
      ```
