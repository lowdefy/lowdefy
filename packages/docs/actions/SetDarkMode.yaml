_ref:
  path: templates/actions.yaml.njk
  vars:
    pageId: SetDarkMode
    pageTitle: SetDarkMode
    filePath: actions/SetDarkMode.yaml
    types: |
      ```
      (params?: {
        darkMode?: boolean
      }): void
      ```
    description: |
      The `SetDarkMode` action toggles or sets dark mode for the app. When called without params, it toggles the current state. When `darkMode` is provided, it sets dark mode to that value.

      Dark mode state is persisted to `localStorage` and triggers re-rendering of the root Ant Design `ConfigProvider` with the `dark` algorithm. All blocks and `_media: darkMode` expressions update automatically.
    params: |
      ###### object (optional)
        - `darkMode: boolean`: Set dark mode on or off. When omitted, toggles the current state.
    examples: |
      ###### Toggle dark mode:
      ```yaml
      - id: toggle_button
        type: Button
        properties:
          title: Toggle Dark Mode
          icon:
            _if:
              test:
                _media: darkMode
              then: AiOutlineSun
              else: AiOutlineMoon
        events:
          onClick:
            - id: toggle
              type: SetDarkMode
      ```

      ###### Enable dark mode explicitly:
      ```yaml
      events:
        onClick:
          - id: enable_dark
            type: SetDarkMode
            params:
              darkMode: true
      ```
