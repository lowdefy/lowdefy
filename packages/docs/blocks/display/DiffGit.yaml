_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: DiffGit
    pageTitle: DiffGit
    section: Display Blocks
    filePath: blocks/display/DiffGit.yaml
    block_type: DiffGit
    github_path: packages/plugins/blocks/blocks-diff/src/blocks/DiffGit
    schema: ../plugins/blocks/blocks-diff/src/blocks/DiffGit/meta.js
    gallery: ../plugins/blocks/blocks-diff/src/blocks/DiffGit/gallery.yaml
    fullWidthExamples: true
    description: >
      `DiffGit` renders a unified-diff YAML patch between the `before` and
      `after` objects, with `+` and `-` line prefixes and coloured backgrounds
      (green for additions, red for removals). Uses stable key-sorted YAML
      serialisation so the patch output is deterministic. Supports `hide` /
      `show` glob filtering to strip sensitive or noisy paths before
      serialising.
