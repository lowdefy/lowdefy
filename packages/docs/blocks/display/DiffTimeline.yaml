_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: DiffTimeline
    pageTitle: DiffTimeline
    section: Display Blocks
    filePath: blocks/display/DiffTimeline.yaml
    block_type: DiffTimeline
    github_path: packages/plugins/blocks/blocks-diff/src/blocks/DiffTimeline
    schema: ../plugins/blocks/blocks-diff/src/blocks/DiffTimeline/meta.js
    gallery: ../plugins/blocks/blocks-diff/src/blocks/DiffTimeline/gallery.yaml
    fullWidthExamples: true
    description: >
      `DiffTimeline` renders a diff as a vertical audit trail using Ant Design's
      `Timeline` component. Each change becomes a timeline entry with a
      colour-coded dot (green for added, red for removed, blue for changed) and
      a breadcrumb-style label that shows the full path to the changed field.
      Uses the same filtering, labelling, and per-path value formatters as
      `DiffList`.
