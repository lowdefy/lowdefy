_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: DiffList
    pageTitle: DiffList
    section: Display Blocks
    filePath: blocks/display/DiffList.yaml
    block_type: DiffList
    github_path: packages/plugins/blocks/blocks-diff/src/blocks/DiffList
    schema: ../plugins/blocks/blocks-diff/src/blocks/DiffList/meta.js
    gallery: ../plugins/blocks/blocks-diff/src/blocks/DiffList/gallery.yaml
    fullWidthExamples: true
    description: >
      `DiffList` renders a polished, user-friendly diff between a `before` and
      an `after` object as a grouped table of changes. Built on `microdiff` for
      the diff engine and antd primitives for rendering, it groups changes by
      top-level key, tags each row as Added / Removed / Changed, and supports
      per-path value formatters (`date`, `datetime`, `boolean`, `currency`,
      `enum`, `json`, `code`), humanised `labels`, and `hide` / `show` glob
      filtering. All colours come from antd's semantic tokens so dark mode and
      `theme` overrides work automatically.
