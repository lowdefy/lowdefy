_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: S3Download
    pageTitle: S3Download
    section: Display Blocks
    filePath: blocks/display/S3Download.yaml
    block_type: S3Download
    github_path: packages/plugins/plugins/plugin-aws/src/blocks/S3Download
    schema: ../plugins/plugins/plugin-aws/src/blocks/S3Download/schema.js
    gallery: ../plugins/plugins/plugin-aws/src/blocks/S3Download/gallery.yaml
    description: >
      Download files from AWS S3. Requires an AwsS3Bucket connection and an
      AwsS3PresignedGetObject request. The s3GetPolicyRequestId property must
      reference the request id. If files were uploaded with S3Upload, its fileList
      value can be mapped directly to this block.
    note: >
      The S3Download block requires an AwsS3Bucket connection and an AwsS3PresignedGetObject request.
      The examples below show configuration structure but will not download files without a configured connection.
