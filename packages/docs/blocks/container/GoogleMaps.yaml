_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: GoogleMaps
    pageTitle: GoogleMaps
    section: Container Blocks
    filePath: blocks/container/GoogleMaps.yaml
    block_type: GoogleMaps
    github_path: packages/plugins/blocks/blocks-google-maps/src/blocks/GoogleMaps
    schema: ../plugins/blocks/blocks-google-maps/src/blocks/GoogleMaps/meta.js
    gallery: ../plugins/blocks/blocks-google-maps/src/blocks/GoogleMaps/gallery.yaml
    wrapperType: GoogleMapsScript
    wrapperProperties:
      apiKey:
        _build.env: GOOGLE_MAPS_API_KEY
    note: >
      The GoogleMaps block must be wrapped in a GoogleMapsScript block with a valid Google Maps API key.
      The examples on this page require a configured API key to render maps.
    description: >
      Interactive Google Map with markers, info windows, marker clusterers, and heatmap layer.
      Must be wrapped in a `GoogleMapsScript` block. Supports auto-bounding, custom map styles,
      and events for clicks, zoom changes, and marker interactions.
