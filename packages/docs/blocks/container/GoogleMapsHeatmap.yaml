_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: GoogleMapsHeatmap
    pageTitle: GoogleMapsHeatmap
    section: Container Blocks
    filePath: blocks/container/GoogleMapsHeatmap.yaml
    block_type: GoogleMapsHeatmap
    github_path: packages/plugins/blocks/blocks-google-maps/src/blocks/GoogleMapsHeatmap
    schema: ../plugins/blocks/blocks-google-maps/src/blocks/GoogleMapsHeatmap/meta.js
    gallery: ../plugins/blocks/blocks-google-maps/src/blocks/GoogleMapsHeatmap/gallery.yaml
    wrapperType: GoogleMapsScript
    wrapperProperties:
      apiKey:
        _build.env: GOOGLE_MAPS_API_KEY
      libraries:
        - visualization
    note: >
      The GoogleMapsHeatmap block must be wrapped in a GoogleMapsScript block with a valid Google Maps API key
      and the visualization library. The examples on this page require a configured API key to render maps.
    description: >
      Google Map with a heatmap visualization layer for displaying data density.
      Must be wrapped in a `GoogleMapsScript` block with `libraries: [visualization]`.
      Supports weighted data points, configurable radius and opacity, markers, and info windows.
