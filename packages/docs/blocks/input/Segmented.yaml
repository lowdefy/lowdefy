_ref:
  path: templates/blocks/template.yaml.njk
  vars:
    block_type: Segmented
    category: input
    schema: ../plugins/blocks/blocks-antd/src/blocks/Segmented/schema.js
    filePath: blocks/input/Segmented.yaml
    description_content: |
      A segmented control input for selecting between a set of options. Similar to a radio group but with a pill/tab-style visual appearance.
    init_property_values:
      options:
        - Option A
        - Option B
        - Option C
