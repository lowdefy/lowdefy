    schema: ../plugins/plugins/plugin-aws/src/blocks/S3UploadPhoto/meta.js
    gallery: ../plugins/plugins/plugin-aws/src/blocks/S3UploadPhoto/gallery.yaml
    note: >
      The S3UploadPhoto requires an AwsS3Bucket connection and AwsS3PresignedPostPolicy request to upload files.
