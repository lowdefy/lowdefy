_ref:
  path: templates/blocks/template.yaml.njk
  vars:
    block_type: SegmentedSelector
    category: input
    schema: ../plugins/blocks/blocks-antd/src/blocks/SegmentedSelector/schema.js
    filePath: blocks/input/SegmentedSelector.yaml
    description_content: |
      A segmented control selector for choosing between a set of options. Works like other Selector blocks with support for primitive and label/value pair options.
    init_property_values:
      options:
        - Option A
        - Option B
        - Option C
