_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: MasonryList
    pageTitle: MasonryList
    section: List Blocks
    filePath: blocks/list/MasonryList.yaml
    block_type: MasonryList
    antd_component: List
    antd_url: list
    github_path: packages/plugins/blocks/blocks-antd/src/blocks/MasonryList
    schema: ../plugins/blocks/blocks-antd/src/blocks/MasonryList/meta.js
    gallery: ../plugins/blocks/blocks-antd/src/blocks/MasonryList/gallery.yaml
    description: >
      Masonry-style grid layout for list data. Items flow into columns and stack
      vertically, filling gaps left by shorter items. Provide an array in state
      and use _state operators in the template to access each item's data.
    onInit:
      - id: init_masonry_data
        type: SetState
        params:
          ml_basic:
            - title: Getting Started
              desc: A quick intro to the platform.
              bg: bg-blue-50
            - title: Authentication
              desc: Set up login providers, configure session handling, manage user roles and permissions, and integrate with external identity services like Auth0 and Okta.
              bg: bg-purple-50
            - title: API Reference
              desc: Full endpoint documentation with request and response examples.
              bg: bg-green-50
            - title: Deployment Guide
              desc: Step-by-step deployment to Docker, Vercel, and Node.js. Covers environment variables, build configuration, CI/CD pipelines, secrets management, and production monitoring setup.
              bg: bg-orange-50
            - title: Theming
              desc: Colors, fonts, and tokens.
              bg: bg-cyan-50
            - title: FAQ
              desc: Answers to common questions about setup, configuration, limits, and troubleshooting. Covers billing, rate limits, version compatibility, and migration between major releases.
              bg: bg-pink-50
