              body: Finish dropdown blocks, update docs, run e2e tests. Ship by Friday.
              tag: Work
              color: blue
              bg: bg-blue-50
            - title: Grocery List
              body: Milk, bread, eggs.
              tag: Personal
              color: green
              bg: bg-green-50
            - title: Bug Report
              body: The Affix gallery throws a ConfigError because the _if test receives undefined instead of boolean. The _event operator returns undefined in gallery context where no event fires. Fixed by wrapping with _eq to guarantee a boolean result.
              tag: Bug
              color: red
              bg: bg-red-50
            - title: Meeting Notes
              body: Agreed on the MasonryList API. Four columns for team directory, three for notes. Sequential mode for timeline-style content. Ship it next week.
              tag: Work
              color: blue
              bg: bg-blue-50
            - title: Read Later
              body: Shape Up.
              tag: Personal
              color: green
              bg: bg-green-50
            - title: Deploy Checklist
              body: Run tests. Check bundle size. Verify env vars. Tag release. Monitor error rate for 30 minutes. Roll back if p99 latency exceeds 2s.
              tag: Ops
              color: orange
              bg: bg-orange-50
            - title: Idea
              body: What if we added a gallery page for every block that auto-generates from a YAML file? One source of truth for docs and live examples.
