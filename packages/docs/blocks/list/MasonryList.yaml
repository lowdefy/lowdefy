              desc: Extend Lowdefy with custom blocks, actions, operators, and connections.
              bg: bg-indigo-50
          ml_two:
            - title: Why We Rebuilt the Dashboard
              body: The old dashboard loaded 14 API requests on every page view. Users complained about 3-second load times on mobile. We moved to server-side aggregation, cut it to 2 requests, and dropped p95 latency from 3.1s to 400ms. The key insight was that 80% of the data never changed between page loads.
              bg: bg-blue-50
            - title: Release Notes v4.7
              body: New MasonryList block, Splitter block, and keyboard shortcuts on menu items.
              bg: bg-green-50
            - title: On-Call Runbook
              body: If the deploy pipeline fails, check the GitHub Actions log first. Nine times out of ten it's a flaky test. Retry the job. If it fails twice, check the Slack incidents channel for known issues before escalating. For database connection errors, verify the connection pool isn't exhausted — the monitoring dashboard is at grafana.internal/d/db-pools.
              bg: bg-orange-50
            - title: Hiring Update
              body: Senior full-stack role open.
              bg: bg-purple-50
            - title: Design System Migration
              body: Moving from custom CSS to Ant Design v6 component tokens. Every component gets a theme object for overrides. This eliminates 3,000 lines of custom CSS and gives us dark mode for free. Timeline is 6 weeks — 2 for core components, 2 for forms, 2 for testing.
              bg: bg-cyan-50
          ml_gutter_tight:
