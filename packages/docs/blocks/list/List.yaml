_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: List
    pageTitle: List
    section: List Blocks
    filePath: blocks/list/List.yaml
    block_type: List
    github_path: packages/plugins/blocks/blocks-basic/src/blocks/List
    schema: ../plugins/blocks/blocks-basic/src/blocks/List/meta.js
    gallery: ../plugins/blocks/blocks-basic/src/blocks/List/gallery.yaml
    description: >
      Flex-based list container that renders a template block for each item in
      an array. Supports column/row direction, wrapping, and scrolling. Use
      `CallMethod` with `pushItem`, `removeItem`, `moveItemUp`, and
      `moveItemDown` to manage items. Pair with `Validate` to validate
      inputs across all list rows.
    onInit:
      - id: init_list_data
        type: SetState
        params:
          notes:
            - text: Pick up groceries
            - text: Call dentist at 3pm
            - text: Review PR #247
          skills:
            - label: React
              color: blue
            - label: TypeScript
              color: cyan
            - label: Node.js
              color: green
            - label: PostgreSQL
              color: geekblue
            - label: Docker
              color: purple
            - label: GraphQL
              color: magenta
            - label: AWS
              color: orange
            - label: Redis
              color: red
          tasks:
            - name: Review pull request
              priority: High
            - name: Write unit tests
              priority: Medium
            - name: Update documentation
              priority: Low
          users: []
          inv:
            - desc: Web development
              qty: 40
              price: 150
            - desc: UI design
              qty: 20
              price: 120
            - desc: QA testing
              qty: 10
              price: 90
