- title: Bar Chart
  fullWidth: true
  blocks:
    - id: bar_chart
      type: EChart
      properties:
        height: 350
        option:
          tooltip:
            trigger: axis
          legend:
            data:
              - Revenue
              - Expenses
          xAxis:
            type: category
            data:
              - Jan
              - Feb
              - Mar
              - Apr
              - May
              - Jun
          yAxis:
            type: value
            axisLabel:
              formatter: '${value}'
          series:
            - name: Revenue
              type: bar
              data:
                - 4200
                - 3800
                - 5100
                - 4600
                - 5800
                - 6200
              itemStyle:
                color: '#5470c6'
            - name: Expenses
              type: bar
              data:
                - 3100
                - 2900
                - 3400
                - 3200
                - 3600
                - 3800
              itemStyle:
                color: '#91cc75'

