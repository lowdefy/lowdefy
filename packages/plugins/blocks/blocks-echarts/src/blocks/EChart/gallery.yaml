- title: Pie Chart
  fullWidth: true
  blocks:
    - id: pie_chart
      type: EChart
      properties:
        height: 350
        option:
          tooltip:
            trigger: item
            formatter: '{a} <br/>{b}: {c} ({d}%)'
          legend:
            orient: vertical
            left: left
            data:
              - Direct
              - Search Engine
              - Email
              - Social Media
              - Affiliates
              - Other
          series:
            - name: Traffic Source
              type: pie
              radius:
                - '40%'
                - '70%'
              avoidLabelOverlap: true
              itemStyle:
                borderRadius: 6
                borderColor: '#fff'
                borderWidth: 2
              label:
                show: true
                formatter: '{b}: {d}%'
              data:
                - name: Direct
                  value: 3350
                - name: Search Engine
                  value: 5100
                - name: Email
                  value: 1548
                - name: Social Media
                  value: 2430
                - name: Affiliates
                  value: 980
                - name: Other
                  value: 620

