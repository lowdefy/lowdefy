- title: Mixed Chart
  fullWidth: true
  blocks:
    - id: mixed_chart
      type: EChart
      properties:
        height: 350
        option:
          tooltip:
            trigger: axis
            axisPointer:
              type: cross
          legend:
            data:
              - Sales Volume
              - Avg Price
          xAxis:
            type: category
            data:
              - Laptops
              - Phones
              - Tablets
              - Watches
              - Headphones
              - Cameras
          yAxis:
            - type: value
              name: Units Sold
              position: left
            - type: value
              name: Avg Price ($)
              position: right
          series:
            - name: Sales Volume
              type: bar
              data:
                - 1240
                - 3560
                - 890
                - 2100
                - 4300
                - 560
              itemStyle:
                color: '#5470c6'
            - name: Avg Price
              type: line
              yAxisIndex: 1
              smooth: true
              data:
                - 899
                - 699
                - 449
                - 299
                - 149
                - 549
              lineStyle:
                width: 3
              itemStyle:
                color: '#ee6666'

- title: Dashboard Gauge
  fullWidth: true
  blocks:
    - id: gauge_chart
      type: EChart
      properties:
        height: 350
        option:
          series:
            - type: gauge
              startAngle: 200
              endAngle: -20
              min: 0
              max: 100
              splitNumber: 10
              progress:
                show: true
                width: 20
              pointer:
                show: true
              axisLine:
                lineStyle:
                  width: 20
              axisTick:
                show: false
              splitLine:
                length: 10
                lineStyle:
                  width: 2
                  color: '#999'
              axisLabel:
                distance: 25
                fontSize: 12
                color: '#999'
              title:
                offsetCenter:
                  - 0
                  - '70%'
                fontSize: 16
              detail:
                valueAnimation: true
                fontSize: 32
                offsetCenter:
                  - 0
                  - '40%'
                formatter: '{value}%'
              data:
                - value: 73
                  name: Performance
