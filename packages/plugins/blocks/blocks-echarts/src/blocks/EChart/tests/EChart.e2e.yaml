id: echart
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: echart_basic
    type: EChart
    properties:
      option:
        xAxis:
          type: category
          data:
            - Mon
            - Tue
            - Wed
            - Thu
            - Fri
        yAxis:
          type: value
        series:
          - data:
              - 120
              - 200
              - 150
              - 80
              - 70
            type: bar

  # ============================================
  # PROPERTY TESTS
  # ============================================

  - id: echart_height
    type: EChart
    properties:
      height: 200
      option:
        xAxis:
          type: category
          data:
            - A
            - B
        yAxis:
          type: value
        series:
          - data:
              - 10
              - 20
            type: bar

  - id: echart_width
    type: EChart
    properties:
      width: 400
      option:
        xAxis:
          type: category
          data:
            - A
            - B
        yAxis:
          type: value
        series:
          - data:
              - 10
              - 20
            type: bar

  - id: echart_svg_renderer
    type: EChart
    properties:
      init:
        renderer: svg
      option:
        xAxis:
          type: category
          data:
            - A
            - B
        yAxis:
          type: value
        series:
          - data:
              - 10
              - 20
            type: line

  - id: echart_pie
    type: EChart
    properties:
      option:
        series:
          - type: pie
            data:
              - value: 335
                name: Direct
              - value: 310
                name: Email
              - value: 234
                name: Search

  - id: echart_with_title
    type: EChart
    properties:
      option:
        title:
          text: Sales Chart
        xAxis:
          type: category
          data:
            - Q1
            - Q2
        yAxis:
          type: value
        series:
          - data:
              - 100
              - 200
            type: bar

  - id: echart_empty_dataset
    type: EChart
    properties:
      option:
        dataset:
          source: null
        xAxis:
          type: category
        yAxis:
          type: value
        series:
          - type: bar

  # ============================================
  # EVENT TESTS
  # ============================================

  - id: echart_onclick
    type: EChart
    properties:
      option:
        xAxis:
          type: category
          data:
            - A
            - B
            - C
        yAxis:
          type: value
        series:
          - data:
              - 10
              - 20
              - 30
            type: bar
    events:
      click:
        - id: set_clicked
          type: SetState
          params:
            echart_clicked: true

  - id: click_display
    type: Span
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: echart_clicked
              - true
          then: Chart clicked
          else: ''
