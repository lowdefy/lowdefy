# NOTE: Google Maps requires a valid API key. Tests verify rendering
# and block structure that work without valid credentials.

id: googlemapsscript
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: gmscript_basic
    type: GoogleMapsScript
    properties:
      apiKey: test-api-key
    blocks:
      - id: gm_basic
        type: GoogleMaps
        properties:
          map:
            center:
              lat: 0
              lng: 0
            zoom: 3

      - id: gm_with_style
        type: GoogleMaps
        properties:
          map:
            center:
              lat: 0
              lng: 0
            zoom: 3
          style:
            height: 200

      - id: gmheatmap_basic
        type: GoogleMapsHeatmap
        properties:
          map:
            center:
              lat: 0
              lng: 0
            zoom: 3
