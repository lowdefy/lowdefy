# Note: GoogleMapsScript loads the Google Maps JavaScript API.
# A valid apiKey is required for the script to load and child map blocks to render.
# It should wrap GoogleMaps or GoogleMapsHeatmap blocks as a parent container.

- title: Default Script Loader
  blocks:
    - id: google_maps_script_default
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY

- title: With Language and Region
  blocks:
    - id: google_maps_script_lang_en
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        language: en
        region: US
    - id: google_maps_script_lang_ja
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        language: ja
        region: JP
    - id: google_maps_script_lang_de
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        language: de
        region: DE

- title: With Visualization Library
  blocks:
    - id: google_maps_script_visualization
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        libraries:
          - visualization

- title: Multiple Libraries
  blocks:
    - id: google_maps_script_multi_libs
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        libraries:
          - visualization
          - drawing
          - geometry
          - places

- title: With API Version
  blocks:
    - id: google_maps_script_version_weekly
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        version: weekly
    - id: google_maps_script_version_quarterly
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        version: quarterly

- title: With Channel
  blocks:
    - id: google_maps_script_channel
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        channel: my-app-channel

- title: Full Configuration
  blocks:
    - id: google_maps_script_full
      type: GoogleMapsScript
      properties:
        apiKey: YOUR_GOOGLE_MAPS_API_KEY
        language: en
        region: US
        version: weekly
        libraries:
          - visualization
          - places
        channel: production
