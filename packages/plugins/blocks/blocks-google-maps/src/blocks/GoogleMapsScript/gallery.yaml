# Note: Only one GoogleMapsScript can be used per page.
# This gallery uses a single example to avoid script loader conflicts.

- title: Full Configuration
  fullWidth: true
  blocks:
    - id: gms_full_config
      type: GoogleMapsScript
      properties:
        apiKey:
          _build.env: GOOGLE_MAPS_API_KEY
        language: en
        region: US
        version: weekly
        libraries:
          - visualization
          - places
        channel: production
      blocks:
        - id: gms_full_config_map
          type: GoogleMaps
          properties:
            map:
              center:
                lat: 40.7128
                lng: -74.006
              zoom: 12
            markers:
              - position:
                  lat: 40.7484
                  lng: -73.9857
                label: A
                title: Empire State Building
              - position:
                  lat: 40.6892
                  lng: -74.0445
                label: B
                title: Statue of Liberty
              - position:
                  lat: 40.7589
                  lng: -73.9851
                label: C
                title: Times Square
