- title: GoogleMapsHeatmap in Store Activity Dashboard
  fullWidth: true
  blocks:
    - id: store_dashboard_title
      type: Title
      properties:
        content: Store Foot Traffic Analysis
        level: 3
    - id: store_dashboard_desc
      type: Paragraph
      properties:
        content: Visualizing customer activity density across downtown locations. Higher intensity areas indicate more foot traffic during peak hours.
    - id: store_dashboard_map
      type: GoogleMapsHeatmap
      class:
        element: rounded-lg shadow-md
      properties:
        style:
          height: 450px
        map:
          center:
            lat: 40.7580
            lng: -73.9855
          zoom: 14
        markers:
          - position:
              lat: 40.7614
              lng: -73.9776
            label: S1
          - position:
              lat: 40.7549
              lng: -73.9840
            label: S2
          - position:
              lat: 40.7587
              lng: -73.9900
            label: S3
        heatmap:
          radius: 35
          opacity: 0.7
          data:
            - lat: 40.7614
              lng: -73.9776
            - lat: 40.7600
              lng: -73.9790
            - lat: 40.7590
              lng: -73.9800
            - lat: 40.7549
              lng: -73.9840
            - lat: 40.7560
              lng: -73.9830
            - lat: 40.7587
              lng: -73.9900
            - lat: 40.7575
              lng: -73.9870
      events:
        onMarkerClick:
          - id: store_marker_click_msg
            type: DisplayMessage
            params:
              content: Click a store marker to view detailed foot traffic analytics.
              status: info

- title: GoogleMapsHeatmap in Environmental Sensor Network
  fullWidth: true
  blocks:
    - id: sensor_network_card
      type: Card
      properties:
        title: Air Quality Monitoring - San Francisco Bay Area
      slots:
        extra:
          blocks:
            - id: sensor_network_refresh_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Refresh Data
                icon: AiOutlineReload
                color: primary
                variant: outlined
                size: small
              events:
                onClick:
                  - id: sensor_refresh_msg
                    type: DisplayMessage
                    params:
                      content: Sensor data refreshed.
                      status: success
      blocks:
        - id: sensor_network_desc
          type: Paragraph
          properties:
            content: Real-time air quality index readings from distributed sensor stations. Warmer areas on the heatmap indicate higher pollutant concentrations. Markers show individual sensor locations.
        - id: sensor_network_map
          type: GoogleMapsHeatmap
          class:
            element: rounded-lg
          properties:
            autoBounds: false
            style:
              height: 500px
            map:
              center:
                lat: 37.775
                lng: -122.418
              zoom: 12
              options:
                mapTypeControl: false
                streetViewControl: false
            markers:
              - position:
                  lat: 37.7849
                  lng: -122.4094
                label: '1'
              - position:
                  lat: 37.7694
                  lng: -122.4862
                label: '2'
              - position:
                  lat: 37.7599
                  lng: -122.4148
                label: '3'
              - position:
                  lat: 37.7909
                  lng: -122.4000
                label: '4'
              - position:
                  lat: 37.7750
                  lng: -122.4350
                label: '5'
            heatmap:
              radius: 40
              opacity: 0.6
              data:
                - lat: 37.7849
                  lng: -122.4094
                - lat: 37.7694
                  lng: -122.4862
                - lat: 37.7599
                  lng: -122.4148
                - lat: 37.7909
                  lng: -122.4000
                - lat: 37.7750
                  lng: -122.4350
                - lat: 37.7800
                  lng: -122.4200
                - lat: 37.7720
                  lng: -122.4500
          events:
            onMarkerClick:
              - id: sensor_marker_click_msg
                type: DisplayMessage
                params:
                  content: Select a sensor station to view detailed air quality readings.
                  status: info
            onClick:
              - id: sensor_map_click_set
                type: SetState
                params:
                  selectedLocation:
                    _event: latLng
