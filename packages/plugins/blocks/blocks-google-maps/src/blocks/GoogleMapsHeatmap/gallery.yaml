# Note: All examples on this page are wrapped in a single GoogleMapsScript
# block via the docs page template. Individual examples do not need their own script.

- title: Basic Heatmap
  blocks:
    - id: heatmap_basic
      type: GoogleMapsHeatmap
      properties:
        map:
          center:
            lat: 37.775
            lng: -122.434
          zoom: 13
        heatmap:
          data:
            - lat: 37.782
              lng: -122.447
            - lat: 37.782
              lng: -122.445
            - lat: 37.782
              lng: -122.443
            - lat: 37.784
              lng: -122.441
            - lat: 37.786
              lng: -122.439
            - lat: 37.786
              lng: -122.435
            - lat: 37.770
              lng: -122.432
            - lat: 37.768
              lng: -122.430

- title: Map Center and Zoom
