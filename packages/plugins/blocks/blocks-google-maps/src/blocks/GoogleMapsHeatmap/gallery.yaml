- title: Map Event Actions
  blocks:
    - id: heatmap_events
      type: GoogleMapsHeatmap
      properties:
        map:
          center:
            lat: 48.8566
            lng: 2.3522
          zoom: 13
        markers:
          - position:
              lat: 48.8584
              lng: 2.2945
            label: A
          - position:
              lat: 48.8606
              lng: 2.3376
            label: B
        heatmap:
          data:
            - lat: 48.8584
              lng: 2.2945
            - lat: 48.8606
              lng: 2.3376
            - lat: 48.8566
              lng: 2.3522
      events:
        onClick:
          - id: heatmap_click_display
            type: DisplayMessage
            params:
              content: Map clicked!
              status: info
        onMarkerClick:
          - id: heatmap_marker_click_msg
            type: DisplayMessage
            params:
              content: Marker clicked!
              status: success
        onZoomChanged:
          - id: heatmap_zoom_set_state
            type: SetState
            params:
              currentZoom:
                _event: zoom

