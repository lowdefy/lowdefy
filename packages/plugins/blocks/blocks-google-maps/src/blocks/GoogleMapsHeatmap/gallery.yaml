- title: Weighted Heatmap Data
  blocks:
    - id: heatmap_weighted
      type: GoogleMapsHeatmap
      properties:
        autoBounds: false
        map:
          center:
            lat: 51.509
            lng: -0.118
          zoom: 13
        heatmap:
          data:
            - location:
                lat: 51.512
                lng: -0.091
              weight: 10
            - location:
                lat: 51.507
                lng: -0.076
              weight: 5
            - location:
                lat: 51.503
                lng: -0.119
              weight: 8
            - location:
                lat: 51.515
                lng: -0.142
              weight: 3
            - location:
                lat: 51.520
                lng: -0.105
              weight: 7

