- title: Events
  fullWidth: true
  blocks:
    - id: events_row_click
      type: AgGridAlpine
      properties:
        height: 300
        defaultColDef:
          sortable: true
          flex: 1
        columnDefs:
          - field: name
            headerName: Name
          - field: role
            headerName: Role
          - field: department
            headerName: Department
          - field: status
            headerName: Status
            width: 120
        rowData:
          - name: Alice Johnson
            role: Developer
            department: Engineering
            status: Active
          - name: Bob Smith
            role: Designer
            department: Design
            status: Active
          - name: Charlie Lee
            role: Manager
            department: Sales
            status: On Leave
          - name: Diana Patel
            role: Analyst
            department: Finance
            status: Active
          - name: Erik Johansson
            role: DevOps
            department: Engineering
            status: Active
      events:
        onRowClick:
          - id: row_click_message
            type: DisplayMessage
            params:
              content:
                _nunjucks:
                  on:
                    _event: row
                  template: 'Clicked: {{ name }} ({{ role }}, {{ department }})'
              duration: 3
        onCellClick:
          - id: cell_click_message
            type: DisplayMessage
            params:
              status: info
              content:
                _nunjucks:
                  on:
                    name:
                      _event: cell.column
                    value:
                      _event: cell.value
                  template: 'Cell: {{ name }} = {{ value }}'
              duration: 3
    - id: events_row_selected
      type: AgGridAlpine
      properties:
        height: 300
        rowSelection: multiple
        defaultColDef:
          sortable: true
          flex: 1
        columnDefs:
          - field: task
            headerName: Task
            flex: 2
          - field: assignee
            headerName: Assignee
          - field: priority
            headerName: Priority
            width: 120
        rowData:
          - task: Design login page
            assignee: Alice
            priority: High
          - task: Implement API
            assignee: Bob
            priority: High
          - task: Write tests
            assignee: Charlie
            priority: Medium
          - task: Update docs
            assignee: Diana
            priority: Low
          - task: Code review
            assignee: Erik
            priority: Medium
      events:
        onRowSelected:
          - id: row_selected_message
            type: DisplayMessage
            params:
              status: success
              content:
                _nunjucks:
                  on:
                    row:
                      _event: row.task
                    count:
                      _event: selected.length
                  template: 'Selected "{{ row }}" ({{ count }} total selected)'
              duration: 3

