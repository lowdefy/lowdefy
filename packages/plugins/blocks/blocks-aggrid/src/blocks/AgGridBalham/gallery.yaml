- title: Built-in cell types
  fullWidth: true
  blocks:
    - id: cell_types_demo
      type: AgGridBalham
      properties:
        height: 360
        defaultColDef:
          resizable: true
          flex: 1
        columnDefs:
          - headerName: Status
            field: status
            width: 130
            cell:
              type: tag
              colorMap:
                Active: green
                Blocked: red
                Pending: blue
                'On Leave': orange
          - headerName: Assignee
            field: name
            minWidth: 220
            cell:
              type: avatar
              nameField: name
              srcField: picture
              idField: id
          - headerName: Created
            field: created_at
            width: 170
            cell:
              type: date
          - headerName: Last seen
            field: last_seen
            width: 150
            cell:
              type: date
              relative: true
          - headerName: Verified
            field: verified
            width: 110
            cell:
              type: boolean
          - headerName: Progress
            field: completion
            width: 130
            cell:
              type: progress
        rowData:
