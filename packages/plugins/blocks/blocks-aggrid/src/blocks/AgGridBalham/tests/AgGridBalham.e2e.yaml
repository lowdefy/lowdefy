id: aggridbalham
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: aggridbalham_basic
    type: AgGridBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
      rowData:
        - name: Alice
          age: 25
        - name: Bob
          age: 30
        - name: Charlie
          age: 35

  # ============================================
  # PROPERTY TESTS
  # ============================================

  - id: aggridbalham_height
    type: AgGridBalham
    properties:
      height: 300
      columnDefs:
        - headerName: Name
          field: name
      rowData:
        - name: Alice
        - name: Bob

  - id: aggridbalham_default_col_def
    type: AgGridBalham
    properties:
      defaultColDef:
        sortable: true
        resizable: true
        filter: true
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
      rowData:
        - name: Alice
          age: 25
        - name: Bob
          age: 30

  - id: aggridbalham_empty
    type: AgGridBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
      rowData: []

  # ============================================
  # EVENT TESTS
  # ============================================

  - id: aggridbalham_onrowclick
    type: AgGridBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
      rowData:
        - name: Alice
          age: 25
        - name: Bob
          age: 30
    events:
      onRowClick:
        - id: set_row_click
          type: SetState
          params:
            aggridbalham_row_clicked:
              _event: row.name

  - id: row_click_display
    type: Span
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: aggridbalham_row_clicked
              - null
          then:
            _string.concat:
              - 'Row: '
              - _state: aggridbalham_row_clicked
          else: ''

  - id: aggridbalham_oncellclick
    type: AgGridBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
      rowData:
        - name: Alice
          age: 25
        - name: Bob
          age: 30
    events:
      onCellClick:
        - id: set_cell_click
          type: SetState
          params:
            aggridbalham_cell_clicked:
              _event: cell.value

  - id: cell_click_display
    type: Span
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: aggridbalham_cell_clicked
              - null
          then:
            _string.concat:
              - 'Cell: '
              - _state: aggridbalham_cell_clicked
          else: ''

  - id: aggridbalham_onrowselected
    type: AgGridBalham
    properties:
      rowSelection: single
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
      rowData:
        - name: Alice
          age: 25
        - name: Bob
          age: 30
    events:
      onRowSelected:
        - id: set_row_selected
          type: SetState
          params:
            aggridbalham_row_selected:
              _event: row.name

  - id: row_selected_display
    type: Span
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: aggridbalham_row_selected
              - null
          then:
            _string.concat:
              - 'Selected: '
              - _state: aggridbalham_row_selected
          else: ''

  # ============================================
  # SORTING & FILTERING
  # ============================================

  - id: aggridbalham_sortable
    type: AgGridBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
          sortable: true
        - headerName: Age
          field: age
          sortable: true
      rowData:
        - name: Charlie
          age: 35
        - name: Alice
          age: 25
        - name: Bob
          age: 30
    events:
      onSortChanged:
        - id: set_sort_changed
          type: SetState
          params:
            aggridbalham_sort_changed: true

  - id: sort_changed_display
    type: Span
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: aggridbalham_sort_changed
              - true
          then: Sort changed
          else: ''

  - id: aggridbalham_filterable
    type: AgGridBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
          filter: true
        - headerName: Age
          field: age
          filter: true
      rowData:
        - name: Alice
          age: 25
        - name: Bob
          age: 30
        - name: Charlie
          age: 35
    events:
      onFilterChanged:
        - id: set_filter_changed
          type: SetState
          params:
            aggridbalham_filter_changed: true

  - id: filter_changed_display
    type: Span
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: aggridbalham_filter_changed
              - true
          then: Filter changed
          else: ''
