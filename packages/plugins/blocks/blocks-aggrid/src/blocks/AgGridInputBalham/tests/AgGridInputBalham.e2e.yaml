id: aggridinputbalham
type: Box

events:
  onInit:
    - id: set_defaults
      type: SetState
      params:
        aggridinputbalham_basic:
          - name: Alice
            age: 25
          - name: Bob
            age: 30
          - name: Charlie
            age: 35
        aggridinputbalham_height:
          - name: Alice
          - name: Bob
        aggridinputbalham_default_col_def:
          - name: Alice
            age: 25
          - name: Bob
            age: 30
        aggridinputbalham_onrowclick:
          - name: Alice
            age: 25
          - name: Bob
            age: 30
        aggridinputbalham_oncellclick:
          - name: Alice
            age: 25
          - name: Bob
            age: 30
        aggridinputbalham_onrowselected:
          - name: Alice
            age: 25
          - name: Bob
            age: 30
        aggridinputbalham_sortable:
          - name: Charlie
            age: 35
          - name: Alice
            age: 25
          - name: Bob
            age: 30
        aggridinputbalham_filterable:
          - name: Alice
            age: 25
          - name: Bob
            age: 30
          - name: Charlie
            age: 35
        aggridinputbalham_editable:
          - name: Alice
            age: 25
          - name: Bob
            age: 30
        aggridinputbalham_rowdrag:
          - name: Alice
            age: 25
          - name: Bob
            age: 30
          - name: Charlie
            age: 35

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: aggridinputbalham_basic
    type: AgGridInputBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age

  # ============================================
  # PROPERTY TESTS
  # ============================================

  - id: aggridinputbalham_height
    type: AgGridInputBalham
    properties:
      height: 300
      columnDefs:
        - headerName: Name
          field: name

  - id: aggridinputbalham_default_col_def
    type: AgGridInputBalham
    properties:
      defaultColDef:
        sortable: true
        resizable: true
        filter: true
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age

  # ============================================
  # EVENT TESTS
  # ============================================

  - id: aggridinputbalham_onrowclick
    type: AgGridInputBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
    events:
      onRowClick:
        - id: set_row_click
          type: SetState
          params:
            aggridinputbalham_row_clicked:
              _event: row.name

  - id: row_click_display
    type: Span
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: aggridinputbalham_row_clicked
              - null
          then:
            _string.concat:
              - 'Row: '
              - _state: aggridinputbalham_row_clicked
          else: ''

  - id: aggridinputbalham_oncellclick
    type: AgGridInputBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
    events:
      onCellClick:
        - id: set_cell_click
          type: SetState
          params:
            aggridinputbalham_cell_clicked:
              _event: cell.value

  - id: cell_click_display
    type: Span
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: aggridinputbalham_cell_clicked
              - null
          then:
            _string.concat:
              - 'Cell: '
              - _state: aggridinputbalham_cell_clicked
          else: ''

  - id: aggridinputbalham_onrowselected
    type: AgGridInputBalham
    properties:
      rowSelection: single
      columnDefs:
        - headerName: Name
          field: name
        - headerName: Age
          field: age
    events:
      onRowSelected:
        - id: set_row_selected
          type: SetState
          params:
            aggridinputbalham_row_selected:
              _event: row.name

  - id: row_selected_display
    type: Span
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: aggridinputbalham_row_selected
              - null
          then:
            _string.concat:
              - 'Selected: '
              - _state: aggridinputbalham_row_selected
          else: ''

  # ============================================
  # SORTING & FILTERING
  # ============================================

  - id: aggridinputbalham_sortable
    type: AgGridInputBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
          sortable: true
        - headerName: Age
          field: age
          sortable: true
    events:
      onSortChanged:
        - id: set_sort_changed
          type: SetState
          params:
            aggridinputbalham_sort_changed: true

  - id: sort_changed_display
    type: Span
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: aggridinputbalham_sort_changed
              - true
          then: Sort changed
          else: ''

  - id: aggridinputbalham_filterable
    type: AgGridInputBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
          filter: true
        - headerName: Age
          field: age
          filter: true
    events:
      onFilterChanged:
        - id: set_filter_changed
          type: SetState
          params:
            aggridinputbalham_filter_changed: true

  - id: filter_changed_display
    type: Span
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: aggridinputbalham_filter_changed
              - true
          then: Filter changed
          else: ''

  # ============================================
  # INPUT-SPECIFIC: EDITABLE CELLS
  # ============================================

  - id: aggridinputbalham_editable
    type: AgGridInputBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
          editable: true
        - headerName: Age
          field: age
    events:
      onCellValueChanged:
        - id: set_cell_value_changed
          type: SetState
          params:
            aggridinputbalham_cell_new_value:
              _event: newValue
            aggridinputbalham_cell_old_value:
              _event: oldValue

  - id: cell_value_changed_display
    type: Span
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: aggridinputbalham_cell_new_value
              - null
          then:
            _string.concat:
              - 'New: '
              - _state: aggridinputbalham_cell_new_value
          else: ''

  # ============================================
  # INPUT-SPECIFIC: ROW DRAGGING
  # ============================================

  - id: aggridinputbalham_rowdrag
    type: AgGridInputBalham
    properties:
      columnDefs:
        - headerName: Name
          field: name
          rowDrag: true
        - headerName: Age
          field: age
    events:
      onRowDragEnd:
        - id: set_row_drag_end
          type: SetState
          params:
            aggridinputbalham_drag_ended: true

  - id: row_drag_display
    type: Span
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: aggridinputbalham_drag_ended
              - true
          then: Drag ended
          else: ''
