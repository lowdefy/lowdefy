id: qrscanner
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: qrscanner_basic
    type: QRScanner
    properties:
      inactiveByDefault: true

  - id: qrscanner_styled
    type: QRScanner
    properties:
      inactiveByDefault: true
      style:
        width: 400
        height: 300

  # ============================================
  # PROPERTY TESTS
  # ============================================

  - id: qrscanner_inactive
    type: QRScanner
    properties:
      inactiveByDefault: true
