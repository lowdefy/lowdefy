- id: default
  type: TiptapMentionInput
- id: properties.placeholder
  type: TiptapMentionInput
  properties:
    placeholder: 'Type @ to mention...'
- id: properties.disabled
  type: TiptapMentionInput
  properties:
    disabled: true
- id: properties.mentions.options
  type: TiptapMentionInput
  properties:
    mentions:
      options:
        - label: Alice
          value:
            _id: user_1
        - label: Bob
          value:
            _id: user_2
- id: properties.mentions.char = '#'
  type: TiptapMentionInput
  properties:
    placeholder: 'Type # to tag'
    mentions:
      char: '#'
      options:
        - label: bug
          value:
            _id: tag_bug
