id: tiptap-input
type: Box

events:
  onMount:
    - id: seed_content
      type: SetState
      params:
        tiptap_with_value:
          html: '<p>Hello <strong>world</strong>.</p>'
        tiptap_disabled:
          html: '<p>Disabled content.</p>'
        tiptap_borderless:
          html: '<p>Borderless.</p>'

blocks:
  - id: tiptap_empty
    type: TiptapInput

  - id: tiptap_placeholder
    type: TiptapInput
    properties:
      placeholder: 'Start typing...'

  - id: tiptap_with_value
    type: TiptapInput

  - id: tiptap_disabled
    type: TiptapInput
    properties:
      disabled: true

  - id: tiptap_borderless
    type: TiptapInput
    properties:
      bordered: false

  - id: tiptap_typing
    type: TiptapInput
