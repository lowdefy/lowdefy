- id: default
  type: TiptapInput
- id: properties.placeholder
  type: TiptapInput
  properties:
    placeholder: 'Start typing...'
- id: properties.title
  type: TiptapInput
  properties:
    title: 'Note'
- id: properties.disabled
  type: TiptapInput
  properties:
    disabled: true
- id: properties.bordered = false
  type: TiptapInput
  properties:
    bordered: false
    placeholder: 'No border.'
- id: properties.image and table disabled
  type: TiptapInput
  properties:
    image:
      disabled: true
    table:
      disabled: true
- id: properties.starterKit overrides
  type: TiptapInput
  properties:
    starterKit:
      codeBlock: false
      blockquote: false
- id: properties.rows = 2
  type: TiptapInput
  properties:
    rows: 2
- id: properties.autoSize = {minRows 2, maxRows 5}
  type: TiptapInput
  properties:
    autoSize:
      minRows: 2
      maxRows: 5
- id: properties.autoSize = true
  type: TiptapInput
  properties:
    autoSize: true
- id: properties.link.openOnClick = false
  type: TiptapInput
  properties:
    link:
      openOnClick: false
