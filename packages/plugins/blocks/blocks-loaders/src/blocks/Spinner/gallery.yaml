- title: Default
  blocks:
    - id: spinner_default
      type: Spinner

- title: Named Sizes
  blocks:
    - id: spinner_size_small
      type: Spinner
      layout:
        flex: 0 0 auto
      properties:
        size: small
    - id: spinner_size_medium
      type: Spinner
      layout:
        flex: 0 0 auto
      properties:
        size: medium
    - id: spinner_size_large
      type: Spinner
      layout:
        flex: 0 0 auto
      properties:
        size: large

- title: Custom Numeric Sizes
  blocks:
    - id: spinner_size_12
      type: Spinner
      layout:
        flex: 0 0 auto
      properties:
        size: 12
    - id: spinner_size_20
      type: Spinner
      layout:
        flex: 0 0 auto
      properties:
        size: 20
    - id: spinner_size_32
      type: Spinner
      layout:
        flex: 0 0 auto
      properties:
        size: 32
    - id: spinner_size_48
      type: Spinner
      layout:
        flex: 0 0 auto
      properties:
        size: 48
    - id: spinner_size_64
      type: Spinner
      layout:
        flex: 0 0 auto
      properties:
        size: 64
