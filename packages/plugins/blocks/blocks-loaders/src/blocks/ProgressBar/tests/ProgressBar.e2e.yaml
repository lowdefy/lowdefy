id: progressbar
type: Box

blocks:
  - id: progressbar_basic
    type: ProgressBar

  - id: progressbar_progress
    type: ProgressBar
    properties:
      progress: 75

  - id: progressbar_height
    type: ProgressBar
    properties:
      height: 10

  - id: progressbar_no_shadow
    type: ProgressBar
    properties:
      shadow: false
