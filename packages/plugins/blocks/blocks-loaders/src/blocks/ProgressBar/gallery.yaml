- title: Default
  blocks:
    - id: progress_bar_default
      type: ProgressBar

- title: Progress Values
  blocks:
    - id: progress_bar_0
      type: ProgressBar
      properties:
        progress: 0
    - id: progress_bar_25
      type: ProgressBar
      properties:
        progress: 25
    - id: progress_bar_50
      type: ProgressBar
      properties:
        progress: 50
    - id: progress_bar_75
      type: ProgressBar
      properties:
        progress: 75
    - id: progress_bar_100
      type: ProgressBar
      properties:
        progress: 100

- title: Custom Height
  blocks:
    - id: progress_bar_thin
      type: ProgressBar
      properties:
        progress: 60
        height: 2
    - id: progress_bar_default_height
      type: ProgressBar
      properties:
        progress: 60
        height: 4
    - id: progress_bar_thick
      type: ProgressBar
      properties:
        progress: 60
        height: 8
    - id: progress_bar_extra_thick
      type: ProgressBar
      properties:
        progress: 60
        height: 12

- title: Transition Speed
  blocks:
    - id: progress_bar_fast_transition
      type: ProgressBar
      properties:
        progress: 80
        transitionTime: 200
    - id: progress_bar_default_transition
      type: ProgressBar
      properties:
        progress: 80
        transitionTime: 1000
    - id: progress_bar_slow_transition
      type: ProgressBar
      properties:
        progress: 80
        transitionTime: 3000

- title: Without Shadow
  blocks:
    - id: progress_bar_no_shadow
      type: ProgressBar
      properties:
        progress: 65
        shadow: false
    - id: progress_bar_with_shadow
      type: ProgressBar
      properties:
        progress: 65
        shadow: true

- title: Complete (Hidden)
  blocks:
    - id: progress_bar_complete
      type: ProgressBar
      properties:
        progress: 100
