# NOTE: DocSearch requires Algolia API credentials to return search results.
# Tests verify rendering and UI interactions that work without valid credentials.

id: docsearch
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: docsearch_basic
    type: DocSearch
    properties:
      appId: test-app-id
      indexName: test-index
      apiKey: test-api-key

  # ============================================
  # PROPERTY TESTS
  # ============================================

  - id: docsearch_with_initial_query
    type: DocSearch
    properties:
      appId: test-app-id
      indexName: test-index
      apiKey: test-api-key
      initialQuery: lowdefy

  - id: docsearch_no_personalization
    type: DocSearch
    properties:
      appId: test-app-id
      indexName: test-index
      apiKey: test-api-key
      disableUserPersonalization: true
