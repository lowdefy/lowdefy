- title: Default
  blocks:
    - id: color_selector_default
      type: ColorSelector
      properties:
        title: Pick a color
- title: With Initial Value
  blocks:
    - id: color_selector_initial_red
      type: ColorSelector
      properties:
        title: Red preset
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_initial_red: '#ff4d4f'
    - id: color_selector_initial_blue
      type: ColorSelector
      properties:
        title: Blue preset
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_initial_blue: '#1677ff'
    - id: color_selector_initial_green
      type: ColorSelector
      properties:
        title: Green preset
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_initial_green: '#52c41a'
- title: Sizes
  blocks:
    - id: color_selector_size_small
      type: ColorSelector
      properties:
        title: Small
        size: small
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_size_small: '#722ed1'
    - id: color_selector_size_default
      type: ColorSelector
      properties:
        title: Default size
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_size_default: '#722ed1'
    - id: color_selector_size_large
      type: ColorSelector
      properties:
        title: Large
        size: large
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_size_large: '#722ed1'
- title: Disabled
  blocks:
    - id: color_selector_disabled
      type: ColorSelector
      properties:
        title: Disabled color selector
        disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_disabled: '#faad14'
- title: Hidden Input
  blocks:
    - id: color_selector_hide_input
      type: ColorSelector
      properties:
        title: Swatch only (input hidden)
        hideInput: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_hide_input: '#eb2f96'
- title: Label Options
  blocks:
    - id: color_selector_label_inline
      type: ColorSelector
      properties:
        title: Inline label
        label:
          inline: true
          span: 8
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_label_inline: '#13c2c2'
    - id: color_selector_label_colon_false
      type: ColorSelector
      properties:
        title: No colon
        label:
          colon: false
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_label_colon_false: '#2f54eb'
    - id: color_selector_label_extra
      type: ColorSelector
      properties:
        title: With extra text
        label:
          extra: Choose a color for your theme.
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_label_extra: '#fadb14'
    - id: color_selector_label_right
      type: ColorSelector
      properties:
        title: Right aligned
        label:
          inline: true
          span: 8
          align: right
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_label_right: '#a0d911'
    - id: color_selector_label_disabled
      type: ColorSelector
      properties:
        title: Label hidden
        label:
          disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              color_selector_label_disabled: '#f5222d'
