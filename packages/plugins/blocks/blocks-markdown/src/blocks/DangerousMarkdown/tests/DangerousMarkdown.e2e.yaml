id: dangerousmarkdown
type: Box

blocks:
  - id: dangerousmarkdown_basic
    type: DangerousMarkdown
    properties:
      content: Hello **dangerous** world

  - id: dangerousmarkdown_html
    type: DangerousMarkdown
    properties:
      content: '<div class="custom-div">HTML content</div>'

  - id: dangerousmarkdown_mixed
    type: DangerousMarkdown
    properties:
      content: |
        # Heading
        <span style="color: red;">Red text</span>
