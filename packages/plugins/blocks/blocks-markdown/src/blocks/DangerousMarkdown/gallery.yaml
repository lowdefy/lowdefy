- title: Callout Boxes
  blocks:
    - id: callout_info
      type: DangerousMarkdown
      properties:
        content: |
          <div style="padding: 12px 16px; background-color: #e6f7ff; border-left: 4px solid #1890ff; border-radius: 0 6px 6px 0; margin-bottom: 8px;">
            <strong>Info:</strong> This is an informational callout created with HTML inside DangerousMarkdown.
          </div>
    - id: callout_success
      type: DangerousMarkdown
      properties:
        content: |
          <div style="padding: 12px 16px; background-color: #f6ffed; border-left: 4px solid #52c41a; border-radius: 0 6px 6px 0; margin-bottom: 8px;">
            <strong>Success:</strong> Your deployment completed without errors.
          </div>
    - id: callout_warning
      type: DangerousMarkdown
      properties:
        content: |
          <div style="padding: 12px 16px; background-color: #fffbe6; border-left: 4px solid #faad14; border-radius: 0 6px 6px 0; margin-bottom: 8px;">
            <strong>Warning:</strong> Only render trusted content with DangerousMarkdown. Never pass user input directly.
          </div>
    - id: callout_error
      type: DangerousMarkdown
      properties:
        content: |
          <div style="padding: 12px 16px; background-color: #fff1f0; border-left: 4px solid #ff4d4f; border-radius: 0 6px 6px 0;">
            <strong>Error:</strong> Connection to the database failed. Check your credentials and try again.
          </div>

