- title: Basic Markdown
  blocks:
    - id: basic_text
      type: DangerousMarkdown
      properties:
        content: |
          ## DangerousMarkdown

          This block renders markdown **and** allows embedded HTML to be rendered inline.

          Regular markdown features like **bold**, *italic*, ~~strikethrough~~, and [links](https://lowdefy.com) all work as expected.

          - Unordered list item
          - Another item

          1. Ordered item one
          2. Ordered item two

- title: Inline HTML Styling
  blocks:
    - id: html_colored_text
      type: DangerousMarkdown
      properties:
        content: |
          Text with <span style="color: #1890ff; font-weight: bold;">blue bold</span> and <span style="color: #52c41a;">green</span> and <span style="color: #ff4d4f; text-decoration: underline;">red underlined</span> inline HTML.

          Use <span style="background-color: #ffffb8; padding: 0 4px;">highlighted text</span> to draw attention to specific words.

          Mix markdown **bold** with <span style="font-style: italic; color: #722ed1;">HTML italic purple</span> seamlessly.
    - id: html_styled_div
      type: DangerousMarkdown
      properties:
        content: |
          <div style="padding: 16px; background: linear-gradient(135deg, #e6f7ff 0%, #bae7ff 100%); border-radius: 8px; border: 1px solid #91d5ff;">
            <strong style="font-size: 16px;">Styled Container</strong>
            <p style="margin: 8px 0 0 0; color: #0050b3;">HTML divs with gradients, borders, and custom spacing render inside DangerousMarkdown.</p>
          </div>

- title: Mixed Markdown and HTML
  fullWidth: true
  blocks:
    - id: mixed_content
      type: DangerousMarkdown
      properties:
        content: |
          ## Project Status Report

          Here is a summary with **markdown headings** and HTML elements combined:

          <div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0;">
            <div style="flex: 1; min-width: 150px; padding: 12px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 6px; text-align: center;">
              <div style="font-size: 24px; font-weight: bold; color: #52c41a;">12</div>
              <div style="color: #389e0d;">Completed</div>
            </div>
            <div style="flex: 1; min-width: 150px; padding: 12px; background: #e6f7ff; border: 1px solid #91d5ff; border-radius: 6px; text-align: center;">
              <div style="font-size: 24px; font-weight: bold; color: #1890ff;">5</div>
              <div style="color: #096dd9;">In Progress</div>
            </div>
            <div style="flex: 1; min-width: 150px; padding: 12px; background: #fff7e6; border: 1px solid #ffd591; border-radius: 6px; text-align: center;">
              <div style="font-size: 24px; font-weight: bold; color: #fa8c16;">3</div>
              <div style="color: #d48806;">Pending</div>
            </div>
          </div>

          > **Note:** The cards above use HTML `div` elements with inline styles for layout.

          Regular markdown continues below the HTML blocks without issue.

