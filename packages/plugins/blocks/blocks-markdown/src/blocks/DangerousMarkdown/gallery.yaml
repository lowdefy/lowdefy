- title: DOMPurifyOptions
  blocks:
    - id: dompurify_default
      type: DangerousMarkdown
      properties:
        content: |
          By default, DOMPurify removes dangerous elements like `<script>` and `<iframe>`.

          This `<iframe>` tag will **not** render: <iframe src="https://example.com"></iframe>

          Standard HTML like <b>bold</b> and <em>emphasis</em> still works.
    - id: dompurify_custom
      type: DangerousMarkdown
      properties:
        DOMPurifyOptions:
          ALLOWED_TAGS:
            - b
            - i
            - em
            - strong
            - p
            - br
          ALLOWED_ATTR: []
        content: |
          With restricted DOMPurifyOptions, only specific tags are allowed.

          <b>Bold works</b> and <i>italic works</i>.

          But <span style="color: red;">styled spans</span> are stripped because `span` is not in ALLOWED_TAGS and `style` is not in ALLOWED_ATTR.

- title: Style Override
  blocks:
    - id: style_element
      type: DangerousMarkdown
      style:
        --element:
          backgroundColor: '#fff7e6'
          padding: 16
          borderRadius: 8
          border: '1px solid #ffd591'
      properties:
        content: |
          ### Styled Container

          The `element` style key applies CSS to the outer wrapper `div`.

          <div style="padding: 8px 12px; background: white; border-radius: 4px; border: 1px solid #ffe58f;">
            Combine <b>container styles</b> with <b>inline HTML styles</b> for rich layouts.
          </div>
