- title: Inline Code
  blocks:
    - id: inline_basic
      type: MarkdownWithCode
      properties:
        content: |
          Use the `MarkdownWithCode` block to render code with syntax highlighting.

          Set properties with `properties.content` and use backticks for `inline code`.
    - id: inline_in_context
      type: MarkdownWithCode
      properties:
        content: |
          Install with `npm install lowdefy` or `pnpm add lowdefy`.

          The config file is called `lowdefy.yaml` and lives in your project root.

          Run `npx lowdefy@4 dev` to start the dev server on `http://localhost:3000`.

- title: YAML
  fullWidth: true
  blocks:
    - id: code_yaml
      type: MarkdownWithCode
      properties:
        content: |
          ```yaml
          lowdefy: 4.0.0

          pages:
            - id: home
              type: PageHeaderMenu
              properties:
                title: My Application
              blocks:
                - id: welcome_title
                  type: Title
                  properties:
                    content: Welcome
                    level: 2
                - id: user_form
                  type: Card
                  properties:
                    title: User Information
                  blocks:
                    - id: name_input
                      type: TextInput
                      properties:
                        label:
                          title: Full Name
                    - id: email_input
                      type: TextInput
                      properties:
                        label:
                          title: Email Address
                    - id: submit_button
                      type: Button
                      properties:
                        title: Submit
                        type: primary
                      events:
                        onClick:
                          - id: validate
                            type: Validate
          ```

- title: JavaScript
  fullWidth: true
  blocks:
    - id: code_javascript
      type: MarkdownWithCode
      properties:
        content: |
          ```javascript
          function buildConnections({ components, context }) {
            const connections = components.connections ?? [];

            connections.forEach((connection) => {
              if (!connection.id) {
                throw new Error('Connection id is missing.');
              }
              if (!connection.type) {
                throw new Error(`Connection "${connection.id}" does not have a type.`);
              }
            });

            return components;
          }

          export default buildConnections;
          ```

