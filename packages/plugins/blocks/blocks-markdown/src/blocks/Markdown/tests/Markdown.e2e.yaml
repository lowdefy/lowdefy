id: markdown
type: Box

blocks:
  - id: markdown_basic
    type: Markdown
    properties:
      content: Hello **world**

  - id: markdown_heading
    type: Markdown
    properties:
      content: '# Heading One'

  - id: markdown_list
    type: Markdown
    properties:
      content: |
        - Item one
        - Item two
        - Item three

  - id: markdown_link
    type: Markdown
    properties:
      content: '[Lowdefy](https://lowdefy.com)'

  - id: markdown_gfm_table
    type: Markdown
    properties:
      content: |
        | Col A | Col B |
        | ----- | ----- |
        | 1     | 2     |

  - id: markdown_code
    type: Markdown
    properties:
      content: 'Inline `code` here'

  - id: markdown_empty
    type: Markdown
