- title: Basic Span
  blocks:
    - id: span_basic
      type: Span
      blocks:
        - id: span_basic_text
          type: Html
          properties:
            html: This is text inside a Span block using the content area.

    - id: span_basic_empty
      type: Span
      properties:
        content: A Span with no child blocks, using the content property instead.

- title: Content Property
  blocks:
    - id: span_content_plain
      type: Span
      properties:
        content: Plain text rendered via the content property.
    - id: span_content_html
      type: Span
      properties:
        content: '<b>Bold</b>, <i>italic</i>, and <u>underlined</u> via the content property.'
    - id: span_content_overrides
      type: Span
      properties:
        content: This content property overrides the content area below.
      blocks:
        - id: span_content_overrides_child
          type: Html
          properties:
            html: This child block is hidden because the content property takes priority.

- title: Content Area with Child Blocks
  blocks:
    - id: span_content_area
      type: Span
      blocks:
        - id: span_content_area_icon
          type: Icon
          layout:
            flex: 0 0 auto
          properties:
            name: AiOutlineInfoCircle
            size: 14
            color: '#1677ff'
        - id: span_content_area_text
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: Child blocks render inside the content area when no content property is set.

- title: onClick Event
  blocks:
    - id: span_click_basic
      type: Span
      style:
        --element:
          color: '#1677ff'
          textDecoration: underline
          cursor: pointer
      properties:
        content: Click me to show a message
      events:
        onClick:
          - id: span_click_basic_msg
            type: DisplayMessage
            params:
              content: You clicked the Span!
              status: success

    - id: span_click_set_state
      type: Span
      style:
        --element:
          background: '#e6f4ff'
          padding: 4px 12px
          borderRadius: 4
          color: '#1677ff'
          fontWeight: bold
      properties:
        content: Click to update state
      events:
        onClick:
          - id: span_click_set_state_action
            type: SetState
            params:
              spanClicked: true
              clickedAt:
                _date: now

    - id: span_click_link
      type: Span
      style:
        --element:
          color: '#722ed1'
          textDecoration: underline
      properties:
        content: Click to navigate
      events:
        onClick:
          - id: span_click_link_action
            type: Link
            params:
              url: https://docs.lowdefy.com
              newTab: true

- title: Style Overrides
  blocks:
    - id: span_style_underline
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          textDecoration: underline
          textDecorationColor: '#1677ff'
          textUnderlineOffset: 4px
      properties:
        content: Underlined span
    - id: span_style_uppercase
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          textTransform: uppercase
          letterSpacing: 2
          fontSize: 12
          fontWeight: bold
          color: '#8c8c8c'
      properties:
        content: uppercase span
    - id: span_style_mono
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          fontFamily: monospace
          background: '#f5f5f5'
          padding: 2px 6px
          borderRadius: 4
          fontSize: 13
          color: '#cf1322'
      properties:
        content: monospace code style
    - id: span_style_gradient
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: linear-gradient(90deg, #1677ff, #722ed1)
          color: '#ffffff'
          padding: 4px 12px
          borderRadius: 6
          fontWeight: bold
      properties:
        content: Gradient span

- title: Tailwind CSS Classes
  blocks:
    - id: span_tw_bold_blue
      type: Span
      layout:
        flex: 0 0 auto
      class:
        element: font-bold text-blue-600
      properties:
        content: Bold blue text via Tailwind
    - id: span_tw_bg_pill
      type: Span
      layout:
        flex: 0 0 auto
      class:
        element: bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-medium
      properties:
        content: Pill badge
    - id: span_tw_hover
      type: Span
      layout:
        flex: 0 0 auto
      class:
        element: text-gray-600 hover:text-blue-600 hover:underline transition-colors duration-200 cursor-pointer
      properties:
        content: Hover for effect
    - id: span_tw_ring
      type: Span
      layout:
        flex: 0 0 auto
      class:
        element: ring-2 ring-purple-300 bg-purple-50 text-purple-700 px-3 py-1 rounded-md text-sm
      properties:
        content: Ring outline

- title: Inline with Text
  blocks:
    - id: span_inline_wrapper
      type: Box
      blocks:
        - id: span_inline_before
          type: Span
          layout:
            flex: 0 0 auto
          properties:
            content: 'This paragraph has an '
        - id: span_inline_highlight
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#1677ff'
              fontWeight: bold
          properties:
            content: inline highlighted Span
        - id: span_inline_after
          type: Span
          layout:
            flex: 0 0 auto
          properties:
            content: ' mixed with regular text.'

- title: Multiple Inline Spans
  blocks:
    - id: span_multi_wrapper
      type: Box
      blocks:
        - id: span_multi_hello
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              fontWeight: bold
          properties:
            content: 'Hello, '
        - id: span_multi_world
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#1677ff'
          properties:
            content: 'world'
        - id: span_multi_excl
          type: Span
          layout:
            flex: 0 0 auto
          properties:
            content: '!'

- title: Nested Spans
  blocks:
    - id: span_nested_outer
      type: Span
      style:
        --element:
          padding: 8px 12px
          background: '#f5f5f5'
          borderRadius: 6
          display: inline-flex
          alignItems: center
          gap: 8
      blocks:
        - id: span_nested_label
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              fontWeight: bold
              color: '#262626'
          properties:
            content: 'Status:'
        - id: span_nested_value
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#52c41a'
          blocks:
            - id: span_nested_value_icon
              type: Icon
              layout:
                flex: 0 0 auto
              properties:
                name: AiOutlineCheckCircle
                size: 14
                color: '#52c41a'
            - id: span_nested_value_text
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: Active

- title: Colored Tags
  blocks:
    - id: span_tag_blue
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#e6f4ff'
          color: '#1677ff'
          padding: 2px 8px
          borderRadius: 4
          fontSize: 12
          border: 1px solid #91caff
      properties:
        content: Info
    - id: span_tag_green
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#f6ffed'
          color: '#52c41a'
          padding: 2px 8px
          borderRadius: 4
          fontSize: 12
          border: 1px solid #b7eb8f
      properties:
        content: Success
    - id: span_tag_red
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#fff2f0'
          color: '#ff4d4f'
          padding: 2px 8px
          borderRadius: 4
          fontSize: 12
          border: 1px solid #ffccc7
      properties:
        content: Error

- title: Badge-Style Spans
  blocks:
    - id: span_badge_primary
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#1677ff'
          color: '#ffffff'
          padding: 2px 10px
          borderRadius: 12
          fontSize: 12
          fontWeight: bold
      properties:
        content: NEW
    - id: span_badge_danger
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#ff4d4f'
          color: '#ffffff'
          padding: 2px 10px
          borderRadius: 12
          fontSize: 12
          fontWeight: bold
      properties:
        content: '3'
    - id: span_badge_success
      type: Span
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#52c41a'
          color: '#ffffff'
          padding: 2px 10px
          borderRadius: 12
          fontSize: 12
          fontWeight: bold
      properties:
        content: LIVE

- title: Inline Icon and Text
  blocks:
