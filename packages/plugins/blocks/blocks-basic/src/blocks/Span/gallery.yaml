      type: Span
      style:
        --element:
          display: inline-flex
          alignItems: center
          gap: 6
      blocks:
        - id: span_icon_smile_icon
          type: Icon
          layout:
            flex: 0 0 auto
          properties:
            name: AiOutlineSmile
            size: 16
            color: '#faad14'
        - id: span_icon_smile_label
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: Happy face
    - id: span_icon_check
      type: Span
      style:
        --element:
          display: inline-flex
          alignItems: center
          gap: 6
      blocks:
        - id: span_icon_check_icon
          type: Icon
          layout:
            flex: 0 0 auto
          properties:
            name: AiOutlineCheckCircle
            size: 16
            color: '#52c41a'
        - id: span_icon_check_label
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: Approved
    - id: span_icon_warning
      type: Span
      style:
        --element:
          display: inline-flex
          alignItems: center
          gap: 6
      blocks:
        - id: span_icon_warning_icon
          type: Icon
          layout:
            flex: 0 0 auto
          properties:
            name: AiOutlineWarning
            size: 16
            color: '#ff4d4f'
        - id: span_icon_warning_label
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: Warning

- title: Order Status Indicator
  blocks:
    - id: span_order_wrapper
      type: Box
      layout:
        gap: 16
        align: center
      blocks:
        - id: span_order_label
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              fontWeight: bold
              color: '#262626'
          properties:
            content: 'Order #10482:'
        - id: span_order_shipped
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              display: inline-flex
              alignItems: center
              gap: 6
              background: '#f6ffed'
              color: '#52c41a'
              padding: 4px 12px
              borderRadius: 12
              fontSize: 13
              fontWeight: 500
              border: 1px solid #b7eb8f
          blocks:
            - id: span_order_shipped_icon
              type: Icon
              layout:
                flex: 0 0 auto
              properties:
                name: AiOutlineCheckCircle
                size: 14
                color: '#52c41a'
            - id: span_order_shipped_text
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: Shipped
        - id: span_order_date
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#8c8c8c'
              fontSize: 13
          properties:
            content: Estimated delivery Mar 18, 2026

- title: Breadcrumb Navigation
  blocks:
    - id: span_breadcrumb_wrapper
      type: Box
      layout:
        gap: 8
        align: center
      blocks:
        - id: span_breadcrumb_home
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#1677ff'
              cursor: pointer
          properties:
            content: Home
          events:
            onClick:
              - id: span_breadcrumb_home_click
                type: Link
                params:
                  url: /
        - id: span_breadcrumb_sep1
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#d9d9d9'
          properties:
            content: /
        - id: span_breadcrumb_products
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#1677ff'
              cursor: pointer
          properties:
            content: Products
          events:
            onClick:
              - id: span_breadcrumb_products_click
                type: Link
                params:
                  url: /products
        - id: span_breadcrumb_sep2
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#d9d9d9'
          properties:
            content: /
        - id: span_breadcrumb_current
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              color: '#595959'
              fontWeight: 500
          properties:
            content: Widget Pro X

- title: User Profile Badge
  blocks:
    - id: span_profile_wrapper
      type: Box
      layout:
        gap: 12
        align: center
      blocks:
        - id: span_profile_avatar
          type: Icon
          layout:
            flex: 0 0 auto
          properties:
            name: AiOutlineUser
            size: 20
            color: '#1677ff'
        - id: span_profile_name
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              fontWeight: bold
              fontSize: 14
              color: '#262626'
          properties:
            content: Sarah Mitchell
        - id: span_profile_role
          type: Span
          layout:
            flex: 0 0 auto
          class:
            element: bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full text-xs font-medium
          properties:
            content: Admin
        - id: span_profile_status
          type: Span
          layout:
            flex: 0 0 auto
          style:
            --element:
              display: inline-flex
              alignItems: center
              gap: 4
              fontSize: 12
              color: '#52c41a'
          blocks:
            - id: span_profile_status_dot
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: '<span style="width:6px;height:6px;background:#52c41a;border-radius:50%;display:inline-block;"></span>'
            - id: span_profile_status_text
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: Online
