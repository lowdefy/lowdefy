# ──────────────────────────────────────────────
# Properties
# ──────────────────────────────────────────────

- title: Direction
  fullWidth: true
  blocks:
    - id: list_basic
      type: List
      blocks:
        - id: list_basic_item
          type: Html
          properties:
            html: List item content
    - id: list_row
      type: List
      properties:
        direction: row
      blocks:
        - id: list_row_item
          type: Box
          layout:
            flex: 0 0 auto
          style:
            --element:
              background: '#1677ff'
              color: '#ffffff'
              padding: 8px 16px
              borderRadius: 6
          properties:
            content: Item label
    - id: list_column
      type: List
      properties:
        direction: column
      blocks:
        - id: list_column_item
          type: Box
          style:
            --element:
              background: '#f5f5f5'
              padding: 12
              borderRadius: 6
              marginBottom: 4
          blocks:
            - id: list_column_item_text
              type: Html
              properties:
                html: Item name
    - id: list_row_rev
      type: List
      properties:
        direction: row-reverse
      blocks:
        - id: list_row_rev_item
          type: Box
          layout:
            flex: 0 0 auto
          style:
            --element:
              background: '#722ed1'
              color: '#ffffff'
              padding: 8px 16px
              borderRadius: 6
          properties:
            content: Item label
    - id: list_col_rev
      type: List
      properties:
        direction: column-reverse
      blocks:
        - id: list_col_rev_item
          type: Box
          style:
            --element:
              background: '#f5f5f5'
              padding: 12
              borderRadius: 6
              marginBottom: 4
          blocks:
            - id: list_col_rev_item_text
              type: Html
              properties:
                html: Item name

- title: Wrap and Scroll
  fullWidth: true
  blocks:
    - id: list_wrap
      type: List
      properties:
        direction: row
        wrap: wrap
      blocks:
        - id: list_wrap_item
          type: Box
          layout:
            flex: 0 0 150px
          style:
            --element:
              background: '#52c41a'
              color: '#ffffff'
              padding: 8px 16px
              borderRadius: 6
              textAlign: center
              margin: 4
          properties:
            content: Item label
    - id: list_nowrap
      type: List
      properties:
        direction: row
        wrap: nowrap
      style:
        --element:
          overflow: auto
      blocks:
        - id: list_nowrap_item
          type: Box
          layout:
            flex: 0 0 150px
          style:
            --element:
              background: '#fa8c16'
              color: '#ffffff'
              padding: 8px 16px
              borderRadius: 6
              textAlign: center
              margin: 4
          properties:
            content: Item label
    - id: list_scroll
      type: List
      properties:
        direction: column
        scroll: true
      style:
        --element:
          maxHeight: 180
          border: 1px solid #d9d9d9
          borderRadius: 8
          padding: 8
      blocks:
        - id: list_scroll_item
          type: Box
          style:
            --element:
              background: '#f5f5f5'
              padding: 12
              borderRadius: 6
              marginBottom: 4
          blocks:
            - id: list_scroll_item_text
              type: Html
              properties:
                html: Item name

# ──────────────────────────────────────────────
# Styling
# ──────────────────────────────────────────────

- title: Styled with Tailwind Classes
  fullWidth: true
  blocks:
    - id: list_tw_rounded
      type: List
      properties:
        direction: column
      class: bg-gray-50 p-4 rounded-xl shadow-sm
      blocks:
        - id: list_tw_rounded_item
          type: Html
          properties:
            html: List item content
    - id: list_tw_border
      type: List
      properties:
        direction: column
      class: border-2 border-dashed border-blue-400 p-4 rounded-lg
      blocks:
        - id: list_tw_border_item
          type: Html
          properties:
            html: List item content
    - id: list_tw_accent
      type: List
      properties:
        direction: column
      class: border-l-4 border-l-green-500 pl-4 py-2 bg-green-50 rounded-r-lg
      blocks:
        - id: list_tw_accent_item
          type: Html
          properties:
            html: List item content

- title: Styled with CSS Key Object
  fullWidth: true
  blocks:
    - id: list_csskey_blue
      type: List
      properties:
        direction: column
      style:
        --element:
          background: '#f0f5ff'
          padding: 16
          borderRadius: 8
          border: 1px solid #91caff
      blocks:
        - id: list_csskey_blue_item
          type: Html
          properties:
            html: List item content
    - id: list_csskey_shadow
      type: List
      properties:
        direction: column
      style:
        --element:
          padding: 16
          borderRadius: 12
          boxShadow: 0 4px 12px rgba(0, 0, 0, 0.1)
          background: '#ffffff'
      blocks:
        - id: list_csskey_shadow_item
          type: Html
          properties:
            html: List item content
    - id: list_csskey_dark
      type: List
      properties:
        direction: column
      style:
        --element:
          background: '#1a1a2e'
          color: '#e0e0e0'
          padding: 16
          borderRadius: 8
      blocks:
        - id: list_csskey_dark_item
          type: Html
          style:
            --element:
              color: '#a0a0a0'
          properties:
            html: List item content

# ──────────────────────────────────────────────
# Applied Examples
# ──────────────────────────────────────────────

- title: List in User Directory
  fullWidth: true
  blocks:
    - id: list_user_dir
      type: List
      properties:
        direction: column
      blocks:
        - id: list_user_dir_item
          type: Box
          layout:
            gap: 12
            align: center
          style:
            --element:
              background: '#ffffff'
              padding: 12px 16px
              borderRadius: 8
              border: 1px solid #f0f0f0
              marginBottom: 8
          events:
            onClick:
              - id: list_user_dir_click
                type: DisplayMessage
                params:
                  content: User selected
                  status: info
          blocks:
            - id: list_user_dir_icon
              type: Icon
              layout:
                flex: 0 0 auto
              properties:
                name: AiOutlineUser
                size: 24
                color: '#1677ff'
            - id: list_user_dir_name
              type: Html
              layout:
                flex: 1
              properties:
                html: Item name

- title: List in Card Gallery
  fullWidth: true
  blocks:
    - id: list_card_gallery
      type: List
      properties:
        direction: row
        wrap: wrap
      blocks:
        - id: list_card_gallery_item
          type: Box
          layout:
            flex: 0 0 200px
          style:
            --element:
              background: '#ffffff'
              padding: 16
              borderRadius: 8
              boxShadow: 0 2px 8px rgba(0, 0, 0, 0.1)
              margin: 4
          events:
            onClick:
              - id: list_card_gallery_click
                type: DisplayMessage
                params:
                  content: Card selected
                  status: info
          blocks:
            - id: list_card_gallery_title
              type: Html
              properties:
                html: '<h4 style="margin: 0 0 8px 0;">Card Title</h4>'
            - id: list_card_gallery_desc
              type: Html
              properties:
                html: Card description text
