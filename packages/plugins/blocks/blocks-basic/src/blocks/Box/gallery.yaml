- title: Page Layout with Header, Body, and Footer
  fullWidth: true
  blocks:
    - id: box_page_layout
      type: Box
      style:
        --element:
          display: flex
          flexDirection: column
          minHeight: 300
          borderRadius: 8
          overflow: hidden
          border: 1px solid #d9d9d9
      blocks:
        - id: box_page_header
          type: Box
          layout:
            justify: space-between
            align: center
          class: bg-slate-900 px-5 py-3
          blocks:
            - id: box_page_logo
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: '<span style="color: #ffffff; font-weight: bold; font-size: 16px;">My App</span>'
            - id: box_page_nav
              type: Box
              layout:
                flex: 0 0 auto
                gap: 16
              blocks:
                - id: box_page_nav_home
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Home
                    color: default
                    variant: link
                  events:
                    onClick:
                      - id: box_page_nav_home_link
                        type: Link
                        params:
                          pageId: home
                - id: box_page_nav_about
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: About
                    color: default
                    variant: link
                  events:
                    onClick:
                      - id: box_page_nav_about_link
                        type: Link
                        params:
                          pageId: about
                - id: box_page_nav_contact
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Contact
                    color: default
                    variant: link
                  events:
                    onClick:
                      - id: box_page_nav_contact_link
                        type: Link
                        params:
                          pageId: contact
        - id: box_page_body
          type: Box
          layout:
            flex: 1
          class: bg-white p-6
          blocks:
            - id: box_page_body_text
              type: Html
              properties:
                html: '<p style="margin: 0; color: #595959;">Main content area grows to fill available space using flex: 1. Place page content blocks here.</p>'
        - id: box_page_footer
          type: Box
          layout:
            justify: center
          class: bg-gray-100 px-5 py-3 border-t border-gray-300
          blocks:
            - id: box_page_footer_text
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: '<span style="color: #8c8c8c; font-size: 13px;">2026 My App. All rights reserved.</span>'

- title: Notification Inbox
  fullWidth: true
