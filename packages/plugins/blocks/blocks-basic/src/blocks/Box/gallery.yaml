              background: '#ffffff'
              padding: 16
              borderRadius: 6
              border: 1px solid #d9d9d9
          blocks:
            - id: box_nested_left_title
              type: Html
              properties:
                html: '<h4 style="margin: 0 0 8px 0;">Left Panel</h4>'
            - id: box_nested_left_text
              type: Html
              properties:
                html: '<p style="margin: 0; color: #595959;">This box is nested inside the outer box with flex: 1.</p>'
        - id: box_nested_right
          type: Box
          layout:
            flex: 1
          style:
