- title: Header and Footer Pattern
  fullWidth: true
  blocks:
    - id: box_layout_page
      type: Box
      style:
        --element:
          display: flex
          flexDirection: column
          minHeight: 300
          borderRadius: 8
          overflow: hidden
          border: 1px solid #d9d9d9
      blocks:
        - id: box_layout_header
          type: Box
          layout:
            justify: space-between
            align: center
          style:
            --element:
              background: '#001529'
              padding: 12px 20px
          blocks:
            - id: box_layout_logo
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: '<span style="color: #ffffff; font-weight: bold; font-size: 16px;">My App</span>'
            - id: box_layout_nav
              type: Box
              layout:
                flex: 0 0 auto
                gap: 16
              blocks:
                - id: box_layout_nav_a
                  type: Html
                  layout:
                    flex: 0 0 auto
                  properties:
                    html: '<span style="color: rgba(255,255,255,0.65);">Home</span>'
                - id: box_layout_nav_b
                  type: Html
                  layout:
                    flex: 0 0 auto
                  properties:
                    html: '<span style="color: rgba(255,255,255,0.65);">About</span>'
                - id: box_layout_nav_c
                  type: Html
                  layout:
                    flex: 0 0 auto
                  properties:
                    html: '<span style="color: rgba(255,255,255,0.65);">Contact</span>'
        - id: box_layout_body
          type: Box
          layout:
            flex: 1
          style:
            --element:
              padding: 24
              background: '#ffffff'
          blocks:
            - id: box_layout_body_text
              type: Html
              properties:
                html: '<p style="margin: 0; color: #595959;">Main content area grows to fill available space using flex: 1.</p>'
        - id: box_layout_footer
          type: Box
          layout:
            justify: center
          style:
            --element:
              background: '#f5f5f5'
              padding: 12px 20px
              borderTop: 1px solid #d9d9d9
          blocks:
            - id: box_layout_footer_text
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: '<span style="color: #8c8c8c; font-size: 13px;">Footer content centered with justify: center</span>'

