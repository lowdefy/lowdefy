    - id: box_style_shadow
      type: Box
      layout:
        flex: 0 0 auto
      style:
        --element:
          padding: 20
          borderRadius: 12
          boxShadow: 0 4px 12px rgba(0, 0, 0, 0.1)
          background: '#ffffff'
      blocks:
        - id: box_style_shadow_text
          type: Html
          properties:
            html: '<p style="margin: 0;">Elevated box with box-shadow.</p>'
    - id: box_style_border
      type: Box
      layout:
        flex: 0 0 auto
      style:
        --element:
          border: 2px dashed #1677ff
          padding: 16
          borderRadius: 8
      blocks:
        - id: box_style_border_text
          type: Html
          properties:
            html: '<p style="margin: 0; color: #1677ff;">Dashed blue border.</p>'
    - id: box_style_accent
      type: Box
      layout:
        flex: 0 0 auto
      style:
        --element:
          borderLeft: 4px solid #fa8c16
          paddingLeft: 16
          paddingTop: 8
          paddingBottom: 8
      blocks:
        - id: box_style_accent_text
          type: Html
          properties:
            html: '<p style="margin: 0; color: #fa8c16; font-weight: 500;">Left accent border.</p>'
    - id: box_style_centered
      type: Box
      style:
        --element:
          maxWidth: 350
          margin: 0 auto
          textAlign: center
          padding: 16
          background: '#f0f5ff'
          borderRadius: 8
      blocks:
        - id: box_style_centered_text
          type: Html
          properties:
            html: '<p style="margin: 0; color: #1677ff; font-weight: bold;">Centered and constrained width.</p>'
