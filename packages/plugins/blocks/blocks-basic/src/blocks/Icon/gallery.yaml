- title: Style Overrides
  blocks:
    - id: style_padded
      type: Icon
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#f0f5ff'
          padding: 12
          borderRadius: 50%
      properties:
        name: AiOutlineUser
        size: 32
        color: '#1677ff'
    - id: style_bordered
      type: Icon
      layout:
        flex: 0 0 auto
      style:
        --element:
          border: 2px solid #d9d9d9
          padding: 10
          borderRadius: 8
      properties:
        name: AiOutlineSetting
        size: 28
        color: '#595959'
    - id: style_shadow
      type: Icon
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#ffffff'
          padding: 14
          borderRadius: 12
          boxShadow: 0 2px 8px rgba(0, 0, 0, 0.15)
      properties:
        name: AiOutlineBell
        size: 30
        color: '#fa8c16'
    - id: style_gradient_bg
      type: Icon
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
          padding: 14
          borderRadius: 12
      properties:
        name: AiOutlineThunderbolt
        size: 30
        color: '#ffffff'
    - id: style_circle_bg
      type: Icon
      layout:
        flex: 0 0 auto
      style:
        --element:
          background: '#ff4d4f'
          padding: 12
          borderRadius: 50%
          display: flex
          alignItems: center
          justifyContent: center
      properties:
        name: AiOutlineHeart
        size: 24
        color: '#ffffff'

- title: Disable Loading Icon
  blocks:
    - id: disable_loading_false_label
      type: Markdown
      properties:
        content: '**disableLoadingIcon: false (default):**'
    - id: disable_loading_default
      type: Icon
      layout:
        flex: 0 0 auto
      properties:
        name: AiOutlineEdit
        size: 32
        color: '#1677ff'
        disableLoadingIcon: false
    - id: disable_loading_true_label
      type: Markdown
      properties:
        content: '**disableLoadingIcon: true:**'
    - id: disable_loading_true
      type: Icon
      layout:
        flex: 0 0 auto
      properties:
        name: AiOutlineEdit
        size: 32
        color: '#1677ff'
        disableLoadingIcon: true
