- title: Audit trail timeline
  fullWidth: true
  blocks:
    - id: diff_timeline_order
      type: DiffTimeline
      properties:
        title: Order #A-10422
        before:
          status: pending
          subtotal: 129.5
          tax: 10.36
          total: 139.86
          items:
            - Notebook (A5)
            - Pen (blue)
          internal:
            createdBy: sys
            traceId: abc-123
        after:
          status: paid
          subtotal: 129.5
          tax: 10.36
          total: 139.86
          items:
            - Notebook (A5)
            - Pen (blue)
            - Sticky notes
          internal:
            createdBy: sys
            traceId: abc-999
        hide:
          - 'internal.*'
        labels:
          status: Status
          subtotal: Subtotal
          tax: Tax
          total: Total
          items: Line items
        format:
          subtotal: { type: currency, currency: USD }
          tax: { type: currency, currency: USD }
          total: { type: currency, currency: USD }
          status:
            type: enum
            map:
              pending: { label: Pending, color: warning }
              paid: { label: Paid, color: success }
              cancelled: { label: Cancelled, color: error }
