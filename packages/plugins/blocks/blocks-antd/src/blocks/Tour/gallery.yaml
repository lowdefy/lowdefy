- title: Basic Tour with Steps
  fullWidth: true
  blocks:
    - id: basic_steps_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Welcome
            description: This is the first step of the tour.
          - title: Explore Features
            description: Discover the key features available in the dashboard.
          - title: Get Started
            description: You are all set to begin using the application.
    - id: basic_single_step_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Quick Tip
            description: A single-step tour works well for brief announcements.
    - id: basic_detailed_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Step 1 of 5
            description: Tours support many steps for longer walkthroughs.
          - title: Step 2 of 5
            description: Each step can have its own title and description.
          - title: Step 3 of 5
            description: Users navigate with Next and Previous buttons.
          - title: Step 4 of 5
            description: Steps are zero-indexed internally.
          - title: Step 5 of 5
            description: The last step shows a Finish button instead of Next.

- title: Tour Types
  fullWidth: true
  blocks:
    - id: type_default_tour
      type: Tour
      properties:
        open: false
        type: default
        steps:
          - title: Default Type
            description: Light background with dark text. Blends naturally with light-themed interfaces.
          - title: Subtle Guidance
            description: The default type is understated, ideal for non-intrusive tours.
    - id: type_primary_tour
      type: Tour
      properties:
        open: false
        type: primary
        steps:
          - title: Primary Type
            description: Bold colored background using the theme primary color.
          - title: High Visibility
            description: Primary tours draw attention and suit critical onboarding flows.
    - id: type_per_step_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: type_per_step_btn_1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Introduction
            color: default
            variant: outlined
        - id: type_per_step_btn_2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Key Feature
            color: primary
            variant: solid
    - id: type_per_step_tour
      type: Tour
      properties:
        open: false
        type: default
        steps:
          - title: Introduction
            description: This step inherits the default type from the tour.
            target: type_per_step_btn_1
            type: default
          - title: Key Feature
            description: This step overrides to primary to draw extra attention.
            target: type_per_step_btn_2
            type: primary

- title: Targeted Steps
  fullWidth: true
  blocks:
    - id: target_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: target_upload_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Upload
            color: primary
            variant: solid
            icon: AiOutlineUpload
        - id: target_save_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Save Draft
            color: green
            variant: outlined
            icon: AiOutlineSave
        - id: target_share_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Share
            color: purple
            variant: solid
            icon: AiOutlineShareAlt
    - id: target_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Upload Files
            description: Click here to upload documents or images to the workspace.
            target: target_upload_btn
          - title: Save Progress
            description: Save your current work as a draft to continue later.
            target: target_save_btn
          - title: Share with Team
            description: Share your work with team members via link or invitation.
            target: target_share_btn
    - id: target_mixed_row
      type: Box
      layout:
        gap: 16
        align: center
      blocks:
        - id: target_mixed_input
          type: TextInput
          layout:
            flex: 0 0 240px
          properties:
            label:
              disabled: true
            placeholder: Search...
        - id: target_mixed_switch
          type: Switch
          layout:
            flex: 0 0 auto
          properties:
            label:
              disabled: true
    - id: target_mixed_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Search Bar
            description: Use the search bar to quickly find items.
            target: target_mixed_input
          - title: Toggle Setting
            description: Toggle this switch to enable or disable notifications.
            target: target_mixed_switch

- title: Placement
  fullWidth: true
  blocks:
    - id: placement_row
      type: Box
      layout:
        gap: 16
        justify: center
      blocks:
        - id: placement_top_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Top
            color: primary
            variant: outlined
        - id: placement_right_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Right
            color: green
            variant: outlined
        - id: placement_bottom_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Bottom
            color: purple
            variant: outlined
        - id: placement_left_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Left
            color: orange
            variant: outlined
    - id: placement_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Top Placement
            description: Guide card appears above the target element.
            target: placement_top_btn
            placement: top
          - title: Right Placement
            description: Guide card appears to the right of the target.
            target: placement_right_btn
            placement: right
          - title: Bottom Placement
            description: Guide card appears below the target element.
            target: placement_bottom_btn
            placement: bottom
          - title: Left Placement
            description: Guide card appears to the left of the target.
            target: placement_left_btn
            placement: left
    - id: placement_fine_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Top Left
            description: Aligned to the top-left corner of the target.
            placement: topLeft
          - title: Bottom Right
            description: Aligned to the bottom-right corner of the target.
            placement: bottomRight
          - title: Right Top
            description: On the right side, aligned to the top.
            placement: rightTop
    - id: placement_tour_level
      type: Tour
      properties:
        open: false
        placement: bottom
        steps:
          - title: Tour-Level Placement
            description: Setting placement on the tour applies to all steps by default.
          - title: Consistent Position
            description: All steps appear below the target unless overridden at the step level.

- title: Mask Configuration
  fullWidth: true
  blocks:
    - id: mask_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: mask_target_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Masked Target
            color: primary
            variant: solid
    - id: mask_enabled_tour
      type: Tour
      properties:
        open: false
        mask: true
        steps:
          - title: Mask Enabled
            description: The background is dimmed, drawing focus to the tour card.
            target: mask_target_btn
    - id: mask_disabled_tour
      type: Tour
      properties:
        open: false
        mask: false
        steps:
          - title: Mask Disabled
            description: No overlay is shown. The page remains fully visible and interactive.
    - id: mask_custom_tour
      type: Tour
      properties:
        open: false
        mask:
          style:
            boxShadow: inset 0 0 15px #333
          color: rgba(80, 0, 130, 0.5)
        steps:
          - title: Custom Mask
            description: A purple-tinted overlay with an inner shadow effect.
            target: mask_target_btn
    - id: mask_per_step_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: mask_per_step_btn_1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Masked Step
            color: primary
            variant: solid
        - id: mask_per_step_btn_2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Unmasked Step
            color: default
            variant: outlined
    - id: mask_per_step_tour
      type: Tour
      properties:
        open: false
        mask: true
        steps:
          - title: Masked
            description: This step shows the mask overlay.
            target: mask_per_step_btn_1
            mask: true
          - title: Unmasked
            description: This step hides the mask for a clear view.
            target: mask_per_step_btn_2
            mask: false

- title: Arrow Configuration
  fullWidth: true
  blocks:
    - id: arrow_enabled_tour
      type: Tour
      properties:
        open: false
        arrow: true
        steps:
          - title: Arrow Visible
            description: An arrow points from the guide card toward the target element.
          - title: Visual Connection
            description: Arrows help users understand which element the step references.
    - id: arrow_disabled_tour
      type: Tour
      properties:
        open: false
        arrow: false
        steps:
          - title: No Arrow
            description: Without arrows, the guide card appears as a clean floating panel.
    - id: arrow_centered_tour
      type: Tour
      properties:
        open: false
        arrow:
          pointAtCenter: true
        steps:
          - title: Centered Arrow
            description: The arrow points precisely at the center of the target element.
    - id: arrow_per_step_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: arrow_per_step_btn_1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: With Arrow
            color: primary
            variant: solid
        - id: arrow_per_step_btn_2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Centered Arrow
            color: green
            variant: solid
    - id: arrow_per_step_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Default Arrow
            description: This step shows the default arrow.
            target: arrow_per_step_btn_1
            arrow: true
          - title: Centered Arrow
            description: This step points the arrow at the center of the target.
            target: arrow_per_step_btn_2
            arrow:
              pointAtCenter: true

- title: Cover Images
  fullWidth: true
  blocks:
    - id: cover_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Welcome to the Dashboard
            description: Get familiar with the main interface and its key areas.
            cover: https://gw.alipayobjects.com/zos/bmw-prod/e9a9b1e8-5e62-4e12-a3b7-e3695b0a5f3c.png
          - title: Navigation Menu
            description: Use the sidebar to navigate between different sections.
            cover: https://gw.alipayobjects.com/zos/bmw-prod/ed5cf3c4-5e34-43e5-9c39-fe131c7cf88e.png
          - title: All Done
            description: You are ready to start using the application.
    - id: cover_target_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: cover_target_btn_1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Dashboard
            color: primary
            variant: solid
            icon: AiOutlineDashboard
        - id: cover_target_btn_2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Settings
            color: default
            variant: outlined
            icon: AiOutlineSetting
    - id: cover_target_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Dashboard Overview
            description: The dashboard shows a summary of your workspace activity.
            target: cover_target_btn_1
            cover: https://gw.alipayobjects.com/zos/bmw-prod/e9a9b1e8-5e62-4e12-a3b7-e3695b0a5f3c.png
          - title: Configure Settings
            description: Adjust preferences and integrations from the settings page.
            target: cover_target_btn_2
            cover: https://gw.alipayobjects.com/zos/bmw-prod/ed5cf3c4-5e34-43e5-9c39-fe131c7cf88e.png

- title: Closable and Keyboard Navigation
  fullWidth: true
  blocks:
    - id: closable_tour
      type: Tour
      properties:
        open: false
        closable: true
        keyboard: true
        steps:
          - title: Closable Tour
            description: The close button (X) is visible. Press Escape to close.
          - title: Keyboard Navigation
            description: Use arrow keys to navigate between steps.
          - title: Final Step
            description: Both close button and keyboard shortcuts are available throughout.
    - id: not_closable_tour
      type: Tour
      properties:
        open: false
        closable: false
        keyboard: false
        steps:
          - title: Guided Tour
            description: Close button and Escape key are disabled. Use Next and Previous buttons.
          - title: Must Complete
            description: Users must step through all steps to finish the tour.
    - id: closable_per_step_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: closable_per_step_btn_1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Closable
            color: green
            variant: outlined
        - id: closable_per_step_btn_2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Not Closable
            color: orange
            variant: outlined
    - id: closable_per_step_tour
      type: Tour
      properties:
        open: false
        closable: true
        steps:
          - title: Closable Step
            description: This step has the close button visible.
            target: closable_per_step_btn_1
            closable: true
          - title: Not Closable Step
            description: This step hides the close button. Navigate forward to continue.
            target: closable_per_step_btn_2
            closable: false

- title: Animation, Scroll, and Disabled Interaction
  fullWidth: true
  blocks:
    - id: animated_tour
      type: Tour
      properties:
        open: false
        animated: true
        scrollIntoViewOptions: true
        steps:
          - title: Animated Tour
            description: Smooth transitions between steps with animation enabled.
          - title: Auto Scroll
            description: Target elements automatically scroll into view when a step activates.
    - id: no_animation_tour
      type: Tour
      properties:
        open: false
        animated: false
        scrollIntoViewOptions: false
        steps:
          - title: No Animation
            description: Instant transitions without animation. Scroll to target is also disabled.
    - id: disabled_interaction_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: disabled_interaction_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Cannot Click During Tour
            color: primary
            variant: solid
            icon: AiOutlineLock
    - id: disabled_interaction_tour
      type: Tour
      properties:
        open: false
        disabledInteraction: true
        steps:
          - title: Interaction Disabled
            description: The highlighted target element cannot be clicked during this tour.
            target: disabled_interaction_btn
          - title: Read-Only Tour
            description: Users can only navigate tour steps, not interact with highlighted elements.

- title: Gap and Current Step
  fullWidth: true
  blocks:
    - id: gap_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: gap_default_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Default Gap
            color: primary
            variant: solid
        - id: gap_large_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Large Gap
            color: purple
            variant: solid
        - id: gap_tight_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No Gap
            color: orange
            variant: solid
    - id: gap_default_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Default Gap
            description: Standard spacing between the highlighted area and the target.
            target: gap_default_btn
    - id: gap_large_tour
      type: Tour
      properties:
        open: false
        gap:
          x: 20
          y: 20
        steps:
          - title: Large Gap
            description: Increased gap (20px) around the target for more breathing room.
            target: gap_large_btn
    - id: gap_tight_tour
      type: Tour
      properties:
        open: false
        gap:
          x: 0
          y: 0
        steps:
          - title: No Gap
            description: The highlight fits tightly around the target with zero spacing.
            target: gap_tight_btn
    - id: current_step_tour
      type: Tour
      properties:
        open: false
        current: 1
        steps:
          - title: Step One
            description: This is the first step, but the tour does not start here.
          - title: Step Two (Starting Point)
            description: The tour opens at this step because current is set to 1 (zero-indexed).
          - title: Step Three
            description: This is the third and final step.

- title: Z-Index Control
  fullWidth: true
  blocks:
    - id: zindex_default_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Default Z-Index
            description: Tour uses the default stacking order (1070). Appears above most content.
    - id: zindex_high_tour
      type: Tour
      properties:
        open: false
        zIndex: 2000
        steps:
          - title: High Z-Index (2000)
            description: Tour renders above other overlays such as modals and drawers.
    - id: zindex_low_tour
      type: Tour
      properties:
        open: false
        zIndex: 900
        steps:
          - title: Low Z-Index (900)
            description: Tour renders below some overlays. Fixed headers may appear above it.

- title: Events
  fullWidth: true
  blocks:
    - id: events_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: events_btn_1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Step 1 Target
            color: primary
            variant: solid
        - id: events_btn_2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Step 2 Target
            color: green
            variant: solid
    - id: events_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: First Step
            description: Navigate forward to trigger the onChange event.
            target: events_btn_1
          - title: Second Step
            description: Close the tour or finish to trigger onClose or onFinish.
            target: events_btn_2
      events:
        onChange:
          - id: events_on_change
            type: DisplayMessage
            params:
              content: Step changed!
              status: info
        onClose:
          - id: events_on_close
            type: DisplayMessage
            params:
              content: Tour closed.
              status: warning
        onFinish:
          - id: events_on_finish
            type: DisplayMessage
            params:
              content: Tour completed!
              status: success

- title: Style and CSS
  fullWidth: true
  blocks:
    - id: css_tailwind_tour
      type: Tour
      class: shadow-2xl
      properties:
        open: false
        steps:
          - title: Tailwind Shadow
            description: Tailwind utility classes can be applied via the class property.
    - id: css_rounded_tour
      type: Tour
      class: rounded-2xl
      properties:
        open: false
        steps:
          - title: Tailwind Rounded
            description: Additional border radius applied via Tailwind class.
    - id: css_inline_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Inline Style
            description: The element style key controls the tour card appearance.
      style:
        --element:
          maxWidth: 320px
    - id: css_dark_bg
      type: Box
      class: bg-gradient-to-r from-slate-900 to-slate-700 p-4 rounded-lg
      layout:
        gap: 8
      blocks:
        - id: css_dark_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Start Tour on Dark Background
            ghost: true
            color: primary
            variant: outlined
    - id: css_dark_tour
      type: Tour
      properties:
        open: false
        steps:
          - title: Dark Background Context
            description: Tour cards remain visible against dark page backgrounds.
            target: css_dark_btn

- title: Theme Token Overrides
  fullWidth: true
  blocks:
    - id: theme_purple_tour
      type: Tour
      properties:
        open: false
        type: primary
        theme:
          colorPrimary: '#722ed1'
        steps:
          - title: Purple Primary
            description: Custom purple colorPrimary changes background and button colors.
          - title: Brand Alignment
            description: Theme tokens align the tour with your brand palette.
    - id: theme_rounded_tour
      type: Tour
      properties:
        open: false
        theme:
          borderRadiusLG: 20
          padding: 24
        steps:
          - title: Rounded Card
            description: Increased border radius (20px) and padding (24px) for a softer look.
    - id: theme_large_font_tour
      type: Tour
      properties:
        open: false
        theme:
          fontSize: 16
          fontSizeLG: 20
        steps:
          - title: Large Text
            description: Increased font sizes improve readability and accessibility.
    - id: theme_combined_tour
      type: Tour
      properties:
        open: false
        type: primary
        theme:
          colorPrimary: '#fa541c'
          borderRadiusLG: 12
          primaryPrevBtnBg: rgba(255, 255, 255, 0.35)
          arrowOffsetHorizontal: 16
        steps:
          - title: Combined Tokens
            description: Multiple tokens create a cohesive warm-themed tour.
          - title: Previous Button
            description: The primaryPrevBtnBg token makes the Previous button more visible.

- title: Tour in Onboarding Flow
  fullWidth: true
  blocks:
    - id: onboard_card
      type: Card
      properties:
        title: My Application
        size: small
      blocks:
        - id: onboard_header_row
          type: Box
          layout:
            gap: 16
            align: center
          blocks:
            - id: onboard_search
              type: TextInput
              layout:
                flex: 1 1 auto
              properties:
                label:
                  disabled: true
                placeholder: Search anything...
            - id: onboard_create_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Create New
                color: primary
                variant: solid
                icon: AiOutlinePlus
            - id: onboard_profile_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Profile
                color: default
                variant: text
                icon: AiOutlineUser
            - id: onboard_settings_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Settings
                color: default
                variant: text
                icon: AiOutlineSetting
        - id: onboard_content
          type: Markdown
          properties:
            content: |
              Welcome to the application. Click the button below to take a guided tour of the interface.
        - id: onboard_start_row
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: onboard_start_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Take the Tour
                color: primary
                variant: solid
                icon: AiOutlineQuestionCircle
              events:
                onClick:
                  - id: onboard_start_tour
                    type: SetState
                    params:
                      show_onboard_tour: true
    - id: onboard_tour
      type: Tour
      properties:
        open:
          _state: show_onboard_tour
        type: default
        mask: true
        animated: true
        steps:
          - title: Welcome
            description: Let us take a quick tour to get you started.
            cover: https://gw.alipayobjects.com/zos/bmw-prod/e9a9b1e8-5e62-4e12-a3b7-e3695b0a5f3c.png
          - title: Search
            description: Use the search bar to quickly find documents, users, or settings.
            target: onboard_search
            placement: bottom
          - title: Create Content
            description: Click here to create a new document, project, or workspace item.
            target: onboard_create_btn
            placement: bottom
          - title: Your Profile
            description: Access your profile to update personal information and preferences.
            target: onboard_profile_btn
            placement: bottomRight
          - title: Settings
            description: Configure application settings, integrations, and notifications.
            target: onboard_settings_btn
            placement: bottomRight
      events:
        onClose:
          - id: onboard_close
            type: SetState
            params:
              show_onboard_tour: false
        onFinish:
          - id: onboard_finish_state
            type: SetState
            params:
              show_onboard_tour: false
          - id: onboard_finish_msg
            type: DisplayMessage
            params:
              content: Tour complete! You are ready to get started.
              status: success

- title: Tour in Feature Introduction
  fullWidth: true
  blocks:
    - id: feature_card
      type: Card
      properties:
        title: Document Editor
        size: small
      blocks:
        - id: feature_toolbar
          type: Box
          layout:
            gap: 8
            align: center
          blocks:
            - id: feature_bold_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: '<b>B</b>'
                color: default
                variant: outlined
                size: small
            - id: feature_italic_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: '<i>I</i>'
                color: default
                variant: outlined
                size: small
            - id: feature_save_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Save
                color: primary
                variant: solid
                size: small
                icon: AiOutlineSave
            - id: feature_export_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Export
                color: default
                variant: outlined
                size: small
                icon: AiOutlineExport
        - id: feature_editor
          type: TextArea
          properties:
            label:
              disabled: true
            placeholder: Start typing your document here...
            rows: 4
        - id: feature_actions
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: feature_tour_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Learn Editor Features
                color: primary
                variant: outlined
                icon: AiOutlineBulb
              events:
                onClick:
                  - id: feature_start_tour
                    type: SetState
                    params:
                      show_feature_tour: true
    - id: feature_tour
      type: Tour
      properties:
        open:
          _state: show_feature_tour
        type: primary
        mask: true
        animated: true
        closable: true
        steps:
          - title: Formatting Tools
            description: Use Bold and Italic buttons to format your text.
            target: feature_bold_btn
            placement: bottom
            type: default
          - title: Save Your Work
            description: Click Save to store your document. Your work is automatically backed up every 5 minutes.
            target: feature_save_btn
            placement: bottom
            type: primary
          - title: Export Options
            description: Export your document as PDF, Word, or plain text for sharing.
            target: feature_export_btn
            placement: bottom
            type: default
      events:
        onClose:
          - id: feature_close
            type: SetState
            params:
              show_feature_tour: false
        onFinish:
          - id: feature_finish_state
            type: SetState
            params:
              show_feature_tour: false
          - id: feature_finish_msg
            type: DisplayMessage
            params:
              content: You are now familiar with the editor features!
              status: success
