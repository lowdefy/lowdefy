- title: Basic Modal
  blocks:
    - id: modal_basic_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Modal
        color: primary
        variant: solid
      events:
        onClick:
          - id: modal_basic_open
            type: CallMethod
            params:
              blockId: modal_basic
              method: setOpen
              args:
                open: true
    - id: modal_basic
      type: Modal
      properties:
        title: Basic Modal
      blocks:
        - id: modal_basic_p1
          type: Paragraph
          properties:
            content: This is a basic modal dialog with a title, content area, and default Ok/Cancel buttons.
        - id: modal_basic_p2
          type: Paragraph
          properties:
            content: Click Ok to confirm or Cancel to dismiss.

- title: Custom Button Text
  blocks:
    - id: modal_btn_text_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Modal
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_btn_text_open
            type: CallMethod
            params:
              blockId: modal_btn_text
              method: setOpen
              args:
                open: true
    - id: modal_btn_text
      type: Modal
      properties:
        title: Custom Button Text
        okText: Save Changes
        cancelText: Discard
      blocks:
        - id: modal_btn_text_content
          type: Paragraph
          properties:
            content: The okText and cancelText properties customize the footer button labels. This modal uses "Save Changes" and "Discard" instead of "Ok" and "Cancel".

- title: Centered Modal
  blocks:
    - id: modal_centered_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Centered Modal
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_centered_open
            type: CallMethod
            params:
              blockId: modal_centered
              method: setOpen
              args:
                open: true
    - id: modal_centered
      type: Modal
      properties:
        title: Centered Modal
        centered: true
      blocks:
        - id: modal_centered_content
          type: Paragraph
          properties:
            content: This modal is vertically centered in the viewport. By default, modals appear near the top of the page.

- title: Custom Widths
  blocks:
    - id: modal_narrow_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Narrow (300px)
        color: primary
        variant: outlined
        size: small
      events:
        onClick:
          - id: modal_narrow_open
            type: CallMethod
            params:
              blockId: modal_narrow
              method: setOpen
              args:
                open: true
    - id: modal_default_w_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Default (520px)
        color: primary
        variant: outlined
        size: small
      events:
        onClick:
          - id: modal_default_w_open
            type: CallMethod
            params:
              blockId: modal_default_w
              method: setOpen
              args:
                open: true
    - id: modal_wide_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Wide (800px)
        color: primary
        variant: outlined
        size: small
      events:
        onClick:
          - id: modal_wide_open
            type: CallMethod
            params:
              blockId: modal_wide
              method: setOpen
              args:
                open: true
    - id: modal_pct_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Percentage (80%)
        color: primary
        variant: outlined
        size: small
      events:
        onClick:
          - id: modal_pct_open
            type: CallMethod
            params:
              blockId: modal_pct
              method: setOpen
              args:
                open: true
    - id: modal_narrow
      type: Modal
      properties:
        title: Narrow Modal
        width: 300
      blocks:
        - id: modal_narrow_content
          type: Paragraph
          properties:
            content: A compact 300px modal, suitable for simple confirmations.
    - id: modal_default_w
      type: Modal
      properties:
        title: Default Width
      blocks:
        - id: modal_default_w_content
          type: Paragraph
          properties:
            content: Default width of 520px.
    - id: modal_wide
      type: Modal
      properties:
        title: Wide Modal
        width: 800
      blocks:
        - id: modal_wide_content
          type: Paragraph
          properties:
            content: An 800px wide modal with more room for complex content like forms, tables, or detail views.
    - id: modal_pct
      type: Modal
      properties:
        title: 80% Width Modal
        width: '80%'
      blocks:
        - id: modal_pct_content
          type: Paragraph
          properties:
            content: Using a percentage width makes the modal responsive, taking up 80% of the viewport width.

- title: Closable Options
  blocks:
    - id: modal_closable_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Closable (default)
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_closable_open
            type: CallMethod
            params:
              blockId: modal_closable
              method: setOpen
              args:
                open: true
    - id: modal_not_closable_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: No Close Button
        color: danger
        variant: outlined
      events:
        onClick:
          - id: modal_not_closable_open
            type: CallMethod
            params:
              blockId: modal_not_closable
              method: setOpen
              args:
                open: true
    - id: modal_closable
      type: Modal
      properties:
        title: Closable Modal
        closable: true
      blocks:
        - id: modal_closable_content
          type: Paragraph
          properties:
            content: The close button is visible in the top right corner. This is the default behavior.
    - id: modal_not_closable
      type: Modal
      properties:
        title: No Close Button
        closable: false
      blocks:
        - id: modal_not_closable_content
          type: Paragraph
          properties:
            content: The close (x) button is hidden. Users must use the Ok or Cancel buttons to close this modal.

- title: Mask Options
  blocks:
    - id: modal_mask_closable_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Mask Closable (default)
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_mask_closable_open
            type: CallMethod
            params:
              blockId: modal_mask_closable
              method: setOpen
              args:
                open: true
    - id: modal_mask_not_closable_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Mask Not Closable
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_mask_not_closable_open
            type: CallMethod
            params:
              blockId: modal_mask_not_closable
              method: setOpen
              args:
                open: true
    - id: modal_no_mask_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: No Mask
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_no_mask_open
            type: CallMethod
            params:
              blockId: modal_no_mask
              method: setOpen
              args:
                open: true
    - id: modal_mask_closable
      type: Modal
      properties:
        title: Mask Closable
        maskClosable: true
      blocks:
        - id: modal_mask_closable_content
          type: Paragraph
          properties:
            content: Clicking the mask area (outside the modal) closes the modal. This is the default.
    - id: modal_mask_not_closable
      type: Modal
      properties:
        title: Mask Not Closable
        maskClosable: false
      blocks:
        - id: modal_mask_not_closable_content
          type: Paragraph
          properties:
            content: The mask is visible but clicking it does not close the modal. Users must use the buttons or close icon.
    - id: modal_no_mask
      type: Modal
      properties:
        title: No Mask
        mask: false
      blocks:
        - id: modal_no_mask_content
          type: Paragraph
          properties:
            content: No mask overlay is shown behind the modal. The page content remains fully visible.

- title: No Footer
  blocks:
    - id: modal_no_footer_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Modal (no footer)
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_no_footer_open
            type: CallMethod
            params:
              blockId: modal_no_footer
              method: setOpen
              args:
                open: true
    - id: modal_no_footer
      type: Modal
      properties:
        title: No Footer Modal
        footer: false
      blocks:
        - id: modal_no_footer_content
          type: Paragraph
          properties:
            content: Setting footer to false removes the Ok and Cancel buttons entirely. This is useful for informational dialogs or when you provide your own action buttons in the content area.
        - id: modal_no_footer_close_btn
          type: Button
          properties:
            title: Close
            color: primary
            variant: solid
            block: true
          events:
            onClick:
              - id: modal_no_footer_close
                type: CallMethod
                params:
                  blockId: modal_no_footer
                  method: setOpen
                  args:
                    open: false

- title: Custom Footer Slot
  blocks:
    - id: modal_footer_slot_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Modal with Custom Footer
        color: primary
        variant: solid
      events:
        onClick:
          - id: modal_footer_slot_open
            type: CallMethod
            params:
              blockId: modal_footer_slot
              method: setOpen
              args:
                open: true
    - id: modal_footer_slot
      type: Modal
      properties:
        title: Custom Footer
      slots:
        footer:
          blocks:
            - id: modal_footer_slot_row
              type: Box
              layout:
                gap: 8
                justify: space-between
              blocks:
                - id: modal_footer_delete_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Delete
                    color: danger
                    variant: text
                    icon: AiOutlineDelete
                - id: modal_footer_actions
                  type: Box
                  layout:
                    flex: 0 0 auto
                    gap: 8
                  blocks:
                    - id: modal_footer_cancel_btn
                      type: Button
                      layout:
                        flex: 0 0 auto
                      properties:
                        title: Cancel
                        color: default
                        variant: outlined
                      events:
                        onClick:
                          - id: modal_footer_cancel_close
                            type: CallMethod
                            params:
                              blockId: modal_footer_slot
                              method: setOpen
                              args:
                                open: false
                    - id: modal_footer_save_btn
                      type: Button
                      layout:
                        flex: 0 0 auto
                      properties:
                        title: Save
                        color: primary
                        variant: solid
                        icon: AiOutlineSave
                      events:
                        onClick:
                          - id: modal_footer_save_close
                            type: CallMethod
                            params:
                              blockId: modal_footer_slot
                              method: setOpen
                              args:
                                open: false
      blocks:
        - id: modal_footer_slot_content
          type: Paragraph
          properties:
            content: The footer slot replaces the default Ok/Cancel buttons with custom content. This example shows a Delete button on the left and Save/Cancel on the right.

- title: Toggle Method
  blocks:
    - id: modal_toggle_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Toggle Modal
        color: primary
        variant: solid
        icon: AiOutlineSwap
      events:
        onClick:
          - id: modal_toggle_call
            type: CallMethod
            params:
              blockId: modal_toggle
              method: toggleOpen
    - id: modal_toggle
      type: Modal
      properties:
        title: Toggle Modal
      blocks:
        - id: modal_toggle_content
          type: Paragraph
          properties:
            content: This modal uses the toggleOpen method. Each click of the button alternates between open and closed states.

- title: Custom Button Props
  blocks:
    - id: modal_btn_props_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Modal with Custom Buttons
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_btn_props_open
            type: CallMethod
            params:
              blockId: modal_btn_props
              method: setOpen
              args:
                open: true
    - id: modal_btn_props
      type: Modal
      properties:
        title: Danger Confirmation
        okText: Delete
        cancelText: Keep
        okButtonProps:
          danger: true
        cancelButtonProps:
          type: primary
      blocks:
        - id: modal_btn_props_content
          type: Paragraph
          properties:
            content: Custom button props allow fine-grained control over the footer buttons. Here the Ok button is styled as a danger button, and the Cancel button uses primary styling.

- title: Rich Content Modal
  blocks:
    - id: modal_rich_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: View Details
        color: primary
        variant: solid
        icon: AiOutlineInfoCircle
      events:
        onClick:
          - id: modal_rich_open
            type: CallMethod
            params:
              blockId: modal_rich
              method: setOpen
              args:
                open: true
    - id: modal_rich
      type: Modal
      properties:
        title: Order Details
        width: 640
        okText: Confirm Order
        cancelText: Close
      blocks:
        - id: modal_rich_desc
          type: Descriptions
          properties:
            column: 2
            items:
              - label: Order ID
                value: '#ORD-2026-0042'
              - label: Status
                value: Processing
              - label: Customer
                value: Jane Cooper
              - label: Email
                value: jane@example.com
              - label: Total
                value: '$1,248.00'
              - label: Payment
                value: Credit Card
        - id: modal_rich_divider
          type: Divider
        - id: modal_rich_progress_label
          type: Paragraph
          properties:
            content: 'Fulfillment Progress:'
        - id: modal_rich_progress
          type: Progress
          properties:
            percent: 65

- title: Custom Z-Index
  blocks:
    - id: modal_zindex_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Modal (z-index 2000)
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_zindex_open
            type: CallMethod
            params:
              blockId: modal_zindex
              method: setOpen
              args:
                open: true
    - id: modal_zindex
      type: Modal
      properties:
        title: High Z-Index Modal
        zIndex: 2000
      blocks:
        - id: modal_zindex_content
          type: Paragraph
          properties:
            content: This modal uses a custom z-index of 2000 to ensure it appears above other overlays. The default is 1000.

- title: Styled Modal
  blocks:
    - id: modal_styled_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Styled Modal
        color: primary
        variant: solid
      events:
        onClick:
          - id: modal_styled_open
            type: CallMethod
            params:
              blockId: modal_styled
              method: setOpen
              args:
                open: true
    - id: modal_styled
      type: Modal
      properties:
        title: Styled Modal
      style:
        --body:
          backgroundColor: '#f6ffed'
          padding: 24px
        mask:
          backgroundColor: 'rgba(0, 100, 0, 0.15)'
      blocks:
        - id: modal_styled_content
          type: Paragraph
          properties:
            content: This modal uses style.body and style.mask to apply custom background colors. The body has a green tint and the mask has a subtle green overlay.

- title: Theme Token Overrides
  blocks:
    - id: modal_theme_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Themed Modal
        color: primary
        variant: solid
      events:
        onClick:
          - id: modal_theme_open
            type: CallMethod
            params:
              blockId: modal_theme
              method: setOpen
              args:
                open: true
    - id: modal_theme
      type: Modal
      properties:
        title: Custom Theme Modal
        theme:
          headerBg: '#e6f4ff'
          contentBg: '#f0f5ff'
          titleColor: '#0958d9'
          titleFontSize: 20
          borderRadiusLG: 16
      blocks:
        - id: modal_theme_content
          type: Paragraph
          properties:
            content: This modal overrides design tokens via the theme property. The header has a blue background, custom title color and size, and larger border radius.
    - id: modal_theme_warm_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Warm Themed Modal
        color: default
        variant: solid
      events:
        onClick:
          - id: modal_theme_warm_open
            type: CallMethod
            params:
              blockId: modal_theme_warm
              method: setOpen
              args:
                open: true
    - id: modal_theme_warm
      type: Modal
      properties:
        title: Warm Theme Modal
        theme:
          headerBg: '#fff7e6'
          contentBg: '#fffbe6'
          footerBg: '#fff7e6'
          titleColor: '#d46b08'
          colorBgMask: 'rgba(250, 173, 20, 0.1)'
          borderRadiusLG: 20
      blocks:
        - id: modal_theme_warm_content
          type: Paragraph
          properties:
            content: A warm-toned modal using theme tokens for header, content, footer backgrounds, and a tinted mask overlay.

- title: HTML Title
  blocks:
    - id: modal_html_title_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Modal with HTML Title
        color: primary
        variant: outlined
      events:
        onClick:
          - id: modal_html_title_open
            type: CallMethod
            params:
              blockId: modal_html_title
              method: setOpen
              args:
                open: true
    - id: modal_html_title
      type: Modal
      properties:
        title: '<b>Bold</b> and <em>italic</em> title'
      blocks:
        - id: modal_html_title_content
          type: Paragraph
          properties:
            content: The modal title supports HTML markup for rich text formatting.
