- title: Label Options
  blocks:
    - id: label_title
      type: AutoComplete
      properties:
        title: Custom Label Title
        label:
          title: Choose a color
        placeholder: Type a color
        options:
          - Red
          - Green
          - Blue
          - Yellow
    - id: label_extra
      type: AutoComplete
      properties:
        title: Label with Extra
        label:
          title: City
          extra: Select the city you live in
        placeholder: Type a city name
        options:
          - New York
          - London
          - Tokyo
          - Paris
          - Berlin
          - Sydney
    - id: label_no_colon
      type: AutoComplete
      properties:
        title: Label without Colon
        label:
          title: Animal
          colon: false
        placeholder: Type an animal
        options:
          - Cat
          - Dog
          - Elephant
          - Giraffe
          - Lion
    - id: label_inline
      type: AutoComplete
      properties:
        title: Inline Label
        label:
          title: Framework
          inline: true
          span: 8
        placeholder: Type to search
        options:
          - React
          - Vue
          - Angular
          - Svelte
          - Solid
    - id: label_inline_right
      type: AutoComplete
      properties:
        title: Inline Label Right Aligned
        label:
          title: Database
          inline: true
          span: 8
          align: right
        placeholder: Type to search
        options:
          - PostgreSQL
          - MySQL
          - MongoDB
          - Redis
          - SQLite

- title: Hidden Label
  blocks:
    - id: label_hidden
      type: AutoComplete
      properties:
        label:
          disabled: true
        placeholder: No label displayed
        options:
          - Option A
          - Option B
          - Option C
    - id: label_hidden_large
      type: AutoComplete
      properties:
        label:
          disabled: true
        size: large
        placeholder: Large with no label
        options:
          - First
          - Second
          - Third

- title: Style Overrides
  blocks:
    - id: style_element
      type: AutoComplete
      style:
        --element:
          borderColor: '#722ed1'
      properties:
        title: Custom Border Color
        placeholder: Purple border
        options:
          - Option A
          - Option B
          - Option C
    - id: style_background
      type: AutoComplete
      style:
        --element:
          backgroundColor: '#f6ffed'
      properties:
        title: Custom Background
        placeholder: Light green background
        options:
          - Option A
          - Option B
          - Option C
    - id: style_label
      type: AutoComplete
      style:
        --label:
          fontWeight: bold
          color: '#1677ff'
      properties:
        title: Styled Label
        placeholder: Blue bold label
        options:
          - Option A
          - Option B
          - Option C

- title: Class Overrides
  blocks:
    - id: class_element
      type: AutoComplete
      class:
        element: rounded-lg shadow-sm
      properties:
        title: Custom Class
        placeholder: Tailwind classes applied
        options:
          - JavaScript
          - TypeScript
          - Python

- title: Theme Token Overrides
  blocks:
    - id: theme_border_radius
      type: AutoComplete
      properties:
        title: Large Border Radius
        placeholder: Rounded corners
        options:
          - Option A
          - Option B
          - Option C
        theme:
          borderRadius: 16
    - id: theme_font_size
      type: AutoComplete
      properties:
        title: Large Font Size
        placeholder: Bigger text
        options:
          - Option A
          - Option B
          - Option C
        theme:
          fontSize: 18
    - id: theme_custom_colors
      type: AutoComplete
      properties:
        title: Custom Colors
        placeholder: Styled with theme tokens
        options:
          - Red
          - Green
          - Blue
        theme:
          colorPrimary: '#722ed1'
          colorPrimaryHover: '#9254de'
    - id: theme_option_selected
      type: AutoComplete
      properties:
        title: Custom Selected Option Style
        placeholder: Custom option highlight
        options:
          - Apple
          - Banana
          - Cherry
          - Dragonfruit
        theme:
          optionSelectedBg: '#f9f0ff'
          optionSelectedColor: '#531dab'
          optionSelectedFontWeight: 700
    - id: theme_option_height
      type: AutoComplete
      properties:
        title: Taller Options
        placeholder: Taller dropdown items
        options:
          - First Item
          - Second Item
          - Third Item
        theme:
          optionHeight: 44
          optionFontSize: 16
    - id: theme_control_height
      type: AutoComplete
      properties:
        title: Custom Control Height
        placeholder: Taller input
        options:
          - Option A
          - Option B
          - Option C
        theme:
          controlHeight: 44
          controlHeightLG: 52
    - id: theme_combined
      type: AutoComplete
      properties:
        title: Combined Token Overrides
        placeholder: Multiple tokens combined
        options:
          - React
          - Vue
          - Angular
          - Svelte
        theme:
          borderRadius: 12
          colorPrimary: '#52c41a'
          colorPrimaryHover: '#73d13d'
          optionSelectedBg: '#f6ffed'
          fontSize: 15
          controlHeight: 40

