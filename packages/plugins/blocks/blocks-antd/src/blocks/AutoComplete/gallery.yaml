- title: Basic
  blocks:
    - id: basic
      type: AutoComplete
      properties:
        title: Fruit
        placeholder: Type a fruit name
        options:
          - Apple
          - Apricot
          - Avocado
          - Banana
          - Blueberry
          - Cherry
          - Grape
          - Mango
          - Orange
          - Peach
    - id: basic_countries
      type: AutoComplete
      properties:
        title: Country
        placeholder: Search countries
        options:
          - Australia
          - Austria
          - Belgium
          - Brazil
          - Canada
          - Denmark
          - France
          - Germany
          - Japan
          - United Kingdom
          - United States

- title: Sizes
  blocks:
    - id: size_small
      type: AutoComplete
      properties:
        title: Small
        size: small
        placeholder: Type to search
        options:
          - Apple
          - Banana
          - Cherry
    - id: size_default
      type: AutoComplete
      properties:
        title: Default
        placeholder: Type to search
        options:
          - Apple
          - Banana
          - Cherry
    - id: size_large
      type: AutoComplete
      properties:
        title: Large
        size: large
        placeholder: Type to search
        options:
          - Apple
          - Banana
          - Cherry

- title: Allow Clear
  blocks:
    - id: allow_clear_true
      type: AutoComplete
      properties:
        title: With Clear Button (default)
        allowClear: true
        placeholder: Select and clear
        options:
          - Option A
          - Option B
          - Option C
    - id: allow_clear_false
      type: AutoComplete
      properties:
        title: Without Clear Button
        allowClear: false
        placeholder: No clear button
        options:
          - Option A
          - Option B
          - Option C

- title: Backfill Mode
  blocks:
    - id: backfill_enabled
      type: AutoComplete
      properties:
        title: Backfill Enabled
        backfill: true
        placeholder: Use arrow keys to backfill
        options:
          - JavaScript
          - TypeScript
          - Python
          - Ruby
          - Go
          - Rust
    - id: backfill_disabled
      type: AutoComplete
      properties:
        title: Backfill Disabled (default)
        backfill: false
        placeholder: Arrow keys highlight only
        options:
          - JavaScript
          - TypeScript
          - Python
          - Ruby
          - Go
          - Rust

- title: Default Open
  blocks:
    - id: default_open_true
      type: AutoComplete
      properties:
        title: Dropdown Open on Render
        defaultOpen: true
        placeholder: Dropdown visible immediately
        options:
          - Red
          - Green
          - Blue
          - Yellow
          - Purple

- title: Placeholder Variations
  blocks:
    - id: placeholder_custom
      type: AutoComplete
      properties:
        title: Custom Placeholder
        placeholder: Start typing to search languages...
        options:
          - JavaScript
          - TypeScript
          - Python
          - Ruby
          - Java
          - C++
    - id: placeholder_default
      type: AutoComplete
      properties:
        title: Default Placeholder
        options:
          - Alpha
          - Beta
          - Gamma
          - Delta

- title: Borderless
  blocks:
