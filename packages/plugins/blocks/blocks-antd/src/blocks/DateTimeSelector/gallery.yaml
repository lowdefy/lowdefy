    - id: dts_lbl_right
      type: DateTimeSelector
      properties:
        title: Align Right
        label:
          align: right
    - id: dts_lbl_inline
      type: DateTimeSelector
      properties:
        title: Inline Label
        label:
          inline: true
          span: 8

- title: Label with Extra Text
  blocks:
    - id: dts_lbl_extra
      type: DateTimeSelector
      properties:
        title: Appointment Time
        label:
          extra: Select the date and time for your appointment.
        placeholder: Select date & time
    - id: dts_lbl_extra_html
      type: DateTimeSelector
      properties:
        title: Event Start
        label:
          extra: 'Choose the <b>start date and time</b> for your event.'
        placeholder: Select event start

- title: Label Inline with Span
  blocks:
    - id: dts_lbl_span_4
      type: DateTimeSelector
      properties:
        title: Span 4
        label:
          inline: true
          span: 4
    - id: dts_lbl_span_8
      type: DateTimeSelector
      properties:
        title: Span 8
        label:
          inline: true
          span: 8
    - id: dts_lbl_span_12
      type: DateTimeSelector
      properties:
        title: Span 12
        label:
          inline: true
          span: 12

- title: Label Disabled (No Label)
