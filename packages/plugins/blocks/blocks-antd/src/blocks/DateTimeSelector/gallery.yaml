        label:
          disabled: true
        placeholder: No label shown
    - id: dts_lbl_hidden_filled
      type: DateTimeSelector
      properties:
        title: Hidden Label Filled
        label:
          disabled: true
        variant: filled
        placeholder: No label, filled variant

- title: Custom Style
  blocks:
    - id: dts_style_width
      type: DateTimeSelector
      style:
        width: 400
      properties:
        title: Fixed Width (400px)
        label:
          disabled: true
    - id: dts_style_element
      type: DateTimeSelector
