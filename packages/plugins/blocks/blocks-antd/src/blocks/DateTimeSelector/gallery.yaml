      type: DateTimeSelector
      properties:
        title: Show Today (default)
        showToday: true
        label:
          disabled: true
    - id: dts_today_disabled
      type: DateTimeSelector
      properties:
        title: No Today Button
        showToday: false
        label:
          disabled: true
    - id: dts_now_enabled
      type: DateTimeSelector
      properties:
        title: Show Now (default)
        showNow: true
        label:
          disabled: true
    - id: dts_now_disabled
      type: DateTimeSelector
      properties:
        title: No Now Button
        showNow: false
        label:
          disabled: true
    - id: dts_both_disabled
      type: DateTimeSelector
      properties:
        title: No Today & No Now
        showToday: false
        showNow: false
