          background: '#f0f5ff'
      properties:
        title: Custom Background
        label:
          disabled: true
    - id: dts_style_label
      type: DateTimeSelector
      style:
        --label:
          color: '#531dab'
          fontWeight: bold
      properties:
        title: Styled Label

- title: Custom CSS Class
