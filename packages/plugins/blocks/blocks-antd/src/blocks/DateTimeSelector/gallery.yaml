    - id: dts_theme_addon_bg
      type: DateTimeSelector
      properties:
        title: Custom Addon Background
        label:
          disabled: true
        theme:
          addonBg: '#f0f5ff'

- title: Combined Features
  blocks:
    - id: dts_combo_appointment
      type: DateTimeSelector
      properties:
        title: Appointment Date & Time
        placeholder: Select appointment date & time
        format: DD MMMM YYYY HH:mm
        size: large
        suffixIcon: AiOutlineSchedule
        showToday: true
        showNow: true
        allowClear: true
        minuteStep: 15
        label:
          extra: Choose your preferred appointment date and time.
          colon: false
    - id: dts_combo_minimal
      type: DateTimeSelector
      properties:
        title: Date & Time
        variant: borderless
        size: small
        allowClear: false
        showToday: false
        showNow: false
        format: DD/MM/YYYY HH:mm
        placeholder: dd/mm/yyyy hh:mm
        label:
          disabled: true
    - id: dts_combo_restricted
      type: DateTimeSelector
      properties:
        title: Event Registration
        placeholder: Select event date & time
        format: DD MMM YYYY HH:mm
        minuteStep: 30
        hourStep: 1
        suffixIcon:
          name: AiOutlineCalendar
          color: '#1677ff'
        disabledDates:
          min: '2026-01-01'
          max: '2026-12-31'
        label:
          extra: Only dates in 2026 are available. Times in 30-minute slots.
    - id: dts_combo_seconds
      type: DateTimeSelector
      properties:
        title: Precise Timestamp
        format: YYYY-MM-DD HH:mm:ss
        timeFormat: HH:mm:ss
        secondStep: 1
        minuteStep: 1
        placeholder: Select precise date & time
        label:
          extra: Select date and time down to the second.
    - id: dts_combo_utc_large
      type: DateTimeSelector
      properties:
        title: UTC Timestamp
        format: YYYY-MM-DD HH:mm
        selectUTC: true
        size: large
        variant: filled
        suffixIcon: AiOutlineClockCircle
        label:
          extra: Time is recorded in UTC.
    - id: dts_combo_themed
      type: DateTimeSelector
      properties:
        title: Themed Picker
        variant: filled
        size: large
        format: DD MMMM YYYY HH:mm
        placeholder: Choose a special date & time...
        minuteStep: 15
        suffixIcon:
          name: AiOutlineHeart
          color: '#eb2f96'
        label:
          disabled: true
        theme:
          colorPrimary: '#eb2f96'
          borderRadius: 20
          controlHeightLG: 48
          fontSize: 16
    - id: dts_combo_inline_filled
      type: DateTimeSelector
      properties:
        title: Inline Filled
        variant: filled
        format: DD MMM YYYY HH:mm
        minuteStep: 10
        label:
          inline: true
          span: 6
          colon: false
    - id: dts_combo_styled
      type: DateTimeSelector
      class: rounded-xl shadow-md
      style:
        --element:
          background: '#fffbe6'
      properties:
        title: Styled DateTime
        format: DD/MM/YYYY HH:mm
        size: large
        minuteStep: 15
        label:
          disabled: true
        theme:
          colorPrimary: '#faad14'
          borderRadius: 12
          controlHeightLG: 48
