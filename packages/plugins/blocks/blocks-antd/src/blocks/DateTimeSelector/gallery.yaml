- title: Variant + Size Matrix
  blocks:
    - id: dts_mx_outlined_label
      type: Markdown
      properties:
        content: '**outlined**'
    - id: dts_mx_outlined_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: dts_mx_outlined_sm
          type: DateTimeSelector
          properties:
            title: Small
            variant: outlined
            size: small
            label:
              disabled: true
        - id: dts_mx_outlined_md
          type: DateTimeSelector
          properties:
            title: Default
            variant: outlined
            label:
              disabled: true
        - id: dts_mx_outlined_lg
          type: DateTimeSelector
          properties:
            title: Large
            variant: outlined
            size: large
            label:
              disabled: true
    - id: dts_mx_filled_label
      type: Markdown
      properties:
        content: '**filled**'
    - id: dts_mx_filled_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: dts_mx_filled_sm
          type: DateTimeSelector
          properties:
            title: Small
            variant: filled
            size: small
            label:
              disabled: true
        - id: dts_mx_filled_md
          type: DateTimeSelector
          properties:
            title: Default
            variant: filled
            label:
              disabled: true
        - id: dts_mx_filled_lg
          type: DateTimeSelector
          properties:
            title: Large
            variant: filled
            size: large
            label:
              disabled: true
    - id: dts_mx_borderless_label
      type: Markdown
      properties:
        content: '**borderless**'
    - id: dts_mx_borderless_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: dts_mx_borderless_sm
          type: DateTimeSelector
          properties:
            title: Small
            variant: borderless
            size: small
            label:
              disabled: true
        - id: dts_mx_borderless_md
          type: DateTimeSelector
          properties:
            title: Default
            variant: borderless
            label:
              disabled: true
        - id: dts_mx_borderless_lg
          type: DateTimeSelector
          properties:
            title: Large
            variant: borderless
            size: large
            label:
              disabled: true

