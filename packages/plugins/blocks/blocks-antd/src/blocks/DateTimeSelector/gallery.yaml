      properties:
        title: Small
        size: small
        label:
          disabled: true
    - id: dts_size_default
      type: DateTimeSelector
      properties:
        title: Default
        label:
          disabled: true
    - id: dts_size_large
      type: DateTimeSelector
      properties:
        title: Large
        size: large
        label:
          disabled: true

- title: Sizes with Labels
  blocks:
    - id: dts_size_label_small
      type: DateTimeSelector
      properties:
        title: Small with Label
        size: small
    - id: dts_size_label_default
      type: DateTimeSelector
      properties:
        title: Default with Label
    - id: dts_size_label_large
      type: DateTimeSelector
      properties:
        title: Large with Label
        size: large

- title: Variants
  blocks:
