- title: MobileMenu in Admin Dashboard
  blocks:
    - id: admin_header
      type: Box
      class: bg-white border-b border-gray-200 px-4 py-3
      layout:
        direction: row
        align: center
        justify: space-between
      blocks:
        - id: admin_left
          type: Box
          layout:
            direction: row
            align: center
            gap: 12
            flex: 0 0 auto
          blocks:
            - id: admin_nav
              type: MobileMenu
              layout:
                flex: 0 0 auto
              properties:
                toggleMenuButton:
                  type: text
                  icon: AiOutlineMenu
                drawer:
                  title: Admin Panel
                  width: 280
                links:
                  - id: an_dashboard
                    type: MenuLink
                    properties:
                      title: Dashboard
                      icon: AiOutlineDashboard
                  - id: an_content
                    type: MenuGroup
                    properties:
                      title: Content
                      icon: AiOutlineFileText
                    links:
                      - id: an_posts
                        type: MenuLink
                        properties:
                          title: Posts
                      - id: an_media
                        type: MenuLink
                        properties:
                          title: Media Library
                  - id: an_users
                    type: MenuGroup
                    properties:
                      title: Users
                      icon: AiOutlineTeam
                    links:
                      - id: an_all_users
                        type: MenuLink
                        properties:
                          title: All Users
                      - id: an_roles
                        type: MenuLink
                        properties:
                          title: Roles
                  - id: an_divider
                    type: MenuDivider
                  - id: an_settings
                    type: MenuLink
                    properties:
                      title: Settings
                      icon: AiOutlineSetting
                  - id: an_divider2
                    type: MenuDivider
                    properties:
                      dashed: true
                  - id: an_logout
                    type: MenuLink
                    properties:
                      title: Sign Out
                      icon: AiOutlineLogout
                      danger: true
              events:
                onMenuItemClick:
                  - id: admin_click_msg
                    type: DisplayMessage
                    params:
                      content: Navigating...
                      status: info
            - id: admin_title
              type: Markdown
              layout:
                flex: 0 0 auto
              properties:
                content: '**Admin Panel**'
        - id: admin_actions
          type: Box
          layout:
            direction: row
            align: center
            gap: 8
            flex: 0 0 auto
          blocks:
            - id: admin_bell
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineBell
                hideTitle: true
                variant: text
                color: default
            - id: admin_avatar
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineUser
                hideTitle: true
                shape: circle
                variant: filled
                color: primary
    - id: admin_body
      type: Card
      properties:
        title: Welcome Back
        size: small
      blocks:
        - id: admin_stats
          type: Markdown
          properties:
            content: |
              You have **12** new orders, **3** pending reviews, and **5** unread messages.

              Use the navigation menu to manage your application.

- title: MobileMenu in E-Commerce App
  blocks:
    - id: shop_header
      type: Box
      class: bg-gradient-to-r from-indigo-600 to-purple-600 px-4 py-3
      layout:
        direction: row
        align: center
        justify: space-between
      blocks:
        - id: shop_left
          type: Box
          layout:
            direction: row
            align: center
            gap: 12
            flex: 0 0 auto
          blocks:
            - id: shop_nav
              type: MobileMenu
              layout:
                flex: 0 0 auto
              properties:
                toggleMenuButton:
                  type: primary
                  ghost: true
                  icon: AiOutlineMenu
                drawer:
                  title: Shop Categories
                  width: 300
                theme: light
                selectedKeys:
                  - sn_clothing
                links:
                  - id: sn_home
                    type: MenuLink
                    url: /
                    properties:
                      title: Home
                      icon: AiOutlineHome
                  - id: sn_divider_top
                    type: MenuDivider
                  - id: sn_clothing
                    type: MenuGroup
                    properties:
                      title: Clothing
                      icon: AiOutlineSkin
                    links:
                      - id: sn_mens
                        type: MenuLink
                        properties:
                          title: Men's Wear
                      - id: sn_womens
                        type: MenuLink
                        properties:
                          title: Women's Wear
                      - id: sn_kids
                        type: MenuLink
                        properties:
                          title: Kids
                  - id: sn_electronics
                    type: MenuGroup
                    properties:
                      title: Electronics
                      icon: AiOutlineLaptop
                    links:
                      - id: sn_phones
                        type: MenuLink
                        properties:
                          title: Phones & Tablets
                      - id: sn_computers
                        type: MenuLink
                        properties:
                          title: Computers
                  - id: sn_divider_bottom
                    type: MenuDivider
                    properties:
                      dashed: true
                  - id: sn_deals
                    type: MenuLink
                    properties:
                      title: Today's Deals
                      icon: AiOutlineThunderbolt
                  - id: sn_orders
                    type: MenuLink
                    pageId: orders
                    properties:
                      title: My Orders
                      icon: AiOutlineShoppingCart
              events:
                onMenuItemSelect:
                  - id: shop_select_msg
                    type: DisplayMessage
                    params:
                      content: Loading category...
                      status: info
                onToggleDrawer:
                  - id: shop_toggle_state
                    type: SetState
                    params:
                      menuOpen:
                        _not:
                          _state: menuOpen
            - id: shop_brand
              type: Markdown
              layout:
                flex: 0 0 auto
              style:
                --element:
                  color: white
              properties:
                content: '**ShopNow**'
        - id: shop_right
          type: Box
          layout:
            direction: row
            align: center
            gap: 8
            flex: 0 0 auto
          blocks:
            - id: shop_search
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineSearch
                hideTitle: true
                variant: text
                ghost: true
                color: default
            - id: shop_cart
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineShoppingCart
                hideTitle: true
                variant: text
                ghost: true
                color: default
    - id: shop_content
      type: Card
      properties:
        title: Featured Products
        size: small
      blocks:
        - id: shop_desc
          type: Markdown
          properties:
            content: |
              Browse our latest collection across all categories.

              **Free shipping** on orders over $50. Use the menu to explore departments.
