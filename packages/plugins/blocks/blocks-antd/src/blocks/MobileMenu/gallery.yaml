- title: Events
  blocks:
    - id: events_toggle
      type: MobileMenu
      layout:
        flex: 0 0 auto
      properties:
        links:
          - id: et_home
            type: MenuLink
            properties:
              title: Home
              icon: AiOutlineHome
          - id: et_about
            type: MenuLink
            properties:
              title: About
              icon: AiOutlineInfoCircle
      events:
        onToggleDrawer:
          - id: toggle_msg
            type: DisplayMessage
            params:
              content: Drawer toggled
              status: info
    - id: events_open_close
      type: MobileMenu
      layout:
        flex: 0 0 auto
      properties:
        links:
          - id: eoc_home
            type: MenuLink
            properties:
              title: Home
              icon: AiOutlineHome
          - id: eoc_profile
            type: MenuLink
            properties:
              title: Profile
              icon: AiOutlineUser
      events:
        onOpen:
          - id: open_msg
            type: DisplayMessage
            params:
              content: Menu opened
              status: success
        onClose:
          - id: close_msg
            type: DisplayMessage
            params:
              content: Menu closed
              status: warning
    - id: events_item_click
      type: MobileMenu
      layout:
        flex: 0 0 auto
      properties:
        links:
          - id: eic_dashboard
            type: MenuLink
            properties:
              title: Dashboard
              icon: AiOutlineDashboard
          - id: eic_reports
            type: MenuLink
            properties:
              title: Reports
              icon: AiOutlineBarChart
      events:
        onMenuItemClick:
          - id: click_msg
            type: DisplayMessage
            params:
              content: Menu item clicked
              status: info
        onMenuItemSelect:
          - id: select_msg
            type: DisplayMessage
            params:
              content: Menu item selected
              status: success
    - id: events_group_toggle
      type: MobileMenu
      layout:
        flex: 0 0 auto
      properties:
        links:
          - id: egt_tools
            type: MenuGroup
            properties:
              title: Tools
              icon: AiOutlineTool
            links:
              - id: egt_editor
                type: MenuLink
                properties:
                  title: Editor
              - id: egt_terminal
                type: MenuLink
                properties:
                  title: Terminal
      events:
        onToggleMenuGroup:
          - id: group_toggle_msg
            type: DisplayMessage
            params:
              content: Menu group toggled
              status: info

