- title: Submenu Delays
  blocks:
    - id: delay_fast
      type: MobileMenu
      layout:
        flex: 0 0 auto
      properties:
        subMenuOpenDelay: 0
        subMenuCloseDelay: 0
        links:
          - id: df_tools
            type: MenuGroup
            properties:
              title: Tools
              icon: AiOutlineTool
            links:
              - id: df_editor
                type: MenuLink
                properties:
                  title: Editor
              - id: df_terminal
                type: MenuLink
                properties:
                  title: Terminal
    - id: delay_slow
      type: MobileMenu
      layout:
        flex: 0 0 auto
      properties:
        subMenuOpenDelay: 0.5
        subMenuCloseDelay: 1
        links:
          - id: ds_tools
            type: MenuGroup
            properties:
              title: Tools
              icon: AiOutlineTool
            links:
              - id: ds_editor
                type: MenuLink
                properties:
                  title: Editor
              - id: ds_terminal
                type: MenuLink
                properties:
