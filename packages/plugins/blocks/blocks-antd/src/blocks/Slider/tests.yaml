- id: default
  type: Slider
- id: 'properties.disabled: true'
  type: Slider
  properties:
    disabled: true
- id: 'properties.dots: true'
  type: Slider
  properties:
    dots: true
    min: 0
    max: 100
    step: 10
- id: 'properties.included: false'
  type: Slider
  properties:
    included: false
- id: properties.marks
  type: Slider
  properties:
    marks:
      0: '0°C'
      26: '26°C'
      37: '37°C'
      100: '100°C'
- id: 'properties.max: 50'
  type: Slider
  properties:
    max: 50
- id: 'properties.min: 10'
  type: Slider
  properties:
    min: 10
- id: 'properties.range: true'
  type: Slider
  properties:
    range: true
- id: 'properties.reverse: true'
  type: Slider
  properties:
    reverse: true
- id: 'properties.step: 10'
  type: Slider
  properties:
    step: 10
- id: 'properties.vertical: true'
  type: Slider
  properties:
    vertical: true
- id: properties.tooltip
  type: Slider
  properties:
    tooltip:
      open: true
