- title: Basic Slider
  fullWidth: true
  blocks:
    - id: slider_basic
      type: Slider
      properties:
        title: Basic Slider
    - id: slider_basic_no_title
      type: Slider

- title: Min, Max, and Step
  fullWidth: true
  blocks:
    - id: slider_min_max
      type: Slider
      properties:
        title: Temperature (10 to 50)
        min: 10
        max: 50
    - id: slider_step_10
      type: Slider
      properties:
        title: Step of 10
        min: 0
        max: 100
        step: 10
    - id: slider_step_5
      type: Slider
      properties:
        title: Step of 5
        min: 0
        max: 50
        step: 5
    - id: slider_step_decimal
      type: Slider
      properties:
        title: Decimal Step (0.1)
        min: 0
        max: 1
        step: 0.1

- title: Range Slider
  fullWidth: true
  blocks:
    - id: slider_range_basic
      type: Slider
      properties:
        title: Price Range
        range: true
        min: 0
        max: 1000
        step: 50
    - id: slider_range_marks
      type: Slider
      properties:
        title: Age Range
        range: true
        min: 0
        max: 100
        marks:
          0: '0'
          18: '18'
          35: '35'
          50: '50'
          65: '65'
          100: '100'

- title: Marks
  fullWidth: true
  blocks:
    - id: slider_marks_basic
      type: Slider
      properties:
        title: Temperature
        min: 0
        max: 100
        marks:
          0: '0°C'
          26: '26°C'
          37: '37°C'
          100: '100°C'
    - id: slider_marks_only
      type: Slider
      properties:
        title: Rating (marks only, step null)
        min: 0
        max: 100
        step: null
        marks:
          0: Poor
          25: Fair
          50: Good
          75: Very Good
          100: Excellent

- title: Dots
  fullWidth: true
  blocks:
    - id: slider_dots
      type: Slider
      properties:
        title: Dots at Each Step
        dots: true
        min: 0
        max: 100
        step: 10
    - id: slider_dots_marks
      type: Slider
      properties:
        title: Dots with Marks
        dots: true
        min: 0
        max: 100
        step: 20
        marks:
          0: '0'
          20: '20'
          40: '40'
          60: '60'
          80: '80'
          100: '100'

- title: Included
  fullWidth: true
  blocks:
    - id: slider_included_true
      type: Slider
      properties:
        title: Included (default)
        included: true
        marks:
          0: '0'
          50: '50'
          100: '100'
    - id: slider_included_false
      type: Slider
      properties:
        title: Not Included
        included: false
        marks:
          0: '0'
          50: '50'
          100: '100'

- title: Reverse
  fullWidth: true
  blocks:
    - id: slider_reverse
      type: Slider
      properties:
        title: Reversed Slider
        reverse: true
        min: 0
        max: 100
    - id: slider_reverse_marks
      type: Slider
      properties:
        title: Reversed with Marks
        reverse: true
        min: 0
        max: 100
        marks:
          0: Start
          50: Middle
          100: End

- title: Tooltip
  fullWidth: true
  blocks:
    - id: slider_tooltip_open
      type: Slider
      properties:
        title: Always Show Tooltip
        tooltip:
          open: true
        min: 0
        max: 100

- title: Vertical Sliders
  blocks:
    - id: slider_vertical_row
      type: Box
      layout:
        gap: 40
        align: flex-start
      style:
        --element:
          height: 250px
          padding: 20px
      blocks:
        - id: slider_vertical_basic
          type: Slider
          layout:
            flex: 0 0 auto
          properties:
            vertical: true
            label:
              disabled: true
        - id: slider_vertical_marks
          type: Slider
          layout:
            flex: 0 0 auto
          properties:
            vertical: true
            min: 0
            max: 100
            marks:
              0: '0'
              25: '25'
              50: '50'
              75: '75'
              100: '100'
            label:
              disabled: true
        - id: slider_vertical_range
          type: Slider
          layout:
            flex: 0 0 auto
          properties:
            vertical: true
            range: true
            min: 0
            max: 100
            step: 10
            label:
              disabled: true
        - id: slider_vertical_dots
          type: Slider
          layout:
            flex: 0 0 auto
          properties:
            vertical: true
            dots: true
            min: 0
            max: 100
            step: 20
            label:
              disabled: true

- title: Disabled State
  fullWidth: true
  blocks:
    - id: slider_disabled
      type: Slider
      properties:
        title: Disabled Slider
        disabled: true
    - id: slider_disabled_marks
      type: Slider
      properties:
        title: Disabled with Marks
        disabled: true
        marks:
          0: Low
          50: Medium
          100: High
    - id: slider_disabled_range
      type: Slider
      properties:
        title: Disabled Range
        disabled: true
        range: true

- title: Label Properties
  fullWidth: true
  blocks:
    - id: slider_label_inline
      type: Slider
      properties:
        title: Inline Label
        label:
          inline: true
          span: 6
        min: 0
        max: 100
    - id: slider_label_extra
      type: Slider
      properties:
        title: With Extra Text
        label:
          extra: Drag to set the desired value
        min: 0
        max: 100
    - id: slider_label_colon_false
      type: Slider
      properties:
        title: No Colon
        label:
          colon: false
        min: 0
        max: 100
    - id: slider_label_disabled
      type: Slider
      properties:
        label:
          disabled: true
        min: 0
        max: 100

- title: Sizes
  fullWidth: true
  blocks:
    - id: slider_size_small
      type: Slider
      properties:
        title: Small
        size: small
        min: 0
        max: 100
    - id: slider_size_default
      type: Slider
      properties:
        title: Default
        min: 0
        max: 100
    - id: slider_size_large
      type: Slider
      properties:
        title: Large
        size: large
        min: 0
        max: 100

- title: Style Overrides
  fullWidth: true
  blocks:
    - id: slider_style_element
      type: Slider
      properties:
        title: Custom Rail Padding
        min: 0
        max: 100
      style:
        --element:
          padding: 0 20px

- title: Theme Token Overrides
  fullWidth: true
  blocks:
    - id: slider_theme_custom_colors
      type: Slider
      properties:
        title: Custom Track Colors
        min: 0
        max: 100
        theme:
          trackBg: '#52c41a'
          trackHoverBg: '#389e0d'
          handleColor: '#52c41a'
          handleActiveColor: '#389e0d'
    - id: slider_theme_large_handle
      type: Slider
      properties:
        title: Large Handle
        min: 0
        max: 100
        theme:
          handleSize: 16
          handleSizeHover: 20
          handleLineWidth: 3
    - id: slider_theme_thick_rail
      type: Slider
      properties:
        title: Thick Rail
        min: 0
        max: 100
        theme:
          railSize: 8
          railBg: '#f0f0f0'
          railHoverBg: '#d9d9d9'
    - id: slider_theme_danger
      type: Slider
      properties:
        title: Danger Theme
        min: 0
        max: 100
        theme:
          trackBg: '#ff4d4f'
          trackHoverBg: '#cf1322'
          handleColor: '#ff4d4f'
          handleActiveColor: '#cf1322'
          handleActiveOutlineColor: 'rgba(255,77,79,0.2)'
