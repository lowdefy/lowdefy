- title: With Style
  blocks:
    - id: style_background_label
      type: Markdown
      properties:
        content: '**Custom background and padding:**'
    - id: style_background
      type: Pagination
      style:
        --element:
          background: '#f5f5f5'
          padding: 12
          borderRadius: 8
      properties:
        total: 100
    - id: style_centered_label
      type: Markdown
      properties:
        content: '**Centered with border:**'
    - id: style_centered
      type: Pagination
      style:
        --element:
          border: 1px solid #d9d9d9
          borderRadius: 8
          padding: 12
          display: flex
          justifyContent: center
      properties:
        total: 100
    - id: style_right_label
      type: Markdown
      properties:
        content: '**Right aligned:**'
    - id: style_right
      type: Pagination
      style:
        --element:
          display: flex
          justifyContent: flex-end
      properties:
        total: 100

