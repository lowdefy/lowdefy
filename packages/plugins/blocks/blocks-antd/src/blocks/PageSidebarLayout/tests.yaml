- id: default
  type: PageSidebarLayout
- id: 'properties.menu'
  type: PageSidebarLayout
  properties:
    menu:
      links:
        - id: Introduction
          type: MenuLink
          pageId: introduction
          properties:
            icon: AiOutlineRocket
            title: Introduction
        - id: alert
          type: MenuLink
          pageId: Alert
          properties:
            icon: AiOutlineExclamationCircle
            title: Alert
- id: 'properties.logo.src'
  type: PageSidebarLayout
  properties:
    logo:
      src: 'https://lowdefy.com/logos/name_250.png'
    menu:
      links:
        - id: Introduction
          type: MenuLink
          pageId: introduction
          properties:
            icon: AiOutlineRocket
            title: Introduction
- id: 'properties.logo.alt'
  type: PageSidebarLayout
  properties:
    logo:
      alt: 'Sidebar logo alt text'
- id: 'properties.logo.style'
  type: PageSidebarLayout
  properties:
    logo:
      style:
        width: 80
- id: 'properties.sider.initialCollapsed: true'
  type: PageSidebarLayout
  properties:
    sider:
      initialCollapsed: true
- id: 'properties.sider.width: 300'
  type: PageSidebarLayout
  properties:
    sider:
      width: 300
- id: 'properties.sider.collapsedWidth: 0'
  type: PageSidebarLayout
  properties:
    sider:
      collapsedWidth: 0
- id: 'properties.sider.hideToggleButton: true'
  type: PageSidebarLayout
  properties:
    sider:
      hideToggleButton: true
- id: 'properties.siderStorageKey'
  type: PageSidebarLayout
  properties:
    siderStorageKey: admin-nav
- id: 'properties.breadcrumb.list'
  type: PageSidebarLayout
  properties:
    breadcrumb:
      list:
        - Home
        - Dashboard
- id: 'properties.footer.style'
  type: PageSidebarLayout
  properties:
    footer:
      style:
        textAlign: center
  areas:
    footer:
      blocks: []
- id: 'properties.content.style'
  type: PageSidebarLayout
  properties:
    content:
      style:
        padding: 0 20px
  areas:
    content:
      blocks: []
- id: 'properties.toggleSiderButton.type'
  type: PageSidebarLayout
  properties:
    toggleSiderButton:
      type: primary
- id: 'properties.darkModeToggle'
  type: PageSidebarLayout
  properties:
    darkModeToggle: true
- id: 'properties.notifications'
  type: PageSidebarLayout
  properties:
    notifications:
      count: 5
- id: 'properties.profile'
  type: PageSidebarLayout
  properties:
    profile:
      avatar:
        content: JD
        color: '#1677ff'
      links:
        - id: prof_settings
          type: MenuLink
          properties:
            title: Settings
            icon: AiOutlineSetting
- id: 'properties.theme (object)'
  type: PageSidebarLayout
  properties:
    theme:
      colorPrimary: '#7c3aed'
      borderRadius: 8
- id: 'areas.siderOpen:'
  type: PageSidebarLayout
  areas:
    siderOpen:
      blocks:
        - id: one
          type: Test
- id: 'areas.siderClosed:'
  type: PageSidebarLayout
  areas:
    siderClosed:
      blocks:
        - id: one
          type: Test
- id: 'areas.mobileExtra:'
  type: PageSidebarLayout
  areas:
    mobileExtra:
      blocks:
        - id: one
          type: Test
- id: 'areas.mobileDrawerContent:'
  type: PageSidebarLayout
  areas:
    mobileDrawerContent:
      blocks:
        - id: one
          type: Test
- id: 'areas.mobileDrawerFooter:'
  type: PageSidebarLayout
  areas:
    mobileDrawerFooter:
      blocks:
        - id: one
          type: Test
