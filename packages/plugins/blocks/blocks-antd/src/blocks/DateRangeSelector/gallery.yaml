- title: Disabled Dates - Min/Max
  blocks:
    - id: drs_dd_min
      type: DateRangeSelector
      properties:
        title: Min Date (2024-01-01)
        disabledDates:
          min: '2024-01-01'
        label:
          disabled: true
    - id: drs_dd_max
      type: DateRangeSelector
      properties:
        title: Max Date (2025-12-31)
        disabledDates:
          max: '2025-12-31'
        label:
          disabled: true
    - id: drs_dd_range
      type: DateRangeSelector
      properties:
        title: Min & Max (2024 only)
        disabledDates:
          min: '2024-01-01'
          max: '2024-12-31'
        label:
          disabled: true

- title: Disabled Dates - Specific Dates
  blocks:
    - id: drs_dd_specific
      type: DateRangeSelector
      properties:
        title: Specific Dates Disabled
        disabledDates:
          dates:
            - '2026-03-15'
            - '2026-03-20'
            - '2026-03-25'
        label:
          disabled: true

- title: Disabled Dates - Date Ranges
  blocks:
    - id: drs_dd_ranges
      type: DateRangeSelector
      properties:
        title: Date Ranges Disabled
        disabledDates:
          ranges:
            - ['2026-03-10', '2026-03-14']
            - ['2026-03-20', '2026-03-24']
        label:
          disabled: true

- title: Label Options
  blocks:
