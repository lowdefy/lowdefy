- title: Combined Features
  blocks:
    - id: drs_combo_hotel
      type: DateRangeSelector
      properties:
        title: Hotel Booking
        placeholder:
          - Check-in date
          - Check-out date
        format: DD MMMM YYYY
        size: large
        separator: '→'
        suffixIcon: AiOutlineSchedule
        allowClear: true
        label:
          extra: Select your check-in and check-out dates.
          colon: false
    - id: drs_combo_minimal
      type: DateRangeSelector
      properties:
        title: Date Range
        variant: borderless
        size: small
        allowClear: false
        format: DD/MM/YYYY
        separator: '-'
        placeholder:
          - From
          - To
        label:
          disabled: true
    - id: drs_combo_restricted
      type: DateRangeSelector
      properties:
        title: Event Registration
        placeholder:
          - Event start
          - Event end
        format: DD MMM YYYY
        suffixIcon:
          name: AiOutlineCalendar
          color: '#1677ff'
        disabledDates:
          min: '2026-01-01'
          max: '2026-12-31'
        label:
          extra: Only dates in 2026 are available.
    - id: drs_combo_themed
      type: DateRangeSelector
      properties:
        title: Themed Picker
        variant: filled
        size: large
        format: DD MMMM YYYY
        separator: '→'
        placeholder:
          - Start date
          - End date
        suffixIcon:
          name: AiOutlineHeart
          color: '#eb2f96'
        label:
          disabled: true
        theme:
          colorPrimary: '#eb2f96'
          borderRadius: 20
          controlHeightLG: 48
          fontSize: 16
          cellActiveWithRangeBg: '#fff0f6'
    - id: drs_combo_contract
      type: DateRangeSelector
      properties:
        title: Contract Period
        placeholder:
          - Contract start
          - Contract end
        format: DD MMM YYYY
        separator: to
        variant: outlined
        size: large
        suffixIcon:
          name: AiOutlineFlag
          color: '#722ed1'
        label:
          extra: 'Specify the <b>full duration</b> of the contract.'
          inline: true
          span: 6
        theme:
          colorPrimary: '#722ed1'
          borderRadius: 8
          activeShadow: '0 0 0 3px rgba(114, 46, 209, 0.12)'
    - id: drs_combo_report
      type: DateRangeSelector
      properties:
        title: Reporting Period
        placeholder:
          - Period start
          - Period end
        format: YYYY-MM-DD
        separator: '|'
        variant: filled
        allowClear: true
        suffixIcon: AiOutlineBarChart
        label:
          extra: Choose the date range for the report.
          colon: false
        theme:
          colorPrimary: '#1677ff'
          colorBgContainer: '#f0f5ff'
          cellActiveWithRangeBg: '#e6f4ff'
