- title: Sizes
  blocks:
    - id: drs_size_small
      type: DateRangeSelector
      properties:
        title: Small
        size: small
        label:
          disabled: true
    - id: drs_size_default
      type: DateRangeSelector
      properties:
        title: Default
        label:
          disabled: true
    - id: drs_size_large
      type: DateRangeSelector
      properties:
        title: Large
        size: large
        label:
          disabled: true

- title: Sizes with Labels
  blocks:
    - id: drs_size_label_small
      type: DateRangeSelector
      properties:
        title: Small with Label
        size: small
    - id: drs_size_label_default
      type: DateRangeSelector
      properties:
        title: Default with Label
    - id: drs_size_label_large
      type: DateRangeSelector
      properties:
        title: Large with Label
        size: large

- title: Variants
  blocks:
    - id: drs_variant_outlined
      type: DateRangeSelector
      properties:
        title: Outlined (default)
        variant: outlined
        label:
          disabled: true
    - id: drs_variant_filled
      type: DateRangeSelector
      properties:
        title: Filled
        variant: filled
        label:
          disabled: true
    - id: drs_variant_borderless
      type: DateRangeSelector
      properties:
        title: Borderless
        variant: borderless
        label:
          disabled: true

- title: Variant + Size Matrix
  blocks:
    - id: drs_mx_outlined_label
      type: Markdown
      properties:
        content: '**outlined**'
    - id: drs_mx_outlined_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: drs_mx_outlined_sm
          type: DateRangeSelector
          properties:
            title: Small
            variant: outlined
            size: small
            label:
              disabled: true
        - id: drs_mx_outlined_md
          type: DateRangeSelector
          properties:
            title: Default
            variant: outlined
            label:
              disabled: true
        - id: drs_mx_outlined_lg
          type: DateRangeSelector
          properties:
            title: Large
            variant: outlined
            size: large
            label:
              disabled: true
    - id: drs_mx_filled_label
      type: Markdown
      properties:
        content: '**filled**'
    - id: drs_mx_filled_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: drs_mx_filled_sm
          type: DateRangeSelector
          properties:
            title: Small
            variant: filled
            size: small
            label:
              disabled: true
        - id: drs_mx_filled_md
          type: DateRangeSelector
          properties:
            title: Default
            variant: filled
            label:
              disabled: true
        - id: drs_mx_filled_lg
          type: DateRangeSelector
          properties:
            title: Large
            variant: filled
            size: large
            label:
              disabled: true
    - id: drs_mx_borderless_label
      type: Markdown
      properties:
        content: '**borderless**'
    - id: drs_mx_borderless_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: drs_mx_borderless_sm
          type: DateRangeSelector
          properties:
            title: Small
            variant: borderless
            size: small
            label:
              disabled: true
        - id: drs_mx_borderless_md
          type: DateRangeSelector
          properties:
            title: Default
            variant: borderless
            label:
              disabled: true
        - id: drs_mx_borderless_lg
          type: DateRangeSelector
          properties:
            title: Large
            variant: borderless
            size: large
            label:
              disabled: true

