    - id: drs_label_right
      type: DateRangeSelector
      properties:
        title: Align Right
        label:
          align: right
    - id: drs_label_inline
      type: DateRangeSelector
      properties:
        title: Inline Label
        label:
          inline: true
          span: 8

- title: Label with Extra Text
  blocks:
    - id: drs_label_extra
      type: DateRangeSelector
      properties:
        title: Travel Dates
        label:
