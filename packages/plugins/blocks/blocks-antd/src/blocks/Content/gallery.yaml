- title: Basic Content
  fullWidth: true
  blocks:
    - id: content_basic
      type: Layout
      blocks:
        - id: content_basic_area
          type: Content
          style:
            padding: 24px
            background: '#fff'
            minHeight: 200px
          blocks:
            - id: content_basic_text
              type: Paragraph
              properties:
                content: The Content block is the main content area within a Layout. It maps to Ant Design's Layout.Content component and is used to hold the primary page content.

- title: Content with Custom Styling
  fullWidth: true
  blocks:
    - id: content_styled
      type: Layout
      blocks:
        - id: content_styled_area
          type: Content
          style:
            padding: 32px 48px
            margin: 16px
            background: '#f5f5f5'
            borderRadius: 8px
            minHeight: 200px
          blocks:
            - id: content_styled_title
              type: Title
              properties:
                content: Styled Content Area
                level: 4
            - id: content_styled_text
              type: Paragraph
              properties:
                content: Content blocks accept custom styles for padding, margin, background, and other CSS properties to customize the content area appearance.

- title: Content in Full Layout
  fullWidth: true
  blocks:
    - id: content_full_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: content_full_header
          type: Header
          style:
            display: flex
            alignItems: center
            paddingInline: 24px
          blocks:
            - id: content_full_header_text
              type: Paragraph
              properties:
                content: Application Header
                style:
                  color: white
                  margin: 0
        - id: content_full_area
          type: Content
          style:
            padding: 24px 48px
            background: '#fff'
          blocks:
            - id: content_full_area_text
              type: Paragraph
              properties:
                content: Content works within a Layout alongside Header and Footer to form a complete page structure. The Content block automatically fills the available vertical space between other layout sections.
        - id: content_full_footer
          type: Footer
          style:
            textAlign: center
          blocks:
            - id: content_full_footer_text
              type: Paragraph
              properties:
                content: Application Footer
