- title: Basic Content
  fullWidth: true
  blocks:
    - id: content_basic_layout
      type: Layout
      blocks:
        - id: content_basic
          type: Content
          style:
            padding: 24px
            background: '#fff'
            minHeight: 200px
          blocks:
            - id: content_basic_text
              type: Paragraph
              properties:
                content:
                  _nunjucks: The Content block is the main content area within a Layout. It maps to Ant Design's Layout.Content component and holds the primary page content.

    - id: content_empty_layout
      type: Layout
      blocks:
        - id: content_empty
          type: Content
          style:
            padding: 24px
            background: '#fafafa'
            minHeight: 120px
            display: flex
            alignItems: center
            justifyContent: center
          blocks:
            - id: content_empty_text
              type: Paragraph
              properties:
                content:
                  _nunjucks: Content without any special configuration. It fills the available space within its parent Layout.

- title: Content in Full Page Layout
  fullWidth: true
  blocks:
    - id: content_full_page_layout
      type: Layout
      style:
        minHeight: 350px
      blocks:
        - id: content_full_page_header
          type: Header
          style:
            display: flex
            alignItems: center
            paddingInline: 24px
          blocks:
            - id: content_full_page_header_title
              type: Title
              properties:
                content:
                  _nunjucks: My Application
                level: 4
                style:
                  color: white
                  margin: 0
        - id: content_full_page_main
          type: Content
          style:
            padding: 24px 48px
            background: '#fff'
          blocks:
            - id: content_full_page_title
              type: Title
              properties:
                content:
                  _nunjucks: Welcome Back
                level: 3
            - id: content_full_page_desc
              type: Paragraph
              properties:
                content:
                  _nunjucks: Content works within a Layout alongside Header and Footer blocks to form a complete page structure. It automatically fills the available vertical space between other layout sections.
        - id: content_full_page_footer
          type: Footer
          style:
            textAlign: center
          blocks:
            - id: content_full_page_footer_text
              type: Paragraph
              properties:
                content:
                  _nunjucks: '© 2026 My Application'

- title: Content with Sider Layout
  fullWidth: true
  blocks:
    - id: content_sider_outer
      type: Layout
      style:
        minHeight: 350px
      blocks:
        - id: content_sider_header
          type: Header
          style:
            display: flex
            alignItems: center
            paddingInline: 24px
          blocks:
            - id: content_sider_header_title
              type: Title
              properties:
                content:
                  _nunjucks: App with Sidebar
                level: 4
                style:
                  color: white
                  margin: 0
        - id: content_sider_inner
          type: Layout
          blocks:
            - id: content_sider_nav
              type: Sider
              properties:
                width: 200
              style:
                background: '#fff'
                paddingTop: 16px
              blocks:
                - id: content_sider_menu
                  type: Menu
                  properties:
                    mode: inline
                    options:
                      - id: dashboard
                        title: Dashboard
                        icon: AiOutlineDashboard
                      - id: users
                        title: Users
                        icon: AiOutlineUser
                      - id: settings
                        title: Settings
                        icon: AiOutlineSetting
            - id: content_sider_main
              type: Content
              style:
                padding: 24px
                background: '#fff'
                margin: 0 16px
              blocks:
                - id: content_sider_main_title
                  type: Title
                  properties:
                    content:
                      _nunjucks: Dashboard
                    level: 3
                - id: content_sider_main_text
                  type: Paragraph
                  properties:
                    content:
                      _nunjucks: When used alongside a Sider block, Content fills the remaining horizontal space. This is the standard layout pattern for admin dashboards and applications with navigation sidebars.

- title: Theme Token Overrides
  fullWidth: true
  blocks:
    - id: content_theme_layout
      type: Layout
      blocks:
        - id: content_theme_custom
          type: Content
          style:
            padding: 24px
            minHeight: 150px
          properties:
            theme:
              colorBgLayout: '#e6f4ff'
              colorText: '#003a8c'
          blocks:
            - id: content_theme_title
              type: Title
              properties:
                content:
                  _nunjucks: Themed Content Area
                level: 4
            - id: content_theme_text
              type: Paragraph
              properties:
                content:
                  _nunjucks: Use the theme property to override antd design tokens. The colorBgLayout token changes the background of the Content block, and colorText adjusts the default text color within it.

    - id: content_theme_warm_layout
      type: Layout
      blocks:
        - id: content_theme_warm
          type: Content
          style:
            padding: 24px
            minHeight: 150px
          properties:
            theme:
              colorBgLayout: '#fff7e6'
              colorText: '#874d00'
          blocks:
            - id: content_theme_warm_title
              type: Title
              properties:
                content:
                  _nunjucks: Warm Color Scheme
                level: 4
            - id: content_theme_warm_text
              type: Paragraph
              properties:
                content:
                  _nunjucks: A warm-toned content area using orange theme tokens. Theme tokens cascade through the antd design system and affect all child blocks within this Content.

    - id: content_theme_dark_layout
      type: Layout
      blocks:
        - id: content_theme_dark
          type: Content
          style:
            padding: 24px
            minHeight: 150px
          properties:
            theme:
              colorBgLayout: '#1f1f1f'
              colorText: '#e0e0e0'
          blocks:
            - id: content_theme_dark_title
              type: Title
              class: text-gray-200
              properties:
                content:
                  _nunjucks: Dark Content Area
                level: 4
            - id: content_theme_dark_text
              type: Paragraph
              class: text-gray-400
              properties:
                content:
                  _nunjucks: Dark-themed content using colorBgLayout and colorText tokens. For app-wide dark themes, prefer using a global ConfigProvider rather than per-block overrides.

- title: Style and CSS Classes
  fullWidth: true
  blocks:
    - id: content_css_rounded_layout
      type: Layout
      blocks:
        - id: content_css_rounded
          type: Content
          class:
            element: bg-blue-50 rounded-xl p-6 m-4
          style:
            minHeight: 150px
          blocks:
            - id: content_css_rounded_title
              type: Title
              properties:
                content:
                  _nunjucks: Rounded Content with Tailwind
                level: 4
            - id: content_css_rounded_text
              type: Paragraph
              properties:
                content:
                  _nunjucks: 'Use the element CSS key to apply Tailwind classes directly to the Content element. Content has one CSS key: element, which targets the Layout.Content wrapper.'

    - id: content_css_gradient_layout
      type: Layout
      blocks:
        - id: content_css_gradient
          type: Content
          class:
            element: bg-gradient-to-br from-indigo-50 to-purple-50 p-8 m-4 rounded-lg shadow-inner
          style:
            minHeight: 150px
          blocks:
            - id: content_css_gradient_title
              type: Title
              properties:
                content:
                  _nunjucks: Gradient Background
                level: 4
            - id: content_css_gradient_text
              type: Paragraph
              properties:
                content:
                  _nunjucks: Tailwind gradient and shadow utilities applied via the element CSS key create a visually distinct content area without needing custom CSS.

    - id: content_css_border_layout
      type: Layout
      blocks:
        - id: content_css_border
          type: Content
          class:
            element: border-l-4 border-l-green-500 bg-green-50 p-6 m-4
          style:
            minHeight: 150px
          blocks:
            - id: content_css_border_title
              type: Title
              properties:
                content:
                  _nunjucks: Accent Border Content
                level: 4
            - id: content_css_border_text
              type: Paragraph
              properties:
                content:
                  _nunjucks: A left accent border highlights the content area. Combine Tailwind border utilities with background colors for status-aware content regions.

- title: Content in Dashboard Layout
  fullWidth: true
  blocks:
    - id: content_dashboard_outer
      type: Layout
      style:
        minHeight: 450px
      blocks:
        - id: content_dashboard_header
          type: Header
          style:
            display: flex
            alignItems: center
            justifyContent: space-between
            paddingInline: 24px
          blocks:
            - id: content_dashboard_header_title
              type: Title
              layout:
                flex: 0 0 auto
              properties:
                content:
                  _nunjucks: Analytics Dashboard
                level: 4
                style:
                  color: white
                  margin: 0
            - id: content_dashboard_header_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Export Report
                icon: AiOutlineDownload
                color: default
                variant: outlined
                size: small
        - id: content_dashboard_inner
          type: Layout
          blocks:
            - id: content_dashboard_sider
              type: Sider
              properties:
                width: 200
              style:
                background: '#fff'
                paddingTop: 16px
              blocks:
                - id: content_dashboard_menu
                  type: Menu
                  properties:
                    mode: inline
                    options:
                      - id: overview
                        title: Overview
                        icon: AiOutlineHome
                      - id: analytics
                        title: Analytics
                        icon: AiOutlineBarChart
                      - id: reports
                        title: Reports
                        icon: AiOutlineFileText
                      - id: team
                        title: Team
                        icon: AiOutlineTeam
            - id: content_dashboard_main
              type: Content
              style:
                padding: 24px
                background: '#f5f5f5'
              blocks:
                - id: content_dashboard_stats_row
                  type: Box
                  layout:
                    gap: 16
                  blocks:
                    - id: content_dashboard_stat1
                      type: Card
                      layout:
                        flex: 1 1 0
                      properties:
                        size: small
                      blocks:
                        - id: content_dashboard_stat1_val
                          type: Statistic
                          properties:
                            title: Total Users
                            value: 12480
                    - id: content_dashboard_stat2
                      type: Card
                      layout:
                        flex: 1 1 0
                      properties:
                        size: small
                      blocks:
                        - id: content_dashboard_stat2_val
                          type: Statistic
                          properties:
                            title: Revenue
                            value: 48650
                            prefix: $
                    - id: content_dashboard_stat3
                      type: Card
                      layout:
                        flex: 1 1 0
                      properties:
                        size: small
                      blocks:
                        - id: content_dashboard_stat3_val
                          type: Statistic
                          properties:
                            title: Conversion
                            value: 3.2
                            suffix: '%'
                - id: content_dashboard_main_card
                  type: Card
                  properties:
                    title: Recent Activity
                  blocks:
                    - id: content_dashboard_activity_1
                      type: Paragraph
                      properties:
                        content:
                          _nunjucks: 'User John updated the project settings — 2 minutes ago'
                    - id: content_dashboard_activity_2
                      type: Paragraph
                      properties:
                        content:
                          _nunjucks: 'Deployment to production completed — 15 minutes ago'
                    - id: content_dashboard_activity_3
                      type: Paragraph
                      properties:
                        content:
                          _nunjucks: 'New team member Sarah joined — 1 hour ago'

- title: Content in Settings Page
  fullWidth: true
  blocks:
    - id: content_settings_outer
      type: Layout
      style:
        minHeight: 400px
      blocks:
        - id: content_settings_header
          type: Header
          style:
            display: flex
            alignItems: center
            paddingInline: 24px
          blocks:
            - id: content_settings_header_title
              type: Title
              properties:
                content:
                  _nunjucks: Account Settings
                level: 4
                style:
                  color: white
                  margin: 0
        - id: content_settings_main
          type: Content
          style:
            padding: 32px 48px
            background: '#fff'
          blocks:
            - id: content_settings_title
              type: Title
              properties:
                content:
                  _nunjucks: Profile Information
                level: 3
            - id: content_settings_desc
              type: Paragraph
              properties:
                content:
                  _nunjucks: Update your personal details and preferences below.
            - id: content_settings_form_name
              type: TextInput
              properties:
                title: Display Name
                placeholder: Enter your display name
            - id: content_settings_form_email
              type: TextInput
              properties:
                title: Email Address
                placeholder: you@example.com
            - id: content_settings_form_bio
              type: TextArea
              properties:
                title: Bio
                placeholder: Tell us about yourself
                rows: 3
            - id: content_settings_divider
              type: Divider
            - id: content_settings_actions
              type: Box
              layout:
                gap: 12
                justify: end
              blocks:
                - id: content_settings_cancel_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Cancel
                    color: default
                    variant: outlined
                - id: content_settings_save_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Save Changes
                    color: primary
                    variant: solid
                    icon: AiOutlineSave
                  events:
                    onClick:
                      - id: content_settings_save_msg
                        type: DisplayMessage
                        params:
                          content: Settings saved successfully!
                          status: success
