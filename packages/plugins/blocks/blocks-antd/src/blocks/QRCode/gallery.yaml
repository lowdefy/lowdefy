        value: https://lowdefy.com
    - id: qr_css_rounded
      type: QRCode
      layout:
        flex: 0 0 auto
      class: rounded-2xl overflow-hidden
      properties:
        value: https://lowdefy.com
    - id: qr_css_shadow_rounded
      type: QRCode
      layout:
        flex: 0 0 auto
      class: shadow-xl rounded-2xl overflow-hidden
      properties:
        value: https://lowdefy.com
        color: '#1677ff'
        bgColor: '#f0f5ff'
    - id: qr_css_border_blue
      type: QRCode
      layout:
        flex: 0 0 auto
      style:
        --element:
          borderColor: '#1677ff'
          borderWidth: 2
      properties:
        value: https://lowdefy.com
        bordered: true
    - id: qr_css_border_green
      type: QRCode
      layout:
        flex: 0 0 auto
      style:
        --element:
          borderColor: '#52c41a'
          borderWidth: 2
          borderRadius: 16
      properties:
        value: https://lowdefy.com
        bordered: true
    - id: qr_css_inline_shadow
      type: QRCode
      layout:
        flex: 0 0 auto
      style:
