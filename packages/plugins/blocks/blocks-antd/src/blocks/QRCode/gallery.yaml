- title: Style and CSS
  blocks:
    - id: qr_css_shadow
      type: QRCode
      layout:
        flex: 0 0 auto
      class: shadow-lg
      properties:
        value: https://lowdefy.com
    - id: qr_css_rounded
      type: QRCode
      layout:
        flex: 0 0 auto
      class: shadow-xl rounded-2xl overflow-hidden
      properties:
        value: https://lowdefy.com
        color: '#1677ff'
        bgColor: '#f0f5ff'
    - id: qr_css_inline_border
      type: QRCode
      layout:
        flex: 0 0 auto
      style:
        --element:
          borderColor: '#1677ff'
          borderWidth: 2
      properties:
        value: https://lowdefy.com
        bordered: true
    - id: qr_css_inline_shadow
      type: QRCode
      layout:
        flex: 0 0 auto
      style:
        --element:
          boxShadow: 0 4px 12px rgba(0, 0, 0, 0.15)
          borderRadius: 16
      properties:
        value: https://lowdefy.com

- title: Theme Token Overrides
  blocks:
    - id: qr_theme_radius
      type: QRCode
      layout:
        flex: 0 0 auto
      properties:
        value: https://lowdefy.com
        theme:
          borderRadiusLG: 24
    - id: qr_theme_container
      type: QRCode
      layout:
        flex: 0 0 auto
      properties:
        value: https://lowdefy.com
        theme:
          colorBgContainer: '#f0f5ff'
          colorSplit: '#1677ff'
    - id: qr_theme_padding
      type: QRCode
      layout:
        flex: 0 0 auto
      properties:
        value: https://lowdefy.com
        theme:
          padding: 24
          borderRadiusLG: 16
    - id: qr_theme_cover
      type: QRCode
      layout:
        flex: 0 0 auto
      properties:
        value: https://lowdefy.com
        status: expired
        theme:
          QRCodeCoverBackgroundColor: rgba(0, 0, 0, 0.8)
          QRCodeTextColor: '#ffffff'

- title: QRCode in Event Ticket
  blocks:
    - id: ticket_card
      type: Card
      layout:
        flex: 0 0 380px
      properties:
        title: Tech Conference 2026
        size: small
      blocks:
        - id: ticket_details
          type: Descriptions
          properties:
            size: small
            column: 1
            items:
              - label: Date
                value: March 28, 2026
              - label: Venue
                value: Convention Center, Hall B
              - label: Ticket
                value: 'General Admission #4821'
        - id: ticket_qr_row
          type: Box
          layout:
            contentAlign: center
            gap: 8
          blocks:
            - id: ticket_qr
              type: QRCode
              layout:
                flex: 0 0 auto
              properties:
                value: 'TICKET:CONF2026:GA:4821:VALID'
                size: 180
                errorLevel: H
                bordered: false
            - id: ticket_hint
              type: Paragraph
              properties:
                content: Present this QR code at the entrance for check-in.
                type: secondary

- title: QRCode in Wi-Fi Share Card
  blocks:
    - id: wifi_card
      type: Card
      layout:
        flex: 0 0 340px
      properties:
        title: Guest Wi-Fi
        size: small
      blocks:
        - id: wifi_qr_row
          type: Box
          layout:
            contentAlign: center
            gap: 8
          blocks:
            - id: wifi_qr
              type: QRCode
              layout:
                flex: 0 0 auto
              properties:
                value: 'WIFI:T:WPA;S:OfficeGuest;P:welcome2026;;'
                size: 200
                color: '#1677ff'
                bgColor: '#e6f4ff'
                errorLevel: Q
                bordered: false
        - id: wifi_details
          type: Descriptions
          properties:
            size: small
            column: 1
            items:
              - label: Network
                value: OfficeGuest
              - label: Password
                value: welcome2026
        - id: wifi_actions
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: wifi_refresh_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Generate New Password
                color: primary
                variant: outlined
                icon: AiOutlineReload
              events:
                onClick:
                  - id: wifi_refresh_msg
                    type: DisplayMessage
                    params:
                      content: New Wi-Fi password generated.
                      status: success
