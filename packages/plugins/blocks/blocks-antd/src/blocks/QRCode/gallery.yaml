- title: Basic QR Code
  blocks:
    - id: qr_basic_url
      type: QRCode
      layout:
        flex: 0 0 auto
      properties:
        value: https://lowdefy.com
    - id: qr_basic_text
      type: QRCode
      layout:
        flex: 0 0 auto
      properties:
        value: Hello, World!
    - id: qr_basic_long_url
      type: QRCode
      layout:
        flex: 0 0 auto
      properties:
        value: https://docs.lowdefy.com/tutorial-start

