- title: In Context - Card Layout
  blocks:
    - id: qr_ctx_card_row
      type: Box
      layout:
        gap: 16
        justify: flex-start
      blocks:
        - id: qr_ctx_card_basic
          type: Card
          layout:
            flex: 0 0 260px
          properties:
            title: Scan to Visit
            size: small
          blocks:
            - id: qr_ctx_card_basic_row
              type: Box
              layout:
                contentAlign: center
              blocks:
                - id: qr_ctx_card_basic_qr
                  type: QRCode
                  layout:
                    flex: 0 0 auto
                  properties:
                    value: https://lowdefy.com
                    size: 180
                    bordered: false
                - id: qr_ctx_card_basic_text
                  type: Paragraph
                  properties:
                    content: Point your phone camera at the QR code to open the link.
                    type: secondary
        - id: qr_ctx_card_branded
          type: Card
          layout:
            flex: 0 0 260px
          properties:
            title: Download App
            size: small
          blocks:
            - id: qr_ctx_card_branded_row
              type: Box
              layout:
                contentAlign: center
              blocks:
                - id: qr_ctx_card_branded_qr
                  type: QRCode
                  layout:
                    flex: 0 0 auto
                  properties:
                    value: https://lowdefy.com
                    size: 180
                    color: '#1677ff'
                    bgColor: '#f0f5ff'
                    errorLevel: H
                    icon: https://lowdefy.com/favicon-32x32.png
                    iconSize: 36
                    bordered: false
                - id: qr_ctx_card_branded_text
                  type: Paragraph
                  properties:
                    content: Scan to download the mobile app from the App Store.
                    type: secondary
        - id: qr_ctx_card_dark
          type: Card
          layout:
            flex: 0 0 260px
          class: bg-slate-900
          properties:
            title: Dark Mode QR
            size: small
          blocks:
            - id: qr_ctx_card_dark_row
              type: Box
              layout:
                contentAlign: center
              blocks:
                - id: qr_ctx_card_dark_qr
                  type: QRCode
                  layout:
                    flex: 0 0 auto
                  properties:
                    value: https://lowdefy.com
                    size: 180
                    color: '#00d4ff'
                    bgColor: '#0d1117'
                    bordered: false

