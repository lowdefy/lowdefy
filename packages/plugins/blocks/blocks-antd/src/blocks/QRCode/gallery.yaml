- title: Multiple QR Codes with Different URLs
  blocks:
    - id: qr_url_row
      type: Box
      layout:
        gap: 16
        justify: flex-start
      blocks:
        - id: qr_url_lowdefy
          type: Box
          layout:
            flex: 0 0 auto
            contentAlign: center
          blocks:
            - id: qr_url_lowdefy_code
              type: QRCode
              layout:
                flex: 0 0 auto
              properties:
                value: https://lowdefy.com
                size: 140
                color: '#1677ff'
            - id: qr_url_lowdefy_label
              type: Markdown
              properties:
                content: Lowdefy Home
        - id: qr_url_docs
          type: Box
          layout:
            flex: 0 0 auto
            contentAlign: center
          blocks:
            - id: qr_url_docs_code
              type: QRCode
              layout:
                flex: 0 0 auto
              properties:
                value: https://docs.lowdefy.com
                size: 140
                color: '#52c41a'
            - id: qr_url_docs_label
              type: Markdown
              properties:
                content: Documentation
        - id: qr_url_github
          type: Box
          layout:
            flex: 0 0 auto
            contentAlign: center
          blocks:
            - id: qr_url_github_code
              type: QRCode
              layout:
                flex: 0 0 auto
              properties:
                value: https://github.com/lowdefy/lowdefy
                size: 140
                color: '#24292e'
            - id: qr_url_github_label
              type: Markdown
              properties:
                content: GitHub Repo
        - id: qr_url_discord
          type: Box
          layout:
            flex: 0 0 auto
            contentAlign: center
          blocks:
            - id: qr_url_discord_code
              type: QRCode
              layout:
                flex: 0 0 auto
              properties:
