id: qr_code
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: qr_basic
    type: QRCode
    properties:
      value: 'https://lowdefy.com'

  - id: qr_bordered
    type: QRCode
    properties:
      bordered: true
      value: 'test'

  - id: qr_size
    type: QRCode
    properties:
      size: 200
      value: 'size-test'

  # ============================================
  # EVENT TESTS
  # ============================================

  - id: qr_expired
    type: QRCode
    properties:
      status: expired
      value: 'expired'
    events:
      onRefresh:
        - id: set_refreshed
          type: SetState
          params:
            qr_refreshed: true

  - id: qr_refresh_display
    type: Paragraph
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: qr_refreshed
              - true
          then: Refresh fired
          else: ''
