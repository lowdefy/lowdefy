- title: Basic Header
  fullWidth: true
  blocks:
    - id: header_basic
      type: Header
      style:
        borderBottom: 1px solid var(--ant-color-border)
      blocks:
        - id: header_basic_logo
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: '<span class="text-lg font-bold">MyApp</span>'

- title: Header with Navigation
  fullWidth: true
  blocks:
    - id: header_nav
      type: Header
      style:
        borderBottom: 1px solid var(--ant-color-border)
      blocks:
        - id: header_nav_logo
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: '<span class="text-lg font-bold mr-6">MyApp</span>'
        - id: header_nav_home
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Home
            icon: AiOutlineHome
            color: default
            variant: link
        - id: header_nav_about
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: About
            color: default
            variant: link
        - id: header_nav_contact
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Contact
            color: default
            variant: link

- title: Profile & Notifications
  fullWidth: true
  blocks:
    - id: header_profile
      type: Header
      properties:
        darkModeToggle: true
        notifications:
          count: 3
        profile:
          avatar:
            content: JD
            color: '#1677ff'
          links:
            - id: header_prof_profile
              type: MenuLink
              properties:
                title: My Profile
                icon: AiOutlineUser
            - id: header_prof_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
            - id: header_prof_divider
              type: MenuDivider
            - id: header_prof_logout
              type: MenuLink
              properties:
                title: Logout
                icon: AiOutlineLogout
                danger: true
      style:
        borderBottom: 1px solid var(--ant-color-border)
      blocks:
        - id: header_profile_logo
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: '<span class="text-lg font-bold mr-6">Dashboard</span>'
        - id: header_profile_overview
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Overview
            icon: AiOutlineDashboard
            color: default
            variant: link
        - id: header_profile_projects
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Projects
            icon: AiOutlineProject
            color: default
            variant: link

- title: Header in Marketing Page
  fullWidth: true
  blocks:
    - id: header_marketing
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: header_marketing_el
          type: Header
          style:
            borderBottom: 1px solid var(--ant-color-border)
          blocks:
            - id: header_marketing_brand
              type: Html
              layout:
                flex: 0 0 auto
              properties:
                html: '<span class="text-primary text-[22px] font-bold mr-8">Acme Inc</span>'
            - id: header_marketing_nav_features
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Features
                color: default
                variant: link
            - id: header_marketing_nav_pricing
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Pricing
                color: default
                variant: link
            - id: header_marketing_nav_docs
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Docs
                color: default
                variant: link
            - id: header_marketing_spacer
              type: Box
              layout:
                flex: 1 1 0
            - id: header_marketing_btn_login
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Log In
                color: default
                variant: outlined
            - id: header_marketing_btn_signup
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Get Started
                color: primary
                variant: solid
        - id: header_marketing_content
          type: Content
          style:
            padding: 64px 48px
            textAlign: center
          blocks:
            - id: header_marketing_hero_title
              type: Title
              properties:
                content: Build Better Products, Faster
                level: 1
            - id: header_marketing_hero_subtitle
              type: Paragraph
              properties:
                content: A Header for marketing pages with button navigation and call-to-action buttons.

- title: Theme Token Overrides
  fullWidth: true
  blocks:
    - id: header_token_branded
      type: Header
      properties:
        theme:
          headerBg: '#0958d9'
          headerHeight: 56
          headerPadding: '0 24px'
      blocks:
        - id: header_token_branded_title
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: '<span class="text-white text-lg font-bold">Branded Header</span>'
        - id: header_token_branded_spacer
          type: Box
          layout:
            flex: 1 1 0
        - id: header_token_branded_subtitle
          type: Html
          layout:
            flex: 0 0 auto
          properties:
            html: '<span style="color:#bae0ff">Using headerBg token</span>'

    - id: header_token_compact
      type: Header
      properties:
        theme:
          headerHeight: 40
          headerPadding: '0 16px'
      style:
        borderBottom: 1px solid var(--ant-color-border)
      blocks:
        - id: header_token_compact_title
          type: Html
          properties:
            html: '<span class="text-sm">Compact Header (40px height)</span>'
