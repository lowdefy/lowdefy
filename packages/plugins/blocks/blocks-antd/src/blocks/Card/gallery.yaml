- title: Basic Card
  blocks:
    - id: basic_card
      type: Card
      properties:
        title: Card Title
      blocks:
        - id: basic_card_p1
          type: Paragraph
          properties:
            content: Cards provide a flexible and extensible content container with multiple variants. This is the default card with a simple title and body content.
        - id: basic_card_p2
          type: Paragraph
          properties:
            content: You can place any blocks inside the card body using the standard blocks key.

    - id: basic_no_title
      type: Card
      blocks:
        - id: basic_no_title_content
          type: Paragraph
          properties:
            content: A card without a title. The header area is completely hidden, leaving only the body content. Useful as a simple elevated content container.

- title: Sizes
  blocks:
    - id: size_default_card
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Default Size
        size: default
      blocks:
        - id: size_default_p
          type: Paragraph
          properties:
            content: Default size card with standard padding (24px) and normal header height (56px). This is the most common card size for general content.
        - id: size_default_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: size_default_tag1
              type: Tag
              properties:
                title: Standard
                color: blue
            - id: size_default_tag2
              type: Tag
              properties:
                title: 24px padding
                color: default

    - id: size_small_card
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Small Size
        size: small
      blocks:
        - id: size_small_p
          type: Paragraph
          properties:
            content: Small size card with compact padding (12px) and shorter header (38px). Ideal for dense layouts, dashboards, or sidebar widgets.
        - id: size_small_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: size_small_tag1
              type: Tag
              properties:
                title: Compact
                color: green
            - id: size_small_tag2
              type: Tag
              properties:
                title: 12px padding
                color: default

- title: Bordered vs Borderless
  blocks:
    - id: border_wrapper
      type: Box
      class: bg-gray-100 p-6 rounded-lg
      layout:
        gap: 16
      blocks:
        - id: bordered_card
          type: Card
          layout:
            flex: 1 1 0
          properties:
            title: Bordered (default)
            bordered: true
          blocks:
            - id: bordered_content
              type: Paragraph
              properties:
                content: The default card has a visible border. This clearly separates the card from its surroundings.

        - id: borderless_card
          type: Card
          layout:
            flex: 1 1 0
          properties:
            title: Borderless
            bordered: false
          blocks:
            - id: borderless_content
              type: Paragraph
              properties:
                content: A borderless card blends into its container. Best used on colored backgrounds where the card's white fill provides enough contrast.

- title: Card with Extra Slot
  blocks:
    - id: extra_text_card
      type: Card
      properties:
        title: Recent Activity
      slots:
        extra:
          blocks:
            - id: extra_text_link
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: View All
                color: primary
                variant: link
                size: small
      blocks:
        - id: extra_text_p1
          type: Paragraph
          properties:
            content: 'User John updated the project settings 2 minutes ago.'
        - id: extra_text_p2
          type: Paragraph
          properties:
            content: 'User Sarah added 3 new team members 15 minutes ago.'
        - id: extra_text_p3
          type: Paragraph
          properties:
            content: 'Deployment completed successfully 1 hour ago.'

    - id: extra_buttons_card
      type: Card
      properties:
        title: Project Settings
      slots:
        extra:
          blocks:
            - id: extra_btn_row
              type: Box
              layout:
                gap: 8
              blocks:
                - id: extra_btn_edit
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Edit
                    icon: AiOutlineEdit
                    color: primary
                    variant: outlined
                    size: small
                - id: extra_btn_more
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineEllipsis
                    color: default
                    variant: text
                    size: small
                    hideTitle: true
      blocks:
        - id: extra_buttons_content
          type: Paragraph
          properties:
            content: The extra slot renders content in the top-right corner of the card header, next to the title. It accepts any blocks, commonly used for action buttons or links.

- title: Card with Title Slot
  blocks:
    - id: title_slot_card
      type: Card
      slots:
        title:
          blocks:
            - id: title_slot_row
              type: Box
              layout:
                gap: 12
                align: center
              blocks:
                - id: title_slot_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineUser
                    color: '#1677ff'
                    backgroundColor: '#e6f4ff'
                - id: title_slot_text
                  type: Title
                  layout:
                    flex: 0 0 auto
                  properties:
                    content: Custom Title Layout
                    level: 5
      blocks:
        - id: title_slot_content
          type: Paragraph
          properties:
            content: The title slot lets you replace the default text title with any combination of blocks. Here we use an Avatar and Title block side by side. This overrides the properties.title string.

    - id: title_slot_badge_card
      type: Card
      slots:
        title:
          blocks:
            - id: title_badge_row
              type: Box
              layout:
                gap: 8
                align: center
              blocks:
                - id: title_badge_text
                  type: Title
                  layout:
                    flex: 0 0 auto
                  properties:
                    content: Notifications
                    level: 5
                - id: title_badge_tag
                  type: Tag
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: '12 new'
                    color: red
        extra:
          blocks:
            - id: title_badge_extra_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Mark all read
                color: primary
                variant: link
                size: small
      blocks:
        - id: title_badge_content
          type: Paragraph
          properties:
            content: Combining the title slot with the extra slot gives you full control over the entire header area.

- title: Card with Cover Slot
  blocks:
    - id: cover_card_1
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Mountain Landscape
        hoverable: true
      slots:
        cover:
          blocks:
            - id: cover_img_1
              type: Html
              properties:
                html: '<img alt="landscape" src="https://picsum.photos/seed/mountain/600/300" style="width:100%; display:block;" />'
      blocks:
        - id: cover_card_1_desc
          type: Paragraph
          properties:
            content: The cover slot renders content above the card body, typically used for images. It sits outside the body padding for edge-to-edge display.

    - id: cover_card_2
      type: Card
      layout:
        flex: 1 1 0
      properties:
        hoverable: true
      slots:
        cover:
          blocks:
            - id: cover_img_2
              type: Html
              properties:
                html: '<img alt="architecture" src="https://picsum.photos/seed/building/600/300" style="width:100%; display:block;" />'
      blocks:
        - id: cover_card_2_title
          type: Title
          properties:
            content: Architecture Photography
            level: 5
        - id: cover_card_2_desc
          type: Paragraph
          properties:
            content: A cover card without a header title. The title is placed inside the body instead, giving a magazine-style layout.
        - id: cover_card_2_tags
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cover_card_2_tag1
              type: Tag
              properties:
                title: Photography
                color: blue
            - id: cover_card_2_tag2
              type: Tag
              properties:
                title: Featured
                color: gold

- title: Inner Cards
  blocks:
    - id: inner_outer
      type: Card
      properties:
        title: Group Title
      slots:
        extra:
          blocks:
            - id: inner_outer_extra
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: More
                color: primary
                variant: link
                size: small
      blocks:
        - id: inner_first
          type: Card
          properties:
            title: Inner Card One
            inner: true
          blocks:
            - id: inner_first_content
              type: Paragraph
              properties:
                content: Inner cards have a gray background and are designed for nesting inside a parent card. They provide visual grouping without extra border weight.
        - id: inner_second
          type: Card
          properties:
            title: Inner Card Two
            inner: true
          blocks:
            - id: inner_second_content
              type: Paragraph
              properties:
                content: Multiple inner cards can stack within a parent to organize related sections. Each has its own title and content area.
        - id: inner_third
          type: Card
          properties:
            title: Inner Card Three
            inner: true
            size: small
          blocks:
            - id: inner_third_content
              type: Paragraph
              properties:
                content: Inner cards also support the small size variant for more compact layouts.

