- title: Styled Cards (Tailwind CSS)
  blocks:
    - id: styled_gradient
      type: Card
      layout:
        flex: 1 1 0
      class: bg-gradient-to-br from-blue-500 to-purple-600 text-white border-0 rounded-xl
      blocks:
        - id: styled_gradient_title
          type: Title
          class: text-white
          properties:
            content: Gradient Card
            level: 4
        - id: styled_gradient_p
          type: Paragraph
          class: text-blue-100
          properties:
            content: Using Tailwind CSS classes to create a gradient background card. The class property on the Card applies utility classes directly to the wrapper.

    - id: styled_shadow
      type: Card
      layout:
        flex: 1 1 0
      class: shadow-xl rounded-2xl border-0
      properties:
        title: Elevated Card
      blocks:
        - id: styled_shadow_p
          type: Paragraph
          properties:
            content: A borderless card with extra-large shadow and rounded corners. The shadow-xl class creates a prominent floating effect.

    - id: styled_accent
      type: Card
      layout:
        flex: 1 1 0
      class: border-l-4 border-l-green-500 rounded-lg
      properties:
        title: Accent Border
      blocks:
        - id: styled_accent_p
          type: Paragraph
          properties:
            content: A left accent border highlights important cards. Combine Tailwind border utilities with the Card component for custom accents.

- title: Custom Header and Body Styles
  blocks:
    - id: style_header_bg
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Colored Header
      style:
        --header:
          backgroundColor: '#e6f4ff'
          borderBottom: 1px solid #91caff
        --body:
          backgroundColor: '#f0f5ff'
      blocks:
        - id: style_header_bg_p
          type: Paragraph
          properties:
            content: Using style.header and style.body to apply custom CSS to the card header and body sections separately. The header has a blue tint with a matching border.

    - id: style_dark_card
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Dark Theme Card
      style:
        --header:
          backgroundColor: '#1f1f1f'
          color: '#ffffff'
          borderBottom: 1px solid #333
        --body:
          backgroundColor: '#2a2a2a'
      blocks:
        - id: style_dark_p
          type: Paragraph
          class: text-gray-300
          properties:
            content: A manually styled dark card using inline styles on the header and body. For app-wide dark themes, prefer antd theme tokens or ConfigProvider.

    - id: style_compact_card
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Compact Custom Padding
      style:
        --header:
          padding: 8px 16px
          minHeight: 40px
        --body:
          padding: 12px 16px
      blocks:
        - id: style_compact_p
          type: Paragraph
          properties:
            content: Inline styles on the header and body can override the default padding for a more compact layout without using the small size variant.

- title: CSS Key Classes
  blocks:
    - id: css_element
      type: Card
      layout:
        flex: 1 1 0
      class:
        element: shadow-lg rounded-xl
        header: bg-blue-50
        body: bg-white
      properties:
        title: Element + Header + Body
      blocks:
        - id: css_element_p
          type: Paragraph
          properties:
            content: 'Card supports these CSS keys: element, header, body, cover, actions, extra. Use class as an object to target each area with Tailwind classes.'

    - id: css_hover_ring
      type: Card
      layout:
        flex: 1 1 0
      class:
        element: hover:ring-2 hover:ring-blue-400 transition-all duration-200 rounded-lg
      properties:
        title: Hover Ring Effect
        hoverable: true
      blocks:
        - id: css_hover_ring_p
          type: Paragraph
          properties:
            content: Combining the hoverable property with a Tailwind hover ring transition creates an interactive highlight on mouse over.

    - id: css_extra_styled
      type: Card
      layout:
        flex: 1 1 0
      class:
        extra: bg-green-50 px-3 py-1 rounded-full
      properties:
        title: Styled Extra Area
      slots:
        extra:
          blocks:
            - id: css_extra_tag
              type: Tag
              layout:
                flex: 0 0 auto
              properties:
                title: Live
                color: success
      blocks:
        - id: css_extra_styled_p
          type: Paragraph
          properties:
            content: The extra CSS key lets you style the container around the extra slot content. Here a green pill background wraps the status tag.

- title: Theme Token Overrides
  blocks:
    - id: theme_large_padding
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Large Padding
        theme:
          bodyPadding: 40
          headerPadding: 40
      blocks:
        - id: theme_large_padding_p
          type: Paragraph
          properties:
            content: Override bodyPadding and headerPadding tokens for extra spacious cards. These tokens control the internal spacing of the card.

    - id: theme_colored_header
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Custom Header Background
        theme:
          headerBg: '#f6ffed'
          colorTextHeading: '#389e0d'
      blocks:
        - id: theme_colored_header_p
          type: Paragraph
          properties:
            content: The headerBg token changes the card header background color, and colorTextHeading changes the title text color. These apply through the antd theme system.

    - id: theme_rounded
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Extra Rounded
        theme:
          borderRadiusLG: 20
      blocks:
        - id: theme_rounded_p
          type: Paragraph
          properties:
            content: The borderRadiusLG token controls the card corner radius. Set a large value for a pill-like card appearance.

    - id: theme_dense
      type: Card
      layout:
        flex: 1 1 0
      properties:
        title: Dense Card
        size: small
        theme:
          bodyPaddingSM: 8
          headerPaddingSM: 8
          headerHeightSM: 32
          headerFontSizeSM: 12
      blocks:
        - id: theme_dense_p
          type: Paragraph
          properties:
            content: Combine the small size variant with custom SM tokens for an ultra-compact card. Useful for data-dense dashboards.

    - id: theme_custom_colors
      type: Card
      properties:
        title: Custom Color Scheme
        theme:
          headerBg: '#fff7e6'
