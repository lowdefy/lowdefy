- title: Basic PageSiderMenu
  fullWidth: true
  blocks:
    - id: psm_basic
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 220
        menu:
          theme: light
          links:
            - id: psm_basic_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_basic_users
              type: MenuLink
              properties:
                title: Users
                icon: AiOutlineUser
            - id: psm_basic_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psm_basic_content
          type: Paragraph
          properties:
            content: PageSiderMenu provides a full page layout with a collapsible sidebar navigation. The sider contains an inline menu that automatically collapses on small screens. A mobile drawer menu is shown on smaller viewports.

- title: Dark Theme Sider
  fullWidth: true
  blocks:
    - id: psm_dark
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: dark
          initialCollapsed: false
          collapsible: true
          width: 200
        menu:
          theme: dark
          links:
            - id: psm_dark_overview
              type: MenuLink
              properties:
                title: Overview
                icon: AiOutlineAppstore
            - id: psm_dark_analytics
              type: MenuLink
              properties:
                title: Analytics
                icon: AiOutlineBarChart
            - id: psm_dark_reports
              type: MenuLink
              properties:
                title: Reports
                icon: AiOutlineFileText
      blocks:
        - id: psm_dark_content
          type: Paragraph
          properties:
            content: Dark theme sidebar with matching dark menu. The sider.theme property controls the sidebar background color and the menu.theme should match for a consistent appearance.

- title: Light Header Theme
  fullWidth: true
  blocks:
    - id: psm_light_header
      type: PageSiderMenu
      properties:
        header:
          theme: light
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 220
        menu:
          theme: light
          links:
            - id: psm_lh_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_lh_reports
              type: MenuLink
              properties:
                title: Reports
                icon: AiOutlineFileText
      blocks:
        - id: psm_light_header_content
          type: Paragraph
          properties:
            content: Setting header.theme to light uses a white header background instead of dark. This creates a lighter, more minimal look for the page.

- title: Menu with Groups and Nested Items
  fullWidth: true
  blocks:
    - id: psm_groups
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 240
        menu:
          theme: light
          links:
            - id: psm_grp_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_grp_management
              type: MenuGroup
              properties:
                title: Management
                icon: AiOutlineTeam
              links:
                - id: psm_grp_users
                  type: MenuLink
                  properties:
                    title: Users
                - id: psm_grp_roles
                  type: MenuLink
                  properties:
                    title: Roles
                - id: psm_grp_permissions
                  type: MenuLink
                  properties:
                    title: Permissions
            - id: psm_grp_content_group
              type: MenuGroup
              properties:
                title: Content
                icon: AiOutlineEdit
              links:
                - id: psm_grp_pages
                  type: MenuLink
                  properties:
                    title: Pages
                - id: psm_grp_posts
                  type: MenuLink
                  properties:
                    title: Posts
                - id: psm_grp_media
                  type: MenuLink
                  properties:
                    title: Media
            - id: psm_grp_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psm_groups_content
          type: Paragraph
          properties:
            content: The inline sidebar menu supports nested groups using MenuGroup. Groups expand and collapse to reveal sub-items, making it ideal for applications with deep navigation hierarchies.

- title: Initially Collapsed Sider
  fullWidth: true
  blocks:
    - id: psm_collapsed
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: true
          collapsible: true
          width: 220
        menu:
          theme: light
          links:
            - id: psm_col_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_col_inbox
              type: MenuLink
              properties:
                title: Inbox
                icon: AiOutlineInbox
            - id: psm_col_starred
              type: MenuLink
              properties:
                title: Starred
                icon: AiOutlineStar
      blocks:
        - id: psm_collapsed_content
          type: Paragraph
          properties:
            content: The sider starts collapsed when sider.initialCollapsed is set to true. Only menu icons are visible in the collapsed state. The toggle button at the bottom allows expanding and collapsing the sidebar.

- title: Custom Sider Width and Collapsed Width
  fullWidth: true
  blocks:
    - id: psm_width
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 300
          collapsedWidth: 60
        menu:
          theme: light
          links:
            - id: psm_w_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_w_explore
              type: MenuLink
              properties:
                title: Explore
                icon: AiOutlineSearch
            - id: psm_w_library
              type: MenuLink
              properties:
                title: Library
                icon: AiOutlineBook
      blocks:
        - id: psm_width_content
          type: Paragraph
          properties:
            content: The sider.width property controls the expanded width (300px here) and sider.collapsedWidth controls the collapsed width (60px). Setting collapsedWidth to 0 completely hides the sidebar when collapsed.

- title: Hidden Toggle Button and Non-Collapsible Sider
  fullWidth: true
  blocks:
    - id: psm_no_toggle
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: false
          hideToggleButton: true
          width: 200
        menu:
          theme: light
          links:
            - id: psm_nt_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_nt_projects
              type: MenuLink
              properties:
                title: Projects
                icon: AiOutlineProject
            - id: psm_nt_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psm_no_toggle_content
          type: Paragraph
          properties:
            content: Setting sider.hideToggleButton to true removes the toggle button at the bottom of the sidebar. Combined with collapsible set to false, this creates a fixed sidebar that stays permanently open.

- title: Sider Breakpoint
  fullWidth: true
  blocks:
    - id: psm_breakpoint
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          breakpoint: lg
          width: 220
        menu:
          theme: light
          links:
            - id: psm_bp_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_bp_reports
              type: MenuLink
              properties:
                title: Reports
                icon: AiOutlineBarChart
      blocks:
        - id: psm_breakpoint_content
          type: Paragraph
          properties:
            content: The sider.breakpoint property controls at which screen size the sidebar collapses responsively. Options are xs, sm (default), md, lg, and xl. Set to lg here so the sider stays visible on medium screens.

- title: Reverse Arrow Sider
  fullWidth: true
  blocks:
    - id: psm_reverse
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          reverseArrow: true
          width: 200
        menu:
          theme: light
          links:
            - id: psm_rev_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_rev_tasks
              type: MenuLink
              properties:
                title: Tasks
                icon: AiOutlineCheckSquare
      blocks:
        - id: psm_reverse_content
          type: Paragraph
          properties:
            content: The sider.reverseArrow property reverses the direction of the collapse arrow on the toggle button. This is intended for sidebars that expand from the right side.

- title: With Breadcrumb
  fullWidth: true
  blocks:
    - id: psm_breadcrumb
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        breadcrumb:
          separator: /
          list:
            - Home
            - Dashboard
            - Analytics
        menu:
          theme: light
          links:
            - id: psm_bc_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_bc_analytics
              type: MenuLink
              properties:
                title: Analytics
                icon: AiOutlineBarChart
      blocks:
        - id: psm_breadcrumb_content
          type: Paragraph
          properties:
            content: Breadcrumbs provide navigation context above the main content. Set the breadcrumb property with a list of path items and an optional separator character.

- title: Breadcrumb with Custom Separator
  fullWidth: true
  blocks:
    - id: psm_bc_custom
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        breadcrumb:
          separator: '>'
          list:
            - Application
            - Settings
            - Profile
        menu:
          theme: light
          links:
            - id: psm_bcc_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psm_bc_custom_content
          type: Paragraph
          properties:
            content: The breadcrumb.separator property accepts any string. Here a greater-than sign is used instead of the default forward slash.

- title: Logo Configuration
  fullWidth: true
  blocks:
    - id: psm_logo
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        logo:
          src: https://lowdefy.com/logos/name_250.png
          alt: My Application
          style:
            height: 32
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        menu:
          theme: light
          links:
            - id: psm_logo_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_logo_pages
              type: MenuLink
              properties:
                title: Pages
                icon: AiOutlineFile
      blocks:
        - id: psm_logo_content
          type: Paragraph
          properties:
            content: The logo property configures the header logo image. Set logo.src for the image URL, logo.alt for accessible alt text, and logo.style to control size and spacing. Use logo.srcMobile and logo.breakpoint to show different logos on mobile vs desktop.

- title: Header Style and Content Style
  fullWidth: true
  blocks:
    - id: psm_header_styles
      type: PageSiderMenu
      properties:
        header:
          theme: dark
          style:
            backgroundColor: '#001529'
            borderBottom: 2px solid #1677ff
          contentStyle:
            alignItems: center
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        menu:
          theme: light
          links:
            - id: psm_hs2_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
      blocks:
        - id: psm_header_styles_content
          type: Paragraph
          properties:
            content: The header.style property applies CSS to the header element itself, while header.contentStyle controls the flex layout of items inside the header (like the header slot content). Here a blue bottom border accents the header.

- title: Footer Style
  fullWidth: true
  blocks:
    - id: psm_footer_style
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        footer:
          style:
            textAlign: center
            backgroundColor: '#fafafa'
            borderTop: 1px solid #f0f0f0
        menu:
          theme: light
          links:
            - id: psm_fs_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
      slots:
        footer:
          blocks:
            - id: psm_fs_text
              type: Paragraph
              properties:
                content: Footer styled with background color and top border.
                style:
                  textAlign: center
                  margin: 0
      blocks:
        - id: psm_footer_style_content
          type: Paragraph
          properties:
            content: The footer.style property applies CSS to the footer container. Use it to set background colors, borders, padding, and text alignment.

- title: Content Style
  fullWidth: true
  blocks:
    - id: psm_content_style
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        content:
          style:
            backgroundColor: '#f5f5f5'
            padding: 0 24px 24px 24px
        menu:
          theme: light
          links:
            - id: psm_cs_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
      blocks:
        - id: psm_content_style_text
          type: Paragraph
          properties:
            content: The content.style property overrides the default content area padding and background. The default padding is 0 40px 40px 40px.

- title: Sider Style
  fullWidth: true
  blocks:
    - id: psm_sider_style
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 220
          style:
            borderRight: 2px solid #1677ff
        menu:
          theme: light
          links:
            - id: psm_ss2_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_ss2_tasks
              type: MenuLink
              properties:
                title: Tasks
                icon: AiOutlineCheckSquare
      blocks:
        - id: psm_sider_style_content
          type: Paragraph
          properties:
            content: The sider.style property applies CSS to the sider container itself. Here a blue right border is added to accent the sidebar.

- title: Toggle Sider Button Properties
  fullWidth: true
  blocks:
    - id: psm_toggle_btn
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 220
        toggleSiderButton:
          color: primary
          variant: outlined
        menu:
          theme: light
          links:
            - id: psm_tb_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_tb_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psm_toggle_btn_content
          type: Paragraph
          properties:
            content: The toggleSiderButton property passes Button properties to the collapse/expand toggle at the bottom of the sidebar. Here we set color and variant to style the toggle button.

- title: Menu Large and Medium Overrides
  fullWidth: true
  blocks:
    - id: psm_menu_overrides
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 220
        menu:
          theme: light
          links:
            - id: psm_mo_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_mo_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
        menuLg:
          theme: light
        menuMd:
          theme: dark
      blocks:
        - id: psm_menu_overrides_content
          type: Paragraph
          properties:
            content: The menuLg property overrides menu properties for the desktop sidebar, while menuMd overrides for the mobile drawer menu. This allows different themes or configurations per viewport size.

- title: With Header Slot
  fullWidth: true
  blocks:
    - id: psm_header_slot
      type: PageSiderMenu
      properties:
        header:
          theme: dark
          contentStyle:
            alignItems: center
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        menu:
          theme: light
          links:
            - id: psm_hs_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_hs_tasks
              type: MenuLink
              properties:
                title: Tasks
                icon: AiOutlineCheckSquare
      slots:
        header:
          blocks:
            - id: psm_header_slot_avatar
              type: Avatar
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineUser
                size: small
      blocks:
        - id: psm_header_slot_content
          type: Paragraph
          properties:
            content: The header slot places custom blocks in the header area. This is typically used for user profile elements, notification indicators, or quick action buttons. The header.contentStyle property controls the flex layout of these items.

- title: With Footer Slot
  fullWidth: true
  blocks:
    - id: psm_footer
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        footer:
          style:
            textAlign: center
        menu:
          theme: light
          links:
            - id: psm_ft_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_ft_about
              type: MenuLink
              properties:
                title: About
                icon: AiOutlineInfoCircle
      blocks:
        - id: psm_footer_main
          type: Paragraph
          properties:
            content: The footer slot appears below the main content area. Use slots.footer to add footer blocks and properties.footer.style to customize the footer appearance.
      slots:
        footer:
          blocks:
            - id: psm_footer_text
              type: Paragraph
              properties:
                content: Application Footer - Built with Lowdefy
                style:
                  textAlign: center
                  margin: 0

- title: With Sider Slot
  fullWidth: true
  blocks:
    - id: psm_sider_slot
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 220
        menu:
          theme: light
          links:
            - id: psm_ss_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_ss_pages
              type: MenuLink
              properties:
                title: Pages
                icon: AiOutlineFile
      slots:
        sider:
          blocks:
            - id: psm_sider_slot_help
              type: Alert
              style:
                margin: 12px
              properties:
                message: Need Help?
                description: Visit our documentation for guides and tutorials.
                type: info
                showIcon: true
      blocks:
        - id: psm_sider_slot_content
          type: Paragraph
          properties:
            content: The sider slot renders custom content below the menu inside the sidebar. This is useful for help links, version info, or supplementary navigation elements.

- title: With Content Slot
  fullWidth: true
  blocks:
    - id: psm_content_slot
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 220
        menu:
          theme: light
          links:
            - id: psm_csl_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
      blocks:
        - id: psm_content_slot_title
          type: Title
          properties:
            content: Main Content Area
            level: 3
        - id: psm_content_slot_text
          type: Paragraph
          properties:
            content: The default content slot is where the main page blocks are placed. Any blocks added directly under the PageSiderMenu blocks key render in the content area between the breadcrumb and footer.

- title: Theme Token Overrides
  fullWidth: true
  blocks:
    - id: psm_theme_primary
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        menu:
          theme: light
          links:
            - id: psm_th_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_th_pages
              type: MenuLink
              properties:
                title: Pages
                icon: AiOutlineFile
        theme:
          colorPrimary: '#52c41a'
          colorBgContainer: '#f6ffed'
      blocks:
        - id: psm_theme_primary_content
          type: Paragraph
          properties:
            content: The theme property allows overriding Ant Design design tokens for the entire page. Here the primary color is set to green and the container background to a light green tint.

- title: Theme Token - Custom Layout Colors
  fullWidth: true
  blocks:
    - id: psm_theme_layout
      type: PageSiderMenu
      properties:
        header:
          theme: light
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
        menu:
          theme: light
          links:
            - id: psm_tl_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_tl_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
        theme:
          colorPrimary: '#722ed1'
          colorBgLayout: '#f9f0ff'
          colorText: '#531dab'
      blocks:
        - id: psm_theme_layout_content
          type: Paragraph
          properties:
            content: Design tokens like colorBgLayout, colorText, and colorPrimary let you create a fully custom color scheme. These tokens cascade through all nested antd components on the page.

- title: Theme Token - Compact Spacing
  fullWidth: true
  blocks:
    - id: psm_theme_compact
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 180
        menu:
          theme: light
          links:
            - id: psm_tc_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_tc_inbox
              type: MenuLink
              properties:
                title: Inbox
                icon: AiOutlineInbox
        theme:
          fontSize: 12
          padding: 12
          margin: 8
      blocks:
        - id: psm_theme_compact_content
          type: Paragraph
          properties:
            content: Reduce fontSize, padding, and margin tokens for a denser UI. These global tokens affect all antd components within the page.

- title: CSS Key Classes (Tailwind)
  fullWidth: true
  blocks:
    - id: psm_css_keys
      type: PageSiderMenu
      class:
        header: bg-gradient-to-r from-blue-600 to-blue-800
        sider: bg-gray-50
        content: bg-white
        footer: bg-gray-100
      properties:
        header:
          theme: dark
        sider:
          theme: light
          initialCollapsed: false
          collapsible: true
          width: 220
        footer:
          style:
            textAlign: center
        breadcrumb:
          list:
            - Home
            - Styled Page
        menu:
          theme: light
          links:
            - id: psm_ck_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psm_ck_pages
              type: MenuLink
              properties:
                title: Pages
                icon: AiOutlineFile
      slots:
        footer:
          blocks:
            - id: psm_ck_footer_text
              type: Paragraph
              properties:
                content: Styled footer area
                style:
                  textAlign: center
                  margin: 0
      blocks:
        - id: psm_css_keys_content
          type: Paragraph
          properties:
            content: 'PageSiderMenu supports these CSS keys: element, header, logo, sider, menu, content, breadcrumb, and footer. Use class as an object to target each area with Tailwind classes.'

- title: CSS Key - Sider and Menu Styling
  fullWidth: true
  blocks:
    - id: psm_css_sider
      type: PageSiderMenu
      class:
