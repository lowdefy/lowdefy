- title: Dark Mode Toggle
  fullWidth: true
  blocks:
    - id: psm_dark_toggle
      type: PageSiderMenu
      properties:
        darkModeToggle: true
        header:
          theme: dark
        sider:
          theme: dark
          initialCollapsed: false
          width: 220
        menu:
          theme: dark
          links:
            - id: psm_dt_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_dt_users
              type: MenuLink
              properties:
                title: Users
                icon: AiOutlineUser
            - id: psm_dt_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psm_dt_content
          type: Paragraph
          properties:
            content: Set darkModeToggle to true to add a dark mode toggle button in the header. Click the moon/sun icon to switch between light and dark themes. The preference is persisted to localStorage.

- title: Basic PageSiderMenu
  fullWidth: true
  blocks:
    - id: psm_basic
      type: PageSiderMenu
      properties:
        header:
          theme: dark
        sider:
          theme: dark
          initialCollapsed: false
          width: 220
        menu:
          theme: dark
          links:
            - id: psm_basic_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_basic_users
              type: MenuLink
              properties:
                title: Users
                icon: AiOutlineUser
            - id: psm_basic_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psm_basic_content
          type: Paragraph
          properties:
            content: PageSiderMenu provides a full page layout with a collapsible sidebar navigation. The sider contains an inline menu that automatically collapses on small screens. A mobile drawer menu is shown on smaller viewports.

- title: Admin Dashboard
  fullWidth: true
  blocks:
    - id: psm_admin
      type: PageSiderMenu
      properties:
        header:
          theme: dark
          contentStyle:
            alignItems: center
        sider:
          theme: dark
          initialCollapsed: false
          width: 240
        breadcrumb:
          list:
            - Admin
            - Dashboard
        menu:
          theme: dark
          links:
            - id: psm_admin_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psm_admin_users_group
              type: MenuGroup
              properties:
                title: User Management
                icon: AiOutlineTeam
              links:
                - id: psm_admin_all_users
                  type: MenuLink
                  properties:
                    title: All Users
                - id: psm_admin_user_roles
                  type: MenuLink
                  properties:
                    title: Roles & Permissions
            - id: psm_admin_content_group
              type: MenuGroup
              properties:
                title: Content
                icon: AiOutlineEdit
              links:
                - id: psm_admin_articles
                  type: MenuLink
                  properties:
                    title: Articles
                - id: psm_admin_categories
                  type: MenuLink
                  properties:
                    title: Categories
            - id: psm_admin_analytics
              type: MenuLink
              properties:
                title: Analytics
                icon: AiOutlineBarChart
            - id: psm_admin_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      slots:
        header:
          blocks:
            - id: psm_admin_header_row
              type: Box
              layout:
                gap: 16
                align: center
              blocks:
                - id: psm_admin_notif_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineBell
                    hideTitle: true
                    color: default
                    variant: text
                    size: small
                  events:
                    onClick:
                      - id: psm_admin_notif_action
                        type: DisplayMessage
                        params:
                          content: You have 3 new notifications.
                          status: info
                - id: psm_admin_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineUser
                    size: small
                    color: '#fff'
                    backgroundColor: '#1677ff'
        footer:
          blocks:
            - id: psm_admin_footer_text
              type: Paragraph
              properties:
                content: Admin Panel v2.4.1
                style:
                  textAlign: center
                  margin: 0
                  color: '#999'
                  fontSize: 12
      blocks:
        - id: psm_admin_title
          type: Title
          properties:
            content: Dashboard Overview
            level: 3
        - id: psm_admin_stats_row
          type: Box
          layout:
            gap: 16
          blocks:
            - id: psm_admin_stat_users
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psm_admin_stat_users_val
                  type: Statistic
                  properties:
                    title: Total Users
                    value: 2847
                    prefixIcon: AiOutlineUser
            - id: psm_admin_stat_revenue
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psm_admin_stat_revenue_val
                  type: Statistic
                  properties:
                    title: Revenue
                    value: 58420
                    prefix: $
            - id: psm_admin_stat_orders
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psm_admin_stat_orders_val
                  type: Statistic
                  properties:
                    title: Orders
                    value: 384
        - id: psm_admin_recent_card
          type: Card
          properties:
            title: Recent Activity
          blocks:
            - id: psm_admin_activity_1
              type: Paragraph
              properties:
                content: 'User john@example.com updated their profile 5 minutes ago.'
            - id: psm_admin_activity_2
              type: Paragraph
              properties:
                content: 'New order #1284 placed by customer sarah@example.com.'
            - id: psm_admin_activity_3
              type: Paragraph
              properties:
                content: 'Article "Getting Started Guide" published by admin.'

- title: Project Management Application
  fullWidth: true
  blocks:
    - id: psm_project
      type: PageSiderMenu
      properties:
        header:
          theme: dark
          contentStyle:
            alignItems: center
        sider:
          theme: dark
          initialCollapsed: false
          width: 250
        breadcrumb:
          separator: /
          list:
            - Projects
            - Project Alpha
            - Tasks
        content:
          style:
            padding: 0 32px 32px 32px
        menu:
          theme: dark
          links:
            - id: psm_proj_overview
              type: MenuLink
              properties:
                title: Overview
                icon: AiOutlineAppstore
            - id: psm_proj_tasks_link
              type: MenuLink
              properties:
                title: Tasks
                icon: AiOutlineCheckSquare
            - id: psm_proj_team_group
              type: MenuGroup
              properties:
                title: Team
                icon: AiOutlineTeam
              links:
                - id: psm_proj_members
                  type: MenuLink
                  properties:
                    title: Members
                - id: psm_proj_activity
                  type: MenuLink
                  properties:
                    title: Activity Log
            - id: psm_proj_files
              type: MenuLink
              properties:
                title: Files
                icon: AiOutlineFile
            - id: psm_proj_settings_link
              type: MenuLink
              properties:
                title: Project Settings
                icon: AiOutlineSetting
      slots:
        header:
          blocks:
            - id: psm_proj_header_row
              type: Box
              layout:
                gap: 12
                align: center
              blocks:
                - id: psm_proj_search_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineSearch
                    hideTitle: true
                    color: default
                    variant: text
                    size: small
                - id: psm_proj_add_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: New Task
                    icon: AiOutlinePlus
                    color: primary
                    variant: solid
                    size: small
                  events:
                    onClick:
                      - id: psm_proj_add_action
                        type: DisplayMessage
                        params:
                          content: New task dialog would open here.
                          status: info
        sider:
          blocks:
            - id: psm_proj_sider_tag
              type: Box
              style:
                padding: 12px
              blocks:
                - id: psm_proj_progress_label
                  type: Paragraph
                  properties:
                    content: Sprint Progress
                    style:
                      margin: 0 0 8px 0
                      fontSize: 12
                      color: '#999'
                - id: psm_proj_progress
                  type: Progress
                  properties:
                    percent: 68
                    size: small
      blocks:
        - id: psm_proj_title
          type: Title
          properties:
            content: Project Alpha - Tasks
            level: 3
        - id: psm_proj_summary_row
          type: Box
          layout:
            gap: 16
          blocks:
            - id: psm_proj_stat_total
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psm_proj_stat_total_val
                  type: Statistic
                  properties:
                    title: Total Tasks
                    value: 42
            - id: psm_proj_stat_done
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psm_proj_stat_done_val
                  type: Statistic
                  properties:
                    title: Completed
                    value: 28
            - id: psm_proj_stat_open
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psm_proj_stat_open_val
                  type: Statistic
                  properties:
                    title: In Progress
                    value: 14
        - id: psm_proj_tasks_card
          type: Card
          properties:
            title: Active Tasks
          slots:
            extra:
              blocks:
                - id: psm_proj_filter_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Filter
                    icon: AiOutlineFilter
                    color: default
                    variant: outlined
                    size: small
          blocks:
            - id: psm_proj_task_1
              type: Box
              layout:
                gap: 8
                align: center
              style:
                padding: 8px 0
                borderBottom: 1px solid var(--ant-color-border)
              blocks:
                - id: psm_proj_task_1_title
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  properties:
                    content: Implement user authentication flow
                    style:
                      margin: 0
                - id: psm_proj_task_1_tag
                  type: Tag
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: High
                    color: red
            - id: psm_proj_task_2
              type: Box
              layout:
                gap: 8
                align: center
              style:
                padding: 8px 0
                borderBottom: 1px solid var(--ant-color-border)
              blocks:
                - id: psm_proj_task_2_title
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  properties:
                    content: Design dashboard wireframes
                    style:
                      margin: 0
                - id: psm_proj_task_2_tag
                  type: Tag
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Medium
                    color: orange
            - id: psm_proj_task_3
              type: Box
              layout:
                gap: 8
                align: center
              style:
                padding: 8px 0
              blocks:
                - id: psm_proj_task_3_title
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  properties:
                    content: Write API documentation
                    style:
                      margin: 0
                - id: psm_proj_task_3_tag
                  type: Tag
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Low
                    color: green

