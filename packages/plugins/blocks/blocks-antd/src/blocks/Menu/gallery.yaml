- title: Horizontal Mode
  blocks:
    - id: horizontal_menu
      type: Menu
      properties:
        mode: horizontal
        theme: light
        links:
          - id: h_home
            type: MenuLink
            properties:
              title: Home
              icon: AiOutlineHome
          - id: h_about
            type: MenuLink
            properties:
              title: About
          - id: h_services
            type: MenuGroup
            properties:
              title: Services
            links:
              - id: h_consulting
                type: MenuLink
                properties:
                  title: Consulting
              - id: h_development
                type: MenuLink
                properties:
                  title: Development
          - id: h_contact
            type: MenuLink
            properties:
              title: Contact

- title: Vertical Mode
  blocks:
    - id: vertical_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        theme: light
        links:
          - id: v_dashboard
            type: MenuLink
            properties:
              title: Dashboard
              icon: AiOutlineHome
          - id: v_users
            type: MenuLink
            properties:
              title: Users
              icon: AiOutlineUser
          - id: v_settings
            type: MenuGroup
            properties:
              title: Settings
              icon: AiOutlineSetting
            links:
              - id: v_profile
                type: MenuLink
                properties:
                  title: Profile
              - id: v_security
                type: MenuLink
                properties:
                  title: Security

- title: Inline Mode
  blocks:
    - id: inline_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: inline
        theme: light
        defaultOpenKeys:
          - i_navigation
        links:
          - id: i_navigation
            type: MenuGroup
            properties:
              title: Navigation
              icon: AiOutlineAppstore
            links:
              - id: i_option1
                type: MenuLink
                properties:
                  title: Option 1
              - id: i_option2
                type: MenuLink
                properties:
                  title: Option 2
          - id: i_tools
            type: MenuGroup
            properties:
              title: Tools
              icon: AiOutlineTool
            links:
              - id: i_option3
                type: MenuLink
                properties:
                  title: Option 3
              - id: i_option4
                type: MenuLink
                properties:
                  title: Option 4

- title: With Icons
  blocks:
