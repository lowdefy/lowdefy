- title: Mode
  blocks:
    - id: mode_horizontal
      type: Menu
      properties:
        mode: horizontal
        links:
          - id: mh_home
            type: MenuLink
            properties:
              title: Home
              icon: AiOutlineHome
          - id: mh_about
            type: MenuLink
            properties:
              title: About
          - id: mh_services
            type: MenuGroup
            properties:
              title: Services
            links:
              - id: mh_consulting
                type: MenuLink
                properties:
                  title: Consulting
              - id: mh_development
                type: MenuLink
                properties:
                  title: Development
          - id: mh_contact
            type: MenuLink
            properties:
              title: Contact
    - id: mode_vertical
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        links:
          - id: mv_dashboard
            type: MenuLink
            properties:
