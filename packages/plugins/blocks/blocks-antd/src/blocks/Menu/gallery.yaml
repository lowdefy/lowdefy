              icon: AiOutlineSetting

- title: Menu Groups (Nested)
  blocks:
    - id: groups_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: inline
        theme: light
        defaultOpenKeys:
          - g_parent
        links:
          - id: g_parent
            type: MenuGroup
            properties:
              title: Navigation
              icon: AiOutlineAppstore
            links:
              - id: g_child_group
                type: MenuGroup
                properties:
                  title: Sub Group
                links:
                  - id: g_sub1
                    type: MenuLink
                    properties:
                      title: Sub Item 1
                  - id: g_sub2
                    type: MenuLink
                    properties:
                      title: Sub Item 2
              - id: g_direct
                type: MenuLink
                properties:
                  title: Direct Item

- title: Dividers
  blocks:
    - id: divider_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        theme: light
        links:
          - id: dv_item1
            type: MenuLink
            properties:
              title: General
              icon: AiOutlineSetting
          - id: dv_item2
            type: MenuLink
            properties:
              title: Profile
              icon: AiOutlineUser
          - id: dv_divider
            type: MenuDivider
          - id: dv_item3
            type: MenuLink
            properties:
              title: Logout
              icon: AiOutlineLogout

- title: Dashed Divider
  blocks:
    - id: dashed_divider_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        theme: light
        links:
          - id: dd_item1
            type: MenuLink
            properties:
              title: Files
              icon: AiOutlineFile
          - id: dd_divider
            type: MenuDivider
            properties:
              dashed: true
          - id: dd_item2
            type: MenuLink
            properties:
              title: Trash
              icon: AiOutlineDelete

- title: Danger Items
  blocks:
    - id: danger_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        theme: light
        links:
