- title: Submenu Delays
  blocks:
    - id: sd_fast_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        subMenuOpenDelay: 0
        subMenuCloseDelay: 0
        links:
          - id: sd_fast_group
            type: MenuGroup
            properties:
              title: Instant Open
              icon: AiOutlineThunderbolt
            links:
              - id: sd_fast_a
                type: MenuLink
                properties:
                  title: No Delay Open
              - id: sd_fast_b
                type: MenuLink
                properties:
                  title: No Delay Close
    - id: sd_slow_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        subMenuOpenDelay: 0.5
        subMenuCloseDelay: 1
        links:
          - id: sd_slow_group
            type: MenuGroup
            properties:
              title: Slow Submenu
              icon: AiOutlineClockCircle
            links:
              - id: sd_slow_a
                type: MenuLink
                properties:
                  title: 0.5s Open Delay
              - id: sd_slow_b
                type: MenuLink
                properties:
                  title: 1s Close Delay
    - id: sd_force_render_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        forceSubMenuRender: true
        links:
          - id: sd_force_group
            type: MenuGroup
            properties:
              title: Pre-rendered Submenu
              icon: AiOutlineSync
            links:
              - id: sd_force_a
                type: MenuLink
                properties:
                  title: Already in DOM
              - id: sd_force_b
                type: MenuLink
                properties:
                  title: Before Visible

