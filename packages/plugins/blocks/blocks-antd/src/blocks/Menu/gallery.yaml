            type: MenuLink
            properties:
              title: Edit
              icon: AiOutlineEdit
          - id: dg_copy
            type: MenuLink
            properties:
              title: Copy
              icon: AiOutlineCopy
          - id: dg_divider
            type: MenuDivider
          - id: dg_delete
            type: MenuLink
            properties:
              title: Delete
              icon: AiOutlineDelete
              danger: true
          - id: dg_destroy
            type: MenuLink
            properties:
              title: Destroy All
              icon: AiOutlineWarning
              danger: true

- title: Disabled Items
  blocks:
    - id: disabled_menu
      type: Menu
      style:
        width: 256
      properties:
        mode: vertical
        theme: light
        links:
          - id: di_active
            type: MenuLink
            properties:
              title: Active Item
              icon: AiOutlineCheck
          - id: di_disabled
            type: MenuLink
            style:
              pointerEvents: none
              opacity: 0.5
            properties:
              title: Disabled Item
              icon: AiOutlineStop
          - id: di_another
            type: MenuLink
            properties:
              title: Another Item
              icon: AiOutlineMore

