- title: Ellipsis - Boolean
  blocks:
    - id: ellipsis_true
      type: ParagraphInput
      properties:
        ellipsis: true
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_true: This is a very long paragraph that should be truncated with an ellipsis when it overflows a single line. The text continues beyond the visible area and the ellipsis indicator will show that there is more content available. This demonstrates the basic boolean ellipsis behavior where the text is clipped at one line by default.
    - id: ellipsis_false
      type: ParagraphInput
      properties:
        ellipsis: false
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_false: This paragraph has ellipsis disabled and will display all text regardless of length. The content will wrap naturally across multiple lines without any truncation applied.
- title: Ellipsis - With Rows
  blocks:
    - id: ellipsis_rows_1
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 1
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_rows_1: This paragraph is limited to 1 row. Any text beyond the first line will be hidden and replaced with an ellipsis indicator. This demonstrates row-limited truncation for compact paragraph displays in space-constrained layouts.
    - id: ellipsis_rows_2
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 2
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_rows_2: This paragraph is limited to 2 rows. The text will display across two lines before being truncated with an ellipsis. This is useful for paragraph previews where you want to show a brief excerpt of longer content. Additional text beyond two lines is hidden from view.
    - id: ellipsis_rows_3
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 3
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_rows_3: This paragraph is limited to 3 rows. It allows more content to be visible compared to fewer rows, but still provides truncation for very long paragraphs. This setting is a good balance between showing enough content for context while keeping the layout compact. Any remaining text beyond three lines will be truncated with an ellipsis.
    - id: ellipsis_rows_5
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 5
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_rows_5: This paragraph is limited to 5 rows. It provides a generous preview of the content while still enforcing a maximum height. This is appropriate for longer descriptions, article excerpts, or detailed explanations where you want to show a substantial portion of the text before truncation kicks in. The ellipsis appears after the fifth line, indicating there is additional content that has been clipped. Users can see enough context to decide whether to expand or interact further with the content.
- title: Ellipsis - Expandable
  blocks:
    - id: ellipsis_expandable_2
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 2
          expandable: true
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_expandable_2: This paragraph can be expanded. Click the expand link to reveal the full content. The expandable feature allows users to see a preview and then choose to read more. This is a common pattern for long content sections where space is limited but the full text should still be accessible to interested readers.
    - id: ellipsis_expandable_3
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 3
          expandable: true
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_expandable_3: Expandable paragraph with 3 visible rows before truncation. Users can click to expand and see the full content. This is useful for displaying longer descriptions or articles where the initial preview should provide more context. The expand control provides a smooth reading experience for content that may be too long to display in full by default in a constrained layout.
    - id: ellipsis_expandable_1
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 1
          expandable: true
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_expandable_1: Single row with expand. This is compact but still allows users to access the full content by clicking the expand link. Useful for tight layouts like cards or sidebars.
- title: Ellipsis - With Suffix
  blocks:
    - id: ellipsis_suffix_author
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 2
          suffix: ' --Lowdefy Docs'
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_suffix_author: This paragraph has a custom suffix appended after the ellipsis. The suffix text is always visible even when the content is truncated. This can be used to show important information like a date or author that should remain visible.
    - id: ellipsis_suffix_expandable
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 2
          expandable: true
          suffix: ' [Read more]'
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_suffix_expandable: This paragraph has both expandable and suffix features combined. The suffix is always shown and the user can expand to read the full content. This provides a rich reading experience with metadata always visible at the end of the truncated preview text.
    - id: ellipsis_suffix_date
      type: ParagraphInput
      properties:
        ellipsis:
          rows: 2
          suffix: ' -- 2026-03-10'
        editable: true
      events:
        onMount:
          - id: set_default
