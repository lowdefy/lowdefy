- title: Basic Editable Paragraph
  blocks:
    - id: basic_default
      type: ParagraphInput
      properties:
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              basic_default: Click the edit icon to start editing this paragraph. Changes are saved when you press Enter or click away.
    - id: basic_editable_object
      type: ParagraphInput
      properties:
        editable: {}
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              basic_editable_object: This paragraph uses an editable object configuration with defaults.
    - id: basic_not_editable
      type: ParagraphInput
      properties:
        editable: false
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              basic_not_editable: This paragraph has editing explicitly disabled and cannot be modified.
    - id: basic_empty
      type: ParagraphInput
      properties:
        editable: true
    - id: basic_long
      type: ParagraphInput
      properties:
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              basic_long: This is a longer paragraph to demonstrate how ParagraphInput handles multi-line content. When you click the edit icon, a text area appears allowing you to modify all of the text. The editable paragraph is useful for inline content editing scenarios where users should be able to quickly update descriptive text without navigating to a separate form.
- title: Editable Options - Tooltip
