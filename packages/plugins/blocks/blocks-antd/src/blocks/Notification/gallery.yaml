            params:
              blockId: notif_html_desc
              method: open
    - id: notif_html_styled
      type: Notification
      properties:
        status: warning
        title: Maintenance Scheduled
        description: '<span style="color: #fa8c16; font-weight: bold;">Downtime:</span> Saturday 2:00 AM - 6:00 AM UTC.'
    - id: btn_notif_html_styled
      type: Button
      layout:
        flex: 0 0 auto
