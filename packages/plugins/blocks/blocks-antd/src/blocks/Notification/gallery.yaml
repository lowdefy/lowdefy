- title: Status Types
  blocks:
    - id: notif_status_success
      type: Notification
      properties:
        status: success
        title: Changes Saved
        description: Your changes have been saved successfully.
    - id: btn_status_success
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Success
        color: primary
        variant: outlined
        icon: AiOutlineCheckCircle
      events:
        onClick:
          - id: open_status_success
            type: CallMethod
            params:
              blockId: notif_status_success
              method: open
    - id: notif_status_error
      type: Notification
      properties:
        status: error
        title: Save Failed
        description: Failed to save your changes. Please try again.
    - id: btn_status_error
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Error
        color: danger
        variant: outlined
        icon: AiOutlineCloseCircle
      events:
        onClick:
          - id: open_status_error
            type: CallMethod
            params:
              blockId: notif_status_error
              method: open
    - id: notif_status_warning
      type: Notification
      properties:
        status: warning
        title: Disk Space Low
        description: Server storage is running below 10% capacity.
    - id: btn_status_warning
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Warning
        color: default
        variant: outlined
        icon: AiOutlineWarning
      events:
        onClick:
          - id: open_status_warning
            type: CallMethod
            params:
              blockId: notif_status_warning
              method: open
    - id: notif_status_info
      type: Notification
      properties:
        status: info
        title: Update Available
        description: A new version of the application is available.
    - id: btn_status_info
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Info
        color: primary
        variant: text
        icon: AiOutlineInfoCircle
      events:
        onClick:
          - id: open_status_info
            type: CallMethod
            params:
              blockId: notif_status_info
              method: open

