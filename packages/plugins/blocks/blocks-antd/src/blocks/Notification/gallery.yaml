- title: With Action Button
  blocks:
    - id: notif_button_confirm
      type: Notification
      properties:
        status: info
        title: Action Required
        description: Please review and confirm the pending changes.
        button:
          title: Confirm
          icon: AiOutlineCheck
          color: primary
          variant: solid
          size: small
    - id: btn_notif_button_confirm
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: With Confirm Button
        color: primary
        variant: outlined
      events:
        onClick:
          - id: open_btn_confirm
            type: CallMethod
            params:
              blockId: notif_button_confirm
              method: open
    - id: notif_button_retry
      type: Notification
      properties:
        status: error
        title: Upload Failed
        description: The file could not be uploaded. Please try again.
        button:
          title: Retry
          icon: AiOutlineReload
          color: danger
          variant: solid
          size: small
    - id: btn_notif_button_retry
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: With Retry Button
        color: danger
        variant: outlined
      events:
        onClick:
          - id: open_btn_retry
            type: CallMethod
            params:
              blockId: notif_button_retry
              method: open

- title: Override at Call Time
  fullWidth: true
  blocks:
    - id: notif_override
      type: Notification
      properties:
        status: info
        title: Default
        description: Default notification.
    - id: btn_notif_override_success
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Success
        color: primary
        variant: solid
        icon: AiOutlineCheckCircle
      events:
        onClick:
          - id: open_override_success
            type: CallMethod
            params:
              blockId: notif_override
              method: open
              args:
                - status: success
                  title: Overridden Title
                  description: Status, title and description all overridden at call time.
    - id: btn_notif_override_error
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Error
        color: danger
        variant: solid
        icon: AiOutlineCloseCircle
      events:
        onClick:
          - id: open_override_error
            type: CallMethod
            params:
              blockId: notif_override
              method: open
              args:
                - status: error
                  title: Error Override
                  description: This error notification was created by overriding args at call time.

