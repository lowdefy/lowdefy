- title: Status Types
  blocks:
    - id: notif_success
      type: Notification
      properties:
        status: success
        title: Success
        description: Your changes have been saved successfully.
    - id: btn_notif_success
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Success
        color: primary
        variant: outlined
        icon: AiOutlineCheckCircle
      events:
        onClick:
          - id: open_notif_success
            type: CallMethod
            params:
              blockId: notif_success
              method: open
    - id: notif_error
      type: Notification
      properties:
        status: error
        title: Error
        description: Failed to save your changes. Please try again.
    - id: btn_notif_error
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Error
        color: danger
        variant: outlined
        icon: AiOutlineCloseCircle
      events:
        onClick:
          - id: open_notif_error
            type: CallMethod
            params:
              blockId: notif_error
              method: open
    - id: notif_warning
      type: Notification
      properties:
        status: warning
        title: Warning
        description: Disk space is running low on the server.
    - id: btn_notif_warning
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Warning
        color: default
        variant: outlined
        icon: AiOutlineWarning
      events:
        onClick:
          - id: open_notif_warning
            type: CallMethod
            params:
              blockId: notif_warning
              method: open
    - id: notif_info
      type: Notification
      properties:
        status: info
        title: Information
        description: A new version of the application is available.
    - id: btn_notif_info
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Info
        color: primary
        variant: text
        icon: AiOutlineInfoCircle
      events:
        onClick:
          - id: open_notif_info
            type: CallMethod
            params:
              blockId: notif_info
              method: open

