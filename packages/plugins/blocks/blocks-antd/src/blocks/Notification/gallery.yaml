- title: Duration
  blocks:
    - id: notif_dur_short
      type: Notification
      properties:
        status: info
        title: Quick Notice
        description: Disappears in 2 seconds.
        duration: 2
    - id: btn_notif_dur_short
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: 2 seconds
        color: default
        variant: outlined
      events:
        onClick:
          - id: open_dur_short
            type: CallMethod
            params:
              blockId: notif_dur_short
              method: open
    - id: notif_dur_default
      type: Notification
      properties:
        status: info
        title: Default Duration
        description: Auto-closes after 4.5 seconds (default).
    - id: btn_notif_dur_default
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Default (4.5s)
        color: default
        variant: outlined
      events:
        onClick:
          - id: open_dur_default
            type: CallMethod
            params:
              blockId: notif_dur_default
              method: open
    - id: notif_dur_sticky
      type: Notification
      properties:
        status: warning
        title: Persistent
        description: Will not auto-close (duration 0). Must be dismissed manually.
        duration: 0
    - id: btn_notif_dur_sticky
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Sticky (duration 0)
        color: default
        variant: outlined
      events:
        onClick:
          - id: open_dur_sticky
            type: CallMethod
            params:
              blockId: notif_dur_sticky
              method: open

