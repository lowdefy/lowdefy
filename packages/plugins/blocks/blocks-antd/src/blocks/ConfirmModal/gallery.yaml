        color: danger
        variant: outlined
      events:
        onClick:
          - id: confirm_ok_btn_open
            type: CallMethod
            params:
              blockId: confirm_ok_btn
              method: open
    - id: confirm_icon_btns_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with Icon Buttons
        color: primary
