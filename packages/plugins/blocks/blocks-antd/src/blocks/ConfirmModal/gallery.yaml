- title: Basic Confirm Modal
  blocks:
    - id: confirm_basic_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Confirm
        color: primary
        variant: solid
      events:
        onClick:
          - id: confirm_basic_open
            type: CallMethod
            params:
              blockId: confirm_basic
              method: open
    - id: confirm_basic
      type: ConfirmModal
      properties:
        title: Are you sure?
        content: This action cannot be undone.

- title: Status Types
  blocks:
    - id: confirm_status_confirm_btn
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Confirm
        color: primary
        variant: outlined
      events:
        onClick:
          - id: confirm_status_confirm_open
            type: CallMethod
            params:
              blockId: confirm_status_confirm
              method: open
    - id: confirm_status_info_btn
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Info
        color: blue
        variant: outlined
      events:
        onClick:
          - id: confirm_status_info_open
            type: CallMethod
            params:
              blockId: confirm_status_info
              method: open
    - id: confirm_status_success_btn
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Success
        color: green
        variant: outlined
      events:
        onClick:
          - id: confirm_status_success_open
            type: CallMethod
            params:
              blockId: confirm_status_success
              method: open
    - id: confirm_status_warning_btn
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Warning
        color: orange
        variant: outlined
      events:
        onClick:
          - id: confirm_status_warning_open
            type: CallMethod
            params:
              blockId: confirm_status_warning
              method: open
    - id: confirm_status_error_btn
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Error
        color: danger
        variant: outlined
      events:
        onClick:
          - id: confirm_status_error_open
            type: CallMethod
            params:
              blockId: confirm_status_error
              method: open
    - id: confirm_status_confirm
      type: ConfirmModal
      properties:
        title: Confirm Action
        content: Do you want to proceed with this action?
        status: confirm
    - id: confirm_status_info
      type: ConfirmModal
      properties:
        title: Information
        content: Your account has been updated successfully.
        status: info
    - id: confirm_status_success
      type: ConfirmModal
      properties:
        title: Success
        content: The operation completed successfully.
        status: success
    - id: confirm_status_warning
      type: ConfirmModal
      properties:
        title: Warning
        content: This will overwrite existing data. Are you sure you want to continue?
        status: warning
    - id: confirm_status_error
      type: ConfirmModal
      properties:
        title: Error
        content: An error occurred while processing your request. Do you want to retry?
        status: error

- title: Override Status at Open Time
  blocks:
    - id: confirm_override_info_btn
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Info
        color: blue
        variant: outlined
      events:
        onClick:
          - id: confirm_override_info_open
            type: CallMethod
            params:
              blockId: confirm_override
              method: open
              args:
                status: info
    - id: confirm_override_error_btn
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Error
        color: danger
        variant: outlined
      events:
        onClick:
          - id: confirm_override_error_open
            type: CallMethod
            params:
              blockId: confirm_override
              method: open
              args:
                status: error
    - id: confirm_override_success_btn
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Success
        color: green
        variant: outlined
      events:
        onClick:
          - id: confirm_override_success_open
            type: CallMethod
            params:
              blockId: confirm_override
              method: open
              args:
                status: success
    - id: confirm_override
      type: ConfirmModal
      properties:
        title: Dynamic Status
        content: The status of this modal was set at open time via the method args, overriding the default.
        status: confirm

- title: Custom Button Text
