- title: Theme Token Overrides
  blocks:
    - id: confirm_theme_colors_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Custom Colors
        color: primary
        variant: outlined
      events:
        onClick:
          - id: confirm_theme_colors_open
            type: CallMethod
            params:
              blockId: confirm_theme_colors
              method: open
    - id: confirm_theme_padding_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Custom Padding
        color: primary
        variant: outlined
      events:
        onClick:
          - id: confirm_theme_padding_open
            type: CallMethod
            params:
              blockId: confirm_theme_padding
              method: open
    - id: confirm_theme_radius_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Custom Radius and Mask
        color: primary
        variant: outlined
      events:
        onClick:
          - id: confirm_theme_radius_open
            type: CallMethod
            params:
              blockId: confirm_theme_radius
              method: open
    - id: confirm_theme_colors
      type: ConfirmModal
      properties:
        title: Custom Color Theme
        content: This modal uses theme tokens to set a custom header background, title color, content background, and footer background.
        theme:
          headerBg: '#e6f4ff'
          titleColor: '#0958d9'
          titleFontSize: 18
          contentBg: '#f0f5ff'
          footerBg: '#f0f5ff'
    - id: confirm_theme_padding
      type: ConfirmModal
      properties:
        title: Custom Padding
        content: This modal uses confirmBodyPadding and confirmBtnsMarginTop tokens for tighter spacing. The confirmIconMarginInlineEnd adjusts icon-to-text distance.
        theme:
          confirmBodyPadding: '16px 24px'
          confirmBtnsMarginTop: 16
          confirmIconMarginInlineEnd: 12
    - id: confirm_theme_radius
      type: ConfirmModal
      properties:
        title: Rounded with Tinted Mask
        content: This modal uses borderRadiusLG for extra-rounded corners and colorBgMask for a tinted overlay backdrop.
        theme:
          borderRadiusLG: 20
          colorBgMask: 'rgba(0, 0, 100, 0.3)'
          titleLineHeight: 2

- title: ConfirmModal in Delete Flow
  blocks:
    - id: delete_flow_card
      type: Card
      properties:
        title: Team Members
        size: small
      blocks:
        - id: delete_flow_list_item_1
          type: Box
          layout:
            gap: 12
            align: center
          blocks:
            - id: delete_flow_avatar_1
              type: Avatar
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineUser
                size: 32
                color: '#fff'
                backgroundColor: '#1677ff'
            - id: delete_flow_name_1
              type: Paragraph
              layout:
                flex: 1 1 0
              properties:
                content: Sarah Chen - Product Manager
            - id: delete_flow_remove_btn_1
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Remove
                icon: AiOutlineDelete
                color: danger
                variant: text
                size: small
              events:
                onClick:
                  - id: delete_flow_set_member
                    type: SetState
                    params:
                      member_to_remove: Sarah Chen
                  - id: delete_flow_open_confirm
                    type: CallMethod
                    params:
                      blockId: delete_flow_confirm
                      method: open
        - id: delete_flow_divider
          type: Divider
        - id: delete_flow_list_item_2
          type: Box
          layout:
            gap: 12
            align: center
          blocks:
            - id: delete_flow_avatar_2
              type: Avatar
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineUser
                size: 32
                color: '#fff'
                backgroundColor: '#52c41a'
            - id: delete_flow_name_2
              type: Paragraph
              layout:
                flex: 1 1 0
              properties:
                content: James Park - Engineering Lead
            - id: delete_flow_remove_btn_2
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Remove
                icon: AiOutlineDelete
                color: danger
                variant: text
                size: small
              events:
                onClick:
                  - id: delete_flow_set_member_2
                    type: SetState
                    params:
                      member_to_remove: James Park
                  - id: delete_flow_open_confirm_2
                    type: CallMethod
                    params:
                      blockId: delete_flow_confirm
                      method: open
    - id: delete_flow_confirm
      type: ConfirmModal
      properties:
        title: Remove Team Member
        status: error
        icon:
          name: AiOutlineUserDelete
          color: '#ff4d4f'
        okText: Remove
        okButton:
          danger: true
        cancelText: Keep Member
        content:
          _string.concat:
            - 'Are you sure you want to remove '
            - _state: member_to_remove
            - ' from the team? They will lose access to all project resources.'
      events:
        onOk:
          - id: delete_flow_ok_msg
            type: DisplayMessage
            params:
              content:
                _string.concat:
                  - _state: member_to_remove
                  - ' has been removed from the team.'
              status: success

- title: ConfirmModal in Form Submission
  blocks:
    - id: form_submit_card
      type: Card
      properties:
        title: Submit Support Ticket
      blocks:
        - id: form_submit_subject
          type: TextInput
          properties:
            title: Subject
            placeholder: Brief description of the issue
        - id: form_submit_priority
          type: Selector
          properties:
            title: Priority
            options:
              - label: Low
                value: low
              - label: Medium
                value: medium
              - label: High
                value: high
              - label: Critical
                value: critical
        - id: form_submit_description
          type: TextArea
          properties:
            title: Description
            placeholder: Describe your issue in detail...
            rows: 4
        - id: form_submit_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Submit Ticket
            icon: AiOutlineSend
            color: primary
            variant: solid
          events:
            onClick:
              - id: form_submit_open_confirm
                type: CallMethod
                params:
                  blockId: form_submit_confirm
                  method: open
    - id: form_submit_confirm
      type: ConfirmModal
      properties:
        title: Submit Support Ticket?
        content: Please verify your ticket details before submitting. You will receive a confirmation email once the ticket is created.
        status: confirm
        okText: Submit
        cancelText: Review Again
        centered: true
        width: 480
        icon: AiOutlineCheckCircle
      events:
        onOk:
          - id: form_submit_ok_msg
            type: DisplayMessage
            params:
              content: Support ticket submitted successfully. Check your email for confirmation.
              status: success
          - id: form_submit_ok_reset
            type: SetState
            params:
              form_submit_subject: null
              form_submit_priority: null
              form_submit_description: null
        onCancel:
          - id: form_submit_cancel_msg
            type: DisplayMessage
            params:
              content: Take your time to review the details.
              status: info

- title: ConfirmModal in Navigation Guard
  blocks:
    - id: nav_guard_card
      type: Card
      properties:
        title: Edit Profile
      blocks:
        - id: nav_guard_name
          type: TextInput
          properties:
            title: Display Name
            placeholder: Enter your display name
        - id: nav_guard_email
          type: TextInput
          properties:
            title: Email Address
            placeholder: name@example.com
        - id: nav_guard_actions
          type: Box
          layout:
            gap: 8
            justify: end
          blocks:
            - id: nav_guard_save_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Save Changes
                color: primary
                variant: solid
              events:
                onClick:
                  - id: nav_guard_save_msg
                    type: DisplayMessage
                    params:
                      content: Profile saved successfully.
                      status: success
            - id: nav_guard_leave_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Leave Page
                color: default
                variant: outlined
              events:
                onClick:
                  - id: nav_guard_open_confirm
                    type: CallMethod
                    params:
                      blockId: nav_guard_confirm
                      method: open
    - id: nav_guard_confirm
      type: ConfirmModal
      properties:
        title: Unsaved Changes
        content: You have unsaved changes that will be lost if you leave this page. Do you want to save your changes before leaving?
        status: warning
        icon: AiOutlineWarning
        okText: Save & Leave
        cancelText: Discard Changes
        closable: true
      events:
        onOk:
          - id: nav_guard_ok_msg
            type: DisplayMessage
            params:
              content: Changes saved. Navigating away...
              status: success
          - id: nav_guard_ok_link
            type: Link
            params:
