- title: Custom Button Properties
  blocks:
    - id: confirm_ok_btn_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with Danger Ok
        color: danger
        variant: outlined
      events:
        onClick:
          - id: confirm_ok_btn_open
            type: CallMethod
            params:
              blockId: confirm_ok_btn
              method: open
    - id: confirm_icon_btns_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with Icon Buttons
        color: primary
        variant: outlined
      events:
        onClick:
          - id: confirm_icon_btns_open
            type: CallMethod
            params:
              blockId: confirm_icon_btns
              method: open
    - id: confirm_ok_btn
      type: ConfirmModal
      properties:
        title: Delete Permanently?
        content: This action will permanently delete the selected items and cannot be undone.
        status: error
        okText: Delete
        okButton:
          danger: true
        cancelText: Keep Items
    - id: confirm_icon_btns
      type: ConfirmModal
      properties:
        title: Export Data?
        content: Your data will be exported to a CSV file and downloaded.
        status: confirm
        okText: Export
        okButton:
          icon: AiOutlineDownload
        cancelText: Cancel
        cancelButton:
          icon: AiOutlineClose

- title: Content Slot
  blocks:
    - id: confirm_content_slot_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with Rich Content
        color: primary
        variant: solid
      events:
        onClick:
          - id: confirm_content_slot_open
            type: CallMethod
            params:
              blockId: confirm_content_slot
              method: open
    - id: confirm_content_slot
      type: ConfirmModal
      properties:
        title: Review Changes
        status: confirm
        width: 500
      blocks:
        - id: confirm_content_slot_desc
          type: Descriptions
          properties:
            size: small
            column: 1
            items:
              - label: File
                value: report-2026-Q1.xlsx
              - label: Size
                value: 2.4 MB
              - label: Modified
                value: March 10, 2026
              - label: Author
                value: Jane Cooper

- title: HTML Content
  blocks:
