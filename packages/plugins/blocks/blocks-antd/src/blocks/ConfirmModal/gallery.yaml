- title: Modal Style
  blocks:
    - id: confirm_modal_style_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Styled Modal
        color: primary
        variant: outlined
      events:
        onClick:
          - id: confirm_modal_style_open
            type: CallMethod
            params:
              blockId: confirm_modal_style
              method: open
    - id: confirm_modal_style
      type: ConfirmModal
      properties:
        title: Styled Modal
        content: This modal uses the modalStyle property to apply custom CSS directly to the modal element.
        modalStyle:
          borderRadius: 16
          boxShadow: 0 8px 32px rgba(0, 0, 0, 0.2)

- title: Content Slot
  blocks:
    - id: confirm_content_slot_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with Rich Content
        color: primary
        variant: solid
      events:
        onClick:
          - id: confirm_content_slot_open
            type: CallMethod
            params:
              blockId: confirm_content_slot
              method: open
    - id: confirm_content_slot
      type: ConfirmModal
      properties:
        title: Review Changes
        status: confirm
        width: 500
      blocks:
        - id: confirm_content_slot_desc
          type: Descriptions
          properties:
            size: small
            column: 1
            items:
              - label: File
                value: report-2026-Q1.xlsx
              - label: Size
                value: 2.4 MB
              - label: Modified
                value: March 10, 2026
              - label: Author
                value: Jane Cooper

- title: HTML Content
  blocks:
    - id: confirm_html_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with HTML Content
        color: primary
        variant: outlined
      events:
        onClick:
          - id: confirm_html_open
            type: CallMethod
            params:
              blockId: confirm_html
              method: open
    - id: confirm_html
      type: ConfirmModal
      properties:
        title: '<b>Important</b> Notice'
        content: 'Your subscription will expire on <b>March 31, 2026</b>. Please <em>renew</em> to avoid service interruption.'
        status: warning

- title: Events with Actions
  blocks:
    - id: confirm_events_trigger
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with Event Actions
        color: primary
        variant: solid
      events:
        onClick:
          - id: confirm_events_open
            type: CallMethod
            params:
              blockId: confirm_events
              method: open
    - id: confirm_events_result
      type: Paragraph
      properties:
        content:
          _if:
            test:
              _state: confirm_events_action
            then:
              _string.concat:
                - 'Last action: '
                - _state: confirm_events_action
            else: Click the button above and choose Ok or Cancel.
    - id: confirm_events
      type: ConfirmModal
      properties:
        title: Confirm with Events
        content: Clicking Ok or Cancel will update the state and show a message.
        okText: Confirm
      events:
        onOpen:
          - id: confirm_events_on_open_set
            type: SetState
            params:
              confirm_events_action: Modal opened...
        onOk:
          - id: confirm_events_on_ok_set
            type: SetState
            params:
              confirm_events_action: Confirmed
          - id: confirm_events_on_ok_msg
            type: DisplayMessage
            params:
              content: Action confirmed successfully.
              status: success
        onCancel:
          - id: confirm_events_on_cancel_set
            type: SetState
            params:
              confirm_events_action: Cancelled
          - id: confirm_events_on_cancel_msg
            type: DisplayMessage
            params:
              content: Action was cancelled.
              status: info

