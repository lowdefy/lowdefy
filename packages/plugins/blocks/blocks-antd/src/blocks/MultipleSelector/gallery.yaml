- title: Basic
  blocks:
    - id: basic_multi
      type: MultipleSelector
      properties:
        title: Select Fruits
        options:
          - label: Apple
            value: apple
          - label: Banana
            value: banana
          - label: Cherry
            value: cherry
          - label: Dragonfruit
            value: dragonfruit
          - label: Elderberry
            value: elderberry
          - label: Fig
            value: fig
    - id: basic_placeholder
      type: MultipleSelector
      properties:
        title: Select Languages
        placeholder: Choose languages...
        options:
          - label: English
            value: en
          - label: Spanish
            value: es
          - label: French
            value: fr
          - label: German
            value: de
          - label: Japanese
            value: ja
          - label: Mandarin
