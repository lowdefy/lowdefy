id: masonry_list
type: Box

events:
  onMount:
    - id: init_ml
      type: SetState
      params:
        ml_test:
          - ml_test_title: Item A
            ml_test_desc: Short text
          - ml_test_title: Item B
            ml_test_desc: Longer description text here
          - ml_test_title: Item C
            ml_test_desc: Medium text

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: ml_test
    type: MasonryList
    properties:
      columns: 3
      gutter: 16
    blocks:
      - id: ml_test.$.ml_test_card
        type: Card
        blocks:
          - id: ml_test.$.ml_test_title
            type: Title
            properties:
              content:
                _state: ml_test.$.ml_test_title
              level: 4
          - id: ml_test.$.ml_test_desc
            type: Paragraph
            properties:
              content:
                _state: ml_test.$.ml_test_desc
