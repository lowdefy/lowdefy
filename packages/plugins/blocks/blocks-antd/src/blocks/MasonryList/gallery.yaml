- title: Column Layouts
  fullWidth: true
  blocks:
    - id: ml_two_col
      type: MasonryList
      properties:
        columns: 2
        gutter: 16
      blocks:
        - id: ml_two_col_card
          type: Card
          properties:
            size: small
          blocks:
            - id: ml_two_col_card_title
              type: Title
              properties:
                content:
                  _state: item.title
                level: 5
            - id: ml_two_col_card_p
              type: Paragraph
              properties:
                content:
                  _state: item.description

    - id: ml_three_col
