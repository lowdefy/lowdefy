- title: Basic MasonryList
  fullWidth: true
  blocks:
    - id: ml_basic
      type: MasonryList
      properties:
        columns: 3
        gutter: 16
      blocks:
        - id: ml_basic_card
          type: Card
          properties:
            size: small
          blocks:
            - id: ml_basic_card_p
              type: Paragraph
              properties:
                content:
                  _state: item.title

- title: Two-Column MasonryList
  fullWidth: true
  blocks:
    - id: ml_two_col
      type: MasonryList
      properties:
        columns: 2
        gutter: 16
      blocks:
        - id: ml_two_col_card
          type: Card
          properties:
            size: small
          blocks:
            - id: ml_two_col_card_title
              type: Title
              properties:
                content:
                  _state: item.name
                level: 5
            - id: ml_two_col_card_p
              type: Paragraph
              properties:
                content:
                  _state: item.description

- title: Four Columns with Gutter Array
  fullWidth: true
  blocks:
    - id: ml_four_col
      type: MasonryList
      properties:
        columns: 4
        gutter:
          - 20
          - 12
      blocks:
        - id: ml_four_col_card
          type: Card
          properties:
            size: small
            hoverable: true
          blocks:
            - id: ml_four_col_card_p
              type: Paragraph
              properties:
                content:
                  _state: item.text

- title: Sequential Rendering
  fullWidth: true
  blocks:
    - id: ml_sequential
      type: MasonryList
      properties:
        columns: 3
        gutter: 16
        sequential: true
      blocks:
        - id: ml_seq_card
          type: Card
          properties:
            size: small
          blocks:
            - id: ml_seq_card_p
              type: Paragraph
              properties:
                content:
                  _state: item.content
