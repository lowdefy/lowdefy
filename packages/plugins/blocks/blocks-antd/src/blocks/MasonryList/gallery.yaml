- title: Basic Masonry (3 Columns)
  fullWidth: true
  blocks:
    - id: ml_basic
      type: MasonryList
      properties:
        columns: 3
        gutter: 16
      blocks:
        - id: ml_basic.$.card
          type: Card
          class:
            _state: ml_basic.$.bg
          properties:
            size: small
          blocks:
            - id: ml_basic.$.title_block
              type: Title
              properties:
                content:
                  _state: ml_basic.$.title
                level: 5
            - id: ml_basic.$.desc_block
              type: Paragraph
              properties:
                content:
                  _state: ml_basic.$.desc

- title: Two Columns
  fullWidth: true
  blocks:
    - id: ml_two
      type: MasonryList
      properties:
        columns: 2
        gutter: 16
      blocks:
        - id: ml_two.$.card
          type: Card
          class:
            _state: ml_two.$.bg
          properties:
            size: small
          blocks:
            - id: ml_two.$.title_block
              type: Title
              properties:
                content:
                  _state: ml_two.$.title
                level: 5
            - id: ml_two.$.body_block
