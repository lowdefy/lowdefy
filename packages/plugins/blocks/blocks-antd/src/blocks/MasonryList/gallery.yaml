- title: MasonryList in Task Board
  fullWidth: true
  blocks:
    - id: ml_tasks_title
      type: Title
      properties:
        content: Project Tasks
        level: 4
    - id: ml_tasks
      type: MasonryList
      properties:
        columns: 3
        gutter: 16
      blocks:
        - id: ml_tasks_card
          type: Card
          properties:
            size: small
            hoverable: true
          blocks:
            - id: ml_tasks_card_title
              type: Title
              properties:
                content:
                  _state: item.title
                level: 5
            - id: ml_tasks_card_desc
              type: Paragraph
              properties:
                content:
                  _state: item.description
            - id: ml_tasks_card_tags
              type: Box
              layout:
                gap: 8
              blocks:
                - id: ml_tasks_card_tag
                  type: Tag
                  properties:
                    title:
                      _state: item.status
                    color:
                      _if:
                        test:
                          _eq:
                            - _state: item.status
                            - Done
                        then: green
                        else: blue
            - id: ml_tasks_card_btn
              type: Button
              properties:
                title: View Details
                color: primary
                variant: outlined
                block: true
                size: small
                icon: AiOutlineEye
              events:
                onClick:
                  - id: ml_tasks_card_msg
                    type: DisplayMessage
                    params:
                      content:
                        _string.concat:
                          - 'Viewing task: '
                          - _state: item.title
                      status: info

- title: MasonryList in Product Catalog
  fullWidth: true
  blocks:
    - id: ml_products_title
      type: Title
      properties:
        content: Featured Products
        level: 4
    - id: ml_products
      type: MasonryList
      class:
        element: bg-gray-50 p-6 rounded-xl
      properties:
        columns: 3
        gutter: 16
      blocks:
        - id: ml_products_card
          type: Card
          properties:
            size: small
            hoverable: true
          blocks:
            - id: ml_products_card_name
              type: Title
              properties:
                content:
                  _state: item.name
                level: 5
            - id: ml_products_card_desc
              type: Paragraph
              properties:
                content:
                  _state: item.description
            - id: ml_products_card_price
              type: Statistic
              properties:
                value:
                  _state: item.price
                prefix: $
            - id: ml_products_card_btn
              type: Button
              properties:
                title: Add to Cart
                color: primary
                variant: solid
                block: true
                size: small
                icon: AiOutlineShoppingCart
              events:
                onClick:
                  - id: ml_products_card_msg
                    type: DisplayMessage
                    params:
                      content:
                        _string.concat:
                          - _state: item.name
                          - ' added to cart'
                      status: success
