- title: With Icons
  blocks:
    - id: icon_row_status
      type: Box
      layout:
        gap: 8
      blocks:
        - id: icon_check
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Approved
            icon: AiOutlineCheck
            color: success
        - id: icon_close
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Rejected
            icon: AiOutlineClose
            color: error
        - id: icon_sync
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Processing
            icon: AiOutlineSync
            color: processing
        - id: icon_warning
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Warning
            icon: AiOutlineWarning
            color: warning
    - id: icon_row_misc
      type: Box
      layout:
        gap: 8
      blocks:
        - id: icon_star
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Featured
            icon: AiOutlineStar
            color: gold
        - id: icon_heart
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Favorite
            icon: AiOutlineHeart
            color: magenta
        - id: icon_thunder
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Fast
            icon: AiOutlineThunderbolt
            color: orange
        - id: icon_lock
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Private
            icon: AiOutlineLock
            color: geekblue
        - id: icon_tag
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Tagged
            icon: AiOutlineTag
            color: cyan
    - id: icon_row_custom
      type: Box
      layout:
        gap: 8
      blocks:
        - id: icon_custom_color
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Custom Icon
            icon:
              name: AiOutlineCrown
              color: '#faad14'
            color: gold
        - id: icon_custom_large
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Big Icon
            icon:
              name: AiOutlineRocket
              style:
                fontSize: 16
            color: purple

