- title: Style Overrides
  blocks:
    - id: style_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: style_rounded
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Rounded
            color: blue
          style:
            --element:
              borderRadius: 12px
              padding: 0 12px
        - id: style_bold
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Bold Text
            color: green
          style:
            --element:
              fontWeight: bold
        - id: style_large
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Large Tag
            color: purple
          style:
            --element:
              fontSize: 16px
              padding: 4px 12px
              lineHeight: '24px'
        - id: style_border
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Thick Border
            color: volcano
          style:
            --element:
              borderWidth: 2px
        - id: style_shadow
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Shadow
            color: gold
          style:
            --element:
              boxShadow: 0 2px 4px rgba(0,0,0,0.15)

- title: Theme Token Overrides
  blocks:
    - id: theme_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: theme_custom_bg
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Custom Background
            theme:
              defaultBg: '#e6f7ff'
              defaultColor: '#1677ff'
        - id: theme_custom_dark
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Dark Tag
            theme:
              defaultBg: '#141414'
              defaultColor: '#ffffff'
        - id: theme_custom_warm
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Warm Tag
            theme:
              defaultBg: '#fff7e6'
              defaultColor: '#d46b08'

- title: Combined Examples
  blocks:
    - id: combined_status_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: combined_active
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Active
            icon: AiOutlineCheck
            color: success
          style:
            --element:
              fontWeight: bold
        - id: combined_pending
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Pending Review
            icon: AiOutlineClockCircle
            color: warning
            closable: true
        - id: combined_draft
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Draft
            icon: AiOutlineEdit
            color: default
            closable: true
    - id: combined_badge_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: combined_pill
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: v2.0.0
            color: blue
          style:
            --element:
              borderRadius: 20px
              padding: 0 10px
        - id: combined_count
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: '99+'
            color: red
          style:
            --element:
              borderRadius: 20px
              padding: 0 8px
              fontWeight: bold
        - id: combined_new
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: NEW
            color: '#52c41a'
          style:
            --element:
              fontWeight: bold
              letterSpacing: 1px
    - id: combined_labels_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: combined_priority_high
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: High Priority
            icon: AiOutlineArrowUp
            color: error
          style:
            --element:
              fontWeight: bold
        - id: combined_priority_medium
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Medium
            icon: AiOutlineMinus
            color: warning
        - id: combined_priority_low
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Low
            icon: AiOutlineArrowDown
            color: blue
