- title: Basic
  blocks:
    - id: basic_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: basic_default
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Tag 1
        - id: basic_tag2
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Tag 2
        - id: basic_tag3
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: Tag 3
        - id: basic_html
          type: Tag
          layout:
            flex: 0 0 auto
          properties:
            title: '<b>Bold</b> Tag'

