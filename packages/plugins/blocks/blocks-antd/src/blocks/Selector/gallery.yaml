- title: Selector in User Registration
  blocks:
    - id: applied2_registration_card
      type: Card
      properties:
        title: User Preferences
      blocks:
        - id: applied2_reg_country
          type: Selector
          properties:
            title: Country
            showSearch: true
            placeholder: Select your country...
            suffixIcon: AiOutlineGlobal
            options:
              - label: United States
                value: us
              - label: United Kingdom
                value: uk
              - label: Canada
                value: ca
              - label: Australia
                value: au
              - label: Germany
                value: de
              - label: France
                value: fr
              - label: Japan
                value: jp
              - label: Brazil
                value: br
              - label: South Africa
                value: za
        - id: applied2_reg_language
          type: Selector
          properties:
            title: Preferred Language
            placeholder: Select language...
            options:
              - label: English
                value: en
              - label: Spanish
                value: es
              - label: French
                value: fr
              - label: German
                value: de
              - label: Japanese
                value: ja
              - label: Portuguese
                value: pt
        - id: applied2_reg_timezone
          type: Selector
          properties:
            title: Timezone
            showSearch: true
            placeholder: Select your timezone...
            suffixIcon: AiOutlineClockCircle
            label:
              extra: Used for scheduling and notifications.
            options:
              - label: UTC-8 Pacific Time
                value: america_los_angeles
              - label: UTC-5 Eastern Time
                value: america_new_york
              - label: UTC+0 London
                value: europe_london
              - label: UTC+1 Berlin
                value: europe_berlin
              - label: UTC+8 Singapore
                value: asia_singapore
              - label: UTC+9 Tokyo
                value: asia_tokyo
              - label: UTC+10 Sydney
                value: australia_sydney
        - id: applied2_reg_save_btn
          type: Button
          properties:
            title: Save Preferences
            icon: AiOutlineSave
            type: primary
            size: large
            block: true
          events:
            onClick:
              - id: save_prefs_action
                type: DisplayMessage
                params:
                  content: Your preferences have been saved.
                  duration: 3

- title: Selector in Order Form
  blocks:
    - id: applied3_order_card
      type: Card
      properties:
        title: Place an Order
      blocks:
        - id: applied3_product
          type: Selector
          properties:
            title: Product
            showSearch: true
            placeholder: Select a product...
            suffixIcon: AiOutlineShopping
            options:
              - label: Laptop Pro 15"
                value: laptop_pro
              - label: Wireless Mouse
                value: mouse
              - label: Mechanical Keyboard
                value: keyboard
              - label: USB-C Hub
                value: hub
              - label: Monitor 27"
                value: monitor
          events:
            onChange:
              - id: set_product_state
                type: SetState
                params:
                  selected_product:
                    _state: applied3_product
        - id: applied3_quantity
          type: Selector
          properties:
            title: Quantity
            allowClear: false
            placeholder: Select quantity...
            options:
              - label: '1'
                value: 1
              - label: '2'
                value: 2
              - label: '5'
                value: 5
              - label: '10'
                value: 10
          events:
            onChange:
              - id: set_quantity_state
                type: SetState
                params:
                  selected_quantity:
                    _state: applied3_quantity
        - id: applied3_shipping
          type: Selector
          properties:
            title: Shipping Method
            placeholder: Choose shipping...
            options:
              - label: Standard (5-7 days)
                value: standard
              - label: Express (2-3 days)
                value: express
              - label: Overnight
                value: overnight
                style:
                  color: '#1677ff'
                  fontWeight: bold
        - id: applied3_place_order_btn
          type: Button
          properties:
            title: Place Order
            icon: AiOutlineCheckCircle
            type: primary
            size: large
            block: true
          events:
            onClick:
              - id: order_confirmation
                type: DisplayMessage
                params:
                  content: Order placed successfully!
                  duration: 3
