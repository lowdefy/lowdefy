id: color_selector
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: cs_basic
    type: ColorSelector

  # ============================================
  # EVENT TESTS
  # ============================================

  - id: cs_change
    type: ColorSelector
    events:
      onChange:
        - id: set_cs_changed
          type: SetState
          params:
            cs_changed: true

  - id: cs_change_display
    type: Paragraph
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: cs_changed
              - true
          then: Changed!
          else: ''

  # ============================================
  # DISABLED TEST
  # ============================================

  - id: cs_disabled
    type: ColorSelector
    properties:
      disabled: true

  # ============================================
  # SIZE TESTS
  # ============================================

  - id: cs_small
    type: ColorSelector
    properties:
      size: small

  - id: cs_middle
    type: ColorSelector
    properties:
      size: middle

  - id: cs_large
    type: ColorSelector
    properties:
      size: large
