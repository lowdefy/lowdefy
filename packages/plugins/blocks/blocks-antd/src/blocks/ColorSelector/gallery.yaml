    - id: style_shadow
      type: ColorSelector
      layout:
        flex: 0 0 auto
      style:
        --element:
          boxShadow: 0 2px 8px rgba(0, 0, 0, 0.15)
          borderRadius: 8px
      properties:
        showText: true
    - id: style_tailwind
      type: ColorSelector
      layout:
        flex: 0 0 auto
      properties:
