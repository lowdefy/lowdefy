- title: Custom Style and Class
  blocks:
    - id: style_border
      type: ColorSelector
      layout:
        flex: 0 0 auto
      style:
        --element:
          border: 2px solid #1677ff
          borderRadius: 8px
      properties:
        showText: true
    - id: style_shadow
      type: ColorSelector
      layout:
        flex: 0 0 auto
      style:
        --element:
          boxShadow: 0 2px 8px rgba(0, 0, 0, 0.15)
          borderRadius: 8px
      properties:
        showText: true
    - id: style_large_swatch
      type: ColorSelector
      layout:
        flex: 0 0 auto
      style:
        --element:
          transform: scale(1.5)
          transformOrigin: left center

