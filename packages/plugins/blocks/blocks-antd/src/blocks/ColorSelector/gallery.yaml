- title: Setting Initial Values
  blocks:
    - id: init_desc
      type: Markdown
      properties:
        content: 'ColorSelector is externally controlled — use an `onMount` event with `SetState` to set an initial color. Without it, the picker starts empty. The other examples on this page are initialized via the page `onInit` event.'
    - id: init_empty
      type: ColorSelector
      properties:
        title: Empty Picker
        showText: true
    - id: init_with_value
      type: ColorSelector
      properties:
        title: Initialized Picker
        showText: true
      events:
        onMount:
          - id: set_init_with_value
            type: SetState
            params:
              init_with_value: '#1677ff'

