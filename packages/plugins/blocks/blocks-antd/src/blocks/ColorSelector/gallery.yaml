- title: ColorSelector in Theme Editor
  blocks:
    - id: applied_theme_editor_card
      type: Card
      properties:
        title: Brand Theme Settings
      blocks:
        - id: applied_theme_brand_name
          type: TextInput
          properties:
            title: Brand Name
            placeholder: Enter your brand name
        - id: applied_theme_primary_color
          type: ColorSelector
          properties:
            title: Primary Color
            showText: true
            format: hex
            disabledAlpha: true
            label:
              extra: Used for buttons, links, and active elements
            presets:
              - label: Popular
                colors:
                  - '#1677ff'
                  - '#52c41a'
                  - '#faad14'
                  - '#f5222d'
                  - '#722ed1'
                  - '#13c2c2'
          events:
            onMount:
              - id: set_primary_color
                type: SetState
                params:
                  applied_theme_primary_color: '#1677ff'
            onChange:
              - id: primary_color_change
                type: DisplayMessage
                params:
                  content:
                    _string.concat:
                      - 'Primary color updated to '
                      - _state: applied_theme_primary_color
                  duration: 1
        - id: applied_theme_secondary_color
          type: ColorSelector
          properties:
            title: Secondary Color
            showText: true
            format: hex
            disabledAlpha: true
            label:
              extra: Used for backgrounds and secondary actions
            presets:
              - label: Popular
                colors:
                  - '#f0f5ff'
                  - '#f6ffed'
                  - '#fffbe6'
                  - '#fff2f0'
                  - '#f9f0ff'
                  - '#e6fffb'
          events:
            onMount:
              - id: set_secondary_color
                type: SetState
                params:
                  applied_theme_secondary_color: '#f0f5ff'
        - id: applied_theme_save_btn
          type: Button
          properties:
            title: Save Theme
            type: primary
            icon: AiOutlineSave
          events:
            onClick:
              - id: theme_save_action
                type: DisplayMessage
                params:
                  content: Brand theme saved successfully
                  status: success
              - id: theme_set_global
                type: SetGlobal
                params:
                  primaryColor:
                    _state: applied_theme_primary_color
                  secondaryColor:
                    _state: applied_theme_secondary_color

- title: ColorSelector in Product Customizer
  blocks:
    - id: applied_product_card
      type: Card
      properties:
        title: Customize Your Product
      blocks:
        - id: applied_product_name
          type: TextInput
          properties:
            title: Product Name
            placeholder: e.g. Custom T-Shirt
        - id: applied_product_body_color
          type: ColorSelector
          properties:
            title: Body Color
            showText: true
            size: large
            disabledAlpha: true
            presets:
              - label: Available Colors
                colors:
                  - '#ffffff'
                  - '#000000'
                  - '#1a3c6e'
                  - '#8b0000'
                  - '#2e8b57'
                  - '#daa520'
          events:
            onMount:
              - id: set_body_color
                type: SetState
                params:
                  applied_product_body_color: '#1a3c6e'
            onChange:
              - id: body_color_change
                type: SetState
                params:
                  product_body_color:
                    _state: applied_product_body_color
        - id: applied_product_accent_color
          type: ColorSelector
          properties:
            title: Accent Color
            showText: true
            size: large
            disabledAlpha: true
            presets:
              - label: Available Colors
                colors:
                  - '#ff4d4f'
                  - '#ff7a45'
                  - '#ffc53d'
                  - '#52c41a'
                  - '#1677ff'
                  - '#722ed1'
          events:
            onMount:
              - id: set_accent_color
                type: SetState
                params:
                  applied_product_accent_color: '#ff4d4f'
        - id: applied_product_quantity
          type: NumberInput
          properties:
            title: Quantity
            min: 1
            max: 100
        - id: applied_product_add_to_cart
          type: Button
          properties:
            title: Add to Cart
            type: primary
            icon: AiOutlineShoppingCart
          events:
            onClick:
              - id: add_to_cart_action
                type: DisplayMessage
                params:
                  content:
                    _string.concat:
                      - 'Added to cart with body color '
                      - _state: applied_product_body_color
                      - ' and accent color '
                      - _state: applied_product_accent_color
                  status: success
