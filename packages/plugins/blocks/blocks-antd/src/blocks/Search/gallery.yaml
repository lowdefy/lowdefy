- title: Default
  blocks:
    - id: example_search_default
      type: Search
      properties:
        indexUrl: /search-index.json
      events:
        onSelect:
          - id: navigate
            type: Link
            params:
              pageId:
                _event: pageId

- title: Custom Shortcut
  blocks:
    - id: example_search_custom_shortcut
      type: Search
      properties:
        indexUrl: /search-index.json
        shortcut: mod+j
        label: Quick Find
      events:
        onSelect:
          - id: navigate
            type: Link
            params:
              pageId:
                _event: pageId

- title: Analytics Events
  blocks:
    - id: example_search_analytics
      type: Search
      properties:
        indexUrl: /search-index.json
      events:
        onSearch:
          - id: track_search
            type: DisplayMessage
            params:
              content:
                _string.concat:
                  - 'Search: "'
                  - _event: value
                  - '" ('
                  - _event: resultCount
                  - ' results)'
        onSelect:
          - id: track_click
            type: DisplayMessage
            params:
              content:
                _string.concat:
                  - 'Clicked "'
                  - _event: title
                  - '" for query "'
                  - _event: query
                  - '" ('
                  - _event: resultCount
                  - ' results)'
          - id: navigate
            type: Link
            params:
              pageId:
                _event: pageId

- title: Runtime Documents
  blocks:
    - id: example_search_runtime
      type: Search
      properties:
        documents:
          - id: intro
            title: Introduction
            content: Welcome to the documentation. This guide covers all features.
            category: guide
          - id: getting-started
            title: Getting Started
            content: Follow these steps to set up your project quickly.
            category: guide
          - id: api-ref
            title: API Reference
            content: Complete API documentation for all endpoints and methods.
            category: api
        fields: [title, content]
        storeFields: [title, category, id]
        searchOptions:
          boost:
            title: 2
          fuzzy: 0.2
        result:
          title: title
          description: content
        placeholder: Search documents...
      events:
        onSelect:
          - id: show_result
            type: DisplayMessage
            params:
              content:
                _string.concat:
                  - 'Selected: '
                  - _event: title
