- title: With Icon
  blocks:
    - id: db_icon
      type: DropdownButton
      layout:
        flex: 0 0 auto
      properties:
        title: Export
        icon: AiOutlineDownload
        color: primary
        variant: outlined
        items:
          - title: Export as CSV
            eventName: onCSV
            icon: AiOutlineFile
          - title: Export as PDF
            eventName: onPDF
            icon: AiOutlineFilePdf
          - title: Export as Excel
            eventName: onExcel
            icon: AiOutlineFileExcel
      events:
        onCSV:
          - id: db_icon_csv_msg
            type: DisplayMessage
            params:
              content: Exporting CSV...
              duration: 2
        onPDF:
          - id: db_icon_pdf_msg
            type: DisplayMessage
            params:
              content: Exporting PDF...
              duration: 2
        onExcel:
          - id: db_icon_excel_msg
            type: DisplayMessage
            params:
              content: Exporting Excel...
              duration: 2

- title: Disabled Items
  blocks:
    - id: db_disabled_items
      type: DropdownButton
      layout:
        flex: 0 0 auto
      properties:
        title: Manage
        items:
          - title: View Details
            eventName: onView
            icon: AiOutlineEye
          - title: Edit (no permission)
            eventName: onEdit
            icon: AiOutlineEdit
            disabled: true
          - type: divider
          - title: Archive
            eventName: onArchive
            icon: AiOutlineDelete
            danger: true
      events:
        onView:
          - id: db_dis_view_msg
            type: DisplayMessage
            params:
              content: Viewing details...
              duration: 2
        onArchive:
          - id: db_dis_archive_msg
            type: DisplayMessage
            params:
              content: Archived!
              status: warning
              duration: 2

- title: Shortcuts on Items
  blocks:
    - id: db_shortcuts
      type: DropdownButton
      layout:
        flex: 0 0 auto
      properties:
        title: Edit
        icon: AiOutlineEdit
        items:
          - title: Undo
            eventName: onUndo
            icon: AiOutlineUndo
            shortcut: mod+Z
          - title: Redo
            eventName: onRedo
            icon: AiOutlineRedo
            shortcut: mod+shift+Z
          - type: divider
          - title: Delete
            eventName: onDelete
            icon: AiOutlineDelete
            danger: true
            shortcut: mod+Backspace
      events:
        onUndo:
          - id: db_sc_undo_msg
            type: DisplayMessage
            params:
              content: Undo
              duration: 2
        onRedo:
          - id: db_sc_redo_msg
            type: DisplayMessage
            params:
              content: Redo
              duration: 2
        onDelete:
          - id: db_sc_del_msg
            type: DisplayMessage
            params:
              content: Deleted
              status: error
              duration: 2

