- title: Basic Action Dropdown
  blocks:
    - id: db_basic
      type: DropdownButton
      layout:
        flex: 0 0 auto
      properties:
        title: Actions
        items:
          - title: Edit
            eventName: onEdit
            icon: AiOutlineEdit
          - title: Duplicate
            eventName: onDuplicate
            icon: AiOutlineCopy
          - type: divider
          - title: Delete
            eventName: onDelete
            icon: AiOutlineDelete
            danger: true
      events:
        onEdit:
          - id: db_basic_edit_msg
            type: DisplayMessage
            params:
              content: Edit clicked
              duration: 2
        onDuplicate:
          - id: db_basic_dup_msg
            type: DisplayMessage
            params:
              content: Duplicate clicked
              duration: 2
        onDelete:
          - id: db_basic_del_msg
            type: DisplayMessage
            params:
              content: Delete clicked
              status: error
              duration: 2

- title: Split Button
  blocks:
    - id: db_split
      type: DropdownButton
      layout:
        flex: 0 0 auto
      properties:
        title: Save
        icon: AiOutlineSave
        color: primary
        variant: solid
        split: true
        items:
          - title: Save as Draft
            eventName: onSaveDraft
            icon: AiOutlineFile
          - title: Save & Publish
            eventName: onPublish
            icon: AiOutlineSend
      events:
        onClick:
          - id: db_split_save_msg
            type: DisplayMessage
            params:
              content: Save clicked
              status: success
              duration: 2
        onSaveDraft:
          - id: db_split_draft_msg
            type: DisplayMessage
            params:
              content: Saved as draft
              duration: 2
        onPublish:
          - id: db_split_pub_msg
            type: DisplayMessage
            params:
              content: Published!
              status: success
              duration: 2

