- title: Theme — Styled Account Dropdown
  blocks:
    - id: db_theme_account
      type: DropdownButton
      layout:
        flex: 0 0 auto
      properties:
        title: My Account
        icon: AiOutlineUser
        color: '#531dab'
        variant: solid
        theme:
          borderRadiusLG: 12
          controlItemBgHover: '#f9f0ff'
          controlItemBgActive: '#efdbff'
          button:
            borderRadius: 20
            paddingInline: 24
            controlHeight: 40
        items:
          - title: Profile Settings
            eventName: onProfile
            icon: AiOutlineSetting
          - title: Billing & Plans
            eventName: onBilling
            icon: AiOutlineCreditCard
          - type: divider
          - title: Sign Out
            eventName: onSignOut
            icon: AiOutlineLogout
            danger: true
      events:
        onProfile:
          - id: db_theme_profile_msg
            type: DisplayMessage
            params:
              content: Opening profile settings...
              duration: 2
        onBilling:
          - id: db_theme_billing_msg
            type: DisplayMessage
            params:
              content: Opening billing page...
              duration: 2
        onSignOut:
          - id: db_theme_signout_msg
            type: DisplayMessage
            params:
              content: Signed out
              status: warning
              duration: 2

- title: Theme — Danger Zone Split
  blocks:
    - id: db_theme_dangerzone
      type: DropdownButton
      layout:
        flex: 0 0 auto
      properties:
        title: Delete Account
        icon: AiOutlineWarning
        color: danger
        variant: solid
        split: true
        theme:
          borderRadiusLG: 8
          button:
            colorPrimary: '#cf1322'
            colorPrimaryHover: '#a8071a'
            colorPrimaryActive: '#820014'
        items:
          - title: Delete All Data
            eventName: onDeleteData
            icon: AiOutlineDelete
            danger: true
          - title: Export Data First
            eventName: onExportFirst
            icon: AiOutlineDownload
      events:
        onClick:
          - id: db_dz_click_msg
            type: DisplayMessage
            params:
              content: Are you sure? This cannot be undone.
              status: error
              duration: 3
        onDeleteData:
          - id: db_dz_deldata_msg
            type: DisplayMessage
            params:
              content: All data deleted permanently.
              status: error
              duration: 3
        onExportFirst:
          - id: db_dz_export_msg
            type: DisplayMessage
            params:
              content: Exporting data before deletion...
              duration: 2
