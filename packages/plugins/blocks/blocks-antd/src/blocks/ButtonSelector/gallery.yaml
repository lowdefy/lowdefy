          borderRadius: 20
    - id: theme_custom_font
      type: ButtonSelector
      properties:
        title: Large Font Size
        buttonStyle: solid
        options:
          - label: Option A
            value: a
          - label: Option B
            value: b
          - label: Option C
            value: c
