      type: ButtonSelector
      properties:
        title: Simple String Array
        buttonStyle: solid
        options:
          - Red
          - Green
          - Blue
    - id: number_options
      type: ButtonSelector
      properties:
        title: Number Options
        buttonStyle: solid
        options:
          - 10
          - 20
          - 50
          - 100

- title: Object Options with Labels
  blocks:
