            value: a
          - label: Option B
            value: b
          - label: Option C
            value: c
        theme:
          buttonBg: '#f0f5ff'
          buttonSolidCheckedBg: '#531dab'
          buttonSolidCheckedHoverBg: '#722ed1'
          buttonSolidCheckedActiveBg: '#391085'
    - id: theme_button_color
      type: ButtonSelector
      properties:
        title: Custom Button Text Color
        buttonStyle: outline
        options:
          - label: Option A
            value: a
          - label: Option B
            value: b
          - label: Option C
            value: c
        theme:
