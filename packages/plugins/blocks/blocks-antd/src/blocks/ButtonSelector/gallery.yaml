            value: low
          - label: Medium
            value: medium
          - label: High
            value: high
          - label: Critical
            value: critical

- title: HTML Labels
  blocks:
    - id: html_labels
      type: ButtonSelector
      properties:
        title: HTML in Option Labels
        buttonStyle: solid
        options:
          - label: '<b>Bold</b>'
            value: bold
          - label: '<i>Italic</i>'
            value: italic
          - label: '<u>Underline</u>'
            value: underline
    - id: html_emoji_labels
      type: ButtonSelector
      properties:
        title: Emoji Labels
        buttonStyle: solid
        options:
          - label: '&#x2705; Approved'
            value: approved
          - label: '&#x23F3; Pending'
            value: pending
          - label: '&#x274C; Rejected'
            value: rejected

- title: Many Options
