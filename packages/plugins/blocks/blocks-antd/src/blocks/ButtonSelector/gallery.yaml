          - label: Highlighted
            value: highlighted
            style:
              fontWeight: bold
          - label: Subtle
            value: subtle
            style:
              fontStyle: italic
    - id: option_styles_solid
      type: ButtonSelector
      properties:
        title: Styled Solid Options
        buttonStyle: solid
        options:
          - label: Default
            value: default
          - label: Emphasized
            value: emphasized
            style:
              fontWeight: bold
              letterSpacing: 1
          - label: Light
            value: light
            style:
              fontStyle: italic
              opacity: 0.8
    - id: option_styles_mixed
      type: ButtonSelector
      properties:
        title: Mixed Option Styling
        buttonStyle: outline
        options:
