- title: Button Styles
  blocks:
    - id: style_solid
      type: ButtonSelector
      properties:
        title: Solid Style (default)
        buttonStyle: solid
        options:
          - label: Daily
            value: daily
          - label: Weekly
            value: weekly
          - label: Monthly
            value: monthly
    - id: style_outline
      type: ButtonSelector
      properties:
        title: Outline Style
        buttonStyle: outline
        options:
          - label: Daily
            value: daily
          - label: Weekly
            value: weekly
          - label: Monthly
            value: monthly
    - id: solid_outline_alignment
      type: ButtonSelector
      properties:
        title: Solid - filled background on selected
        buttonStyle: solid
        options:
          - label: Left
            value: left
          - label: Center
            value: center
          - label: Right
            value: right
          - label: Justify
            value: justify

- title: Options
