- title: ButtonSelector in Survey Form
  blocks:
    - id: applied_survey_card
      type: Card
      properties:
        title: Customer Satisfaction Survey
      blocks:
        - id: applied_survey_name
          type: TextInput
          properties:
            title: Your Name
            placeholder: Enter your full name
        - id: applied_survey_rating
          type: ButtonSelector
          properties:
            title: How satisfied are you with our service?
            buttonStyle: solid
            color: '#1677ff'
            options:
              - label: Very Unsatisfied
                value: 1
              - label: Unsatisfied
                value: 2
              - label: Neutral
                value: 3
              - label: Satisfied
                value: 4
              - label: Very Satisfied
                value: 5
        - id: applied_survey_recommend
          type: ButtonSelector
          properties:
            title: Would you recommend us to a friend?
            buttonStyle: solid
            options:
              - label: Definitely
                value: definitely
              - label: Probably
                value: probably
              - label: Not Sure
                value: not_sure
              - label: Unlikely
                value: unlikely
        - id: applied_survey_comments
          type: TextArea
          properties:
            title: Additional Comments
            placeholder: Tell us more about your experience...
        - id: applied_survey_submit
          type: Button
          properties:
            title: Submit Survey
            type: primary
            icon: AiOutlineSend
          events:
            onClick:
              - id: survey_submit_action
                type: DisplayMessage
                params:
                  content:
                    _string.concat:
                      - 'Thank you for your feedback! Rating: '
                      - _state: applied_survey_rating
                  status: success

- title: ButtonSelector in Settings Page
  blocks:
    - id: applied_settings_card
      type: Card
      properties:
        title: Display Settings
      blocks:
        - id: applied_settings_theme
          type: ButtonSelector
          properties:
            title: Theme
            buttonStyle: solid
            options:
              - label: Light
                value: light
              - label: Dark
                value: dark
              - label: System
                value: system
          events:
            onChange:
              - id: theme_change_action
                type: SetState
                params:
                  selected_theme:
                    _state: applied_settings_theme
        - id: applied_settings_language
          type: ButtonSelector
          properties:
            title: Language
            buttonStyle: outline
            options:
              - label: English
                value: en
              - label: Spanish
                value: es
              - label: French
                value: fr
              - label: German
                value: de
        - id: applied_settings_font_size
          type: ButtonSelector
          properties:
            title: Font Size
            buttonStyle: solid
            size: small
            options:
              - label: Small
                value: small
              - label: Medium
                value: medium
              - label: Large
                value: large
        - id: applied_settings_save
          type: Button
          properties:
            title: Save Settings
            type: primary
            icon: AiOutlineSave
          events:
            onClick:
              - id: settings_save_action
                type: DisplayMessage
                params:
                  content: Settings saved successfully
                  status: success
              - id: settings_set_global
                type: SetGlobal
                params:
                  theme:
                    _state: applied_settings_theme
                  language:
                    _state: applied_settings_language
                  fontSize:
                    _state: applied_settings_font_size
