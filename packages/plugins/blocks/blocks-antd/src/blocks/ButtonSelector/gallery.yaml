- title: Button Styles
  blocks:
    - id: style_solid
      type: ButtonSelector
      properties:
        title: Solid Style (default)
        buttonStyle: solid
        options:
          - label: Daily
            value: daily
          - label: Weekly
            value: weekly
          - label: Monthly
            value: monthly
    - id: style_outline
      type: ButtonSelector
      properties:
        title: Outline Style
        buttonStyle: outline
        options:
          - label: Daily
            value: daily
          - label: Weekly
            value: weekly
          - label: Monthly
            value: monthly

- title: Solid vs Outline Comparison
  blocks:
    - id: solid_comparison
      type: ButtonSelector
      properties:
        title: Solid - filled background on selected
        buttonStyle: solid
        options:
          - label: Left
            value: left
          - label: Center
            value: center
          - label: Right
            value: right
          - label: Justify
            value: justify
    - id: outline_comparison
      type: ButtonSelector
      properties:
        title: Outline - bordered highlight on selected
        buttonStyle: outline
        options:
          - label: Left
            value: left
          - label: Center
            value: center
          - label: Right
            value: right
          - label: Justify
            value: justify

- title: Sizes
  blocks:
    - id: size_small
      type: ButtonSelector
      properties:
        title: Small
        size: small
        buttonStyle: solid
        options:
          - Small
          - Medium
          - Large
    - id: size_default
      type: ButtonSelector
      properties:
        title: Default
        buttonStyle: solid
        options:
          - Small
          - Medium
          - Large
    - id: size_large
      type: ButtonSelector
      properties:
        title: Large
        size: large
        buttonStyle: solid
        options:
          - Small
          - Medium
          - Large

- title: Sizes with Outline
  blocks:
