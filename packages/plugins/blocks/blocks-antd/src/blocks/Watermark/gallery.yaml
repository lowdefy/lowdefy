- title: Watermark Over Rich Content
  blocks:
    - id: over_paragraphs
      type: Watermark
      properties:
        text: Lowdefy
        font:
          color: rgba(0, 0, 0, 0.08)
      blocks:
        - id: over_paragraphs_title
          type: Title
          properties:
            content: Getting Started with Lowdefy
            level: 4
        - id: over_paragraphs_p1
          type: Paragraph
          properties:
            content: >
              Lowdefy is an open-source framework that lets you build web apps,
              admin panels, BI dashboards, and CRUD apps with YAML or JSON configuration.
        - id: over_paragraphs_p2
          type: Paragraph
          properties:
            content: >
              Connect to databases and APIs, define pages with blocks, and deploy
              your app without writing frontend code.
        - id: over_paragraphs_p3
          type: Paragraph
          properties:
            content: >
              The framework handles routing, state management, and server-side
              rendering so you can focus on building your application logic.
    - id: over_card
      type: Watermark
      properties:
        text:
          - Confidential
          - Internal Only
        font:
          color: rgba(255, 0, 0, 0.08)
          fontSize: 14
      blocks:
        - id: over_card_1
          type: Card
          layout:
            flex: 1 1 0
          properties:
            title: Project Alpha
          blocks:
            - id: over_card_1_desc
              type: Paragraph
              properties:
                content: A web application for managing team workflows and project timelines. Currently in active development with scheduled release next quarter.
        - id: over_card_2
          type: Card
          layout:
            flex: 1 1 0
          properties:
            title: Project Beta
          blocks:
            - id: over_card_2_desc
              type: Paragraph
              properties:
                content: Mobile app for real-time inventory tracking across multiple warehouses. Integrates with existing ERP systems for seamless data sync.
    - id: over_tags
      type: Watermark
      properties:
        text: Sample Data
        font:
          color: rgba(0, 0, 0, 0.06)
      blocks:
        - id: over_tags_title
          type: Title
          properties:
            content: Department Labels
            level: 5
        - id: over_tags_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: over_tag_eng
              type: Tag
              layout:
                flex: 0 0 auto
              properties:
                title: Engineering
                color: blue
            - id: over_tag_design
              type: Tag
              layout:
                flex: 0 0 auto
              properties:
                title: Design
                color: purple
            - id: over_tag_marketing
              type: Tag
              layout:
                flex: 0 0 auto
              properties:
                title: Marketing
                color: green
            - id: over_tag_sales
              type: Tag
              layout:
                flex: 0 0 auto
              properties:
                title: Sales
                color: orange
            - id: over_tag_support
              type: Tag
              layout:
                flex: 0 0 auto
              properties:
                title: Support
                color: cyan

- title: Document-Style Watermarks
  blocks:
    - id: doc_draft_bg
      type: Box
      class: bg-white rounded-lg shadow-sm
      blocks:
        - id: doc_draft
          type: Watermark
          properties:
            text: DRAFT
            font:
              fontSize: 28
              fontWeight: bold
              color: rgba(255, 0, 0, 0.06)
            gap:
              - 150
              - 150
            rotate: -30
          blocks:
            - id: doc_draft_heading
              type: Title
              properties:
                content: Quarterly Financial Report
                level: 4
            - id: doc_draft_subtitle
              type: Paragraph
              properties:
                content: Prepared for the Board of Directors — Q1 2026
            - id: doc_draft_divider
              type: Divider
            - id: doc_draft_body_1
              type: Paragraph
              properties:
                content: >
                  Revenue for the first quarter reached $12.4M, representing a 15% increase
                  year-over-year. Operating margins improved to 23% driven by efficiency gains
                  across all business units.
            - id: doc_draft_body_2
              type: Paragraph
              properties:
                content: >
                  Customer acquisition costs decreased by 8% while customer lifetime value
                  increased by 12%, indicating strong unit economics. The sales pipeline
                  remains robust with $45M in qualified opportunities.
    - id: doc_confidential_bg
      type: Box
      class: bg-white rounded-lg shadow-sm
      blocks:
        - id: doc_confidential
          type: Watermark
          properties:
            text:
              - CONFIDENTIAL
              - Do Not Copy
            font:
              fontSize: 20
              color: rgba(22, 119, 255, 0.06)
              fontWeight: bold
            gap:
              - 120
              - 120
          blocks:
            - id: doc_conf_heading
              type: Title
              properties:
                content: Product Roadmap 2026
                level: 4
            - id: doc_conf_p1
              type: Paragraph
              properties:
                content: >
                  Phase 1 (Q1-Q2): Core platform enhancements including improved
                  real-time collaboration features and expanded API coverage.
            - id: doc_conf_p2
              type: Paragraph
              properties:
                content: >
                  Phase 2 (Q3-Q4): Launch of enterprise tier with advanced
                  security controls, audit logging, and custom SSO integrations.

- title: Styled Containers
  blocks:
    - id: styled_gradient
      type: Watermark
      class: bg-gradient-to-br from-blue-50 to-purple-50 rounded-lg p-4
      properties:
        text: Preview
        font:
          color: rgba(79, 70, 229, 0.1)
          fontSize: 18
      blocks:
        - id: styled_gradient_content
          type: Paragraph
          properties:
            content: >
              Watermark on a gradient background using Tailwind utility classes.
              The rounded corners and padding create a contained preview area.
        - id: styled_gradient_button
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Action Button
            color: primary
            variant: solid
    - id: styled_dark
      type: Watermark
      class: bg-slate-800 rounded-lg p-4
      properties:
        text: Dark Theme
        font:
          color: rgba(255, 255, 255, 0.08)
          fontSize: 16
      blocks:
        - id: styled_dark_title
          type: Title
          style:
            color: white
          properties:
            content: Dark Background
            level: 5
        - id: styled_dark_content
          type: Paragraph
          style:
            color: rgba(255, 255, 255, 0.7)
          properties:
            content: >
              The watermark text color uses white with low opacity to remain subtle
              on a dark surface. This is useful for dark-mode interfaces.
    - id: styled_bordered
      type: Watermark
      class: border-2 border-dashed border-gray-300 rounded-xl p-6
      properties:
        text: Upload Area
        font:
          color: rgba(0, 0, 0, 0.06)
          fontSize: 20
        rotate: 0
        gap:
          - 120
          - 80
      blocks:
        - id: styled_bordered_text
          type: Paragraph
          style:
            textAlign: center
            color: '#999'
          properties:
            content: Drag and drop files here or click to browse
    - id: styled_shadow
      type: Watermark
      class: bg-white rounded-lg shadow-lg p-6
      properties:
        text: Protected
        font:
          color: rgba(0, 0, 0, 0.05)
      blocks:
        - id: styled_shadow_content
          type: Paragraph
          properties:
            content: >
              Elevated card-like container with a box shadow and the watermark
              rendered over the content area for a polished document feel.

