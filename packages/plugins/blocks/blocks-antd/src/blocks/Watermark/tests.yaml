- id: default
  type: Watermark
- id: properties.text
  type: Watermark
  properties:
    text: Lowdefy
- id: properties.text array
  type: Watermark
  properties:
    text:
      - Lowdefy
      - Confidential
- id: properties.font
  type: Watermark
  properties:
    text: Lowdefy
    font:
      color: rgba(0, 0, 0, 0.15)
      fontSize: 16
      fontWeight: normal
      fontFamily: Roboto
- id: properties.gap
  type: Watermark
  properties:
    text: Lowdefy
    gap:
      - 100
      - 100
- id: properties.offset
  type: Watermark
  properties:
    text: Lowdefy
    offset:
      - 50
      - 50
- id: 'properties.rotate: -30'
  type: Watermark
  properties:
    text: Lowdefy
    rotate: -30
- id: 'properties.zIndex: 10'
  type: Watermark
  properties:
    text: Lowdefy
    zIndex: 10
- id: 'properties.width: 120'
  type: Watermark
  properties:
    text: Lowdefy
    width: 120
- id: 'properties.height: 64'
  type: Watermark
  properties:
    text: Lowdefy
    height: 64
- id: properties.image
  type: Watermark
  properties:
    image: https://via.placeholder.com/100
    width: 100
    height: 100
- id: 'properties.inherit: false'
  type: Watermark
  properties:
    text: Lowdefy
    inherit: false
- id: 'properties.font.textAlign: center'
  type: Watermark
  properties:
    text: Lowdefy
    font:
      textAlign: center
