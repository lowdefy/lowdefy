        list:
          - Home
          - Application Center
          - Application List
          - An Application
    - id: basic_objects
      type: Breadcrumb
      properties:
        list:
          - label: Home
          - label: Products
          - label: Electronics
          - label: Headphones
    - id: basic_two_items
      type: Breadcrumb
      properties:
        list:
          - Home
          - Current Page

- title: Separator
  blocks:
    - id: separator_default
      type: Breadcrumb
      properties:
        list:
          - Home
          - Category
          - Item
    - id: separator_arrow
      type: Breadcrumb
      properties:
        separator: '>'
        list:
          - Home
          - Category
          - Sub-Category
          - Item
    - id: separator_dash
      type: Breadcrumb
      properties:
