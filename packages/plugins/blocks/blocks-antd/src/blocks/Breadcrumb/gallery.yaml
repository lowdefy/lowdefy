- title: Item Style
  blocks:
    - id: styled_bold_last
      type: Breadcrumb
      properties:
        list:
          - label: Dashboard
          - label: Settings
          - label: Security
            style:
              fontWeight: bold
    - id: styled_colored
      type: Breadcrumb
      properties:
        list:
          - label: Home
            style:
              color: '#1677ff'
          - label: Active
            style:
              color: '#52c41a'
              fontWeight: bold
          - label: Page
    - id: styled_size
      type: Breadcrumb
      properties:
        list:
          - label: Root
            style:
              fontSize: 16
          - label: Child
            style:
