- title: onClick Event
  blocks:
    - id: on_click_basic
      type: Breadcrumb
      properties:
        list:
          - Home
          - Products
          - Details
      events:
        onClick:
          - id: on_click_basic_msg
            type: DisplayMessage
            params:
              content:
                _string.concat:
                  - 'Clicked: '
                  - _event: link
              status: info
    - id: on_click_objects
      type: Breadcrumb
      properties:
        list:
          - label: Dashboard
          - label: Reports
          - label: Monthly
      events:
        onClick:
          - id: on_click_objects_msg
            type: DisplayMessage
            params:
              content:
                _string.concat:
                  - 'Navigating to item '
                  - _event: index
              status: info
    - id: on_click_set_state
      type: Breadcrumb
      properties:
        list:
          - label: Home
          - label: Settings
          - label: Profile
      events:
        onClick:
          - id: on_click_set_state_action
            type: SetState
            params:
              last_breadcrumb_click:
                _event: link

- title: Style and CSS
  blocks:
    - id: css_tailwind_bg
      type: Breadcrumb
      class: bg-gray-100 p-3 rounded-lg
      properties:
        list:
          - Home
          - Category
          - Item
    - id: css_tailwind_shadow
      type: Breadcrumb
      class: shadow-md p-3 rounded-md
      properties:
        list:
          - Dashboard
          - Analytics
          - Reports
    - id: css_inline_border
      type: Breadcrumb
      properties:
        list:
          - Dashboard
          - Analytics
          - Reports
      style:
        --element:
          padding: 8px 16px
          border: 1px solid #d9d9d9
          borderRadius: 6
    - id: css_inline_background
      type: Breadcrumb
      properties:
        list:
          - Home
          - Products
          - Checkout
      style:
        --element:
          padding: 10px 20px
          backgroundColor: '#f0f5ff'
          borderRadius: 8

- title: Theme Token Overrides
  blocks:
    - id: theme_separator_style
      type: Breadcrumb
      properties:
        list:
          - Home
          - Products
          - Details
        theme:
          separatorColor: '#1677ff'
          separatorMargin: 12
    - id: theme_link_colors
      type: Breadcrumb
      properties:
        list:
          - label: Dashboard
          - label: Settings
          - label: Profile
        theme:
          itemColor: '#722ed1'
          lastItemColor: '#f5222d'
          linkColor: '#722ed1'
          linkHoverColor: '#eb2f96'
    - id: theme_icon_size
      type: Breadcrumb
      properties:
        list:
          - label: Home
            icon: AiOutlineHome
          - label: Users
            icon: AiOutlineTeam
          - label: Profile
        theme:
          iconFontSize: 20
    - id: theme_combined
      type: Breadcrumb
      properties:
        separator: '>'
        list:
          - label: Home
            icon: AiOutlineHome
          - label: Projects
          - label: Current
        theme:
          itemColor: '#8c8c8c'
          lastItemColor: '#1677ff'
          separatorColor: '#bfbfbf'
          separatorMargin: 16
          iconFontSize: 16

- title: Breadcrumb in Settings Page
  blocks:
    - id: settings_card
      type: Card
      properties:
        title: Account Settings
        size: small
      blocks:
        - id: settings_breadcrumb
          type: Breadcrumb
          properties:
            separator: '>'
            list:
              - label: Home
                icon: AiOutlineHome
                pageId: introduction
              - label: Settings
                icon: AiOutlineSetting
              - label: Security
                icon: AiOutlineLock
          events:
            onClick:
              - id: settings_click_msg
                type: DisplayMessage
                params:
                  content:
                    _string.concat:
                      - 'Navigating to: '
                      - _event: link.label
                  status: info
        - id: settings_divider
          type: Divider
        - id: settings_description
          type: Markdown
          properties:
            content: |
              **Two-Factor Authentication**

              Add an extra layer of security to your account by enabling two-factor authentication.
        - id: settings_actions
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: settings_cancel_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Cancel
                color: default
                variant: outlined
              events:
                onClick:
                  - id: settings_cancel_msg
                    type: DisplayMessage
                    params:
                      content: Changes discarded
                      status: info
            - id: settings_save_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Save Changes
                color: primary
                variant: solid
                icon: AiOutlineSave
              events:
                onClick:
                  - id: settings_save_msg
                    type: DisplayMessage
                    params:
                      content: Settings saved successfully!
                      status: success

- title: Breadcrumb in E-Commerce Product Page
  blocks:
    - id: ecommerce_breadcrumb
      type: Breadcrumb
      class: bg-gray-50 px-4 py-2 rounded-md
      properties:
        list:
          - label: Shop
            icon: AiOutlineHome
            url: https://lowdefy.com
          - label: Electronics
          - label: Audio
          - label: Wireless Headphones
            style:
              fontWeight: bold
        theme:
          lastItemColor: '#1677ff'
          separatorMargin: 10
    - id: ecommerce_card
      type: Card
      properties:
        title: Wireless Noise-Cancelling Headphones
        size: small
      blocks:
        - id: ecommerce_description
          type: Markdown
          properties:
            content: |
              **$249.99** ~~$329.99~~

              Premium over-ear headphones with active noise cancellation, 30-hour battery life, and hi-res audio support. Available in Midnight Black and Pearl White.
        - id: ecommerce_actions
          type: Box
          layout:
            gap: 8
            justify: flex-start
          blocks:
            - id: ecommerce_cart_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Add to Cart
                color: primary
                variant: solid
                icon: AiOutlineShoppingCart
              events:
                onClick:
                  - id: ecommerce_cart_msg
                    type: DisplayMessage
                    params:
                      content: Added to cart!
                      status: success
            - id: ecommerce_wishlist_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Wishlist
                color: default
                variant: outlined
                icon: AiOutlineHeart
              events:
                onClick:
                  - id: ecommerce_wishlist_msg
                    type: DisplayMessage
                    params:
                      content: Added to wishlist
                      status: info
