- title: Team Directory
  fullWidth: true
  blocks:
    - id: mas_team
      type: Masonry
      properties:
        columns:
          xs: 1
          sm: 2
          lg: 3
        gutter: 16
      blocks:
        - id: mas_team_c1
          type: Card
          properties:
            size: small
            hoverable: true
          blocks:
            - id: mas_team_c1_row
              type: Box
              layout:
                gap: 12
                align: center
              blocks:
                - id: mas_team_c1_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineUser
                    size: 48
                    color: '#fff'
                    backgroundColor: '#1677ff'
                - id: mas_team_c1_info
                  type: Box
                  layout:
                    flex: 1 1 0
                    direction: column
                    gap: 2
                  blocks:
                    - id: mas_team_c1_name
                      type: Title
                      properties:
                        content: Sarah Chen
                        level: 5
                    - id: mas_team_c1_role
