          properties:
            size: small
            title: Themed Card
          blocks:
            - id: mas_blue_c1_p
              type: Paragraph
              properties:
                content: Theme tokens cascade to all child blocks within this Masonry.
        - id: mas_blue_c2
          type: Card
          properties:
            size: small
            title: Rounded Corners
          blocks:
            - id: mas_blue_c2_stat
              type: Statistic
              properties:
                value: 16
                suffix: px radius

- title: Warm Theme Tokens
