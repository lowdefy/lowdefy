- title: Basic Masonry Layout
  fullWidth: true
  blocks:
    - id: mas_basic
      type: Masonry
      properties:
        columns: 3
        gutter: 16
      blocks:
        - id: mas_basic_card1
          type: Card
          properties:
            title: Short Card
            size: small
          blocks:
            - id: mas_basic_card1_p
              type: Paragraph
              properties:
                content: A compact card in the masonry grid.
        - id: mas_basic_card2
          type: Card
          properties:
            title: Tall Card
            size: small
          blocks:
            - id: mas_basic_card2_p1
              type: Paragraph
              properties:
                content: This card has more content to demonstrate how masonry handles varying heights.
            - id: mas_basic_card2_p2
              type: Paragraph
              properties:
                content: The layout fills gaps efficiently by placing items in the shortest column.
        - id: mas_basic_card3
          type: Card
          properties:
            title: Medium Card
            size: small
          blocks:
            - id: mas_basic_card3_p
              type: Paragraph
              properties:
                content: Cards of different heights are arranged to minimize vertical gaps.
        - id: mas_basic_card4
          type: Card
          properties:
            title: Another Short Card
            size: small
          blocks:
            - id: mas_basic_card4_p
              type: Paragraph
              properties:
                content: Brief content here.
        - id: mas_basic_card5
          type: Card
          properties:
            title: Extra Tall Card
            size: small
          blocks:
            - id: mas_basic_card5_p1
              type: Paragraph
              properties:
                content: This card is the tallest in the grid.
            - id: mas_basic_card5_p2
              type: Paragraph
              properties:
                content: Multiple paragraphs increase its height.
            - id: mas_basic_card5_p3
              type: Paragraph
              properties:
                content: The masonry layout flows items around it naturally.
        - id: mas_basic_card6
          type: Card
          properties:
            title: Final Card
            size: small
          blocks:
            - id: mas_basic_card6_p
              type: Paragraph
              properties:
                content: Fills the remaining space in the grid.

- title: Column Count Variations
  fullWidth: true
  blocks:
    - id: mas_two_col
      type: Masonry
      properties:
        columns: 2
        gutter: 16
      blocks:
        - id: mas_two_col_card1
          type: Card
          properties:
            title: Two-Column Layout
            size: small
          blocks:
            - id: mas_two_col_card1_p
              type: Paragraph
              properties:
                content: A two-column masonry works well for medium-width containers and sidebar-like layouts.
        - id: mas_two_col_card2
          type: Card
          properties:
            title: Second Item
            size: small
          blocks:
            - id: mas_two_col_card2_p
              type: Paragraph
              properties:
                content: Each column fills independently, stacking items where there is the most available space.
            - id: mas_two_col_card2_p2
              type: Paragraph
              properties:
                content: Extra content to show height difference handling.
        - id: mas_two_col_card3
          type: Card
          properties:
            title: Third Item
            size: small
          blocks:
            - id: mas_two_col_card3_p
              type: Paragraph
              properties:
                content: Placed in the shortest column automatically.

- title: Responsive Columns
  fullWidth: true
  blocks:
    - id: mas_responsive
      type: Masonry
      properties:
        columns:
          xs: 1
          sm: 2
          md: 3
          lg: 4
        gutter: 16
      blocks:
        - id: mas_resp_c1
          type: Card
          properties:
            title: Responsive Item 1
            size: small
          blocks:
            - id: mas_resp_c1_p
              type: Paragraph
              properties:
                content: The columns property accepts a responsive breakpoint object. This grid shows 1 column on xs, 2 on sm, 3 on md, and 4 on lg screens.
        - id: mas_resp_c2
          type: Card
          properties:
            title: Responsive Item 2
            size: small
          blocks:
            - id: mas_resp_c2_p
              type: Paragraph
              properties:
                content: Resize the browser to see the column count change at each breakpoint.
        - id: mas_resp_c3
          type: Card
          properties:
            title: Responsive Item 3
            size: small
          blocks:
            - id: mas_resp_c3_p
              type: Paragraph
              properties:
                content: A shorter card to demonstrate responsive reflow.
        - id: mas_resp_c4
          type: Card
          properties:
            title: Responsive Item 4
            size: small
          blocks:
            - id: mas_resp_c4_p
              type: Paragraph
              properties:
                content: On large screens this appears in the fourth column. On mobile it stacks into a single column.

- title: Gutter as Number
  fullWidth: true
  blocks:
    - id: mas_gutter_num
      type: Masonry
      properties:
        columns: 3
        gutter: 32
      blocks:
        - id: mas_gutter_num_c1
          type: Card
          properties:
            title: Wide Gap
            size: small
          blocks:
            - id: mas_gutter_num_c1_p
              type: Paragraph
              properties:
                content: A single number for gutter applies the same spacing both horizontally and vertically (32px here).
        - id: mas_gutter_num_c2
          type: Card
          properties:
            title: Spacious
            size: small
          blocks:
            - id: mas_gutter_num_c2_p
              type: Paragraph
              properties:
                content: Larger gutter values create a more open, airy layout between items.
        - id: mas_gutter_num_c3
          type: Card
          properties:
            title: Uniform
            size: small
          blocks:
            - id: mas_gutter_num_c3_p
              type: Paragraph
              properties:
                content: The spacing is equal in both directions.

- title: Horizontal and Vertical Gutter
  fullWidth: true
  blocks:
    - id: mas_hv_gutter
      type: Masonry
      properties:
        columns: 3
        gutter:
          - 32
          - 8
      blocks:
        - id: mas_hv_c1
          type: Card
          properties:
            title: Wide Horizontal Gap
            size: small
          blocks:
            - id: mas_hv_c1_p
              type: Paragraph
              properties:
                content: The gutter array sets horizontal (32px) and vertical (8px) spacing independently.
        - id: mas_hv_c2
          type: Card
          properties:
            title: Compact Vertical
            size: small
          blocks:
            - id: mas_hv_c2_p
              type: Paragraph
              properties:
                content: Vertical gaps are tighter at 8px while columns are spaced at 32px.
        - id: mas_hv_c3
          type: Card
          properties:
            title: Mixed Spacing
            size: small
          blocks:
            - id: mas_hv_c3_p
              type: Paragraph
              properties:
                content: This creates a layout with distinct horizontal and vertical rhythm.
        - id: mas_hv_c4
          type: Card
          properties:
            title: Fourth Item
            size: small
          blocks:
            - id: mas_hv_c4_p
              type: Paragraph
              properties:
                content: Notice how items are tightly stacked vertically but have generous horizontal spacing.

- title: Sequential Rendering
  fullWidth: true
  blocks:
    - id: mas_sequential
      type: Masonry
      properties:
        columns: 3
        gutter: 16
        sequential: true
      blocks:
        - id: mas_seq_c1
          type: Card
          properties:
            title: Item 1
            size: small
          blocks:
            - id: mas_seq_c1_p
              type: Paragraph
              properties:
                content: Sequential mode renders items in order rather than optimizing for shortest column.
        - id: mas_seq_c2
          type: Card
          properties:
            title: Item 2
            size: small
          blocks:
            - id: mas_seq_c2_p
              type: Paragraph
              properties:
                content: This preserves the source order of items across columns.
        - id: mas_seq_c3
          type: Card
          properties:
            title: Item 3
            size: small
          blocks:
            - id: mas_seq_c3_p
              type: Paragraph
              properties:
                content: Useful when display order matters more than visual compactness.
        - id: mas_seq_c4
          type: Card
          properties:
            title: Item 4
            size: small
          blocks:
            - id: mas_seq_c4_p
              type: Paragraph
              properties:
                content: Items flow left to right, then wrap to the next row.
        - id: mas_seq_c5
          type: Card
          properties:
            title: Item 5
            size: small
          blocks:
            - id: mas_seq_c5_p
              type: Paragraph
              properties:
                content: Maintaining order for numbered or chronological content.
            - id: mas_seq_c5_p2
              type: Paragraph
              properties:
                content: This item has extra content to show that sequential ordering is preserved regardless of height.

- title: Theme Token Overrides
  fullWidth: true
  blocks:
    - id: mas_theme_colors
      type: Masonry
      properties:
        columns: 3
        gutter: 16
        theme:
          colorBgContainer: '#f0f5ff'
          colorBorderSecondary: '#adc6ff'
          borderRadiusLG: 16
      blocks:
        - id: mas_theme_c1
          type: Card
          properties:
            title: Themed Item 1
            size: small
          blocks:
            - id: mas_theme_c1_p
              type: Paragraph
              properties:
                content: The theme property passes antd design token overrides to the Masonry block and its children. Here we use a blue-tinted background.
        - id: mas_theme_c2
          type: Card
          properties:
            title: Themed Item 2
            size: small
          blocks:
            - id: mas_theme_c2_p
              type: Paragraph
              properties:
                content: Token overrides cascade to child blocks like these Cards, applying consistent colors and border radius.
        - id: mas_theme_c3
          type: Card
          properties:
            title: Themed Item 3
            size: small
          blocks:
            - id: mas_theme_c3_p
              type: Paragraph
              properties:
                content: The borderRadiusLG token gives all cards extra-rounded corners within this masonry grid.

    - id: mas_theme_warm
      type: Masonry
      properties:
        columns: 2
        gutter: 16
        theme:
          colorBgContainer: '#fffbe6'
          colorBorderSecondary: '#ffd591'
          colorTextHeading: '#d46b08'
          colorText: '#874d00'
      blocks:
        - id: mas_theme_warm_c1
          type: Card
          properties:
            title: Warm Theme
            size: small
          blocks:
            - id: mas_theme_warm_c1_p
              type: Paragraph
              properties:
                content: A warm-toned masonry grid using orange and gold design tokens for a distinct visual style.
        - id: mas_theme_warm_c2
          type: Card
          properties:
            title: Consistent Palette
            size: small
          blocks:
            - id: mas_theme_warm_c2_p
              type: Paragraph
              properties:
                content: All children inherit the color overrides, keeping text, borders, and backgrounds harmonized.

- title: Styled Masonry (Tailwind CSS)
  fullWidth: true
  blocks:
    - id: mas_styled_bg
      type: Masonry
      class:
        element: bg-gray-100 p-6 rounded-xl
      properties:
        columns: 3
        gutter: 16
      blocks:
        - id: mas_styled_bg_c1
          type: Card
          properties:
            title: Styled Container
            size: small
          blocks:
            - id: mas_styled_bg_c1_p
              type: Paragraph
              properties:
                content: The element CSS key targets the Masonry wrapper. Here we add a gray background, padding, and rounded corners using Tailwind classes.
        - id: mas_styled_bg_c2
          type: Card
          properties:
            title: Contrast Effect
            size: small
          blocks:
            - id: mas_styled_bg_c2_p
              type: Paragraph
              properties:
                content: White cards against a gray background create a clear visual separation between the grid and surrounding content.
        - id: mas_styled_bg_c3
          type: Card
          properties:
            title: Third Item
            size: small
          blocks:
            - id: mas_styled_bg_c3_p
              type: Paragraph
              properties:
                content: The padding on the masonry element adds internal margin around the entire grid.

    - id: mas_styled_border
      type: Masonry
      class:
        element: border-2 border-dashed border-blue-300 p-4 rounded-lg
      properties:
        columns: 2
        gutter: 12
      blocks:
        - id: mas_styled_border_c1
          type: Card
          properties:
            title: Bordered Grid
            size: small
          blocks:
            - id: mas_styled_border_c1_p
              type: Paragraph
              properties:
                content: A dashed border around the masonry element makes the grid boundary visible, useful for debugging layouts.
        - id: mas_styled_border_c2
          type: Card
          properties:
            title: Debug View
            size: small
          blocks:
            - id: mas_styled_border_c2_p
              type: Paragraph
              properties:
                content: Combine border, padding, and background classes on the element key for full control over the masonry container.

