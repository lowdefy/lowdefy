- title: Basic Masonry (3 Columns)
  fullWidth: true
  blocks:
    - id: mas_basic
      type: Masonry
      properties:
        columns: 3
        gutter: 16
      blocks:
        - id: mas_basic_card1
          type: Card
          properties:
            title: Short Card
            size: small
          blocks:
            - id: mas_basic_card1_p
              type: Paragraph
              properties:
                content: A compact card in the masonry grid.
        - id: mas_basic_card2
          type: Card
          properties:
            title: Tall Card
            size: small
          blocks:
            - id: mas_basic_card2_p1
              type: Paragraph
              properties:
                content: This card has more content to demonstrate how masonry handles varying heights.
            - id: mas_basic_card2_p2
              type: Paragraph
              properties:
                content: The layout fills gaps efficiently by placing items in the shortest column.
        - id: mas_basic_card3
          type: Card
          properties:
            title: Medium Card
            size: small
          blocks:
            - id: mas_basic_card3_p
              type: Paragraph
              properties:
                content: Cards of different heights are arranged to minimize vertical gaps.
        - id: mas_basic_card4
          type: Card
          properties:
            title: Another Short Card
            size: small
          blocks:
            - id: mas_basic_card4_p
              type: Paragraph
              properties:
                content: Brief content here.
        - id: mas_basic_card5
          type: Card
          properties:
            title: Extra Tall Card
            size: small
          blocks:
            - id: mas_basic_card5_p1
              type: Paragraph
              properties:
                content: This card is the tallest in the grid.
            - id: mas_basic_card5_p2
              type: Paragraph
              properties:
                content: Multiple paragraphs increase its height.
            - id: mas_basic_card5_p3
              type: Paragraph
              properties:
                content: The masonry layout flows items around it naturally.
        - id: mas_basic_card6
          type: Card
          properties:
            title: Final Card
            size: small
          blocks:
            - id: mas_basic_card6_p
              type: Paragraph
              properties:
                content: Fills the remaining space in the grid.

- title: Two Columns
  fullWidth: true
  blocks:
    - id: mas_two_col
      type: Masonry
      properties:
        columns: 2
        gutter: 16
      blocks:
        - id: mas_two_col_card1
          type: Card
          properties:
            title: Project Alpha
            size: small
          blocks:
            - id: mas_two_col_card1_p
              type: Paragraph
              properties:
                content: A two-column masonry layout works well for medium-width containers.
            - id: mas_two_col_card1_tag
              type: Tag
              properties:
                title: Active
                color: success
        - id: mas_two_col_card2
          type: Card
          properties:
            title: Project Beta
            size: small
          blocks:
            - id: mas_two_col_card2_p
              type: Paragraph
              properties:
                content: Each column fills independently, stacking items where there is the most available space.
        - id: mas_two_col_card3
          type: Card
          properties:
            title: Project Gamma
            size: small
          blocks:
            - id: mas_two_col_card3_p
              type: Paragraph
              properties:
                content: Short description.
            - id: mas_two_col_card3_tag
              type: Tag
              properties:
                title: Completed
                color: default
        - id: mas_two_col_card4
          type: Card
          properties:
            title: Project Delta
            size: small
          blocks:
            - id: mas_two_col_card4_p
              type: Paragraph
              properties:
                content: The final item in this two-column masonry grid.

- title: Four Columns with Large Gutter
  fullWidth: true
  blocks:
    - id: mas_four_col
      type: Masonry
      properties:
        columns: 4
        gutter: 24
      blocks:
        - id: mas_four_col_c1
          type: Card
          properties:
            size: small
            hoverable: true
          blocks:
            - id: mas_four_col_c1_stat
              type: Statistic
              properties:
                title: Users
                value: 1248
        - id: mas_four_col_c2
          type: Card
          properties:
            size: small
            hoverable: true
          blocks:
            - id: mas_four_col_c2_stat
              type: Statistic
              properties:
                title: Revenue
                value: 48650
                prefix: $
            - id: mas_four_col_c2_tag
              type: Tag
              properties:
                title: +12%
                color: success
        - id: mas_four_col_c3
          type: Card
          properties:
            size: small
            hoverable: true
          blocks:
            - id: mas_four_col_c3_stat
              type: Statistic
              properties:
                title: Tasks
                value: 37
        - id: mas_four_col_c4
          type: Card
          properties:
            size: small
            hoverable: true
          blocks:
            - id: mas_four_col_c4_stat
              type: Statistic
              properties:
                title: Uptime
                value: 99.9
                suffix: '%'
            - id: mas_four_col_c4_progress
              type: Progress
              properties:
                percent: 99.9

- title: Horizontal and Vertical Gutter
  fullWidth: true
  blocks:
    - id: mas_hv_gutter
      type: Masonry
      properties:
        columns: 3
        gutter:
          - 24
          - 12
      blocks:
        - id: mas_hv_c1
          type: Card
          properties:
            title: Wide Horizontal Gap
            size: small
          blocks:
            - id: mas_hv_c1_p
              type: Paragraph
              properties:
                content: The gutter array sets horizontal (24px) and vertical (12px) spacing independently.
        - id: mas_hv_c2
          type: Card
          properties:
            title: Compact Vertical
            size: small
          blocks:
            - id: mas_hv_c2_p
              type: Paragraph
              properties:
                content: Vertical gaps are tighter at 12px while columns are spaced at 24px.
        - id: mas_hv_c3
          type: Card
          properties:
            title: Mixed Spacing
            size: small
          blocks:
            - id: mas_hv_c3_p
              type: Paragraph
              properties:
                content: This creates a layout with distinct horizontal and vertical rhythm.

- title: Sequential Rendering
  fullWidth: true
  blocks:
    - id: mas_sequential
      type: Masonry
      properties:
        columns: 3
        gutter: 16
        sequential: true
      blocks:
        - id: mas_seq_c1
          type: Card
          properties:
            title: Item 1
            size: small
          blocks:
            - id: mas_seq_c1_p
              type: Paragraph
              properties:
                content: Sequential mode renders items in order rather than optimizing for shortest column.
        - id: mas_seq_c2
          type: Card
          properties:
            title: Item 2
            size: small
          blocks:
            - id: mas_seq_c2_p
              type: Paragraph
              properties:
                content: This preserves the source order of items across columns.
        - id: mas_seq_c3
          type: Card
          properties:
            title: Item 3
            size: small
          blocks:
            - id: mas_seq_c3_p
              type: Paragraph
              properties:
                content: Useful when display order matters more than visual compactness.
        - id: mas_seq_c4
          type: Card
          properties:
            title: Item 4
            size: small
          blocks:
            - id: mas_seq_c4_p
              type: Paragraph
              properties:
                content: Items flow left to right, then wrap to the next row.
        - id: mas_seq_c5
          type: Card
          properties:
            title: Item 5
            size: small
          blocks:
            - id: mas_seq_c5_p
              type: Paragraph
              properties:
                content: Maintaining order for numbered or chronological content.
        - id: mas_seq_c6
          type: Card
          properties:
            title: Item 6
            size: small
          blocks:
            - id: mas_seq_c6_p
              type: Paragraph
              properties:
                content: The sixth and final item in sequential order.
