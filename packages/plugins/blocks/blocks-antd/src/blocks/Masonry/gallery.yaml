- title: Tailwind Styled Container
  blocks:
    - id: mas_tw
      type: Masonry
      class:
        element: bg-gray-100 p-6 rounded-xl
      properties:
        columns: 2
        gutter: 12
      blocks:
        - id: mas_tw_c1
          type: Card
          properties:
            size: small
            title: Gray Background
          blocks:
            - id: mas_tw_c1_p
              type: Paragraph
              properties:
                content: Tailwind classes on the element CSS key style the Masonry wrapper.
        - id: mas_tw_c2
          type: Card
          properties:
            size: small
            title: Contrast
          blocks:
            - id: mas_tw_c2_p
              type: Paragraph
              properties:
                content: White cards against gray create visual separation.

- title: Slow Motion Tokens
  blocks:
    - id: mas_motion
      type: Masonry
      properties:
        columns: 2
        gutter: 12
        theme:
          motionDurationSlow: '2s'
          motionDurationFast: '1s'
          motionEaseOut: ease-in-out
      blocks:
        - id: mas_motion_c1
          type: Card
          properties:
            size: small
            title: 2s Transitions
          blocks:
            - id: mas_motion_c1_p
              type: Paragraph
              properties:
                content: Resize browser to see slow item repositioning.
        - id: mas_motion_c2
          type: Card
          properties:
            size: small
            title: Custom Easing
          blocks:
            - id: mas_motion_c2_p
              type: Paragraph
              properties:
                content: ease-in-out instead of the default cubic-bezier.

