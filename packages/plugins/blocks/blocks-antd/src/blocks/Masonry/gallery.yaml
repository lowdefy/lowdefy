- title: 3 Columns (Default)
  blocks:
    - id: mas_3col
      type: Masonry
      properties:
        columns: 3
        gutter: 12
      blocks:
        - id: mas_3col_c1
          type: Card
          properties:
            size: small
            title: Revenue
          blocks:
            - id: mas_3col_c1_stat
              type: Statistic
              properties:
                value: 128450
                prefix: $
        - id: mas_3col_c2
          type: Card
          properties:
            size: small
            title: Active Users
          blocks:
            - id: mas_3col_c2_stat
              type: Statistic
              properties:
                value: 3842
            - id: mas_3col_c2_p
              type: Paragraph
              properties:
                content: '<span style="color:#52c41a">+12.5%</span> vs last month'
        - id: mas_3col_c3
          type: Card
          properties:
            size: small
            title: Uptime
          blocks:
            - id: mas_3col_c3_stat
              type: Statistic
              properties:
                value: 99.97
                suffix: '%'
        - id: mas_3col_c4
          type: Card
          properties:
            size: small
            title: Top Region
          blocks:
            - id: mas_3col_c4_tags
              type: Box
              layout:
                gap: 8
                wrap: wrap
              blocks:
                - id: mas_3col_c4_t1
                  type: Tag
                  properties:
                    title: North America
                    color: blue
                - id: mas_3col_c4_t2
                  type: Tag
                  properties:
                    title: Europe
                    color: green
                - id: mas_3col_c4_t3
                  type: Tag
                  properties:
                    title: Asia Pacific
                    color: orange
        - id: mas_3col_c5
          type: Card
          properties:
            size: small
            title: Conversion Rate
          blocks:
            - id: mas_3col_c5_stat
              type: Statistic
              properties:
                value: 4.2
                suffix: '%'
            - id: mas_3col_c5_p1
              type: Paragraph
              properties:
                content: Target is 5%. Campaigns are underperforming in APAC.
            - id: mas_3col_c5_p2
              type: Progress
              properties:
                percent: 84

- title: 2 Columns
  blocks:
    - id: mas_2col
      type: Masonry
      properties:
        columns: 2
        gutter: 12
      blocks:
        - id: mas_2col_c1
          type: Card
          properties:
            size: small
            title: Notifications
          blocks:
            - id: mas_2col_c1_alert
              type: Alert
              properties:
                type: success
                showIcon: true
                message: Deployment completed
            - id: mas_2col_c1_alert2
              type: Alert
              properties:
                type: warning
                showIcon: true
                message: Disk usage at 85%
        - id: mas_2col_c2
          type: Card
          properties:
            size: small
            title: Quick Stats
          blocks:
            - id: mas_2col_c2_stat
              type: Statistic
              properties:
                value: 1024
                suffix: requests/s

- title: Responsive Columns
  blocks:
    - id: mas_resp
      type: Masonry
      properties:
        columns:
          xs: 1
          sm: 2
          md: 3
        gutter: 12
      blocks:
        - id: mas_resp_c1
          type: Card
          properties:
            size: small
            title: xs:1 sm:2 md:3
          blocks:
            - id: mas_resp_c1_p
              type: Paragraph
              properties:
                content: Resize browser to see columns change at each breakpoint.
        - id: mas_resp_c2
          type: Card
          properties:
            size: small
            title: Responsive
          blocks:
            - id: mas_resp_c2_stat
              type: Statistic
              properties:
                value: 3
                suffix: breakpoints
        - id: mas_resp_c3
          type: Card
          properties:
            size: small
            title: Mobile
          blocks:
            - id: mas_resp_c3_p
              type: Paragraph
              properties:
                content: Stacks to a single column on small screens.

- title: Wide Gutter (32px)
  blocks:
    - id: mas_gutter
      type: Masonry
      properties:
        columns: 2
        gutter: 32
      blocks:
        - id: mas_gutter_c1
          type: Card
          properties:
            size: small
            title: Spacious
          blocks:
            - id: mas_gutter_c1_p
              type: Paragraph
              properties:
                content: 32px gap between items in both directions.
        - id: mas_gutter_c2
          type: Card
          properties:
            size: small
            title: Airy Layout
          blocks:
            - id: mas_gutter_c2_stat
              type: Statistic
              properties:
                value: 32
                suffix: px

- title: Mixed Gutter [32, 8]
  blocks:
    - id: mas_hv
      type: Masonry
      properties:
        columns: 2
        gutter:
          - 32
          - 8
      blocks:
        - id: mas_hv_c1
          type: Card
          properties:
            size: small
            title: Wide Horizontal
          blocks:
            - id: mas_hv_c1_p
              type: Paragraph
              properties:
                content: 32px horizontal, 8px vertical. Compact rows, wide columns.
        - id: mas_hv_c2
          type: Card
          properties:
            size: small
            title: Tight Vertical
          blocks:
            - id: mas_hv_c2_stat
              type: Statistic
              properties:
                value: 8
                suffix: px vertical
        - id: mas_hv_c3
          type: Card
          properties:
            size: small
            title: Third
          blocks:
            - id: mas_hv_c3_p
              type: Paragraph
              properties:
                content: Notice the asymmetric spacing.

- title: Sequential Rendering
  blocks:
    - id: mas_seq
      type: Masonry
      properties:
        columns: 3
        gutter: 12
        sequential: true
      blocks:
        - id: mas_seq_c1
          type: Card
          properties:
            size: small
            title: '1'
          blocks:
            - id: mas_seq_c1_p
              type: Paragraph
              properties:
                content: Items fill left-to-right in source order instead of shortest column.
        - id: mas_seq_c2
          type: Card
          properties:
            size: small
            title: '2'
          blocks:
            - id: mas_seq_c2_p
              type: Paragraph
              properties:
                content: Second item.
        - id: mas_seq_c3
          type: Card
          properties:
            size: small
            title: '3'
          blocks:
            - id: mas_seq_c3_p
              type: Paragraph
              properties:
                content: Third item.
            - id: mas_seq_c3_p2
              type: Paragraph
              properties:
                content: Taller card — order still preserved.

- title: Blue Theme Tokens
  blocks:
