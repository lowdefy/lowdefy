id: masonry_block
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: masonry_basic
    type: Masonry
    properties:
      columns: 3
      gutter: 16
    blocks:
      - id: masonry_card_1
        type: Card
        properties:
          title: Card 1
        blocks:
          - id: masonry_card_1_text
            type: Paragraph
            properties:
              content: Short text content.
      - id: masonry_card_2
        type: Card
        properties:
          title: Card 2
        blocks:
          - id: masonry_card_2_text
            type: Paragraph
            properties:
              content: This card has a bit more content to make it taller than the others.
      - id: masonry_card_3
        type: Card
        properties:
          title: Card 3
        blocks:
          - id: masonry_card_3_text
            type: Paragraph
            properties:
              content: Medium length content here.
      - id: masonry_card_4
        type: Card
        properties:
          title: Card 4
        blocks:
          - id: masonry_card_4_text
            type: Paragraph
            properties:
              content: Another card with some text.
      - id: masonry_card_5
        type: Card
        properties:
          title: Card 5
        blocks:
          - id: masonry_card_5_text
            type: Paragraph
            properties:
              content: Fifth card content.
      - id: masonry_card_6
        type: Card
        properties:
          title: Card 6
        blocks:
          - id: masonry_card_6_text
            type: Paragraph
            properties:
              content: Last card in the masonry layout with varying content length.

  # ============================================
  # TWO COLUMN
  # ============================================

  - id: masonry_two_col
    type: Masonry
    properties:
      columns: 2
    blocks:
      - id: masonry_two_card_1
        type: Card
        properties:
          title: Two Col Card 1
        blocks:
          - id: masonry_two_card_1_text
            type: Paragraph
            properties:
              content: First card in two column layout.
      - id: masonry_two_card_2
        type: Card
        properties:
          title: Two Col Card 2
        blocks:
          - id: masonry_two_card_2_text
            type: Paragraph
            properties:
              content: Second card.
      - id: masonry_two_card_3
        type: Card
        properties:
          title: Two Col Card 3
        blocks:
          - id: masonry_two_card_3_text
            type: Paragraph
            properties:
              content: Third card.
      - id: masonry_two_card_4
        type: Card
        properties:
          title: Two Col Card 4
        blocks:
          - id: masonry_two_card_4_text
            type: Paragraph
            properties:
              content: Fourth card in two column layout.
