- id: default
  type: Masonry
- id: 'properties.columns: 3'
  type: Masonry
  properties:
    columns: 3
- id: properties.columns responsive
  type: Masonry
  properties:
    columns:
      xs: 1
      sm: 2
      md: 3
      lg: 4
- id: 'properties.gutter: 16'
  type: Masonry
  properties:
    gutter: 16
- id: properties.gutter array
  type: Masonry
  properties:
    gutter:
      - 16
      - 24
- id: 'properties.sequential: true'
  type: Masonry
  properties:
    sequential: true
