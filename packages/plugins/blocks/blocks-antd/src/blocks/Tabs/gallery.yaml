        dk_third:
          blocks:
            - id: dk_third_content
              type: Paragraph
              properties:
                content: This is the third tab with regular content.

- title: Extra Content in Tab Bar
  blocks:
    - id: extra_tabs
      type: Tabs
      properties:
        extraAreaKey: extra_area
        tabs:
          - key: extra_documents
            title: Documents
          - key: extra_images
            title: Images
