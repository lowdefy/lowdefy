- title: With Icons
  blocks:
    - id: icon_tabs
      type: Tabs
      properties:
        tabs:
          - key: icon_home
            title: Home
            icon: AiOutlineHome
          - key: icon_users
            title: Users
            icon: AiOutlineTeam
          - key: icon_settings
            title: Settings
            icon: AiOutlineSetting
          - key: icon_chart
            title: Analytics
            icon: AiOutlineBarChart
      slots:
        icon_home:
          blocks:
            - id: icon_home_content
              type: Paragraph
              properties:
                content: Welcome to the dashboard. Here you can view recent activity, quick statistics, and announcements from your team.
        icon_users:
          blocks:
            - id: icon_users_desc
              type: Descriptions
              properties:
                bordered: true
                size: small
                items:
                  - label: Total Members
                    value: '24'
                  - label: Active Now
                    value: '8'
                  - label: Pending Invites
                    value: '3'
        icon_settings:
          blocks:
            - id: icon_settings_content
              type: Paragraph
              properties:
                content: Application configuration, theme settings, and advanced options. Changes take effect immediately.
        icon_chart:
          blocks:
            - id: icon_chart_progress
              type: Progress
              properties:
                percent: 85
                status: active
            - id: icon_chart_note
              type: Paragraph
              properties:
                content: Monthly target progress at 85%. On track for completion by end of quarter.

- title: Custom Icon Properties
  blocks:
    - id: custom_icon_tabs
      type: Tabs
      properties:
        tabs:
          - key: ci_success
            title: Passed
            icon:
              name: AiOutlineCheckCircle
              color: '#52c41a'
          - key: ci_warning
            title: Warnings
            icon:
              name: AiOutlineWarning
              color: '#faad14'
          - key: ci_error
            title: Failed
            icon:
              name: AiOutlineCloseCircle
              color: '#ff4d4f'
      slots:
        ci_success:
          blocks:
            - id: ci_success_result
              type: Result
              properties:
                status: success
                title: All Tests Passed
                subTitle: 142 tests completed successfully in 4.2 seconds.
        ci_warning:
          blocks:
            - id: ci_warning_alert
              type: Alert
              properties:
                message: 3 Deprecation Warnings
                description: Some test suites use deprecated assertion methods. Please update to the latest API.
                type: warning
                showIcon: true
        ci_error:
          blocks:
            - id: ci_error_result
              type: Result
              properties:
                status: error
                title: 2 Tests Failed
                subTitle: Check the error log below for details on the failing assertions.

- title: Disabled Tab
