      type: Markdown
      properties:
        content: '**Top (default):**'
    - id: pos_top_tabs
      type: Tabs
      properties:
        tabPlacement: top
        tabs:
          - key: pos_top_first
            title: First
          - key: pos_top_second
            title: Second
          - key: pos_top_third
            title: Third
      slots:
        pos_top_first:
          blocks:
            - id: pos_top_first_content
              type: Paragraph
              properties:
                content: Tabs positioned at the top are the most common layout, suitable for primary navigation within a section.
        pos_top_second:
          blocks:
            - id: pos_top_second_content
              type: Paragraph
              properties:
                content: This is the second tab in the top-positioned layout.
        pos_top_third:
          blocks:
            - id: pos_top_third_content
              type: Paragraph
              properties:
                content: This is the third tab in the top-positioned layout.
    - id: pos_bottom_label
      type: Markdown
      properties:
        content: '**Bottom:**'
    - id: pos_bottom_tabs
      type: Tabs
      properties:
        tabPlacement: bottom
        tabs:
