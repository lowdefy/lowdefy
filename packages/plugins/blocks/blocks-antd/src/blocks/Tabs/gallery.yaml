          - key: dis_beta
            title: Beta
          - key: dis_locked
            title: Locked
            disabled: true
      slots:
        dis_active:
          blocks:
            - id: dis_active_content
              type: Paragraph
              properties:
                content: This tab is accessible and contains normal content. Users can freely navigate to this section.
        dis_coming_soon:
          blocks:
            - id: dis_coming_soon_content
              type: Paragraph
              properties:
                content: This content is not yet available. The tab is disabled to indicate an upcoming feature.
        dis_beta:
          blocks:
            - id: dis_beta_alert
              type: Alert
              properties:
                message: Beta Feature
                description: This feature is currently in beta. Some functionality may be incomplete or change without notice.
                type: info
                showIcon: true
        dis_locked:
          blocks:
            - id: dis_locked_content
              type: Paragraph
              properties:
                content: This section requires an upgraded subscription plan to access.

