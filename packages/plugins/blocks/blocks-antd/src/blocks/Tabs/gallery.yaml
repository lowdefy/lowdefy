                    value: March 2024
        lc_notifications:
          blocks:
            - id: lc_notif_content
              type: Paragraph
              properties:
                content: Configure which events trigger notifications. Choose between email, push, or in-app delivery for each category.
        lc_appearance:
          blocks:
            - id: lc_appearance_content
              type: Paragraph
              properties:
                content: Customize your visual preferences including theme mode, accent color, font size, and compact layout options.
        lc_privacy:
          blocks:
            - id: lc_privacy_alert
              type: Alert
              properties:
                message: Privacy Settings
                description: Your profile is currently set to public. Other workspace members can see your name, avatar, and activity status.
                type: warning
                showIcon: true

- title: Animation Disabled
  blocks:
    - id: no_anim_tabs
      type: Tabs
      properties:
        animated: false
        tabs:
          - key: na_tab1
            title: No Animation 1
          - key: na_tab2
            title: No Animation 2
          - key: na_tab3
            title: No Animation 3
      slots:
        na_tab1:
          blocks:
            - id: na_tab1_content
              type: Paragraph
              properties:
                content: Tab content switches instantly without any transition animation. This can be useful for performance-sensitive interfaces or when animation feels distracting.
        na_tab2:
          blocks:
            - id: na_tab2_content
              type: Paragraph
              properties:
                content: The animated property is set to false, disabling both the ink bar animation and the content transition.
        na_tab3:
          blocks:
            - id: na_tab3_content
              type: Paragraph
              properties:
                content: Compare this with the other tab examples on this page to see the difference in transition behavior.

- title: CSS Style Customization
  blocks:
    - id: css_tabs
      type: Tabs
      properties:
        tabs:
          - key: css_overview
            title: Overview
          - key: css_details
            title: Details
          - key: css_contact
            title: Contact
      style:
        --element:
          background: '#f6f8fa'
          padding: 16px
          borderRadius: 8px
        --tabBar:
          marginBottom: 24px
        --tabPane:
          padding: 12px
      slots:
        css_overview:
          blocks:
            - id: css_overview_content
              type: Paragraph
              properties:
                content: This example demonstrates CSS customization using the style property. The element has a light gray background with rounded corners, and the tab bar has extra bottom margin.
        css_details:
          blocks:
            - id: css_details_content
              type: Paragraph
              properties:
                content: The tabBar, tabPane, and element CSS keys can be individually targeted. Each accepts standard CSS properties as an object.
        css_contact:
          blocks:
            - id: css_contact_content
              type: Paragraph
              properties:
                content: Use style.element to control the outer wrapper, style.tabBar for the navigation strip, and style.tabPane for each content panel.
    - id: css_dark_tabs
      type: Tabs
      properties:
        tabs:
          - key: cssd_code
            title: Code
          - key: cssd_output
            title: Output
          - key: cssd_logs
            title: Logs
      style:
        --element:
          background: '#1e1e2e'
          padding: 16px
          borderRadius: 8px
          color: '#cdd6f4'
        --tabBar:
          color: '#cdd6f4'
      slots:
        cssd_code:
          blocks:
            - id: cssd_code_content
              type: Paragraph
              properties:
                content: Dark-themed tabs using CSS overrides. Suitable for code editors, terminal views, or developer tool interfaces.
              style:
                --element:
                  color: '#cdd6f4'
        cssd_output:
          blocks:
            - id: cssd_output_content
              type: Paragraph
              properties:
                content: Output panel with matching dark theme. The element and tabBar CSS keys are styled together for a cohesive look.
              style:
                --element:
                  color: '#cdd6f4'
        cssd_logs:
          blocks:
            - id: cssd_logs_content
              type: Paragraph
              properties:
                content: Log viewer panel. Monospaced fonts and dark backgrounds reduce eye strain during extended debugging sessions.
              style:
                --element:
                  color: '#cdd6f4'
                  fontFamily: monospace

- title: Theme Token Overrides
  blocks:
    - id: theme_custom_colors
      type: Markdown
      properties:
        content: '**Custom ink bar and text colors:**'
    - id: theme_color_tabs
      type: Tabs
      properties:
        theme:
          inkBarColor: '#52c41a'
          itemSelectedColor: '#52c41a'
          itemHoverColor: '#73d13d'
          itemActiveColor: '#389e0d'
        tabs:
          - key: tc_plants
            title: Plants
          - key: tc_garden
            title: Garden
          - key: tc_harvest
            title: Harvest
      slots:
        tc_plants:
          blocks:
            - id: tc_plants_content
              type: Paragraph
              properties:
                content: The ink bar and selected tab text are green, overriding the default blue. Use inkBarColor, itemSelectedColor, itemHoverColor, and itemActiveColor tokens.
        tc_garden:
          blocks:
            - id: tc_garden_content
              type: Paragraph
              properties:
                content: The garden planner helps you organize plant spacing, sunlight needs, and watering schedules throughout the growing season.
        tc_harvest:
          blocks:
            - id: tc_harvest_content
              type: Paragraph
              properties:
                content: Track your harvest yields by week and compare against previous seasons to optimize your gardening strategy.
    - id: theme_card_label
      type: Markdown
      properties:
        content: '**Custom card tab appearance:**'
    - id: theme_card_tabs
      type: Tabs
      properties:
        tabType: card
        theme:
          cardBg: '#fff7e6'
          cardHeight: 48
          cardPadding: '12px 24px'
          cardGutter: 4
          itemSelectedColor: '#d46b08'
          itemColor: '#874d00'
        tabs:
          - key: tcd_recipes
            title: Recipes
          - key: tcd_favorites
            title: Favorites
          - key: tcd_recent
            title: Recent
      slots:
        tcd_recipes:
          blocks:
            - id: tcd_recipes_content
              type: Paragraph
              properties:
                content: Card tabs with a warm amber background and custom height. The cardBg, cardHeight, cardPadding, and cardGutter tokens control the card-type appearance.
        tcd_favorites:
          blocks:
            - id: tcd_favorites_content
              type: Paragraph
              properties:
                content: Your saved favorite recipes. Browse your curated collection of breakfast, lunch, and dinner ideas.
        tcd_recent:
          blocks:
            - id: tcd_recent_content
              type: Paragraph
              properties:
                content: Recently viewed recipes from the past 30 days. Quick access to dishes you have been exploring.
    - id: theme_spacing_label
      type: Markdown
      properties:
        content: '**Custom spacing and font size:**'
    - id: theme_spacing_tabs
      type: Tabs
      properties:
        theme:
          horizontalItemGutter: 48
          horizontalItemPadding: '16px 0'
          titleFontSize: 16
          inkBarColor: '#722ed1'
          itemSelectedColor: '#722ed1'
          itemHoverColor: '#9254de'
        tabs:
          - key: ts_intro
            title: Introduction
          - key: ts_chapters
            title: Chapters
          - key: ts_appendix
            title: Appendix
      slots:
        ts_intro:
          blocks:
            - id: ts_intro_content
              type: Paragraph
              properties:
                content: Wider spacing between tabs using horizontalItemGutter token set to 48px (default is 32px). The title font size is increased to 16px with a purple accent color.
        ts_chapters:
          blocks:
            - id: ts_chapters_content
              type: Paragraph
              properties:
                content: Chapter listing with spaced-out tab headers. The increased gutter gives each tab more visual breathing room.
        ts_appendix:
          blocks:
            - id: ts_appendix_content
              type: Paragraph
              properties:
                content: Supplementary materials and reference tables. The larger font size makes the tab labels easier to read at a glance.
    - id: theme_vertical_label
      type: Markdown
      properties:
        content: '**Custom vertical tab tokens:**'
    - id: theme_vertical_tabs
      type: Tabs
      properties:
        tabPlacement: left
        theme:
          verticalItemPadding: '12px 32px'
          verticalItemMargin: '8px 0 0 0'
          inkBarColor: '#eb2f96'
          itemSelectedColor: '#eb2f96'
          itemHoverColor: '#f759ab'
          titleFontSize: 15
        tabs:
          - key: tv_design
            title: Design
          - key: tv_develop
            title: Develop
          - key: tv_deploy
            title: Deploy
      slots:
        tv_design:
          blocks:
            - id: tv_design_content
              type: Paragraph
              properties:
                content: Vertical tabs with custom padding and pink accent. The verticalItemPadding and verticalItemMargin tokens control spacing in left/right tab layouts.
        tv_develop:
          blocks:
            - id: tv_develop_content
              type: Paragraph
              properties:
                content: Development phase with code reviews, testing, and continuous integration. The pink accent differentiates this tab set from others on the page.
        tv_deploy:
          blocks:
            - id: tv_deploy_content
              type: Paragraph
              properties:
                content: Deployment pipeline configuration. Preview environments, staging, and production release management.

- title: HTML in Tab Titles
  blocks:
    - id: html_tabs
      type: Tabs
      properties:
        tabs:
          - key: html_bold
            title: '<b>Important</b>'
          - key: html_badge
            title: 'Messages <sup style="color: #ff4d4f; font-size: 10px;">3</sup>'
          - key: html_colored
            title: '<span style="color: #52c41a;">Active</span>'
      slots:
        html_bold:
          blocks:
            - id: html_bold_content
              type: Paragraph
              properties:
                content: Tab titles support HTML content. The first tab title uses bold text via the b tag. This is useful for emphasizing key tabs.
        html_badge:
          blocks:
            - id: html_badge_content
              type: Paragraph
              properties:
                content: The second tab simulates a notification badge using a superscript element with red color. A lightweight alternative to separate badge components.
        html_colored:
          blocks:
            - id: html_colored_content
              type: Paragraph
              properties:
                content: The third tab uses an inline span with green color to indicate active status directly in the tab title.
