- title: Basic Tabs (Line)
  blocks:
    - id: basic_tabs
      type: Tabs
      properties:
        tabs:
          - key: profile
            title: Profile
          - key: settings
            title: Settings
          - key: billing
            title: Billing
      slots:
        profile:
          blocks:
            - id: basic_profile_title
              type: Title
              properties:
                content: Personal Information
                level: 4
            - id: basic_profile_content
              type: Paragraph
              properties:
                content: Manage your personal information, display name, and avatar. Changes are saved automatically across all your connected devices.
        settings:
          blocks:
            - id: basic_settings_title
              type: Title
              properties:
                content: Preferences
                level: 4
            - id: basic_settings_content
              type: Paragraph
              properties:
                content: Configure application preferences, notification settings, and keyboard shortcuts. These settings apply to your current workspace.
        billing:
          blocks:
            - id: basic_billing_title
              type: Title
              properties:
                content: Billing Details
                level: 4
            - id: basic_billing_content
              type: Paragraph
              properties:
                content: View your current plan, payment history, and update billing information. Your next invoice is scheduled for the first of next month.

- title: Card Type
  blocks:
    - id: card_tabs
      type: Tabs
      properties:
        tabType: card
        tabs:
          - key: overview
            title: Overview
          - key: analytics
            title: Analytics
          - key: reports
            title: Reports
          - key: exports
            title: Exports
      slots:
        overview:
          blocks:
            - id: card_overview_row
              type: Box
              layout:
                gap: 16
              blocks:
                - id: card_stat_users
                  type: Statistic
                  layout:
                    flex: 1 1 0
                  properties:
                    title: Active Users
                    value: 1284
                - id: card_stat_sessions
                  type: Statistic
                  layout:
                    flex: 1 1 0
                  properties:
                    title: Sessions Today
                    value: 3567
                - id: card_stat_revenue
                  type: Statistic
                  layout:
                    flex: 1 1 0
                  properties:
                    title: Revenue
                    value: 48250
                    prefix: $
            - id: card_overview_content
              type: Paragraph
              properties:
                content: Dashboard overview showing key metrics and recent activity for your project.
        analytics:
          blocks:
            - id: card_analytics_progress_label
              type: Paragraph
              properties:
                content: Conversion funnel progress for the current quarter.
            - id: card_analytics_progress
              type: Progress
              properties:
                percent: 72
                status: active
        reports:
          blocks:
            - id: card_reports_content
              type: Paragraph
              properties:
                content: Generate and download reports for weekly, monthly, and quarterly performance summaries. Select a date range to get started.
        exports:
          blocks:
            - id: card_exports_content
              type: Paragraph
              properties:
                content: Export your data in CSV, JSON, or PDF format. Scheduled exports run daily at midnight UTC.

- title: Tab Positions
  blocks:
