      slots:
        dk_first:
          blocks:
            - id: dk_first_content
              type: Paragraph
              properties:
                content: This is the first tab. It is not active by default because defaultActiveKey is set to the second tab.
        dk_second:
          blocks:
            - id: dk_second_content
              type: Alert
              properties:
                message: This tab is active by default
