            title: Sent
          - key: pos_bot_drafts
            title: Drafts
      slots:
        pos_bot_inbox:
          blocks:
            - id: pos_bot_inbox_content
              type: Paragraph
              properties:
                content: You have 12 unread messages. The most recent is from the engineering team regarding deployment schedules.
        pos_bot_sent:
          blocks:
            - id: pos_bot_sent_content
              type: Paragraph
              properties:
                content: Your last sent message was a project status update to the stakeholders group.
        pos_bot_drafts:
          blocks:
            - id: pos_bot_drafts_content
              type: Paragraph
              properties:
                content: You have 3 saved drafts including the quarterly review document and team feedback form.
    - id: pos_left_label
      type: Markdown
      properties:
        content: '**Left:**'
    - id: pos_left_tabs
      type: Tabs
      properties:
        tabPlacement: left
        tabs:
          - key: pos_left_general
            title: General
          - key: pos_left_security
            title: Security
          - key: pos_left_integrations
            title: Integrations
          - key: pos_left_api
            title: API Keys
      slots:
        pos_left_general:
          blocks:
            - id: pos_left_general_content
              type: Paragraph
              properties:
                content: General application settings including workspace name, default language, and timezone configuration.
        pos_left_security:
          blocks:
            - id: pos_left_security_content
              type: Paragraph
              properties:
                content: Two-factor authentication, session management, and login history for your account.
        pos_left_integrations:
          blocks:
            - id: pos_left_integrations_content
              type: Paragraph
              properties:
                content: Connect with third-party services like Slack, GitHub, Jira, and Google Workspace.
        pos_left_api:
          blocks:
            - id: pos_left_api_content
              type: Paragraph
              properties:
                content: Manage API keys for programmatic access. Create, revoke, and monitor usage of your tokens.
    - id: pos_right_label
      type: Markdown
      properties:
        content: '**Right:**'
    - id: pos_right_tabs
      type: Tabs
      properties:
        tabPlacement: right
        tabs:
          - key: pos_right_desc
            title: Description
          - key: pos_right_reviews
            title: Reviews
          - key: pos_right_shipping
            title: Shipping
      slots:
        pos_right_desc:
          blocks:
            - id: pos_right_desc_content
              type: Paragraph
              properties:
                content: Premium wireless headphones with active noise cancellation, 30-hour battery life, and comfortable over-ear design.
        pos_right_reviews:
          blocks:
            - id: pos_right_reviews_content
              type: Paragraph
              properties:
                content: 4.7 out of 5 stars based on 2,340 reviews. Customers praise the sound quality and battery life.
        pos_right_shipping:
          blocks:
            - id: pos_right_shipping_content
              type: Paragraph
              properties:
                content: Free standard shipping (3-5 business days). Express shipping available for $9.99 (1-2 business days).

