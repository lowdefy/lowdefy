- title: TitleInput in Document Editor
  blocks:
    - id: applied2_doc_editor_card
      type: Card
      properties:
        title: Document Editor
      blocks:
        - id: applied2_doc_title
          type: TitleInput
          properties:
            level: 2
            editable:
              tooltip: Click to rename this document
              maxLength: 80
            copyable: true
          events:
            onMount:
              - id: set_doc_title_default
                type: SetState
                params:
                  applied2_doc_title: Untitled Document
        - id: applied2_doc_status
          type: Selector
          properties:
            title: Status
            placeholder: Select document status...
            options:
              - label: Draft
                value: draft
              - label: In Review
                value: review
              - label: Approved
                value: approved
              - label: Published
                value: published
        - id: applied2_doc_category
          type: Selector
          properties:
            title: Category
            placeholder: Select category...
            options:
              - label: Technical Specification
                value: tech_spec
              - label: User Guide
                value: user_guide
              - label: Release Notes
                value: release_notes
              - label: Internal Memo
                value: memo
        - id: applied2_doc_save_btn
          type: Button
          properties:
            title: Save Document
            icon: AiOutlineSave
            type: primary
            size: large
            block: true
          events:
            onClick:
              - id: save_doc_action
                type: DisplayMessage
                params:
                  content: Document saved successfully.
                  duration: 3

- title: TitleInput in Blog Post Editor
  blocks:
    - id: applied3_blog_editor_card
      type: Card
      properties:
        title: Blog Post Editor
      blocks:
        - id: applied3_post_title
          type: TitleInput
          properties:
            level: 1
            editable:
              tooltip: Enter your blog post title
              maxLength: 120
            copyable: true
          events:
            onMount:
              - id: set_post_title_default
                type: SetState
                params:
                  applied3_post_title: Untitled Blog Post
        - id: applied3_post_content
          type: TextArea
          properties:
            title: Content
            placeholder: Write your blog post content here...
            autoSize:
              minRows: 6
              maxRows: 16
        - id: applied3_post_category
          type: Selector
          properties:
            title: Category
            placeholder: Select a category...
            options:
              - label: Technology
                value: technology
              - label: Design
                value: design
              - label: Business
                value: business
              - label: Lifestyle
                value: lifestyle
        - id: applied3_publish_btn
          type: Button
          properties:
            title: Publish Post
            icon: AiOutlineSend
            type: primary
            size: large
            block: true
          events:
            onClick:
              - id: publish_post_action
                type: DisplayMessage
                params:
                  content: Blog post published successfully.
                  duration: 3
