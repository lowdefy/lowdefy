- title: Ellipsis
  blocks:
    - id: ellipsis_boolean
      type: TitleInput
      properties:
        level: 3
        ellipsis: true
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_boolean: This is a very long editable title that should be truncated with an ellipsis when it overflows the available space in a single line of text content.
    - id: ellipsis_two_rows
      type: TitleInput
      properties:
        level: 4
        ellipsis:
          rows: 2
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_two_rows: This is an extremely long title text that demonstrates multi-row ellipsis truncation. When the content exceeds the specified number of rows it will be truncated and show an ellipsis indicator at the end of the visible text area.
    - id: ellipsis_three_rows_expandable
      type: TitleInput
      properties:
        level: 4
        ellipsis:
          rows: 3
          expandable: true
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_three_rows_expandable: This is a very long title that will be truncated after three rows. It demonstrates the expandable ellipsis feature which allows users to click to expand and see the full content of the title. This is useful for long headings that need to be visible on demand without taking up too much vertical space in the layout.
    - id: ellipsis_with_suffix
      type: TitleInput
      properties:
        level: 4
        ellipsis:
          rows: 1
          suffix: ' [more]'
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_with_suffix: This long title demonstrates the suffix feature of the ellipsis configuration where a custom suffix string appears at the truncation point instead of the default behavior.
    - id: ellipsis_expandable_with_suffix
      type: TitleInput
      properties:
        level: 4
        ellipsis:
          rows: 2
          expandable: true
          suffix: ' ...(click to expand)'
        editable: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              ellipsis_expandable_with_suffix: This title combines expandable and suffix options. Click to expand and see the full content. The suffix text appears at the end of the truncated text to provide a visual cue to the user.
