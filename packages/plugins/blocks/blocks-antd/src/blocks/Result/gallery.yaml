- title: Status Types
  blocks:
    - id: status_success
      type: Result
      properties:
        status: success
        title: Successfully Purchased Cloud Server
        subTitle: 'Order number: 2026-0342-8756-0028. Cloud server configuration takes 1-5 minutes, please wait.'
    - id: status_error
      type: Result
      properties:
        status: error
        title: Submission Failed
        subTitle: Please check and modify the following information before resubmitting.
    - id: status_info
      type: Result
      properties:
        status: info
        title: Your Operation Has Been Executed
        subTitle: We will review your request and respond within 24 hours.
    - id: status_warning
      type: Result
      properties:
        status: warning
        title: There Are Some Problems With Your Operation
        subTitle: Please review and correct the issues listed below before proceeding.

- title: HTTP Status Codes
  blocks:
    - id: http_404
      type: Result
      properties:
        status: '404'
        title: '404'
        subTitle: Sorry, the page you visited does not exist.
    - id: http_403
      type: Result
      properties:
        status: '403'
        title: '403'
        subTitle: Sorry, you are not authorized to access this page.
    - id: http_500
      type: Result
      properties:
        status: '500'
        title: '500'
        subTitle: Sorry, something went wrong on our server.

