- title: Style and CSS
  blocks:
    - id: styled_success_card
      type: Result
      class: bg-green-50 rounded-lg border border-green-200
      properties:
        status: success
        title: Environment Ready
        subTitle: Your staging environment has been provisioned and is ready for deployment.
    - id: styled_error_card
      type: Result
      class: bg-red-50 rounded-lg border border-red-200
      properties:
        status: error
        title: Build Failed
        subTitle: The CI pipeline encountered 3 errors during the build step. Check the logs for details.
    - id: styled_warning_card
      type: Result
      class: bg-amber-50 rounded-lg border border-amber-200
      properties:
        status: warning
        title: Rate Limit Approaching
        subTitle: You have used 85% of your monthly API quota. Consider upgrading your plan.
    - id: styled_info_card
      type: Result
      class: bg-blue-50 rounded-lg border border-blue-200
      properties:
        status: info
        title: New Features Available
        subTitle: Version 4.2 includes real-time collaboration and improved dashboard analytics.
    - id: styled_gradient
      type: Result
      class: bg-gradient-to-br from-indigo-50 to-purple-50 rounded-lg border border-indigo-100
      properties:
        status: success
        title: Welcome to Your Workspace
        subTitle: Your team workspace has been created. Invite members to get started.
        icon:
          name: AiOutlineTeam
          color: '#722ed1'
          size: 72
    - id: styled_dark
      type: Result
      class: bg-gray-900 rounded-lg
      style:
        --element:
          color: white
      properties:
        status: success
        title: Deployment Complete
        subTitle: All services are running on the latest version.

- title: Custom Inline Styles
  blocks:
    - id: inline_bordered
      type: Result
      properties:
        status: info
        title: Verification Required
        subTitle: Please verify your identity to continue. Check your email for the verification code.
      style:
        --element:
          border: 2px solid #1677ff
          borderRadius: 12px
          padding: 32px
    - id: inline_shadow
      type: Result
      properties:
        status: success
        title: Connected
        subTitle: Your database connection has been established successfully.
      style:
        --element:
          boxShadow: 0 4px 16px rgba(0, 0, 0, 0.08)
          borderRadius: 12px
          padding: 32px
    - id: inline_max_width
      type: Result
      properties:
        status: warning
        title: Storage Almost Full
        subTitle: You have used 9.2 GB of your 10 GB storage limit. Delete files or upgrade your plan.
      style:
        --element:
          maxWidth: 480px
          margin: 0 auto
          border: 1px solid #faad14
          borderRadius: 8px
          padding: 24px

