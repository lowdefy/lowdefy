                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Modify Details
                    color: default
                    variant: outlined
      blocks:
        - id: child_error_details
          type: Descriptions
          properties:
            title: Error Details
            bordered: true
            size: small
            column: 1
            items:
              - label: Field
                value: Email Address
              - label: Issue
                value: Invalid email format — must include @ symbol
              - label: Field
                value: Phone Number
              - label: Issue
                value: Phone number must be 10 digits
    - id: child_success
      type: Result
      properties:
        status: success
        title: Application Submitted
        subTitle: 'Reference: APP-2026-1234. We will review and respond within 3 business days.'
      slots:
        extra:
          blocks:
            - id: child_success_extra_row
              type: Box
              layout:
                gap: 8
                justify: center
              blocks:
                - id: child_success_dashboard_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Go to Dashboard
                    color: primary
                    variant: solid
                - id: child_success_track_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Track Application
                    color: default
                    variant: outlined
      blocks:
        - id: child_success_summary
          type: Descriptions
          properties:
            title: Submission Summary
            bordered: true
            size: small
            column: 1
            items:
              - label: Applicant
                value: Jane Smith
              - label: Submitted
                value: March 10, 2026 at 14:32
              - label: Type
                value: Business License Renewal
              - label: Status
                value: Under Review

