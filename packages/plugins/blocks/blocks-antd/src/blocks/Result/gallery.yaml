      type: Result
      properties:
        status: info
        subTitle: Your changes have been saved. No further action is required.
    - id: html_title
      type: Result
      properties:
        status: success
        title: '<b>Order</b> #ORD-2026-4455 <i>Confirmed</i>'
        subTitle: 'Estimated delivery: <b>March 15, 2026</b>. Track your package in the orders section.'
    - id: long_content
      type: Result
      properties:
        status: info
        title: System Maintenance Scheduled
        subTitle: Our platform will undergo scheduled maintenance on Saturday, March 15, 2026 from 02:00 to 06:00 UTC. During this window, the application may be intermittently unavailable. All data will be preserved and no action is required on your part. We apologize for any inconvenience.

