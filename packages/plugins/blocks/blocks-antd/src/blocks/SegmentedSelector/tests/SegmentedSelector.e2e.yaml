id: segmented_selector
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: seg_basic
    type: SegmentedSelector
    properties:
      label:
        disabled: true
      options:
        - Daily
        - Weekly
        - Monthly

  # ============================================
  # EVENT TESTS
  # ============================================

  - id: seg_change
    type: SegmentedSelector
    properties:
      label:
        disabled: true
      options:
        - Option A
        - Option B
    events:
      onChange:
        - id: set_seg_result
          type: SetState
          params:
            seg_result:
              _event: value

  - id: seg_change_display
    type: Paragraph
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: seg_result
              - null
          then:
            _state: seg_result
          else: ''

  # ============================================
  # DISABLED TEST
  # ============================================

  - id: seg_disabled
    type: SegmentedSelector
    properties:
      label:
        disabled: true
      disabled: true
      options:
        - X
        - Y

  # ============================================
  # SIZE TESTS
  # ============================================

  - id: seg_small
    type: SegmentedSelector
    properties:
      label:
        disabled: true
      size: small
      options:
        - S
        - M
        - L

  - id: seg_middle
    type: SegmentedSelector
    properties:
      label:
        disabled: true
      size: middle
      options:
        - S
        - M
        - L

  - id: seg_large
    type: SegmentedSelector
    properties:
      label:
        disabled: true
      size: large
      options:
        - S
        - M
        - L
