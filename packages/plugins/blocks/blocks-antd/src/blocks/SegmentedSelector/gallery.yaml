        options:
          - label: Overview
            value: overview
          - label: Details
            value: details
          - label: Logs
            value: logs
        theme:
          trackBg: '#1f1f1f'
          itemColor: '#ffffffa6'
          itemSelectedBg: '#177ddc'
          itemSelectedColor: '#ffffff'
          itemHoverColor: '#ffffffd9'
          itemHoverBg: '#ffffff1a'
    - id: theme_green
      type: SegmentedSelector
      properties:
        title: Green Theme
        options:
          - label: Approved
            value: approved
          - label: Pending
            value: pending
          - label: Rejected
            value: rejected
        theme:
          trackBg: '#f6ffed'
          itemSelectedBg: '#52c41a'
          itemSelectedColor: '#ffffff'
          itemHoverBg: '#b7eb8f80'
    - id: theme_purple
      type: SegmentedSelector
      properties:
        title: Purple Theme
        options:
          - label: Basic
            value: basic
          - label: Premium
            value: premium
          - label: Enterprise
            value: enterprise
        theme:
          trackBg: '#f9f0ff'
          itemSelectedBg: '#722ed1'
          itemSelectedColor: '#ffffff'
          itemHoverBg: '#d3adf780'
    - id: theme_round_dark
      type: SegmentedSelector
      properties:
        title: Round Dark Pill
        shape: round
        size: large
        options:
          - label: Light
            value: light
          - label: Dark
            value: dark
          - label: System
            value: system
        theme:
          trackBg: '#262626'
          itemColor: '#ffffffa6'
          itemSelectedBg: '#434343'
          itemSelectedColor: '#ffffff'
          itemHoverColor: '#ffffffd9'
          itemHoverBg: '#ffffff14'
          borderRadius: 40
          borderRadiusLG: 40
    - id: theme_block_gradient
      type: SegmentedSelector
      properties:
        title: Full Width Themed
        block: true
        options:
          - label: Dashboard
            value: dashboard
          - label: Projects
            value: projects
          - label: Tasks
            value: tasks
          - label: Calendar
            value: calendar
        theme:
          trackBg: '#f0f5ff'
          itemSelectedBg: '#2f54eb'
          itemSelectedColor: '#ffffff'
          itemHoverBg: '#adc6ff80'
          trackPadding: 4

- title: SegmentedSelector in Dashboard View
  blocks:
    - id: applied2_dashboard_card
      type: Card
      properties:
        title: Sales Dashboard
      blocks:
        - id: applied2_dashboard_view_toggle
          type: SegmentedSelector
          properties:
            title: View
            block: true
            size: large
            label:
              disabled: true
            options:
              - label: Overview
                value: overview
                icon: AiOutlineDashboard
              - label: Charts
                value: charts
                icon: AiOutlineBarChart
              - label: Table
                value: table
                icon: AiOutlineTable
          events:
            onChange:
              - id: view_changed_action
                type: SetState
                params:
                  applied2_dashboard_view: _state: applied2_dashboard_view_toggle
        - id: applied2_dashboard_date_range
          type: DateRangeSelector
          properties:
            title: Date Range
            placeholder:
              - From
              - To
            format: DD MMM YYYY
            label:
              disabled: true
        - id: applied2_dashboard_refresh_btn
          type: Button
          properties:
            title: Refresh Data
            icon: AiOutlineReload
            type: primary
          events:
            onClick:
              - id: refresh_action
                type: DisplayMessage
                params:
                  content: Dashboard data refreshed.
                  duration: 2

- title: SegmentedSelector in Settings Page
  blocks:
    - id: applied3_settings_card
      type: Card
      properties:
        title: Application Settings
      blocks:
        - id: applied3_theme_selector
          type: SegmentedSelector
          properties:
            title: Theme
            block: true
            options:
              - label: Light
                value: light
                icon: AiOutlineBulb
              - label: Dark
                value: dark
                icon: AiOutlineEyeInvisible
              - label: System
                value: system
                icon: AiOutlineLaptop
          events:
            onChange:
              - id: theme_changed_action
                type: SetState
                params:
                  applied3_theme: _state: applied3_theme_selector
        - id: applied3_language_selector
          type: SegmentedSelector
          properties:
            title: Language
            options:
              - label: English
                value: en
              - label: French
                value: fr
              - label: German
                value: de
          events:
            onChange:
              - id: language_changed_action
                type: SetState
                params:
                  applied3_language: _state: applied3_language_selector
        - id: applied3_notifications_toggle
          type: SegmentedSelector
          properties:
            title: Notifications
            options:
              - label: All
                value: all
              - label: Important
                value: important
              - label: None
                value: none
          events:
            onChange:
              - id: notifications_changed_action
                type: SetState
                params:
                  applied3_notifications: _state: applied3_notifications_toggle
        - id: applied3_save_btn
          type: Button
          properties:
            title: Save Settings
            icon: AiOutlineSave
            type: primary
          events:
            onClick:
              - id: save_settings_action
                type: DisplayMessage
                params:
                  content: Settings saved successfully.
                  duration: 2
