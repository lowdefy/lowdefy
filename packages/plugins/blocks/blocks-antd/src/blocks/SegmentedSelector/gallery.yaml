- title: Basic String Options
  blocks:
    - id: basic_strings
      type: SegmentedSelector
      properties:
        title: View
        options:
          - Daily
          - Weekly
          - Monthly
    - id: basic_numbers
      type: SegmentedSelector
      properties:
        title: Rating
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
    - id: basic_two
      type: SegmentedSelector
      properties:
        title: Toggle
        options:
          - 'Yes'
          - 'No'

- title: Label-Value Options
  blocks:
    - id: label_value_basic
      type: SegmentedSelector
      properties:
        title: Status Filter
        options:
          - label: All
            value: all
          - label: Active
            value: active
          - label: Inactive
            value: inactive
          - label: Archived
            value: archived
    - id: label_value_roles
      type: SegmentedSelector
      properties:
        title: User Role
        options:
          - label: Admin
            value: admin
          - label: Editor
            value: editor
          - label: Viewer
            value: viewer
    - id: label_value_many
      type: SegmentedSelector
      properties:
        title: Time Range
        options:
          - label: 1H
            value: 1h
          - label: 6H
            value: 6h
          - label: 1D
            value: 1d
          - label: 1W
            value: 1w
          - label: 1M
            value: 1m
          - label: 1Y
            value: 1y

- title: Sizes
  blocks:
