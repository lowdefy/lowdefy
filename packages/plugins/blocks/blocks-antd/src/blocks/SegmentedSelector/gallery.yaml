- title: Basic String Options
  blocks:
    - id: basic_strings
      type: SegmentedSelector
      properties:
        title: View
        options:
          - Daily
          - Weekly
          - Monthly
    - id: basic_numbers
      type: SegmentedSelector
      properties:
        title: Rating
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
    - id: basic_two
      type: SegmentedSelector
      properties:
        title: Toggle
        options:
          - 'Yes'
          - 'No'

