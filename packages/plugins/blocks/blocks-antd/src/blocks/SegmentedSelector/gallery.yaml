- title: Disabled
  blocks:
    - id: disabled_all
      type: SegmentedSelector
      properties:
        title: Fully Disabled
        disabled: true
        options:
          - Option A
          - Option B
          - Option C
    - id: disabled_multiple
      type: SegmentedSelector
      properties:
        title: Multiple Disabled Options
        options:
          - label: Free
            value: free
          - label: Basic
            value: basic
          - label: Pro (Coming Soon)
            value: pro
            disabled: true
          - label: Enterprise (Coming Soon)
            value: enterprise
            disabled: true
    - id: disabled_icons
      type: SegmentedSelector
      properties:
        title: Disabled with Icons
        disabled: true
        options:
          - label: Edit
            value: edit
            icon: AiOutlineEdit
          - label: View
            value: view
            icon: AiOutlineEye
          - label: Delete
            value: delete
            icon: AiOutlineDelete

- title: Label Options
  blocks:
    - id: label_default
      type: SegmentedSelector
      properties:
        title: Default Label
        options:
          - Alpha
          - Beta
          - Gamma
    - id: label_extra
      type: SegmentedSelector
      properties:
        title: With Extra Text
        label:
          extra: Select the deployment environment
        options:
          - label: Dev
            value: dev
          - label: Staging
            value: staging
          - label: Prod
            value: prod
    - id: label_inline
      type: SegmentedSelector
      properties:
        title: Inline Label
        label:
          inline: true
          span: 6
        options:
          - label: Light
            value: light
          - label: Dark
            value: dark
          - label: Auto
            value: auto
    - id: label_inline_right
      type: SegmentedSelector
      properties:
        title: Inline Right
        label:
          inline: true
          span: 6
          align: right
        options:
          - label: Light
            value: light
          - label: Dark
            value: dark
          - label: Auto
            value: auto
    - id: no_label_segmented
      type: SegmentedSelector
      properties:
        label:
          disabled: true
        options:
          - label: Day
            value: day
          - label: Week
            value: week
          - label: Month
            value: month
          - label: Year
            value: year

- title: Style and Class Overrides
  blocks:
    - id: style_background
      type: SegmentedSelector
      properties:
        title: Custom Background
        options:
          - label: Tab A
            value: a
          - label: Tab B
            value: b
          - label: Tab C
            value: c
      style:
        --element:
          background: '#e6f7ff'
          borderRadius: 12
    - id: style_border
      type: SegmentedSelector
      properties:
        title: Custom Border
        options:
          - label: Left
            value: left
          - label: Center
            value: center
          - label: Right
            value: right
      style:
        --element:
          border: '2px solid #91caff'
          borderRadius: 8
    - id: class_shadow
      type: SegmentedSelector
      class: shadow-md
      properties:
        title: With Shadow
        options:
          - label: Recent
            value: recent
          - label: Popular
            value: popular
          - label: Featured
            value: featured

- title: Theme Token Overrides
  blocks:
    - id: theme_dark_track
      type: SegmentedSelector
      properties:
