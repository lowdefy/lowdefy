        options:
          - label: Overview
            value: overview
          - label: Details
            value: details
          - label: History
            value: history
    - id: vertical_icons
      type: SegmentedSelector
      properties:
        title: Vertical with Icons
        vertical: true
        options:
          - label: Dashboard
            value: dashboard
            icon: AiOutlineDashboard
          - label: Analytics
            value: analytics
            icon: AiOutlineBarChart
          - label: Reports
