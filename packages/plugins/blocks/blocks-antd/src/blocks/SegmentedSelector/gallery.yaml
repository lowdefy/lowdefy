          - label: Medium
            value: medium
          - label: High
            value: high
          - label: Critical
            value: critical
    - id: size_default_lv
      type: SegmentedSelector
      properties:
        title: Default Priority
        options:
          - label: Low
            value: low
          - label: Medium
            value: medium
          - label: High
            value: high
          - label: Critical
            value: critical
    - id: size_large_lv
      type: SegmentedSelector
      properties:
        title: Large Priority
        size: large
        options:
          - label: Low
            value: low
          - label: Medium
            value: medium
          - label: High
            value: high
          - label: Critical
            value: critical

- title: Shape and Block Mode
  blocks:
    - id: shape_default
      type: SegmentedSelector
      properties:
        title: Default Shape
        shape: default
        options:
          - label: List
            value: list
          - label: Grid
            value: grid
          - label: Board
            value: board
    - id: shape_round
      type: SegmentedSelector
      properties:
        title: Round Shape
        shape: round
        options:
          - label: List
            value: list
          - label: Grid
            value: grid
          - label: Board
            value: board
    - id: block_segmented
      type: SegmentedSelector
      properties:
        title: Full Width
        block: true
        options:
          - label: List
            value: list
          - label: Grid
            value: grid
          - label: Board
            value: board
    - id: block_round
      type: SegmentedSelector
      properties:
        title: Full Width Round
        block: true
        shape: round
        options:
          - label: Newest
            value: newest
          - label: Popular
            value: popular
          - label: Trending
            value: trending
    - id: block_round_large
      type: SegmentedSelector
      properties:
        title: Full Width Round Large
        block: true
        shape: round
        size: large
        options:
          - label: All
            value: all
          - label: Images
            value: images
          - label: Videos
            value: videos
          - label: Documents
            value: documents

