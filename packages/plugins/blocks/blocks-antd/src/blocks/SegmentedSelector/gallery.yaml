          - M
          - L
          - XL
    - id: size_default
      type: SegmentedSelector
      properties:
        title: Default
        options:
          - S
          - M
          - L
          - XL
    - id: size_large
      type: SegmentedSelector
      properties:
        title: Large
        size: large
        options:
          - S
          - M
          - L
          - XL

- title: Size Comparison with Label-Value
