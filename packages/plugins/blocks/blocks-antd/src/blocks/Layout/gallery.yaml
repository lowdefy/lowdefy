- title: Basic Layout
  fullWidth: true
  blocks:
    - id: layout_basic
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: layout_basic_header
          type: Header
          style:
            display: flex
            alignItems: center
            paddingInline: 24px
          blocks:
            - id: layout_basic_header_text
              type: Paragraph
              properties:
                content: Header
                style:
                  color: white
                  margin: 0
        - id: layout_basic_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: layout_basic_content_text
              type: Paragraph
              properties:
                content: This is the main content area. The Layout block wraps Header, Content, and Footer to create a standard page structure.
        - id: layout_basic_footer
          type: Footer
          style:
            textAlign: center
          blocks:
            - id: layout_basic_footer_text
              type: Paragraph
              properties:
                content: Footer - Copyright 2026

- title: Layout with Sider
  fullWidth: true
  blocks:
    - id: layout_sider_outer
      type: Layout
      style:
        minHeight: 350px
      blocks:
        - id: layout_sider_header
          type: Header
          style:
            display: flex
            alignItems: center
            paddingInline: 24px
          blocks:
            - id: layout_sider_header_text
              type: Paragraph
              properties:
                content: Header
                style:
                  color: white
                  margin: 0
        - id: layout_sider_inner
          type: Layout
          blocks:
            - id: layout_sider_side
              type: Sider
              properties:
                theme: light
                width: 200
                initialCollapsed: false
                collapsible: false
              blocks:
                - id: layout_sider_side_menu
                  type: Menu
                  properties:
                    mode: inline
                    theme: light
                    links:
                      - id: layout_sider_nav_1
                        type: MenuLink
                        properties:
                          title: Dashboard
                          icon: AiOutlineDashboard
                      - id: layout_sider_nav_2
                        type: MenuLink
                        properties:
                          title: Settings
                          icon: AiOutlineSetting
            - id: layout_sider_content
              type: Content
              style:
                padding: 24px
                background: '#fff'
              blocks:
                - id: layout_sider_content_text
                  type: Paragraph
                  properties:
                    content: Layout blocks compose together to create complex page structures. Here, an outer Layout wraps a Header, and an inner Layout contains a Sider and Content side by side.
        - id: layout_sider_footer
          type: Footer
          style:
            textAlign: center
          blocks:
            - id: layout_sider_footer_text
              type: Paragraph
              properties:
                content: Footer

- title: Nested Layout with Right Sider
  fullWidth: true
  blocks:
    - id: layout_right_sider_outer
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: layout_right_sider_inner
          type: Layout
          blocks:
            - id: layout_right_sider_content
              type: Content
              style:
                padding: 24px
                background: '#fff'
              blocks:
                - id: layout_right_sider_content_text
                  type: Paragraph
                  properties:
                    content: Main content area with a right-side panel. The Sider is placed after Content to render on the right.
            - id: layout_right_sider_side
              type: Sider
              properties:
                theme: light
                width: 250
                initialCollapsed: false
                collapsible: false
                reverseArrow: true
              style:
                borderLeft: 1px solid #f0f0f0
              blocks:
                - id: layout_right_sider_side_text
                  type: Paragraph
                  style:
                    padding: 16px
                  properties:
                    content: Right side panel for supplementary content, filters, or navigation.
