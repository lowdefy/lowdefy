- title: Override at Call Time
  fullWidth: true
  blocks:
    - id: msg_override
      type: Message
      properties:
        status: info
        content: Default message
    - id: btn_override_success
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Success
        color: primary
        variant: solid
        icon: AiOutlineCheckCircle
      events:
        onClick:
          - id: open_override_success
            type: CallMethod
            params:
              blockId: msg_override
              method: open
              args:
                - status: success
                  content: Overridden to success at call time!
                  duration: 3
    - id: btn_override_error
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Error
        color: danger
        variant: solid
        icon: AiOutlineCloseCircle
      events:
        onClick:
          - id: open_override_error
            type: CallMethod
            params:
              blockId: msg_override
              method: open
              args:
                - status: error
                  content: Overridden to error at call time!
                  duration: 3
    - id: btn_override_custom
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with Custom Icon
        color: default
        variant: solid
        icon: AiOutlineRocket
      events:
        onClick:
          - id: open_override_custom
            type: CallMethod
            params:
              blockId: msg_override
              method: open
              args:
                - status: info
                  content: Launched with a rocket icon!
                  icon: AiOutlineRocket
                  duration: 3

