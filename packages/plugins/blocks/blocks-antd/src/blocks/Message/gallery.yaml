- title: Status Types
  blocks:
    - id: status_success_msg
      type: Message
      properties:
        status: success
        content: Operation completed successfully
    - id: status_error_msg
      type: Message
      properties:
        status: error
        content: Something went wrong
    - id: status_warning_msg
      type: Message
      properties:
        status: warning
        content: Please check your input
    - id: status_info_msg
      type: Message
      properties:
        status: info
        content: Here is some useful information
    - id: status_loading_msg
      type: Message
      properties:
        status: loading
        content: Loading data...
        duration: 3
    - id: btn_status_success
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Success
        color: primary
        variant: outlined
        icon: AiOutlineCheckCircle
      events:
        onClick:
          - id: call_status_success
            type: CallMethod
            params:
              blockId: status_success_msg
              method: open
    - id: btn_status_error
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Error
        color: danger
        variant: outlined
        icon: AiOutlineCloseCircle
      events:
        onClick:
          - id: call_status_error
            type: CallMethod
            params:
              blockId: status_error_msg
              method: open
    - id: btn_status_warning
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Warning
        color: default
        variant: outlined
        icon: AiOutlineWarning
      events:
        onClick:
          - id: call_status_warning
            type: CallMethod
            params:
              blockId: status_warning_msg
              method: open
    - id: btn_status_info
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Info
        color: primary
        variant: text
        icon: AiOutlineInfoCircle
      events:
        onClick:
          - id: call_status_info
            type: CallMethod
            params:
              blockId: status_info_msg
              method: open
    - id: btn_status_loading
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Loading
        color: default
        variant: outlined
        icon: AiOutlineLoading
      events:
        onClick:
          - id: call_status_loading
            type: CallMethod
            params:
              blockId: status_loading_msg
              method: open

