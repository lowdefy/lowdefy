- title: Message in Form Submission
  blocks:
    - id: form_card
      type: Card
      properties:
        title: Submit Feedback
        size: small
      blocks:
        - id: form_name
          type: TextInput
          required: true
          properties:
            label:
              title: Name
            placeholder: Your name
        - id: form_rating
          type: RatingSlider
          required: true
          properties:
            label:
              title: Rating
        - id: form_comments
          type: TextArea
          properties:
            label:
              title: Comments
            placeholder: Tell us what you think
            rows: 3
        - id: form_submit_msg
          type: Message
          properties:
            status: success
            content: Thank you for your feedback!
            duration: 3
          events:
            onClose:
              - id: form_close_set
                type: SetState
                params:
                  feedbackSubmitted: true
        - id: form_error_msg
          type: Message
          properties:
            status: error
            content: Please fill in all required fields.
            duration: 4
        - id: form_actions
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: form_cancel
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Cancel
                color: default
                variant: outlined
              events:
                onClick:
                  - id: form_cancel_reset
                    type: ResetValidation
                  - id: form_cancel_msg
                    type: DisplayMessage
                    params:
                      content: Form cleared
                      status: info
            - id: form_submit
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Submit Feedback
                color: primary
                variant: solid
                icon: AiOutlineSend
              events:
                onClick:
                  - id: form_validate
                    type: Validate
                  - id: form_open_success
                    type: CallMethod
                    params:
                      blockId: form_submit_msg
                      method: open

- title: Message in File Upload
  blocks:
    - id: upload_card
      type: Card
      properties:
        title: Upload Documents
        size: small
      blocks:
        - id: upload_description
          type: Markdown
          properties:
            content: |
              Upload your project files below. Supported formats: PDF, DOCX, XLSX.
              Maximum file size: 10 MB.
        - id: upload_progress_msg
          type: Message
          properties:
            status: loading
            content: Uploading file...
            duration: 0
        - id: upload_success_msg
          type: Message
          properties:
            status: success
            content: File uploaded successfully!
            icon: AiOutlineCloudUpload
            duration: 3
        - id: upload_fail_msg
          type: Message
          properties:
            status: error
            content: Upload failed. Please try again.
            duration: 5
        - id: upload_actions
          type: Box
          layout:
            gap: 8
            justify: flex-start
          blocks:
            - id: upload_start
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Start Upload
                color: primary
                variant: solid
                icon: AiOutlineUpload
              events:
                onClick:
                  - id: upload_show_progress
                    type: CallMethod
                    params:
                      blockId: upload_progress_msg
                      method: open
            - id: upload_complete
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Simulate Success
                color: green
                variant: outlined
                icon: AiOutlineCheckCircle
              events:
                onClick:
                  - id: upload_show_success
                    type: CallMethod
                    params:
                      blockId: upload_success_msg
                      method: open
            - id: upload_fail
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Simulate Failure
                color: danger
                variant: outlined
                icon: AiOutlineCloseCircle
              events:
                onClick:
                  - id: upload_show_fail
                    type: CallMethod
                    params:
                      blockId: upload_fail_msg
                      method: open
