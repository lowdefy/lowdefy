- title: Override at Call Time
  blocks:
    - id: override_msg
      type: Message
      properties:
        status: info
        content: Default message
    - id: btn_override_success
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Success
        color: primary
        variant: solid
        icon: AiOutlineCheckCircle
      events:
        onClick:
          - id: call_override_success
            type: CallMethod
            params:
              blockId: override_msg
              method: open
              args:
                - status: success
                  content: Overridden to success at call time!
                  duration: 3
    - id: btn_override_error
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open as Error
        color: danger
        variant: solid
        icon: AiOutlineCloseCircle
      events:
        onClick:
          - id: call_override_error
            type: CallMethod
            params:
              blockId: override_msg
              method: open
              args:
                - status: error
                  content: Overridden to error at call time!
                  duration: 3
    - id: btn_override_icon
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open with Custom Icon
        color: default
        variant: solid
        icon: AiOutlineRocket
      events:
        onClick:
          - id: call_override_icon
            type: CallMethod
            params:
              blockId: override_msg
              method: open
              args:
                - status: info
                  content: Launched with a rocket icon!
                  icon: AiOutlineRocket
                  duration: 3

- title: onClose Event
  blocks:
    - id: onclose_msg
      type: Message
      properties:
        status: info
        content: Close me to trigger the onClose event
        duration: 3
      events:
        onClose:
          - id: onclose_set_state
            type: SetState
            params:
              messageClosed: true
          - id: onclose_display
            type: DisplayMessage
            params:
              content: onClose event fired!
              status: success
    - id: btn_onclose
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Open Message with onClose
        color: primary
        variant: outlined
        icon: AiOutlineNotification
      events:
        onClick:
          - id: call_onclose
            type: CallMethod
            params:
              blockId: onclose_msg
              method: open

