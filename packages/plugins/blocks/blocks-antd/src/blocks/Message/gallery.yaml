- title: Message Style
  blocks:
    - id: mstyle_bg_msg
      type: Message
      properties:
        status: success
        content: Custom background color
        messageStyle:
          backgroundColor: '#f6ffed'
          border: '1px solid #b7eb8f'
    - id: mstyle_font_msg
      type: Message
      properties:
        status: info
        content: Larger font with custom padding
        messageStyle:
          fontSize: 16
          padding: '12px 24px'
    - id: mstyle_shadow_msg
      type: Message
      properties:
        status: warning
        content: Shadow and rounded corners
        messageStyle:
          boxShadow: '0 4px 12px rgba(0, 0, 0, 0.15)'
          borderRadius: 12
    - id: btn_mstyle_bg
      type: Button
      layout:
        flex: 0 0 auto
      properties:
