- title: Status Types
  blocks:
    - id: msg_success
      type: Message
      properties:
        status: success
        content: Operation completed successfully
    - id: msg_error
      type: Message
      properties:
        status: error
        content: Something went wrong
    - id: msg_warning
      type: Message
      properties:
        status: warning
        content: Please check your input
    - id: msg_info
      type: Message
      properties:
        status: info
        content: Here is some useful information
    - id: msg_loading
      type: Message
      properties:
        status: loading
        content: Loading data...
        duration: 3
    - id: btn_msg_success
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Success
        color: primary
        variant: outlined
        icon: AiOutlineCheckCircle
      events:
        onClick:
          - id: open_msg_success
            type: CallMethod
            params:
              blockId: msg_success
              method: open
    - id: btn_msg_error
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Error
        color: danger
        variant: outlined
        icon: AiOutlineCloseCircle
      events:
        onClick:
          - id: open_msg_error
            type: CallMethod
            params:
              blockId: msg_error
              method: open
    - id: btn_msg_warning
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Warning
        color: default
        variant: outlined
        icon: AiOutlineWarning
      events:
        onClick:
          - id: open_msg_warning
            type: CallMethod
            params:
              blockId: msg_warning
              method: open
    - id: btn_msg_info
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Info
        color: primary
        variant: text
        icon: AiOutlineInfoCircle
      events:
        onClick:
          - id: open_msg_info
            type: CallMethod
            params:
              blockId: msg_info
              method: open
    - id: btn_msg_loading
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Loading
        color: default
        variant: outlined
        icon: AiOutlineLoading
      events:
        onClick:
          - id: open_msg_loading
            type: CallMethod
            params:
              blockId: msg_loading
              method: open

- title: Duration
  blocks:
    - id: msg_dur_short
      type: Message
      properties:
        status: info
        content: Gone in 1 second
        duration: 1
    - id: msg_dur_default
      type: Message
      properties:
        status: info
        content: Default duration (4.5s)
    - id: msg_dur_long
      type: Message
      properties:
        status: info
        content: Stays for 10 seconds
        duration: 10
    - id: msg_dur_sticky
      type: Message
      properties:
        status: warning
        content: Will not auto-close (duration 0)
        duration: 0
    - id: btn_dur_short
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: 1 second
        color: default
        variant: outlined
      events:
        onClick:
          - id: open_dur_short
            type: CallMethod
            params:
              blockId: msg_dur_short
              method: open
    - id: btn_dur_default
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Default (4.5s)
        color: default
        variant: outlined
      events:
        onClick:
          - id: open_dur_default
            type: CallMethod
            params:
              blockId: msg_dur_default
              method: open
    - id: btn_dur_long
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: 10 seconds
        color: default
        variant: outlined
      events:
        onClick:
          - id: open_dur_long
            type: CallMethod
            params:
              blockId: msg_dur_long
              method: open
    - id: btn_dur_sticky
      type: Button
      layout:
        flex: 0 0 auto
      properties:
        title: Sticky (duration 0)
        color: default
        variant: outlined
      events:
        onClick:
          - id: open_dur_sticky
            type: CallMethod
            params:
              blockId: msg_dur_sticky
              method: open

