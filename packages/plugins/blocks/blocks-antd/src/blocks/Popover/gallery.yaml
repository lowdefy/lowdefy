                backgroundColor: '#1677ff'
            - id: popover_usercard_trigger_name
              type: Paragraph
              layout:
                flex: 0 0 auto
              properties:
                content: Sarah Chen

- title: Popover as Quick Actions Menu
  blocks:
    - id: popover_quickmenu
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        trigger: click
        placement: bottomRight
        overlayInnerStyle:
          width: 200
          padding: 8
      events:
        onOpenChange:
          - id: popover_quickmenu_state
            type: SetState
            params:
              menu_toggled: true
      slots:
        popover:
          blocks:
            - id: popover_quickmenu_col
              type: Box
              layout:
                direction: column
                gap: 2
              blocks:
                - id: popover_quickmenu_new
                  type: Button
                  properties:
                    title: New Document
                    icon: AiOutlineFileAdd
                    color: primary
                    variant: text
                    block: true
                  events:
                    onClick:
                      - id: popover_quickmenu_new_action
                        type: DisplayMessage
                        params:
                          content: Creating new document...
                          duration: 2
                - id: popover_quickmenu_upload
                  type: Button
                  properties:
                    title: Upload File
                    icon: AiOutlineUpload
                    color: default
                    variant: text
                    block: true
                  events:
                    onClick:
                      - id: popover_quickmenu_upload_action
                        type: DisplayMessage
                        params:
                          content: Opening file picker...
                          duration: 2
                - id: popover_quickmenu_divider
                  type: Divider
                  properties:
                    dashed: true
                - id: popover_quickmenu_import
                  type: Button
                  properties:
                    title: Import from URL
                    icon: AiOutlineLink
                    color: default
                    variant: text
                    block: true
                  events:
                    onClick:
                      - id: popover_quickmenu_import_action
                        type: DisplayMessage
                        params:
                          content: Enter a URL to import...
                          duration: 2
                - id: popover_quickmenu_template
                  type: Button
                  properties:
                    title: Use Template
                    icon: AiOutlineAppstore
                    color: default
                    variant: text
                    block: true
      blocks:
        - id: popover_quickmenu_trigger
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Create New
            icon: AiOutlinePlus
            color: primary
            variant: solid

- title: Popover as Help Tooltip
  blocks:
    - id: popover_help_row
      type: Box
      layout:
        gap: 16
        align: center
      blocks:
        - id: popover_help_label
          type: Title
          layout:
            flex: 0 0 auto
          properties:
            content: Monthly Budget
            level: 5
        - id: popover_help_icon
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: About Monthly Budget
            placement: right
            overlayInnerStyle:
              width: 300
          slots:
            popover:
              blocks:
                - id: popover_help_desc
                  type: Paragraph
                  properties:
                    content: The monthly budget is the maximum amount your team can spend on resources each billing cycle. It resets on the 1st of every month.
                - id: popover_help_note
                  type: Paragraph
                  class: text-gray-500 text-sm
                  properties:
                    content: You will receive a warning notification when 80% of the budget is used.
                - id: popover_help_link
                  type: Button
                  properties:
                    title: Learn more
                    color: primary
                    variant: link
                    size: small
                  events:
                    onClick:
                      - id: popover_help_link_action
                        type: Link
                        params:
                          url: https://example.com/docs/budget
                          newTab: true
          blocks:
            - id: popover_help_trigger
              type: Icon
              layout:
                flex: 0 0 auto
              properties:
                name: AiOutlineQuestionCircle
                color: '#8c8c8c'
                size: 18
        - id: popover_help_input
          type: NumberInput
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            prefix: $
