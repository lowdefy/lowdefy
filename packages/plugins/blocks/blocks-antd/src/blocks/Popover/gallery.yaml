- title: Basic Popover
  blocks:
    - id: popover_basic
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Popover Title
      slots:
        popover:
          blocks:
            - id: popover_basic_content
              type: Paragraph
              properties:
                content: This is the popover body content. You can place any blocks here.
      blocks:
        - id: popover_basic_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Hover me
            color: primary
            variant: solid

    - id: popover_no_title
      type: Popover
      layout:
        flex: 0 0 auto
      slots:
        popover:
          blocks:
            - id: popover_no_title_content
              type: Paragraph
              properties:
                content: A popover without a title - just body content.
      blocks:
        - id: popover_no_title_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No title
            color: default
            variant: outlined

- title: Placements
  blocks:
    - id: popover_place_row_top
      type: Box
      layout:
        gap: 8
        justify: center
      blocks:
        - id: popover_pl_top
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Top
            placement: top
          slots:
            popover:
              blocks:
                - id: popover_pl_top_msg
                  type: Paragraph
                  properties:
                    content: Popover placed at top.
          blocks:
            - id: popover_pl_top_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: top
                color: primary
                variant: solid
                size: small
        - id: popover_pl_topLeft
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Top Left
            placement: topLeft
          slots:
            popover:
              blocks:
                - id: popover_pl_topLeft_msg
                  type: Paragraph
                  properties:
                    content: Popover placed at topLeft.
          blocks:
            - id: popover_pl_topLeft_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: topLeft
                color: default
                variant: outlined
                size: small
        - id: popover_pl_topRight
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Top Right
            placement: topRight
          slots:
            popover:
              blocks:
                - id: popover_pl_topRight_msg
                  type: Paragraph
                  properties:
                    content: Popover placed at topRight.
          blocks:
            - id: popover_pl_topRight_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: topRight
                color: default
                variant: outlined
                size: small

    - id: popover_place_row_sides
      type: Box
      layout:
        gap: 8
      blocks:
        - id: popover_pl_left
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Left
            placement: left
          slots:
            popover:
              blocks:
                - id: popover_pl_left_msg
                  type: Paragraph
                  properties:
                    content: Popover placed at left.
          blocks:
            - id: popover_pl_left_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: left
                color: primary
                variant: solid
                size: small
        - id: popover_pl_right
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Right
            placement: right
          slots:
            popover:
              blocks:
                - id: popover_pl_right_msg
                  type: Paragraph
                  properties:
                    content: Popover placed at right.
          blocks:
            - id: popover_pl_right_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: right
                color: primary
                variant: outlined
                size: small
        - id: popover_pl_bottom
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Bottom
            placement: bottom
          slots:
            popover:
              blocks:
                - id: popover_pl_bottom_msg
                  type: Paragraph
                  properties:
                    content: Popover placed at bottom (default).
          blocks:
            - id: popover_pl_bottom_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: bottom (default)
                color: default
                variant: outlined
                size: small

- title: Trigger Modes
  blocks:
    - id: popover_trig_hover
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Hover Popover
        trigger: hover
      slots:
        popover:
          blocks:
            - id: popover_trig_hover_msg
              type: Paragraph
              properties:
                content: This popover appears on hover (default).
      blocks:
        - id: popover_trig_hover_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Hover (default)
            color: primary
            variant: solid
    - id: popover_trig_click
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Click Popover
        trigger: click
      slots:
        popover:
          blocks:
            - id: popover_trig_click_msg
              type: Paragraph
              properties:
                content: This popover appears on click. Click outside to close.
      blocks:
        - id: popover_trig_click_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Click me
            color: primary
            variant: outlined
    - id: popover_trig_focus
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Focus Popover
        trigger: focus
      slots:
        popover:
          blocks:
            - id: popover_trig_focus_msg
              type: Paragraph
              properties:
                content: This popover appears on focus. Tab to the button or click it.
      blocks:
        - id: popover_trig_focus_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Focus (tab to me)
            color: primary
            variant: dashed

- title: Background Color
