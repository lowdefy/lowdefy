      blocks:
        - id: popover_col_default
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Default Color
          slots:
            popover:
              blocks:
                - id: popover_col_default_msg
                  type: Paragraph
                  properties:
                    content: Default background color.
          blocks:
            - id: popover_col_default_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Default
                color: default
                variant: outlined
                size: small
        - id: popover_col_yellow
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Light Yellow
            color: '#fffbe6'
          slots:
            popover:
              blocks:
                - id: popover_col_yellow_msg
                  type: Paragraph
                  properties:
                    content: A warm light yellow background.
          blocks:
            - id: popover_col_yellow_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Light Yellow
                color: gold
                variant: outlined
                size: small
        - id: popover_col_blue
          type: Popover
          layout:
            flex: 0 0 auto
          properties:
            title: Light Blue
            color: '#e6f4ff'
          slots:
            popover:
              blocks:
                - id: popover_col_blue_msg
                  type: Paragraph
                  properties:
                    content: A cool light blue background.
          blocks:
            - id: popover_col_blue_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Light Blue
                color: blue
                variant: outlined
                size: small

- title: Default Open
  blocks:
    - id: popover_defopen
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Open by Default
        defaultOpen: true
        placement: right
      slots:
        popover:
          blocks:
            - id: popover_defopen_msg
              type: Paragraph
              properties:
                content: This popover is open by default when the page loads.
      blocks:
        - id: popover_defopen_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Open by default
            color: green
            variant: solid

- title: Auto Adjust Overflow
  blocks:
    - id: popover_adj_on
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Auto Adjust
        autoAdjustOverflow: true
        placement: top
      slots:
        popover:
          blocks:
            - id: popover_adj_on_msg
              type: Paragraph
              properties:
                content: Repositions automatically near viewport edges (default behavior).
      blocks:
        - id: popover_adj_on_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Auto adjust (default)
            color: primary
            variant: solid
    - id: popover_adj_off
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Fixed Position
        autoAdjustOverflow: false
        placement: top
      slots:
        popover:
          blocks:
            - id: popover_adj_off_msg
              type: Paragraph
              properties:
                content: Stays in the specified position even near edges.
      blocks:
        - id: popover_adj_off_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No auto adjust
            color: default
            variant: outlined

- title: Delay Settings
  blocks:
    - id: popover_del_fast
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Instant
        mouseEnterDelay: 0
        mouseLeaveDelay: 0
      slots:
        popover:
          blocks:
            - id: popover_del_fast_msg
              type: Paragraph
              properties:
                content: No delay on enter or leave.
      blocks:
        - id: popover_del_fast_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No delay
            color: primary
            variant: solid
    - id: popover_del_slow
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Slow Enter
        mouseEnterDelay: 1
      slots:
        popover:
          blocks:
            - id: popover_del_slow_msg
              type: Paragraph
              properties:
                content: 1 second delay before showing.
      blocks:
        - id: popover_del_slow_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: 1s enter delay
            color: primary
            variant: outlined
    - id: popover_del_sticky
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Sticky
        mouseLeaveDelay: 2
      slots:
        popover:
          blocks:
            - id: popover_del_sticky_msg
              type: Paragraph
              properties:
                content: Stays visible for 2 seconds after mouse leaves.
      blocks:
        - id: popover_del_sticky_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: 2s leave delay
            color: primary
            variant: dashed

- title: Z-Index
  blocks:
    - id: popover_zindex
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Custom Z-Index
        zIndex: 2000
      slots:
        popover:
          blocks:
            - id: popover_zindex_msg
              type: Paragraph
              properties:
                content: This popover has a custom z-index of 2000, useful when layering over modals or drawers.
      blocks:
        - id: popover_zindex_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Z-index 2000
            color: primary
            variant: solid

- title: Overlay Inner Style
  blocks:
    - id: popover_overlay_style
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Styled Overlay
        overlayInnerStyle:
          borderRadius: 16
          boxShadow: '0 6px 16px rgba(0, 0, 0, 0.2)'
      slots:
        popover:
          blocks:
            - id: popover_overlay_style_msg
              type: Paragraph
              properties:
                content: Custom inner style with larger border radius and a stronger shadow.
      blocks:
        - id: popover_overlay_style_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom overlay style
            color: primary
            variant: solid
    - id: popover_overlay_wide
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Wide Popover
        overlayInnerStyle:
          width: 400
          padding: 20
      slots:
        popover:
          blocks:
            - id: popover_overlay_wide_msg
              type: Paragraph
              properties:
                content: This popover has a fixed width of 400px and extra padding, useful for displaying larger content like forms or details.
      blocks:
        - id: popover_overlay_wide_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Wide overlay
            color: primary
            variant: outlined

- title: onOpenChange Event
  blocks:
    - id: popover_event_open
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Event Popover
        trigger: click
      events:
        onOpenChange:
          - id: popover_event_open_msg
            type: DisplayMessage
            params:
              content: Popover visibility changed!
              duration: 2
      slots:
        popover:
          blocks:
            - id: popover_event_open_content
              type: Paragraph
              properties:
                content: Opening or closing this popover triggers a DisplayMessage action.
      blocks:
        - id: popover_event_open_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Click to toggle
            color: primary
            variant: solid
            icon: AiOutlineBell

    - id: popover_event_state
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Track State
        trigger: click
      events:
        onOpenChange:
          - id: popover_event_state_set
            type: SetState
            params:
              popover_was_opened: true
      slots:
        popover:
          blocks:
            - id: popover_event_state_content
              type: Paragraph
              properties:
                content: This popover uses SetState to track that it was opened.
      blocks:
        - id: popover_event_state_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Track open state
            color: primary
            variant: outlined

- title: Rich Popover Content
  blocks:
    - id: popover_rich_profile
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: User Profile
        trigger: click
      slots:
        popover:
          blocks:
            - id: popover_rich_profile_row
              type: Box
              layout:
                gap: 8
              blocks:
                - id: popover_rich_profile_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    content: JD
                    color: blue
                - id: popover_rich_profile_info
                  type: Box
                  blocks:
                    - id: popover_rich_profile_name
                      type: Title
                      properties:
                        content: Jane Doe
                        level: 5
                    - id: popover_rich_profile_email
                      type: Paragraph
                      properties:
                        content: jane.doe@example.com
      blocks:
        - id: popover_rich_profile_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: View Profile
            color: primary
            variant: solid
            icon: AiOutlineUser

    - id: popover_rich_actions
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Actions
        trigger: click
      slots:
        popover:
          blocks:
            - id: popover_rich_actions_col
              type: Box
              layout:
                gap: 4
                direction: column
              blocks:
                - id: popover_rich_act_edit
                  type: Button
                  properties:
                    title: Edit
                    icon: AiOutlineEdit
                    color: primary
                    variant: text
                    block: true
                - id: popover_rich_act_copy
                  type: Button
                  properties:
                    title: Duplicate
                    icon: AiOutlineCopy
                    color: default
                    variant: text
                    block: true
                - id: popover_rich_act_del
                  type: Button
                  properties:
                    title: Delete
                    icon: AiOutlineDelete
                    color: danger
                    variant: text
                    block: true
      blocks:
        - id: popover_rich_actions_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: More
            icon: AiOutlineEllipsis
            color: default
            variant: outlined

- title: Theme Token Overrides
  blocks:
    - id: popover_theme_wide
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Wide Title
        theme:
          titleMinWidth: 300
      slots:
        popover:
          blocks:
            - id: popover_theme_wide_msg
              type: Paragraph
              properties:
                content: This popover has a wider minimum title width of 300px using the titleMinWidth token.
      blocks:
        - id: popover_theme_wide_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Wide title (300px)
            color: primary
            variant: solid

    - id: popover_theme_radius
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Large Radius
        theme:
          borderRadiusLG: 20
      slots:
        popover:
          blocks:
            - id: popover_theme_radius_msg
              type: Paragraph
              properties:
                content: Custom border radius of 20px for a softer appearance.
      blocks:
        - id: popover_theme_radius_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Large radius
            color: primary
            variant: outlined

    - id: popover_theme_bg
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Custom Background
        theme:
          colorBgElevated: '#f0f5ff'
      slots:
        popover:
          blocks:
            - id: popover_theme_bg_msg
              type: Paragraph
              properties:
                content: Custom elevated background color using the colorBgElevated theme token.
      blocks:
        - id: popover_theme_bg_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom background
            color: primary
            variant: dashed

    - id: popover_theme_padding
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Extra Padding
        theme:
          innerPadding: 24
          titlePadding: '16px 24px'
          titleMarginBottom: 16
      slots:
        popover:
          blocks:
            - id: popover_theme_padding_msg
              type: Paragraph
              properties:
                content: Increased inner padding (24px), custom title padding, and larger title margin bottom.
      blocks:
        - id: popover_theme_padding_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Extra padding
            color: default
            variant: outlined

    - id: popover_theme_border
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Title Border
        theme:
          titleBorderBottom: 1px solid #d9d9d9
          titleMarginBottom: 12
          innerContentPadding: '8px 0'
      slots:
        popover:
          blocks:
            - id: popover_theme_border_msg
              type: Paragraph
              properties:
                content: A visible border under the title using titleBorderBottom, plus innerContentPadding for spacing.
      blocks:
        - id: popover_theme_border_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Title border
            color: default
            variant: outlined

    - id: popover_theme_zindex
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Custom Z-Index Token
        theme:
          zIndexPopup: 2050
      slots:
        popover:
          blocks:
            - id: popover_theme_zindex_msg
              type: Paragraph
              properties:
                content: The zIndexPopup theme token sets the popover z-index at the theme level (default 1030).
      blocks:
        - id: popover_theme_zindex_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Z-index token
            color: default
            variant: dashed

- title: CSS Key Classes
  blocks:
    - id: popover_css_element
      type: Popover
      layout:
        flex: 0 0 auto
      class:
        element: cursor-pointer
      properties:
        title: Element CSS Key
        trigger: click
      slots:
        popover:
          blocks:
            - id: popover_css_element_msg
              type: Paragraph
              properties:
                content: The element CSS key targets the outer Popover wrapper. Here it adds a pointer cursor on the trigger area.
      blocks:
        - id: popover_css_element_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Element key
            color: primary
            variant: solid

    - id: popover_css_inner
      type: Popover
      layout:
        flex: 0 0 auto
      class:
        inner: shadow-xl rounded-xl
      properties:
        title: Inner CSS Key
      slots:
        popover:
          blocks:
            - id: popover_css_inner_msg
              type: Paragraph
              properties:
                content: The inner CSS key targets the popover inner container. Here it applies extra shadow and rounded corners.
      blocks:
        - id: popover_css_inner_btn
          type: Button
          layout:
            flex: 0 0 auto
