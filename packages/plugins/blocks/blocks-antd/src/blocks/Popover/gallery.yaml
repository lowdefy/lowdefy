    - id: popover_css_title
      type: Popover
      layout:
        flex: 0 0 auto
      class:
        title: font-bold text-blue-600 border-b border-blue-200 pb-2
      properties:
        title: Title CSS Key
      slots:
        popover:
          blocks:
            - id: popover_css_title_msg
              type: Paragraph
              properties:
                content: The title CSS key styles the popover title area with blue text, bold weight, and a bottom border.
      blocks:
        - id: popover_css_title_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Title key
            color: blue
            variant: outlined

    - id: popover_css_content
      type: Popover
      layout:
        flex: 0 0 auto
      class:
        content: bg-gray-50 p-4 rounded-md
      properties:
        title: Content CSS Key
      slots:
        popover:
          blocks:
            - id: popover_css_content_msg
              type: Paragraph
              properties:
                content: The content CSS key targets the popover content area. Here it adds a gray background, padding, and rounded corners.
      blocks:
        - id: popover_css_content_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Content key
            color: default
            variant: outlined

- title: Popover as User Card
  blocks:
    - id: popover_usercard
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        trigger: click
        overlayInnerStyle:
          width: 320
          padding: 0
      slots:
        popover:
          blocks:
            - id: popover_usercard_header
              type: Box
              class: bg-blue-50 p-4 rounded-t-lg
              layout:
                gap: 12
                align: center
              blocks:
                - id: popover_usercard_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineUser
                    size: 48
                    color: '#fff'
                    backgroundColor: '#1677ff'
                - id: popover_usercard_info
                  type: Box
                  layout:
                    direction: column
                    gap: 2
                  blocks:
                    - id: popover_usercard_name
                      type: Title
                      properties:
                        content: Sarah Chen
                        level: 5
                    - id: popover_usercard_role
                      type: Paragraph
                      properties:
                        content: Product Manager
            - id: popover_usercard_details
              type: Descriptions
              class: p-4
              properties:
                size: small
                column: 1
                items:
                  - label: Email
                    value: sarah.chen@company.com
                  - label: Team
                    value: Product
                  - label: Location
                    value: San Francisco, CA
            - id: popover_usercard_actions_row
              type: Box
              class: px-4 pb-4
              layout:
                gap: 8
              blocks:
                - id: popover_usercard_msg_btn
                  type: Button
                  layout:
                    flex: 1 1 0
                  properties:
                    title: Message
                    icon: AiOutlineMail
                    color: primary
                    variant: solid
                    size: small
                  events:
                    onClick:
                      - id: popover_usercard_msg_action
                        type: DisplayMessage
                        params:
                          content: Opening chat with Sarah...
                          duration: 2
                - id: popover_usercard_profile_btn
                  type: Button
                  layout:
                    flex: 1 1 0
                  properties:
                    title: View Profile
                    icon: AiOutlineUser
                    color: default
                    variant: outlined
                    size: small
                  events:
                    onClick:
                      - id: popover_usercard_profile_action
                        type: Link
