            color: primary
            variant: solid
    - id: popover_theme_radius
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Large Radius
        theme:
          borderRadiusLG: 20
      slots:
        popover:
          blocks:
            - id: popover_theme_radius_msg
              type: Paragraph
              properties:
                content: Custom border radius of 20px.
      blocks:
        - id: popover_theme_radius_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Large radius
            color: primary
            variant: outlined
    - id: popover_theme_bg
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Custom Background
        theme:
          colorBgElevated: '#f0f5ff'
      slots:
        popover:
          blocks:
            - id: popover_theme_bg_msg
              type: Paragraph
              properties:
                content: Custom elevated background color using theme token.
      blocks:
        - id: popover_theme_bg_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom background
            color: primary
            variant: dashed
