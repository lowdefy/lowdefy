- title: Basic Popover
  blocks:
    - id: popover_basic
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Popover Title
      slots:
        popover:
          blocks:
            - id: popover_basic_content
              type: Paragraph
              properties:
                content: This is the popover body content. You can place any blocks here.
      blocks:
        - id: popover_basic_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Hover me
            color: primary
            variant: solid

    - id: popover_no_title
      type: Popover
      layout:
        flex: 0 0 auto
      slots:
        popover:
          blocks:
            - id: popover_no_title_content
              type: Paragraph
              properties:
                content: A popover without a title - just body content.
      blocks:
        - id: popover_no_title_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No title
            color: default
            variant: outlined

