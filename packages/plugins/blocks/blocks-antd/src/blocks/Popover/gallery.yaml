- title: Default Open
  blocks:
    - id: popover_default_open
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Open by Default
        defaultOpen: true
        placement: right
      slots:
        popover:
          blocks:
            - id: popover_default_open_msg
              type: Paragraph
              properties:
                content: This popover is open by default when the page loads.
      blocks:
        - id: popover_default_open_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Open by default
            color: green
            variant: solid

- title: Delay Settings
  blocks:
    - id: popover_delay_fast
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Instant
        mouseEnterDelay: 0
        mouseLeaveDelay: 0
      slots:
        popover:
          blocks:
            - id: popover_delay_fast_msg
              type: Paragraph
              properties:
                content: No delay on enter or leave.
      blocks:
        - id: popover_delay_fast_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No delay
            color: primary
            variant: solid
    - id: popover_delay_slow
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Slow Enter
        mouseEnterDelay: 1
      slots:
        popover:
          blocks:
            - id: popover_delay_slow_msg
              type: Paragraph
              properties:
                content: 1 second delay before showing.
      blocks:
        - id: popover_delay_slow_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: 1s enter delay
            color: primary
            variant: outlined
    - id: popover_delay_sticky
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Sticky
        mouseLeaveDelay: 2
      slots:
        popover:
          blocks:
            - id: popover_delay_sticky_msg
              type: Paragraph
              properties:
                content: Stays visible for 2 seconds after mouse leaves.
      blocks:
        - id: popover_delay_sticky_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: 2s leave delay
            color: primary
            variant: dashed

- title: Rich Popover Content
  blocks:
    - id: popover_rich_card
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: User Profile
        trigger: click
      slots:
        popover:
          blocks:
            - id: popover_rich_row
              type: Box
              layout:
                gap: 8
              blocks:
                - id: popover_rich_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    content: JD
                    color: blue
                - id: popover_rich_info
                  type: Box
                  blocks:
                    - id: popover_rich_name
                      type: Title
                      properties:
                        content: Jane Doe
                        level: 5
                    - id: popover_rich_email
                      type: Paragraph
                      properties:
                        content: jane.doe@example.com
      blocks:
        - id: popover_rich_card_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: View Profile
            color: primary
            variant: solid
            icon: AiOutlineUser

    - id: popover_rich_actions
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Actions
        trigger: click
      slots:
        popover:
          blocks:
            - id: popover_rich_actions_col
              type: Box
              layout:
                gap: 4
                direction: column
              blocks:
                - id: popover_rich_act_edit
                  type: Button
                  properties:
                    title: Edit
                    icon: AiOutlineEdit
                    color: primary
                    variant: text
                    block: true
                - id: popover_rich_act_copy
                  type: Button
                  properties:
                    title: Duplicate
                    icon: AiOutlineCopy
                    color: default
                    variant: text
                    block: true
                - id: popover_rich_act_delete
                  type: Button
                  properties:
                    title: Delete
                    icon: AiOutlineDelete
                    color: danger
                    variant: text
                    block: true
      blocks:
        - id: popover_rich_actions_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: More
            icon: AiOutlineEllipsis
            color: default
            variant: outlined

- title: Auto Adjust Overflow
  blocks:
    - id: popover_overflow_on
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Auto Adjust
        autoAdjustOverflow: true
        placement: top
      slots:
        popover:
          blocks:
            - id: popover_overflow_on_msg
              type: Paragraph
              properties:
                content: Repositions automatically near viewport edges.
      blocks:
        - id: popover_overflow_on_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Auto adjust (default)
            color: primary
            variant: solid
    - id: popover_overflow_off
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Fixed Position
        autoAdjustOverflow: false
        placement: top
      slots:
        popover:
          blocks:
            - id: popover_overflow_off_msg
              type: Paragraph
              properties:
                content: Stays in the specified position.
      blocks:
        - id: popover_overflow_off_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No auto adjust
            color: default
            variant: outlined

- title: Style Overrides
  blocks:
    - id: popover_style_custom
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Styled Popover
        overlayInnerStyle:
          borderRadius: 16
          boxShadow: '0 6px 16px rgba(0, 0, 0, 0.2)'
      slots:
        popover:
          blocks:
            - id: popover_style_custom_msg
              type: Paragraph
              properties:
                content: Custom inner style with larger border radius and stronger shadow.
      blocks:
        - id: popover_style_custom_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom styled
            color: primary
            variant: solid

- title: Theme Token Overrides
  blocks:
    - id: popover_theme_wide
      type: Popover
      layout:
