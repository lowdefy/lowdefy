- title: Trigger Modes
  blocks:
    - id: popover_trigger_hover
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Hover Popover
        trigger: hover
      slots:
        popover:
          blocks:
            - id: popover_trigger_hover_msg
              type: Paragraph
              properties:
                content: This popover appears on hover (default).
      blocks:
        - id: popover_trigger_hover_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Hover (default)
            color: primary
            variant: solid
    - id: popover_trigger_click
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Click Popover
        trigger: click
      slots:
        popover:
          blocks:
            - id: popover_trigger_click_msg
              type: Paragraph
              properties:
                content: This popover appears on click.
      blocks:
        - id: popover_trigger_click_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Click
            color: primary
            variant: outlined
    - id: popover_trigger_focus
      type: Popover
      layout:
        flex: 0 0 auto
      properties:
        title: Focus Popover
        trigger: focus
      slots:
        popover:
          blocks:
            - id: popover_trigger_focus_msg
              type: Paragraph
              properties:
                content: This popover appears on focus.
      blocks:
        - id: popover_trigger_focus_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Focus (tab to me)
            color: primary
            variant: dashed

