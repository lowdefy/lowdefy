- title: Notification Bell Header
  blocks:
    - id: rw_notif_header
      type: Box
      layout:
        gap: 24
        align: center
        justify: end
      class: bg-white p-4 rounded-lg shadow-sm border border-gray-200
      blocks:
        - id: rw_notif_search
          type: TextInput
          layout:
            flex: 1 1 0
          properties:
            placeholder: Search...
            prefixIcon: AiOutlineSearch
        - id: rw_notif_badge_mail
          type: Badge
          layout:
            flex: 0 0 auto
          properties:
            count: 4
            size: small
          blocks:
            - id: rw_notif_mail_btn
              type: Button
              properties:
                icon: AiOutlineMail
                color: default
                variant: text
                hideTitle: true
              events:
                onClick:
                  - id: rw_notif_mail_action
                    type: DisplayMessage
                    params:
                      content: You have 4 unread messages.
                      status: info
        - id: rw_notif_badge_bell
          type: Badge
          layout:
            flex: 0 0 auto
          properties:
            dot: true
          blocks:
            - id: rw_notif_bell_btn
              type: Button
              properties:
                icon: AiOutlineBell
                color: default
                variant: text
                hideTitle: true
              events:
                onClick:
                  - id: rw_notif_bell_action
                    type: DisplayMessage
                    params:
                      content: You have new notifications.
                      status: info
        - id: rw_notif_avatar
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: JD
            color: '#fff'
            backgroundColor: '#1677ff'

