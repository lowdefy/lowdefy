- title: Sidebar Navigation with Badges
  blocks:
    - id: rw_sidebar
      type: Box
      layout:
        direction: column
        gap: 0
      class: bg-white rounded-lg shadow-sm border border-gray-200 p-2 max-w-xs
      blocks:
        - id: rw_nav_inbox_btn
          type: Button
          class: justify-start w-full
          properties:
            title: Inbox
            icon: AiOutlineInbox
            color: primary
            variant: text
          events:
            onClick:
              - id: rw_nav_inbox_action
                type: SetState
                params:
                  selectedNav: inbox
          blocks:
            - id: rw_nav_inbox_badge
              type: Badge
              layout:
                flex: 0 0 auto
              properties:
                count: 12
                size: small
                theme:
                  colorError: '#1677ff'
        - id: rw_nav_alerts_btn
