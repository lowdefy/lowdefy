- title: Style and CSS Examples
  blocks:
    - id: css_shadow
      type: Badge
      layout:
        flex: 0 0 auto
      properties:
        count: 5
      style:
        --indicator:
          boxShadow: 0 0 0 2px #1677ff
      blocks:
        - id: css_shadow_child
          type: Avatar
          properties:
            shape: square
            content: U
    - id: css_green_indicator
      type: Badge
      layout:
        flex: 0 0 auto
      properties:
        count: 5
      style:
        --indicator:
          backgroundColor: '#52c41a'
      blocks:
        - id: css_green_indicator_child
          type: Avatar
          properties:
            shape: square
            content: U
    - id: css_rounded_box
      type: Badge
      class: p-1
      layout:
        flex: 0 0 auto
      properties:
        count: 3
      blocks:
        - id: css_rounded_box_child
          type: Box
          class: bg-gray-100 rounded-lg p-4
          blocks:
            - id: css_rounded_box_text
              type: Paragraph
              properties:
                content: Inbox
    - id: css_bold_indicator
      type: Badge
      layout:
        flex: 0 0 auto
      properties:
        count: 42
      style:
        --indicator:
          fontWeight: bold
          fontSize: 14px
      blocks:
        - id: css_bold_indicator_child
          type: Avatar
          properties:
            shape: square
            content: U
            size: large

