- title: TreeSelector in Category Browser
  blocks:
    - id: applied_category_card
      type: Card
      properties:
        title: Product Category Browser
      blocks:
        - id: applied_category_search
          type: TextInput
          properties:
            title: Search Products
            placeholder: Enter product name or keyword
        - id: applied_category_tree
          type: TreeSelector
          properties:
            title: Select Category
            showLine: true
            label:
              extra: Browse and select a product category to filter results
            options:
              - label: Electronics
                value: electronics
                children:
                  - label: Computers & Tablets
                    value: computers
                    children:
                      - label: Laptops
                        value: laptops
                      - label: Desktops
                        value: desktops
                      - label: Tablets
                        value: tablets
                  - label: Audio & Headphones
                    value: audio
                    children:
                      - label: Over-Ear Headphones
                        value: over_ear
                      - label: In-Ear Earbuds
                        value: earbuds
                      - label: Speakers
                        value: speakers
              - label: Home & Garden
                value: home
                children:
                  - label: Furniture
                    value: furniture
                    children:
                      - label: Living Room
                        value: living_room
                      - label: Bedroom
                        value: bedroom
                  - label: Kitchen
                    value: kitchen
                    children:
                      - label: Appliances
                        value: appliances
                      - label: Cookware
                        value: cookware
              - label: Clothing & Accessories
                value: clothing
                children:
                  - label: Men
                    value: mens_clothing
                  - label: Women
                    value: womens_clothing
                  - label: Kids
                    value: kids_clothing
          events:
            onChange:
              - id: category_change_action
                type: DisplayMessage
                params:
                  content:
                    _string.concat:
                      - 'Browsing category: '
                      - _state: applied_category_tree
                  duration: 1
        - id: applied_category_apply
          type: Button
          properties:
            title: Show Products
            type: primary
            icon: AiOutlineSearch
          events:
            onClick:
              - id: category_apply_action
                type: DisplayMessage
                params:
                  content:
                    _if:
                      test:
                        _ne:
                          - _state: applied_category_tree
                          - null
                      then:
                        _string.concat:
                          - 'Showing products in: '
                          - _state: applied_category_tree
                      else: Please select a category first
                  status:
                    _if:
                      test:
                        _ne:
                          - _state: applied_category_tree
                          - null
                      then: success
                      else: warning

- title: TreeSelector in Permission Manager
  blocks:
    - id: applied_permissions_card
      type: Card
      properties:
        title: Role Permission Manager
      blocks:
        - id: applied_permissions_role_name
          type: TextInput
          properties:
            title: Role Name
            placeholder: e.g. Content Editor
        - id: applied_permissions_tree
          type: TreeSelector
          properties:
            title: Assign Permissions
            checkable: true
            showLine: true
            label:
              extra: Check the permissions this role should have access to
            options:
              - label: Content Management
                value: content
                children:
                  - label: Create Articles
                    value: create_articles
                  - label: Edit Articles
                    value: edit_articles
                  - label: Delete Articles
                    value: delete_articles
                  - label: Publish Articles
                    value: publish_articles
              - label: User Management
                value: users
                children:
                  - label: View Users
                    value: view_users
                  - label: Create Users
                    value: create_users
                  - label: Edit Users
                    value: edit_users
                  - label: Deactivate Users
                    value: deactivate_users
                    disabled: true
              - label: System Settings
                value: system
                children:
                  - label: View Settings
                    value: view_settings
                  - label: Edit Settings
                    value: edit_settings
                    disabled: true
                  - label: View Audit Log
                    value: view_audit
                  - label: Manage API Keys
                    value: manage_api_keys
                    disabled: true
              - label: Reports
                value: reports
                children:
                  - label: View Reports
                    value: view_reports
                  - label: Export Reports
                    value: export_reports
                  - label: Schedule Reports
                    value: schedule_reports
        - id: applied_permissions_save
          type: Button
          properties:
            title: Save Permissions
            type: primary
            icon: AiOutlineSave
          events:
            onClick:
              - id: permissions_save_action
                type: DisplayMessage
                params:
                  content:
                    _string.concat:
                      - 'Permissions saved for role: '
                      - _state: applied_permissions_role_name
                  status: success
              - id: permissions_set_global
                type: SetGlobal
                params:
                  rolePermissions:
                    roleName:
                      _state: applied_permissions_role_name
                    permissions:
                      _state: applied_permissions_tree
