- title: Basic PageHeaderMenu
  fullWidth: true
  blocks:
    - id: phm_basic
      type: PageHeaderMenu
      properties:
        header:
          theme: dark
        menu:
          theme: dark
          links:
            - id: phm_basic_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: phm_basic_about
              type: MenuLink
              properties:
                title: About
            - id: phm_basic_contact
              type: MenuLink
              properties:
                title: Contact
      blocks:
        - id: phm_basic_content
          type: Paragraph
          properties:
            content: PageHeaderMenu provides a full page layout with a horizontal navigation menu in the header. On mobile screens, the menu collapses into a drawer.

- title: Grouped Menu with Breadcrumb
  fullWidth: true
  blocks:
    - id: phm_grouped
      type: PageHeaderMenu
      properties:
        header:
          theme: dark
        breadcrumb:
          separator: /
          list:
            - Dashboard
            - Analytics
            - Overview
        menu:
          theme: dark
          links:
            - id: phm_g_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: phm_g_analytics
              type: MenuGroup
              properties:
                title: Analytics
                icon: AiOutlineBarChart
              links:
                - id: phm_g_overview
                  type: MenuLink
                  properties:
                    title: Overview
                - id: phm_g_realtime
                  type: MenuLink
                  properties:
                    title: Real-time
                - id: phm_g_funnel
                  type: MenuLink
                  properties:
                    title: Funnels
            - id: phm_g_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      events:
        onMenuItemClick:
          - id: phm_g_nav
            type: DisplayMessage
            params:
              content: Navigating...
              duration: 1
      blocks:
        - id: phm_g_title
          type: Title
          properties:
            content: Analytics Overview
            level: 3
        - id: phm_g_cards
          type: Box
          layout:
            gap: 16
          blocks:
            - id: phm_g_card_visits
              type: Statistic
              layout:
                flex: 1 1 200px
              properties:
                title: Page Views
                value: 12,847
            - id: phm_g_card_users
              type: Statistic
              layout:
                flex: 1 1 200px
              properties:
                title: Active Users
                value: 1,024
            - id: phm_g_card_rate
              type: Statistic
              layout:
                flex: 1 1 200px
              properties:
                title: Bounce Rate
                value: 23.4%

- title: Intranet Portal
  fullWidth: true
  blocks:
    - id: phm_intranet
      type: PageHeaderMenu
      properties:
        logo:
          alt: Acme Corp
        header:
          theme: dark
          contentStyle:
            alignItems: center
            gap: 12px
        breadcrumb:
          list:
            - Intranet
            - Team Directory
        menu:
          theme: dark
          links:
            - id: phm_intranet_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: phm_intranet_directory
              type: MenuLink
              properties:
                title: Team Directory
                icon: AiOutlineTeam
            - id: phm_intranet_resources
              type: MenuGroup
              properties:
                title: Resources
                icon: AiOutlineBook
              links:
                - id: phm_intranet_policies
                  type: MenuLink
                  properties:
                    title: Company Policies
                - id: phm_intranet_benefits
                  type: MenuLink
                  properties:
                    title: Benefits Guide
            - id: phm_intranet_help
              type: MenuLink
              properties:
                title: IT Support
                icon: AiOutlineQuestionCircle
      slots:
        header:
          blocks:
            - id: phm_intranet_header_row
              type: Box
              layout:
                gap: 12
                align: center
                flex: 0 0 auto
              blocks:
                - id: phm_intranet_notif_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineBell
                    color: default
                    variant: text
                    hideTitle: true
                    size: small
                - id: phm_intranet_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineUser
                    size: small
        footer:
          blocks:
            - id: phm_intranet_footer_row
              type: Box
              layout:
                justify: center
              blocks:
                - id: phm_intranet_footer_copy
                  type: Paragraph
                  properties:
                    content: Acme Corp Intranet - Internal Use Only
                    style:
                      margin: 0
                      color: '#888'
      blocks:
        - id: phm_intranet_welcome
          type: Title
          properties:
            content: Welcome back, Jane
            level: 3
        - id: phm_intranet_cards
          type: Box
          layout:
            gap: 16
          blocks:
            - id: phm_intranet_card_announce
              type: Card
              layout:
                flex: 1 1 300px
              properties:
                title: Announcements
              blocks:
                - id: phm_intranet_announce_1
                  type: Paragraph
                  properties:
                    content: 'Office hours updated: Building opens at 7:00 AM starting next Monday.'
                - id: phm_intranet_announce_2
                  type: Paragraph
                  properties:
                    content: 'Q1 All-Hands meeting scheduled for March 28 at 2:00 PM.'
            - id: phm_intranet_card_links
              type: Card
              layout:
                flex: 1 1 300px
              properties:
                title: Quick Links
              blocks:
                - id: phm_intranet_link_1
                  type: Paragraph
                  properties:
                    content: Submit a Time-Off Request
                - id: phm_intranet_link_2
                  type: Paragraph
                  properties:
                    content: View Expense Reports
                - id: phm_intranet_link_3
                  type: Paragraph
                  properties:
                    content: Book a Meeting Room

- title: Documentation Site
  fullWidth: true
  blocks:
    - id: phm_docs_site
      type: PageHeaderMenu
      properties:
        logo:
          alt: DevDocs
        header:
          theme: dark
          contentStyle:
            alignItems: center
            gap: 8px
        menu:
          theme: dark
          links:
            - id: phm_docs_guide
              type: MenuLink
              properties:
                title: Guide
                icon: AiOutlineBook
            - id: phm_docs_api_ref
              type: MenuLink
              properties:
                title: API Reference
                icon: AiOutlineApi
            - id: phm_docs_examples
              type: MenuLink
              properties:
                title: Examples
                icon: AiOutlineCode
            - id: phm_docs_community
              type: MenuLink
              properties:
                title: Community
                icon: AiOutlineGlobal
        breadcrumb:
          separator: /
          list:
            - Docs
            - Getting Started
            - Installation
        content:
          style:
            maxWidth: 960px
            margin: 0 auto
            padding: 0 40px 40px 40px
      slots:
        header:
          blocks:
            - id: phm_docs_search_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Search
                icon: AiOutlineSearch
                color: default
                variant: outlined
                size: small
            - id: phm_docs_github_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineGithub
                color: default
                variant: text
                hideTitle: true
                size: small
      blocks:
        - id: phm_docs_title
          type: Title
          properties:
            content: Installation
            level: 2
        - id: phm_docs_intro
          type: Paragraph
          properties:
            content: Get started by installing the framework via npm or yarn. Follow the steps below to set up your development environment.
        - id: phm_docs_alert
          type: Alert
          properties:
            message: Prerequisites
            description: Make sure you have Node.js version 18 or higher installed before proceeding.
            type: info
            showIcon: true
        - id: phm_docs_steps_card
          type: Card
          properties:
            title: Setup Steps
            size: small
          blocks:
            - id: phm_docs_step_1
              type: Paragraph
              properties:
                content: '1. Initialize a new project directory and run the setup command.'
            - id: phm_docs_step_2
              type: Paragraph
              properties:
                content: '2. Configure your lowdefy.yaml file with pages and connections.'
            - id: phm_docs_step_3
              type: Paragraph
              properties:
                content: '3. Start the development server to preview your application.'
