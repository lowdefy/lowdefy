- title: Full Layout with All Slots
  fullWidth: true
  blocks:
    - id: phm_full
      type: PageHeaderMenu
      properties:
        darkModeToggle: true
        logo:
          alt: Acme Corp
        notifications:
          dot: true
        profile:
          avatar:
            icon: AiOutlineUser
        breadcrumb:
          list:
            - Intranet
            - Team Directory
        menu:
          links:
            - id: phm_full_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: phm_full_directory
              type: MenuLink
              properties:
                title: Directory
                icon: AiOutlineTeam
            - id: phm_full_resources
              type: MenuGroup
              properties:
                title: Resources
                icon: AiOutlineBook
              links:
                - id: phm_full_policies
                  type: MenuLink
                  properties:
                    title: Company Policies
                - id: phm_full_benefits
                  type: MenuLink
                  properties:
                    title: Benefits Guide
            - id: phm_full_help
              type: MenuLink
              properties:
                title: IT Support
                icon: AiOutlineQuestionCircle
      slots:
        footer:
          blocks:
            - id: phm_full_footer_text
              type: Paragraph
              properties:
                content: Acme Corp Intranet - Internal Use Only
                style:
                  margin: 0
                  color: '#888'
                  textAlign: center
      blocks:
        - id: phm_full_welcome
          type: Title
          properties:
            content: Welcome back, Jane
            level: 3
        - id: phm_full_cards
          type: Box
          layout:
            gap: 16
          blocks:
            - id: phm_full_card_announce
              type: Card
              layout:
                flex: 1 1 300px
              properties:
                title: Announcements
              blocks:
                - id: phm_full_announce_1
                  type: Paragraph
                  properties:
                    content: 'Office hours updated: Building opens at 7:00 AM starting next Monday.'
                - id: phm_full_announce_2
                  type: Paragraph
                  properties:
                    content: 'Q1 All-Hands meeting scheduled for March 28 at 2:00 PM.'
            - id: phm_full_card_links
              type: Card
              layout:
                flex: 1 1 300px
              properties:
                title: Quick Links
              blocks:
                - id: phm_full_link_1
                  type: Paragraph
                  properties:
                    content: Submit a Time-Off Request
                - id: phm_full_link_2
                  type: Paragraph
                  properties:
                    content: View Expense Reports

- title: Dark Mode Toggle with Breadcrumb
  fullWidth: true
  blocks:
    - id: phm_light
      type: PageHeaderMenu
      properties:
        darkModeToggle: true
        menu:
          links:
            - id: phm_light_guide
              type: MenuLink
              properties:
                title: Guide
                icon: AiOutlineBook
            - id: phm_light_api
              type: MenuLink
              properties:
                title: API Reference
                icon: AiOutlineApi
            - id: phm_light_examples
              type: MenuLink
              properties:
                title: Examples
                icon: AiOutlineCode
            - id: phm_light_community
              type: MenuLink
              properties:
                title: Community
                icon: AiOutlineGlobal
        breadcrumb:
          separator: /
          list:
            - Docs
            - Getting Started
            - Installation
      slots:
        header:
          blocks:
            - id: phm_light_search_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Search
                icon: AiOutlineSearch
                color: default
                variant: outlined
                size: small
      blocks:
        - id: phm_light_title
          type: Title
          properties:
            content: Installation
            level: 2
        - id: phm_light_intro
          type: Paragraph
          properties:
            content: Get started by installing the framework via npm or yarn. Follow the steps below to set up your development environment.
        - id: phm_light_alert
          type: Alert
          properties:
            message: Prerequisites
            description: Make sure you have Node.js version 18 or higher installed before proceeding.
            type: info
            showIcon: true
        - id: phm_light_steps
          type: Card
          properties:
            title: Setup Steps
            size: small
          blocks:
            - id: phm_light_step_1
              type: Paragraph
              properties:
                content: '1. Initialize a new project directory and run the setup command.'
            - id: phm_light_step_2
              type: Paragraph
              properties:
                content: '2. Configure your lowdefy.yaml file with pages and connections.'
            - id: phm_light_step_3
              type: Paragraph
              properties:
                content: '3. Start the development server to preview your application.'
