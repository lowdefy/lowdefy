- title: Basic PageHeaderMenu
  fullWidth: true
  blocks:
    - id: phm_basic
      type: PageHeaderMenu
      properties:
        menu:
          links:
            - id: phm_basic_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: phm_basic_products
              type: MenuLink
              properties:
                title: Products
                icon: AiOutlineAppstore
            - id: phm_basic_pricing
              type: MenuLink
              properties:
                title: Pricing
            - id: phm_basic_contact
              type: MenuLink
              properties:
                title: Contact
      blocks:
        - id: phm_basic_title
          type: Title
          properties:
            content: Welcome
            level: 2
        - id: phm_basic_cards
          type: Box
          layout:
            gap: 16
          blocks:
            - id: phm_basic_card_1
              type: Card
              layout:
                flex: 1 1 0
              properties:
                title: Getting Started
              blocks:
                - id: phm_basic_card_1_text
                  type: Paragraph
                  properties:
                    content: Follow the quick start guide to set up your first project in minutes.
            - id: phm_basic_card_2
              type: Card
              layout:
                flex: 1 1 0
              properties:
                title: Documentation
              blocks:
                - id: phm_basic_card_2_text
                  type: Paragraph
                  properties:
                    content: Browse the full API reference and configuration guides.

- title: Menu Groups & Breadcrumb
  fullWidth: true
  blocks:
    - id: phm_grouped
      type: PageHeaderMenu
      properties:
        darkModeToggle: true
        breadcrumb:
          separator: /
          list:
            - label: Home
              icon: AiOutlineHome
            - label: Analytics
            - label: Overview
        menu:
          links:
            - id: phm_g_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: phm_g_analytics
              type: MenuGroup
              properties:
                title: Analytics
                icon: AiOutlineBarChart
              links:
                - id: phm_g_overview
                  type: MenuLink
                  properties:
                    title: Overview
                - id: phm_g_realtime
                  type: MenuLink
                  properties:
                    title: Real-time
                - id: phm_g_funnel
                  type: MenuLink
                  properties:
                    title: Funnels
            - id: phm_g_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: phm_g_title
          type: Title
          properties:
            content: Analytics Overview
            level: 3
        - id: phm_g_cards
          type: Box
          layout:
            gap: 16
          blocks:
            - id: phm_g_card_visits
              type: Card
              layout:
                flex: 1 1 200px
              properties:
                size: small
              blocks:
                - id: phm_g_stat_visits
                  type: Statistic
                  properties:
                    title: Page Views
                    value: 12847
            - id: phm_g_card_users
              type: Card
              layout:
                flex: 1 1 200px
              properties:
                size: small
              blocks:
                - id: phm_g_stat_users
                  type: Statistic
                  properties:
                    title: Active Users
                    value: 1024
            - id: phm_g_card_rate
              type: Card
              layout:
                flex: 1 1 200px
              properties:
                size: small
              blocks:
                - id: phm_g_stat_rate
                  type: Statistic
                  properties:
                    title: Bounce Rate
                    value: 23.4
                    suffix: '%'

- title: Profile & Notifications
