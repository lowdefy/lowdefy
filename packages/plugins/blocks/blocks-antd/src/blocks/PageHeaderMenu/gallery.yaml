            level: 3
        - id: phm_prof_cards
          type: Box
          layout:
            gap: 16
          blocks:
            - id: phm_prof_card_1
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: phm_prof_stat_1
                  type: Statistic
