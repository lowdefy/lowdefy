- title: Line Progress
  blocks:
    - id: line_0
      type: Progress
      properties:
        percent: 0
    - id: line_30
      type: Progress
      properties:
        percent: 30
    - id: line_50
      type: Progress
      properties:
        percent: 50
    - id: line_70
      type: Progress
      properties:
        percent: 70
    - id: line_100
      type: Progress
      properties:
        percent: 100

- title: Line Status
  blocks:
    - id: status_normal
      type: Progress
      properties:
        percent: 30
        status: normal
    - id: status_active
      type: Progress
      properties:
        percent: 60
        status: active
    - id: status_success
      type: Progress
      properties:
        percent: 100
        status: success
    - id: status_exception
      type: Progress
      properties:
        percent: 70
        status: exception

- title: Circle Progress
  blocks:
    - id: circle_0
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 0
    - id: circle_25
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 25
    - id: circle_50
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 50
    - id: circle_75
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 75
    - id: circle_100
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 100

- title: Circle Status
