      type: Progress
      properties:
        percent: 60
        strokeWidth: 4
    - id: stroke_default
      type: Progress
      properties:
        percent: 60
        strokeWidth: 8
    - id: stroke_thick
      type: Progress
      properties:
        percent: 60
        strokeWidth: 16
    - id: stroke_extra_thick
      type: Progress
      properties:
        percent: 60
        strokeWidth: 24
        strokeColor: '#1677ff'

- title: Stroke Width (Circle)
  blocks:
