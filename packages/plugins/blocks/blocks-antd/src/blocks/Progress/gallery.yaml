    - id: circle_default_stroke
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 75
        strokeWidth: 6
    - id: circle_thick_stroke
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 75
        strokeWidth: 12
    - id: circle_extra_thick_stroke
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 75
        strokeWidth: 20

- title: Steps (Segmented Line)
  blocks:
