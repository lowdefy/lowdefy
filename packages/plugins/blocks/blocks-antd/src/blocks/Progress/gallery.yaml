- title: Gradient Stroke Colors (Line)
  blocks:
    - id: gradient_line_blue
      type: Progress
      properties:
        percent: 80
        strokeColor:
          '0%': '#108ee9'
          '100%': '#87d068'
    - id: gradient_line_warm
      type: Progress
      properties:
        percent: 65
        strokeColor:
          '0%': '#ff4d4f'
          '100%': '#faad14'
    - id: gradient_line_cool
      type: Progress
      properties:
        percent: 90
        strokeColor:
          '0%': '#722ed1'
          '100%': '#13c2c2'

- title: Trail Color
  blocks:
    - id: trail_blue
      type: Progress
      properties:
        percent: 60
        strokeColor: '#1677ff'
        trailColor: '#e6f4ff'
    - id: trail_green
      type: Progress
      properties:
        percent: 75
        strokeColor: '#52c41a'
        trailColor: '#f6ffed'
    - id: trail_circle
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 45
        strokeColor: '#1677ff'
        trailColor: '#e6f4ff'
    - id: trail_circle_purple
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 70
        strokeColor: '#722ed1'
        trailColor: '#f9f0ff'

- title: Stroke Linecap
  blocks:
    - id: linecap_round
      type: Progress
      properties:
        percent: 60
        strokeLinecap: round
        strokeWidth: 12
        strokeColor: '#52c41a'
    - id: linecap_square
      type: Progress
      properties:
        percent: 60
        strokeLinecap: square
        strokeWidth: 12
        strokeColor: '#1677ff'

- title: Stroke Linecap (Circle)
  blocks:
    - id: circle_linecap_round
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 75
        strokeLinecap: round
    - id: circle_linecap_square
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 75
        strokeLinecap: square

- title: Stroke Width (Line)
  blocks:
