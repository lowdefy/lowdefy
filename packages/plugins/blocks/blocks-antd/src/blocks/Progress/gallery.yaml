    - id: steps_5
      type: Progress
      properties:
        percent: 60
        steps: 5
    - id: steps_8
      type: Progress
      properties:
        percent: 50
        steps: 8
    - id: steps_colored
      type: Progress
      properties:
        percent: 80
        steps: 5
        strokeColor: '#52c41a'

- title: Show Info Toggle
  blocks:
    - id: no_info_line
      type: Progress
      properties:
        percent: 50
        showInfo: false
    - id: no_info_circle
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 75
        showInfo: false
        width: 80
    - id: no_info_dashboard
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: dashboard
        percent: 60
        showInfo: false
        width: 80
    - id: info_shown_line
      type: Progress
      properties:
        percent: 50
        showInfo: true

- title: Segmented Success
  blocks:
    - id: success_line
      type: Progress
      properties:
        percent: 60
        success:
          percent: 30
    - id: success_line_high
      type: Progress
      properties:
        percent: 90
        success:
          percent: 60
    - id: success_circle
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 80
        success:
          percent: 50
    - id: success_dashboard
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: dashboard
        percent: 75
        success:
          percent: 40

- title: Style Overrides
  blocks:
    - id: style_line_margin
      type: Progress
      properties:
        percent: 72
        strokeColor: '#722ed1'
      style:
        --element:
          maxWidth: 400px
    - id: style_circle_shadow
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 88
        strokeColor: '#1677ff'
      style:
        --element:
          filter: drop-shadow(0 2px 8px rgba(22, 119, 255, 0.3))
    - id: style_circle_bg
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 95
        strokeColor: '#52c41a'
      style:
        --element:
          backgroundColor: '#f6ffed'
          padding: 16px
          borderRadius: 8px

- title: Theme Token Overrides
  blocks:
    - id: theme_custom_default_color
      type: Progress
      properties:
        percent: 70
        theme:
          defaultColor: '#722ed1'
    - id: theme_custom_remaining
      type: Progress
      properties:
        percent: 55
        theme:
          remainingColor: '#f9f0ff'
          defaultColor: '#722ed1'
    - id: theme_circle_colors
      type: Progress
      layout:
        flex: 0 0 auto
      properties:
        type: circle
        percent: 82
        theme:
          defaultColor: '#eb2f96'
          remainingColor: '#fff0f6'
    - id: theme_success_color
      type: Progress
      properties:
        percent: 100
        status: success
        theme:
          colorSuccess: '#13c2c2'

- title: Real-World Examples
  blocks:
    - id: example_upload_label
      type: Markdown
      properties:
        content: '**File upload:**'
    - id: example_upload
      type: Progress
      properties:
        percent: 72
        status: active
        strokeColor:
          '0%': '#108ee9'
          '100%': '#87d068'
    - id: example_skills_label
      type: Markdown
      properties:
        content: '**Skill levels:**'
    - id: example_skill_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: example_skill_js
          type: Progress
          layout:
            flex: 1 1 0
          properties:
            percent: 90
            strokeColor: '#faad14'
        - id: example_skill_py
          type: Progress
          layout:
            flex: 1 1 0
          properties:
            percent: 75
            strokeColor: '#1677ff'
        - id: example_skill_go
          type: Progress
          layout:
            flex: 1 1 0
          properties:
            percent: 45
            strokeColor: '#13c2c2'
    - id: example_kpi_label
      type: Markdown
      properties:
        content: '**KPI dashboard:**'
    - id: example_kpi_row
      type: Box
      layout:
        gap: 16
      blocks:
        - id: example_kpi_cpu
          type: Progress
          layout:
            flex: 0 0 auto
          properties:
            type: dashboard
            percent: 68
            strokeColor: '#1677ff'
            width: 100
        - id: example_kpi_mem
          type: Progress
          layout:
            flex: 0 0 auto
          properties:
            type: dashboard
            percent: 85
            strokeColor: '#faad14'
            width: 100
        - id: example_kpi_disk
          type: Progress
          layout:
            flex: 0 0 auto
          properties:
            type: dashboard
            percent: 42
            strokeColor: '#52c41a'
            width: 100
    - id: example_steps_label
      type: Markdown
      properties:
        content: '**Onboarding progress:**'
    - id: example_steps
      type: Progress
      properties:
        percent: 60
        steps: 5
        strokeColor: '#52c41a'
