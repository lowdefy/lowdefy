- title: Steps Wizard Pattern
  fullWidth: true

  blocks:
    - id: wizard_card
      type: Card
      properties:
        title: Create Account
        size: small
      blocks:
        - id: wizard_steps
          type: Steps
          properties:
            current:
              _state: wizard_step
            items:
              - title: Account
                icon: AiOutlineUser
              - title: Profile
                icon: AiOutlineIdcard
              - title: Confirm
                icon: AiOutlineCheck
          events:
            onChange:
              - id: wizard_set_step
                type: SetState
                params:
                  wizard_step:
                    _event: current
        - id: wizard_divider
          type: Divider
        - id: wizard_description
          type: Markdown
          properties:
            content:
              _if:
                test:
                  _eq:
                    - _state: wizard_step
                    - 0
                then: |
                  **Step 1: Account Details**

                  Enter your email address and create a password to get started.
                else:
                  _if:
                    test:
                      _eq:
                        - _state: wizard_step
                        - 1
                    then: |
                      **Step 2: Profile Information**

                      Tell us a bit about yourself so we can personalize your experience.
                    else: |
                      **Step 3: Confirmation**

                      Review your information and confirm to complete registration.
        - id: wizard_actions
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: wizard_prev_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Previous
                color: default
                variant: outlined
                disabled:
                  _eq:
                    - _state: wizard_step
                    - 0
              events:
                onClick:
                  - id: wizard_prev_action
                    type: SetState
                    params:
                      wizard_step:
                        _subtract:
                          - _state:
                              key: wizard_step
                              default: 0
                          - 1
            - id: wizard_next_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title:
                  _if:
                    test:
                      _eq:
                        - _state: wizard_step
                        - 2
                    then: Submit
                    else: Next
                color: primary
                variant: solid
              events:
                onClick:
                  - id: wizard_next_action
                    type: SetState
                    skip:
                      _eq:
                        - _state: wizard_step
                        - 2
                    params:
                      wizard_step:
                        _sum:
                          - _state:
                              key: wizard_step
                              default: 0
                          - 1
                  - id: wizard_done_msg
                    type: DisplayMessage
                    skip:
                      _not:
                        _eq:
                          - _state: wizard_step
                          - 2
                    params:
                      content: Account created successfully!
                      status: success

