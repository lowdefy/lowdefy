- title: Theme Token Overrides
  blocks:
    - id: flex_theme_padding
      type: Flex
      properties:
        gap: 12
        theme:
          padding: 24
          margin: 8
      blocks:
        - id: flex_theme_padding_btn1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom Padding
            color: primary
            variant: solid
        - id: flex_theme_padding_btn2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: And Margin
            color: primary
            variant: outlined

    - id: flex_theme_bg
      type: Flex
      properties:
        gap: 12
        theme:
          colorBgContainer: '#f6ffed'
      blocks:
        - id: flex_theme_bg_btn1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Token A
            color: green
            variant: solid
        - id: flex_theme_bg_btn2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Token B
            color: green
            variant: outlined

    - id: flex_theme_combined
      type: Flex
      properties:
        gap: 16
        vertical: true
        theme:
          padding: 20
          margin: 4
