- title: Flex Shorthand Property
  fullWidth: true
  blocks:
    - id: flex_prop_label
      type: Markdown
      properties:
        content: '**flex** property on the Flex container itself sets the CSS flex shorthand'
    - id: flex_prop_outer
      type: Flex
      properties:
        gap: 16
      blocks:
        - id: flex_prop_grow
          type: Flex
          layout:
            flex: 1 1 0
          class: bg-blue-50 p-4 rounded
          properties:
            flex: 1
            justify: center
            align: center
          blocks:
            - id: flex_prop_grow_txt
              type: Paragraph
              properties:
                content: flex 1 (grows)
        - id: flex_prop_fixed
          type: Flex
          layout:
            flex: 0 0 auto
          class: bg-green-50 p-4 rounded
          properties:
            flex: none
            justify: center
            align: center
          blocks:
            - id: flex_prop_fixed_txt
              type: Paragraph
              properties:
                content: flex none (fixed)
        - id: flex_prop_grow2
          type: Flex
          layout:
            flex: 2 1 0
          class: bg-orange-50 p-4 rounded
          properties:
            flex: 2
            justify: center
            align: center
          blocks:
            - id: flex_prop_grow2_txt
              type: Paragraph
              properties:
                content: flex 2 (grows 2x)

- title: Composition - Toolbar
  fullWidth: true
  blocks:
    - id: flex_toolbar
      type: Flex
      class: bg-white p-3 rounded-lg shadow-sm border
      properties:
        justify: space-between
        align: center
        gap: 8
      blocks:
        - id: flex_toolbar_left
          type: Flex
          properties:
            gap: 8
            align: center
          blocks:
            - id: flex_toolbar_title
              type: Title
              layout:
                flex: 0 0 auto
              properties:
                content: Dashboard
                level: 5
            - id: flex_toolbar_tag
              type: Tag
              layout:
                flex: 0 0 auto
              properties:
                title: Live
                color: success
        - id: flex_toolbar_right
          type: Flex
          properties:
            gap: 8
          blocks:
            - id: flex_toolbar_btn_filter
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Filter
                icon: AiOutlineFilter
                color: default
                variant: outlined
                size: small
            - id: flex_toolbar_btn_export
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Export
                icon: AiOutlineDownload
                color: primary
                variant: solid
                size: small

