- title: Application Toolbar
  fullWidth: true
  blocks:
    - id: flex_app_toolbar
      type: Flex
      class: bg-white p-3 rounded-lg shadow-sm border
      properties:
        justify: space-between
        align: center
        gap: 8
      blocks:
        - id: flex_app_toolbar_left
          type: Flex
          properties:
            gap: 8
            align: center
          blocks:
            - id: flex_app_toolbar_title
              type: Title
              layout:
                flex: 0 0 auto
              properties:
                content: Dashboard
                level: 5
            - id: flex_app_toolbar_tag
              type: Tag
              layout:
                flex: 0 0 auto
              properties:
                title: Live
                color: success
        - id: flex_app_toolbar_right
          type: Flex
          properties:
            gap: 8
          blocks:
            - id: flex_app_toolbar_btn_filter
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Filter
                icon: AiOutlineFilter
                color: default
                variant: outlined
                size: small
              events:
                onClick:
                  - id: flex_app_toolbar_filter_msg
                    type: DisplayMessage
                    params:
                      content: Filter panel toggled.
                      status: info
            - id: flex_app_toolbar_btn_export
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Export
                icon: AiOutlineDownload
                color: primary
                variant: solid
                size: small
              events:
                onClick:
                  - id: flex_app_toolbar_export_msg
                    type: DisplayMessage
                    params:
                      content: Export started.
                      status: success

