- title: Basic Horizontal
  blocks:
    - id: flex_basic
      type: Flex
      properties:
        gap: 8
      blocks:
        - id: flex_basic_btn1
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: One
            color: primary
            variant: solid
        - id: flex_basic_btn2
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Two
            color: primary
            variant: outlined
        - id: flex_basic_btn3
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Three
            color: primary
            variant: dashed

- title: Vertical Layout
  blocks:
    - id: flex_vertical
      type: Flex
      properties:
        vertical: true
        gap: 12
      blocks:
        - id: flex_vert_card1
          type: Card
          properties:
            title: First
            size: small
          blocks:
