id: flex_block
type: Box

blocks:
  # ============================================
  # HORIZONTAL (DEFAULT)
  # ============================================

  - id: flex_horizontal
    type: Flex
    blocks:
      - id: flex_h_btn_1
        type: Button
        properties:
          title: Button 1
      - id: flex_h_btn_2
        type: Button
        properties:
          title: Button 2
      - id: flex_h_btn_3
        type: Button
        properties:
          title: Button 3

  # ============================================
  # VERTICAL
  # ============================================

  - id: flex_vertical
    type: Flex
    properties:
      vertical: true
    blocks:
      - id: flex_v_btn_1
        type: Button
        properties:
          title: Button A
      - id: flex_v_btn_2
        type: Button
        properties:
          title: Button B
      - id: flex_v_btn_3
        type: Button
        properties:
          title: Button C

  # ============================================
  # GAP
  # ============================================

  - id: flex_gap
    type: Flex
    properties:
      gap: 24
    blocks:
      - id: flex_gap_btn_1
        type: Button
        properties:
          title: Gap 1
      - id: flex_gap_btn_2
        type: Button
        properties:
          title: Gap 2

  # ============================================
  # JUSTIFY
  # ============================================

  - id: flex_justify
    type: Flex
    properties:
      justify: space-between
    blocks:
      - id: flex_j_btn_1
        type: Button
        properties:
          title: Left
      - id: flex_j_btn_2
        type: Button
        properties:
          title: Right
