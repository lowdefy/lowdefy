id: float_button
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: fb_basic
    type: FloatButton
    properties:
      icon: AiOutlineQuestion

  # ============================================
  # PRIMARY TYPE
  # ============================================

  - id: fb_primary
    type: FloatButton
    properties:
      type: primary
      icon: AiOutlineQuestion

  # ============================================
  # EVENT TESTS
  # ============================================

  - id: fb_click
    type: FloatButton
    properties:
      icon: AiOutlinePlus
    events:
      onClick:
        - id: set_fb_clicked
          type: SetState
          params:
            fb_clicked: true

  - id: fb_click_display
    type: Paragraph
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: fb_clicked
              - true
          then: Clicked!
          else: ''

  # ============================================
  # TOOLTIP TEST
  # ============================================

  - id: fb_tooltip
    type: FloatButton
    properties:
      tooltip: Help
      icon: AiOutlineQuestion
