- title: FloatButton Preview
  fullWidth: true
  blocks:
    - id: float_preview
      type: FloatButton
      properties:
        type:
          _if_none:
            - _state: float_type
            - default
        shape:
          _if_none:
            - _state: float_shape
            - circle
        icon:
          _if_none:
            - _state: float_icon
            - AiOutlineQuestionCircle
        tooltip:
          _state: float_tooltip
        description:
          _state: float_description
        badge:
          _state: float_badge
        theme:
          _state: float_theme
    - id: float_current_label
      type: Paragraph
      properties:
        type: secondary
        content:
          _nunjucks:
            template: >
              Active example: **{{ label }}** — look at the floating button in the bottom-right corner.
            on:
              label:
                _if_none:
                  - _state: float_label
                  - Basic (default)
    - id: float_examples_grid
      type: Box
      layout:
        gap: 8
        wrap: wrap
      blocks:
        - id: btn_ex_basic
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Basic
            color:
              _if:
                test:
                  _eq:
                    - _state: float_label
                    - null
                then: primary
                else: default
            variant:
              _if:
                test:
                  _eq:
                    - _state: float_label
                    - null
                then: solid
                else: outlined
          events:
            onClick:
              - id: set_basic
                type: SetState
                params:
                  float_type: default
                  float_shape: circle
                  float_icon: AiOutlineQuestionCircle
                  float_tooltip:
                  float_description:
                  float_badge:
                  float_theme:
                  float_label:
        - id: btn_ex_primary
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Primary Type
            color:
              _if:
                test:
                  _eq:
                    - _state: float_label
                    - Primary Type
                then: primary
                else: default
            variant:
              _if:
                test:
                  _eq:
                    - _state: float_label
                    - Primary Type
                then: solid
                else: outlined
          events:
            onClick:
              - id: set_primary
                type: SetState
                params:
                  float_type: primary
                  float_shape: circle
                  float_icon: AiOutlineCustomerService
                  float_tooltip:
                  float_description:
                  float_badge:
                  float_theme:
                  float_label: Primary Type
        - id: btn_ex_square
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Square Shape
            color:
              _if:
                test:
                  _eq:
                    - _state: float_label
                    - Square Shape
                then: primary
                else: default
            variant:
              _if:
                test:
                  _eq:
                    - _state: float_label
                    - Square Shape
                then: solid
                else: outlined
          events:
            onClick:
              - id: set_square
                type: SetState
                params:
                  float_type: default
                  float_shape: square
                  float_icon: AiOutlineSetting
                  float_tooltip:
                  float_description:
                  float_badge:
                  float_theme:
                  float_label: Square Shape
        - id: btn_ex_tooltip
