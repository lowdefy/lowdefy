- title: Style and CSS
  blocks:
    - id: css_shadow
      type: FloatButton
      class: shadow-xl
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        icon: AiOutlineStar
        tooltip: Shadow
    - id: css_opacity
      type: FloatButton
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
          opacity: 0.6
      properties:
        icon: AiOutlineEye
        tooltip: Reduced opacity
    - id: css_ring
      type: FloatButton
      class: ring-2 ring-blue-400
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        icon: AiOutlinePlus
        tooltip: Ring highlight
        type: primary
    - id: css_on_dark_bg
      type: Box
      class: bg-gradient-to-r from-slate-900 to-slate-700 p-4 rounded-lg
      layout:
        gap: 8
      blocks:
        - id: css_on_dark
          type: FloatButton
          style:
            --element:
              position: relative
              insetInlineEnd: auto
              insetBlockEnd: auto
          properties:
            icon: AiOutlineBulb
            tooltip: On dark background
            type: primary

- title: Theme Token Overrides
  blocks:
    - id: theme_green
      type: FloatButton
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        icon: AiOutlineCheck
        tooltip: Green primary
        type: primary
        theme:
          colorPrimary: '#52c41a'
          colorPrimaryHover: '#73d13d'
    - id: theme_dark_bg
      type: FloatButton
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        icon: AiOutlineSetting
        tooltip: Dark background
        theme:
          colorBgElevated: '#1f1f1f'
          colorText: '#ffffff'
    - id: theme_large
      type: FloatButton
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        icon: AiOutlinePlus
        tooltip: Large button
        type: primary
        theme:
          controlHeightLG: 56
          fontSizeIcon: 24
    - id: theme_custom_badge
      type: FloatButton
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        icon: AiOutlineBell
        tooltip: Custom badge color
        badge:
          count: 3
        theme:
          badgeColor: '#722ed1'
          dotSize: 12

- title: FloatButton in Dashboard
  blocks:
    - id: dashboard_card
      type: Card
      properties:
        title: Sales Overview
        size: small
      blocks:
        - id: dashboard_stats
          type: Box
          layout:
            gap: 16
          blocks:
            - id: dashboard_revenue
              type: Statistic
              layout:
                flex: 1 1 auto
              properties:
                title: Total Revenue
                value: 48250
                prefix: $
                precision: 0
            - id: dashboard_orders
              type: Statistic
              layout:
                flex: 1 1 auto
              properties:
                title: Orders
                value: 312
            - id: dashboard_growth
              type: Statistic
              layout:
                flex: 1 1 auto
              properties:
                title: Growth
                value: 12.5
                suffix: '%'
        - id: dashboard_divider
          type: Divider
        - id: dashboard_info
          type: Markdown
          properties:
            content: |
              Updated 5 minutes ago. Use the floating button to export this report or get help.
        - id: dashboard_float
          type: FloatButton
          style:
            --element:
              position: relative
              insetInlineEnd: auto
              insetBlockEnd: auto
          properties:
            icon: AiOutlineDownload
            tooltip: Export report
            type: primary
          events:
            onClick:
              - id: dashboard_export_msg
                type: DisplayMessage
                params:
                  content: Report export started
                  status: success

- title: FloatButton in Help Center
  blocks:
    - id: help_card
      type: Card
      properties:
        title: Getting Started
        size: small
      blocks:
        - id: help_content
          type: Markdown
          properties:
            content: |
              Welcome to the platform. Follow these steps to get started:

              1. **Create a project** - Set up your first Lowdefy project.
              2. **Add pages** - Define your app layout with pages and blocks.
              3. **Connect data** - Link to your database or API.

              Need help? Click the floating support button below.
        - id: help_actions
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: help_docs_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Read the Docs
                color: primary
                variant: outlined
                icon: AiOutlineFileText
              events:
                onClick:
                  - id: help_docs_link
                    type: Link
                    params:
                      url: https://docs.lowdefy.com
                      newWindow: true
            - id: help_float
              type: FloatButton
              style:
                --element:
                  position: relative
                  insetInlineEnd: auto
                  insetBlockEnd: auto
              properties:
                icon: AiOutlineCustomerService
                tooltip: Contact support
                type: primary
                badge:
                  dot: true
              events:
                onClick:
                  - id: help_support_msg
                    type: DisplayMessage
                    params:
                      content: Opening support chat...
                      status: info
