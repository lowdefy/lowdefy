- title: Type
  blocks:
    - id: type_default
      type: FloatButton
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        type: default
        icon: AiOutlineQuestionCircle
        tooltip: Default type
    - id: type_primary
      type: FloatButton
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        type: primary
        icon: AiOutlineQuestionCircle
        tooltip: Primary type
    - id: type_primary_icon
      type: FloatButton
      style:
        --element:
          position: relative
          insetInlineEnd: auto
          insetBlockEnd: auto
      properties:
        type: primary
        icon: AiOutlineCustomerService
        tooltip: Support

