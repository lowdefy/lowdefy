- title: Style Overrides
  blocks:
    - id: style_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: style_border
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: BD
            color: '#1677ff'
          style:
            --element:
              border: 2px solid #1677ff
        - id: style_shadow
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: SH
            color: '#722ed1'
          style:
            --element:
              boxShadow: 0 2px 8px rgba(114, 46, 209, 0.4)
        - id: style_gradient
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineStar
            size: large
          style:
            --element:
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
        - id: style_large_custom
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: XL
            size: 56
            color: '#fa541c'
          style:
            --element:
              fontSize: 20px
              fontWeight: bold

- title: Theme Token Overrides
  blocks:
    - id: theme_row
      type: Box
      layout:
        gap: 8
        align: center
      blocks:
        - id: theme_large_container
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineUser
            size: large
            color: '#1677ff'
            theme:
              containerSizeLG: 56
              iconFontSizeLG: 32
        - id: theme_text_size
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: Hi
            size: large
            color: '#52c41a'
            theme:
              containerSizeLG: 48
              textFontSizeLG: 20

- title: Combined Examples
  blocks:
    - id: combined_row
      type: Box
      layout:
        gap: 8
        align: center
      blocks:
        - id: combined_profile
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            src: https://api.dicebear.com/7.x/miniavs/svg?seed=profile
            size: large
            alt: User profile
          style:
            --element:
              border: 2px solid #1677ff
        - id: combined_badge_icon
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineCrown
            color: '#faad14'
            shape: square
            size: large
          style:
            --element:
              borderRadius: 8px
        - id: combined_dark
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: DK
            color: '#141414'
            size: large
          style:
            --element:
              border: 1px solid #434343
        - id: combined_outline_circle
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlinePlus
            size: large
          style:
            --element:
              backgroundColor: '#fff'
              color: '#1677ff'
              border: 2px dashed #1677ff
