                    type: DisplayMessage
                    params:
                      content: View Marcus Reed's profile
                      status: info
            - id: c2_body
              type: Box
              layout:
                flex: 1 1 0
                gap: 4
              blocks:
                - id: c2_header
                  type: Html
                  properties:
                    html: '<b>Marcus Reed</b> <span style="color:#8c8c8c;font-size:13px">&middot; 1h ago</span>'
                - id: c2_text
                  type: Span
                  properties:
                    content: Good idea! I will add it to the next sprint. Should be ready by Friday.
                - id: c2_actions
                  type: Box
                  layout:
                    gap: 16
                  style:
                    --element:
                      marginTop: 4
                  blocks:
                    - id: c2_like
                      type: Anchor
                      layout:
                        flex: 0 0 auto
                      properties:
                        icon: AiOutlineLike
                        title: Like
                      style:
                        --element:
                          fontSize: 13px
                          color: '#8c8c8c'
                    - id: c2_reply
                      type: Anchor
                      layout:
                        flex: 0 0 auto
                      properties:
                        icon: AiOutlineMessage
                        title: Reply
                      style:
                        --element:
                          fontSize: 13px
                          color: '#8c8c8c'
        - id: c_divider_2
          type: Divider
          style:
            --element:
              margin: 0
        - id: c3
          type: Box
          layout:
            gap: 12
            align: flex-start
            wrap: nowrap
          style:
            --element:
              padding: 16px 0
          blocks:
            - id: c3_avatar
              type: Avatar
              layout:
                flex: 0 0 auto
