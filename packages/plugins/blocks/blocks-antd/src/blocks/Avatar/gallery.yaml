        - id: size_large
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: L
            size: large
            color: '#722ed1'
        - id: size_numeric_48
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: '48'
            size: 48
            color: '#eb2f96'
        - id: size_numeric_64
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: '64'
            size: 64
            color: '#eb2f96'

- title: Text Content
  blocks:
    - id: text_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: text_single
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: U
            color: '#1677ff'
        - id: text_initials
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: JD
            color: '#52c41a'
        - id: text_name
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: Tom
            color: '#fa8c16'
            size: large
        - id: text_number
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
