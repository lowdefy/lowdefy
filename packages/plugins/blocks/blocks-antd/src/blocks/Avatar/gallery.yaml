                - src: https://api.dicebear.com/7.x/miniavs/svg?seed=5
                - content: AB
                  color: '#52c41a'
                - icon: AiOutlineUser
                  color: '#722ed1'
                - content: CD
                  color: '#f5222d'
                - content: EF
                  color: '#fa8c16'
          style:
            --max:
              color: '#fff'
              backgroundColor: '#1677ff'
        - id: group_red_overflow
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            group:
              maxCount: 2
              avatars:
                - content: P
                  color: '#1677ff'
                - content: Q
                  color: '#52c41a'
                - content: R
                  color: '#722ed1'
                - content: S
                  color: '#faad14'
