- title: Shapes
  blocks:
    - id: shapes_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: shape_circle
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: A
            shape: circle
            color: '#1677ff'
        - id: shape_square
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: B
            shape: square
            color: '#1677ff'
        - id: shape_circle_icon
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineUser
            shape: circle
            color: '#52c41a'
        - id: shape_square_icon
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineUser
            shape: square
            color: '#52c41a'
        - id: shape_circle_src
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            src: https://api.dicebear.com/7.x/miniavs/svg?seed=shape1
            shape: circle
        - id: shape_square_src
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            src: https://api.dicebear.com/7.x/miniavs/svg?seed=shape2
            shape: square

