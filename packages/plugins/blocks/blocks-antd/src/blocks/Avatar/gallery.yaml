- title: Icons
  blocks:
    - id: icons_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: icon_user
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineUser
            color: '#1677ff'
        - id: icon_team
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineTeam
            color: '#722ed1'
        - id: icon_star
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineStar
            color: '#faad14'
        - id: icon_custom_color
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon:
              name: AiOutlineThunderbolt
              color: '#fff700'
            color: '#000000'
        - id: icon_custom_large
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon:
              name: AiOutlineCrown
              color: '#fff'
            color: '#722ed1'
            size: large

- title: Image Source and Alt
  blocks:
