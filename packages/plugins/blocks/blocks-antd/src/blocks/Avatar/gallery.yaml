- title: Shapes
  blocks:
    - id: shape_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: shape_circle
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: A
            shape: circle
            color: '#1677ff'
        - id: shape_square
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: B
            shape: square
            color: '#1677ff'
        - id: shape_circle_icon
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineUser
            shape: circle
            color: '#52c41a'
        - id: shape_square_src
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            src: https://api.dicebear.com/7.x/miniavs/svg?seed=shape1
            shape: square

- title: Sizes
  blocks:
    - id: sizes_row
      type: Box
      layout:
        gap: 8
        align: center
      blocks:
        - id: size_small
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: S
            size: small
            color: '#722ed1'
        - id: size_default
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: M
            size: default
