          blocks:
            - id: reply_avatar
              type: Avatar
              layout:
                flex: 0 0 auto
              properties:
                icon: AiOutlineUser
                color: '#52c41a'
            - id: reply_body
              type: Box
              layout:
                flex: 1 1 0
                gap: 8
              blocks:
                - id: reply_input
                  type: TextInput
                  properties:
                    label:
                      disabled: true
                    placeholder: Write a reply...
                - id: reply_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Reply
                    color: primary
                    variant: solid
                    icon: AiOutlineSend
                  events:
                    onClick:
                      - id: reply_msg
                        type: DisplayMessage
                        params:
                          content: Reply posted
                          status: success
