- title: onClick Event
  blocks:
    - id: click_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: click_avatar
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineUser
            color: '#1677ff'
            size: large
          events:
            onClick:
              - id: click_msg
                type: DisplayMessage
                params:
                  content: Avatar clicked!
                  status: info
        - id: click_text_avatar
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: JD
            color: '#52c41a'
            size: large
          events:
            onClick:
              - id: click_text_msg
                type: DisplayMessage
                params:
                  content: Viewing profile for JD
                  status: success
        - id: click_image_avatar
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            src: https://api.dicebear.com/7.x/miniavs/svg?seed=click
            size: large
          events:
            onClick:
              - id: click_image_msg
                type: DisplayMessage
                params:
                  content: Opening user settings
                  status: info

- title: Style and CSS
  blocks:
    - id: css_tailwind_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: css_shadow
          type: Avatar
          layout:
            flex: 0 0 auto
          class: shadow-lg
          properties:
            content: SH
            color: '#1677ff'
            size: large
        - id: css_ring
          type: Avatar
          layout:
            flex: 0 0 auto
          class: ring-2 ring-blue-500 ring-offset-2
          properties:
            src: https://api.dicebear.com/7.x/miniavs/svg?seed=ring
            size: large
        - id: css_opacity
          type: Avatar
          layout:
            flex: 0 0 auto
          class: opacity-60
          properties:
            content: OP
            color: '#722ed1'
            size: large
    - id: css_inline_row
      type: Box
      layout:
        gap: 8
      blocks:
        - id: css_border
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: BD
            color: '#1677ff'
          style:
            --element:
              border: 2px solid #1677ff
        - id: css_box_shadow
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: SH
            color: '#722ed1'
          style:
            --element:
              boxShadow: 0 2px 8px rgba(114, 46, 209, 0.4)
        - id: css_gradient
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineStar
            size: large
          style:
            --element:
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
        - id: css_dashed_outline
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlinePlus
            size: large
          style:
            --element:
              backgroundColor: '#fff'
              color: '#1677ff'
              border: 2px dashed #1677ff

- title: Theme Token Overrides
  blocks:
    - id: theme_row
      type: Box
      layout:
        gap: 8
        align: center
      blocks:
        - id: theme_large_container
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineUser
            size: large
            color: '#1677ff'
            theme:
              containerSizeLG: 56
              iconFontSizeLG: 32
        - id: theme_text_size
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: Hi
            size: large
            color: '#52c41a'
            theme:
              containerSizeLG: 48
              textFontSizeLG: 20
        - id: theme_small_override
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            content: SM
            size: small
            color: '#fa8c16'
            theme:
              containerSizeSM: 20
              textFontSizeSM: 10
        - id: theme_default_override
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineStar
            color: '#722ed1'
            theme:
              containerSize: 44
              iconFontSize: 24

- title: Group
  blocks:
    - id: group_row
      type: Box
      layout:
        gap: 24
        align: center
      blocks:
        - id: group_basic
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            group:
              avatars:
                - src: https://api.dicebear.com/7.x/miniavs/svg?seed=1
                - content: BK
                  color: '#1677ff'
                - icon: AiOutlineUser
                  color: '#87d068'
                - content: ZW
                  color: '#722ed1'
        - id: group_max_count
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            group:
              maxCount: 3
              avatars:
                - src: https://api.dicebear.com/7.x/miniavs/svg?seed=2
                - content: AL
                  color: '#f56a00'
                - icon: AiOutlineUser
                  color: '#1677ff'
                - content: KJ
                  color: '#722ed1'
                - content: RW
                  color: '#52c41a'
        - id: group_square
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            shape: square
            group:
              avatars:
                - content: A
                  color: '#1677ff'
                - content: B
                  color: '#52c41a'
                - content: C
                  color: '#f5222d'
        - id: group_large
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            group:
              size: large
              avatars:
                - src: https://api.dicebear.com/7.x/miniavs/svg?seed=3
                - content: LG
                  color: '#eb2f96'
                - icon: AiOutlineStar
                  color: '#faad14'

- title: Group Max Style
  blocks:
    - id: group_style_row
      type: Box
      layout:
        gap: 24
        align: center
      blocks:
        - id: group_orange_overflow
          type: Avatar
          layout:
            flex: 0 0 auto
          properties:
            group:
              maxCount: 2
              avatars:
                - content: K
                  color: '#1677ff'
                - content: L
                  color: '#52c41a'
                - content: M
                  color: '#722ed1'
                - content: N
                  color: '#eb2f96'
          style:
            --max:
