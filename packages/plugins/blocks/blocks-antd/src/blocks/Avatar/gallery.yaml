                      content: View Elena Torres's profile
                      status: info
            - id: c3_body
              type: Box
              layout:
                flex: 1 1 0
                gap: 4
              blocks:
                - id: c3_header
                  type: Html
                  properties:
                    html: '<b>Elena Torres</b> <span style="color:#8c8c8c;font-size:13px">&middot; 45m ago</span>'
                - id: c3_text
                  type: Span
                  properties:
                    content: "I've started on the date picker component. Quick question \u2014 should it default to the current month or last 30 days?"
                - id: c3_actions
                  type: Box
                  layout:
                    gap: 16
                  style:
                    --element:
                      marginTop: 4
                  blocks:
                    - id: c3_like
                      type: Anchor
                      layout:
                        flex: 0 0 auto
                      properties:
                        icon: AiOutlineLike
