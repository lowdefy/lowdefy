- title: Avatar in User Profile
  blocks:
    - id: profile_card
      type: Card
      properties:
        title: User Profile
        size: small
      blocks:
        - id: profile_row
          type: Box
          layout:
            gap: 16
            align: center
          blocks:
            - id: profile_avatar
              type: Avatar
              layout:
                flex: 0 0 auto
              properties:
                src: https://api.dicebear.com/7.x/miniavs/svg?seed=sarah
                size: large
                alt: Sarah Chen
              style:
                --element:
                  border: 2px solid #1677ff
              events:
                onClick:
                  - id: profile_click_msg
                    type: DisplayMessage
                    params:
                      content: Edit profile photo
                      status: info
            - id: profile_info
              type: Box
              layout:
                gap: 0
              blocks:
                - id: profile_name
                  type: Markdown
                  properties:
                    content: '**Sarah Chen**'
                - id: profile_role
                  type: Markdown
                  properties:
                    content: 'Senior Engineer at Acme Corp'
        - id: profile_divider
          type: Divider
        - id: profile_actions
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: profile_edit_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Edit Profile
                color: primary
                variant: outlined
                icon: AiOutlineEdit
              events:
                onClick:
                  - id: profile_edit_msg
                    type: DisplayMessage
                    params:
                      content: Opening profile editor
                      status: info
            - id: profile_msg_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Send Message
                color: primary
                variant: solid
                icon: AiOutlineMail
              events:
                onClick:
                  - id: profile_msg_msg
                    type: DisplayMessage
                    params:
                      content: Message sent to Sarah Chen
                      status: success

- title: Avatar Group in Team Card
  blocks:
    - id: team_card
      type: Card
      properties:
        title: Project Team
        size: small
      blocks:
        - id: team_row
          type: Box
          layout:
            gap: 16
            align: center
          blocks:
            - id: team_avatars
              type: Avatar
              layout:
                flex: 0 0 auto
              properties:
                group:
                  maxCount: 4
                  size: large
                  avatars:
                    - src: https://api.dicebear.com/7.x/miniavs/svg?seed=sarah
                      alt: Sarah Chen
                    - content: MR
                      color: '#1677ff'
                    - src: https://api.dicebear.com/7.x/miniavs/svg?seed=elena
                      alt: Elena Torres
                    - content: JD
                      color: '#52c41a'
                    - icon: AiOutlineUser
                      color: '#722ed1'
                    - content: KP
                      color: '#fa8c16'
              style:
                --max:
                  color: '#f56a00'
                  backgroundColor: '#fde3cf'
            - id: team_info
              type: Box
              layout:
                gap: 0
              blocks:
                - id: team_title
                  type: Markdown
                  properties:
                    content: '**6 team members**'
                - id: team_subtitle
                  type: Markdown
                  properties:
                    content: 'Dashboard redesign project'

- title: Comment Thread
  blocks:
    - id: thread
      type: Box
      layout:
        gap: 0
      blocks:
        - id: c1
          type: Box
          layout:
            gap: 12
            align: flex-start
            wrap: nowrap
          style:
            --element:
              padding: 16px 0
          blocks:
            - id: c1_avatar
              type: Avatar
              layout:
                flex: 0 0 auto
              properties:
                src: https://api.dicebear.com/7.x/miniavs/svg?seed=sarah
              style:
                --element:
                  border: 2px solid #1677ff
              events:
                onClick:
                  - id: c1_profile
                    type: DisplayMessage
                    params:
                      content: View Sarah Chen's profile
                      status: info
            - id: c1_body
              type: Box
              layout:
                flex: 1 1 0
                gap: 4
              blocks:
                - id: c1_header
                  type: Html
                  properties:
                    html: '<b>Sarah Chen</b> <span style="color:#8c8c8c;font-size:13px">&middot; 2h ago</span>'
                - id: c1_text
                  type: Span
                  properties:
                    content: The new dashboard layout looks great. Can we add a date filter to the reports section?
                - id: c1_actions
                  type: Box
                  layout:
                    gap: 16
                  style:
                    --element:
                      marginTop: 4
                  blocks:
                    - id: c1_like
                      type: Anchor
                      layout:
                        flex: 0 0 auto
                      properties:
                        icon: AiOutlineLike
                        title: Like
                      style:
                        --element:
                          fontSize: 13px
                          color: '#8c8c8c'
                    - id: c1_reply
                      type: Anchor
                      layout:
                        flex: 0 0 auto
                      properties:
                        icon: AiOutlineMessage
                        title: Reply
                      style:
                        --element:
                          fontSize: 13px
                          color: '#8c8c8c'
        - id: c_divider_1
          type: Divider
          style:
            --element:
              margin: 0
        - id: c2
          type: Box
          layout:
            gap: 12
            align: flex-start
            wrap: nowrap
          style:
            --element:
              padding: 16px 0
          blocks:
            - id: c2_avatar
              type: Avatar
              layout:
                flex: 0 0 auto
              properties:
                content: MR
                color: '#1677ff'
              events:
