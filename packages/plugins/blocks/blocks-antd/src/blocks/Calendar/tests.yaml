- id: default
  type: Calendar
- id: 'properties.fullscreen: false'
  type: Calendar
  properties:
    fullscreen: false
- id: 'properties.mode: year'
  type: Calendar
  properties:
    mode: year
- id: 'properties.validRange'
  type: Calendar
  properties:
    validRange:
      - '2026-01-01'
      - '2026-12-31'
- id: 'properties.disabledDates.min'
  type: Calendar
  properties:
    disabledDates:
      min: '2026-03-01'
- id: 'properties.disabledDates.max'
  type: Calendar
  properties:
    disabledDates:
      max: '2026-03-31'
- id: 'properties.dateCellData'
  type: Calendar
  properties:
    dateCellData:
      - date: '2026-03-15'
        content: Meeting
        status: success
      - date: '2026-03-20'
        content: Deadline
        status: error
