        value: 24500
        prefix: $
    - id: suffix_percent
      type: Statistic
      layout:
        flex: 0 0 auto
      properties:
        title: Completion
        value: 93.5
        suffix: '%'
    - id: suffix_unit
      type: Statistic
      layout:
        flex: 0 0 auto
