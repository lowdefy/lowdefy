- title: Value and Title
  blocks:
    - id: value_number
      type: Statistic
      layout:
        flex: 0 0 auto
      properties:
        title: Active Users
        value: 112893
    - id: value_decimal
      type: Statistic
      layout:
        flex: 0 0 auto
      properties:
        title: Account Balance
        value: 112893.12
        precision: 2
    - id: value_string
      type: Statistic
      layout:
        flex: 0 0 auto
      properties:
        title: Status
        value: Running
    - id: value_version
      type: Statistic
      layout:
        flex: 0 0 auto
      properties:
        title: Version
        value: v4.2.1

- title: Prefix and Suffix
  blocks:
