- title: Real-World Dashboard Row
  blocks:
    - id: dashboard_row
      type: Box
      layout:
        gap: 24
      blocks:
        - id: dash_revenue
          type: Statistic
          layout:
            flex: 1 1 0
          properties:
            title: Total Revenue
            value: 126560
            prefix: $
            precision: 0
            prefixIcon:
              name: AiOutlineDollarCircle
              color: '#52c41a'
            valueStyle:
              color: '#3f8600'
          style:
            --element:
              backgroundColor: '#f6ffed'
              padding: 16px
              borderRadius: 8px
        - id: dash_users
          type: Statistic
          layout:
            flex: 1 1 0
          properties:
            title: Active Users
            value: 8920
            prefixIcon:
              name: AiOutlineTeam
              color: '#1677ff'
            valueStyle:
              color: '#1677ff'
          style:
            --element:
              backgroundColor: '#e6f4ff'
              padding: 16px
              borderRadius: 8px
        - id: dash_errors
          type: Statistic
          layout:
            flex: 1 1 0
          properties:
            title: Error Rate
            value: 0.12
            suffix: '%'
            precision: 2
            prefixIcon:
              name: AiOutlineBug
              color: '#ff4d4f'
            valueStyle:
              color: '#cf1322'
          style:
            --element:
              backgroundColor: '#fff2f0'
              padding: 16px
              borderRadius: 8px
        - id: dash_uptime
          type: Statistic
          layout:
            flex: 1 1 0
          properties:
            title: Uptime
