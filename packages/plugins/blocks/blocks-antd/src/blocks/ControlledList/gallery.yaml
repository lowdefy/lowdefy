# ──────────────────────────────────────────────
# Basic Examples
# ──────────────────────────────────────────────

- title: Team Members
  blocks:
    - id: team
      type: ControlledList
      properties:
        title: Team Members
      blocks:
        - id: team.$.name
          type: TextInput
          required: true
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Full name
        - id: team.$.role
          type: Selector
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Role
            options:
              - Developer
              - Designer
              - PM
              - QA
        - id: team.$.email
          type: TextInput
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Email

- title: Bookmarks
  blocks:
    - id: bookmarks
      type: ControlledList
      properties:
        title: Bookmarks
        addToFront: true
        size: small
        addItemButton:
          title: Bookmark
          icon: AiOutlinePlus
          color: primary
          variant: dashed
        removeItemIcon:
          name: AiOutlineDelete
          color: '#ff4d4f'
      blocks:
        - id: bookmarks.$.url
          type: TextInput
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: 'https://...'
            prefixIcon: AiOutlineLink
        - id: bookmarks.$.label
          type: TextInput
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Label

# ──────────────────────────────────────────────
# Advanced Examples
# ──────────────────────────────────────────────

- title: Event Registration
  fullWidth: true
  blocks:
    - id: attendees
      type: ControlledList
      properties:
        title: Attendees
        addItemButton:
          title: Add Attendee
          icon: AiOutlineUserAdd
          color: primary
          variant: outlined
      blocks:
        - id: attendees.$.name
          type: TextInput
          required: true
          layout:
            flex: 2 1 0
          properties:
            label:
              disabled: true
            placeholder: Full name
        - id: attendees.$.type
          type: Selector
          required: true
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Type
            options:
              - Adult
              - Child
              - Senior
        - id: attendees.$.email
          type: TextInput
          required: true
          visible:
            _eq:
              - _state: attendees.$.type
              - Adult
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Email
          validate:
            - message: Enter a valid email.
              status: error
              pass:
                _regex:
                  pattern: '^[^@]+@[^@]+\.[^@]+$'
                  on:
                    _if_none:
                      - _state: attendees.$.email
                      - ''
        - id: attendees.$.meal
          type: Selector
          visible:
            _eq:
              - _state: attendees.$.type
              - Adult
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Meal
            options:
              - Standard
              - Vegetarian
              - Vegan
        - id: attendees.$.age
          type: NumberInput
          visible:
            _eq:
              - _state: attendees.$.type
              - Child
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Age
            min: 1
            max: 17
        - id: attendees.$.supervision
          type: Switch
          visible:
            _eq:
              - _state: attendees.$.type
              - Child
          layout:
            flex: 0 0 auto
          properties:
            label: Needs supervision
            size: small
        - id: attendees.$.wheelchair
          type: Switch
          visible:
            _eq:
              - _state: attendees.$.type
              - Senior
          layout:
            flex: 0 0 auto
          properties:
            label: Wheelchair access
            size: small
        - id: attendees.$.dietary
          type: TextInput
          visible:
            _eq:
              - _state: attendees.$.type
              - Senior
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Dietary notes
    - id: attendees_footer
      type: Box
      layout:
        justify: flex-end
      blocks:
        - id: attendees_register
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Register All
            icon: AiOutlineSend
            color: primary
            variant: solid
          events:
            onClick:
              - id: attendees_validate
                type: Validate
                params:
                  regex: ^attendees
              - id: attendees_msg
                type: DisplayMessage
                params:
                  content: All attendees registered!
                  status: success

- title: Expense Report
  fullWidth: true
  blocks:
    - id: expenses
      type: ControlledList
      properties:
        title: Expenses
        addItemButton:
          title: Add Expense
          icon: AiOutlinePlus
          color: primary
          variant: dashed
        theme:
          headerBg: '#fafafa'
          itemPadding: '16px 12px'
      blocks:
        - id: expenses.$.date
          type: DateSelector
          required: true
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Date
        - id: expenses.$.category
          type: Selector
          required: true
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Category
            options:
              - Travel
              - Meals
              - Software
              - Equipment
              - Other
        - id: expenses.$.desc
          type: TextInput
          required: true
          layout:
            flex: 2 1 0
          properties:
            label:
              disabled: true
            placeholder: Description
        - id: expenses.$.amount
          type: NumberInput
          required: true
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Amount
            min: 0
            step: 0.01
            prefix: '$'
    - id: expenses_footer
      type: Box
      layout:
        gap: 16
        justify: flex-end
        align: center
      blocks:
        - id: expenses_total
          type: Statistic
          layout:
            flex: 0 0 auto
          properties:
            title: Total Expenses
            prefix: '$'
            precision: 2
            value:
              _js: |
                const expenses = state('expenses') || [];
                return expenses.reduce((sum, item) => sum + (item.amount || 0), 0);
        - id: expenses_submit
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Submit Report
            icon: AiOutlineSend
            color: primary
            variant: solid
          events:
            onClick:
              - id: expenses_validate
                type: Validate
                params:
                  regex: ^expenses
              - id: expenses_msg
                type: DisplayMessage
                params:
                  content: Expense report submitted!
                  status: success

- title: Project Planner
  fullWidth: true
  blocks:
    - id: projects
      type: ControlledList
      properties:
        title: Projects
        addItemButton:
          title: Add Project
          icon: AiOutlinePlus
          color: primary
          variant: outlined
      blocks:
        - id: projects.$.name
          type: TextInput
          required: true
          layout:
            flex: 1 1 0
          properties:
            label:
              disabled: true
            placeholder: Project name
        - id: projects.$.status
          type: Selector
          layout:
            flex: 0 0 140px
          properties:
            label:
              disabled: true
            placeholder: Status
            options:
              - Planning
              - Active
              - Review
              - Done
        - id: projects.$.tasks
          type: ControlledList
          properties:
            title: Tasks
            size: small
            addItemButton:
              title: Add Task
              icon: AiOutlinePlus
              size: small
              variant: dashed
          blocks:
            - id: projects.$.tasks.$.task
              type: TextInput
              required: true
              layout:
                flex: 1 1 0
              properties:
                label:
                  disabled: true
                placeholder: Task description
                size: small
            - id: projects.$.tasks.$.done
              type: Switch
              layout:
                flex: 0 0 auto
              properties:
                label: Done
                size: small
    - id: projects_footer
      type: Box
      layout:
        justify: flex-end
      blocks:
        - id: projects_save
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Save All
            icon: AiOutlineSave
            color: primary
            variant: solid
          events:
            onClick:
              - id: projects_validate
                type: Validate
                params:
                  regex: ^projects
              - id: projects_msg
                type: DisplayMessage
                params:
                  content: Projects saved!
                  status: success
