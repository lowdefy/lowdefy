- title: Style Overrides
  blocks:
    - id: style_bg
      type: Title
      properties:
        content: Title with Background
        level: 4
      style:
        --element:
          backgroundColor: '#f0f5ff'
          padding: 8px 16px
          borderRadius: 6px
    - id: style_border
      type: Title
      properties:
        content: Title with Border
        level: 4
      style:
        --element:
          borderBottom: 2px solid #1677ff
          paddingBottom: 8px
    - id: style_spacing
      type: Title
      properties:
        content: Title with Letter Spacing
        level: 3
      style:
        --element:
          letterSpacing: 4px
          textTransform: uppercase
    - id: style_shadow
      type: Title
      properties:
        content: Title with Text Shadow
        level: 3
        color: '#1677ff'
      style:
        --element:
          textShadow: 2px 2px 4px rgba(22, 119, 255, 0.3)

- title: Theme Token Overrides
  blocks:
    - id: theme_large_h4
      type: Title
      properties:
        content: Large H4 Title
        level: 4
        theme:
          fontSizeHeading4: 28
    - id: theme_small_h1
      type: Title
      properties:
        content: Small H1 Title
        level: 1
        theme:
          fontSizeHeading1: 24
    - id: theme_custom_weight
      type: Title
      properties:
        content: Light Weight Title
        level: 3
        theme:
          fontWeightStrong: 300
    - id: theme_custom_colors
      type: Title
      properties:
        content: Theme-Colored Title
        level: 4
        type: success
        theme:
          colorSuccess: '#13c2c2'

