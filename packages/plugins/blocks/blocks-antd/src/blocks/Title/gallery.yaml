      properties:
        content: 'Status: <span style="color: #52c41a">Online</span> / <span style="color: #ff4d4f">Offline</span>'
        level: 4

- title: Copyable
  blocks:
    - id: copyable_simple
      type: Title
      properties:
        content: Copy this title
        level: 4
        copyable: true
    - id: copyable_custom_text
      type: Title
      properties:
        content: Title with custom copy text
        level: 4
        copyable:
          text: This custom text is copied instead of the visible title.
    - id: copyable_tooltips
      type: Title
      properties:
        content: Hover the copy icon
        level: 4
        copyable:
          tooltips:
            - Click to copy
            - Copied!
    - id: copyable_custom_icon
      type: Title
      properties:
        content: Custom copy icon
        level: 4
        copyable:
          icon: AiOutlineSnippets
    - id: copyable_two_icons
      type: Title
      properties:
        content: Two-state copy icons
        level: 4
        copyable:
          icon:
            - AiOutlineCopy
            - AiOutlineCheck
          tooltips:
            - Copy text
            - Done!

- title: Ellipsis
  blocks:
    - id: ellipsis_single
      type: Title
      properties:
        content: This is a very long title that should be truncated with an ellipsis when it overflows the available space in a single line of the container.
        level: 4
        ellipsis: true
    - id: ellipsis_rows_2
      type: Title
      properties:
        content: This is an extremely long title that demonstrates multi-row ellipsis truncation. When the content exceeds the specified number of rows, it will be truncated and show an ellipsis indicator at the end of the visible text area.
        level: 5
        ellipsis:
          rows: 2
    - id: ellipsis_expandable
      type: Title
      properties:
        content: This long title can be expanded by clicking the expand control. It demonstrates how ellipsis with expandable works to let users reveal the full heading when needed.
        level: 5
        ellipsis:
          rows: 1
          expandable: true
    - id: ellipsis_suffix
      type: Title
      properties:
        content: This title has a custom suffix appended after the ellipsis truncation point so readers know more content exists.
        level: 4
        ellipsis:
          rows: 1
          suffix: ' --Read More'

- title: Style and CSS
  blocks:
    - id: css_tailwind_bg
      type: Title
      class: bg-blue-50 px-4 py-2 rounded-lg
      properties:
        content: Tailwind Background
        level: 4
    - id: css_tailwind_border
      type: Title
      class: border-l-4 border-blue-500 pl-3
      properties:
        content: Tailwind Left Border
        level: 4
    - id: css_tailwind_uppercase
      type: Title
      class: uppercase tracking-widest
      properties:
        content: Uppercase Tracking
        level: 5
    - id: css_inline_border_bottom
      type: Title
      properties:
        content: Inline Border Bottom
        level: 4
      style:
        --element:
          borderBottom: 2px solid #1677ff
          paddingBottom: 8px
    - id: css_inline_shadow
      type: Title
      properties:
        content: Inline Text Shadow
        level: 3
        color: '#1677ff'
      style:
        --element:
          textShadow: 2px 2px 4px rgba(22, 119, 255, 0.3)

- title: Theme Token Overrides
  blocks:
    - id: theme_large_h4
      type: Title
      properties:
        content: Large H4 Title
        level: 4
        theme:
          fontSizeHeading4: 28
    - id: theme_light_weight
      type: Title
      properties:
        content: Light Weight Title
        level: 3
        theme:
          fontWeightStrong: 300
    - id: theme_custom_success
      type: Title
      properties:
        content: Teal Success Title
        level: 4
        type: success
        theme:
          colorSuccess: '#13c2c2'
    - id: theme_spacing
      type: Title
      properties:
        content: Extra Margin Title
        level: 4
        theme:
          titleMarginTop: 0
          titleMarginBottom: 0

- title: Title in Article Header
  blocks:
    - id: article_card
      type: Card
      properties:
        size: small
      blocks:
        - id: article_category
          type: Title
          properties:
            content: Engineering
            level: 5
            type: secondary
        - id: article_headline
          type: Title
          properties:
            content: Building Config-Driven Web Applications
            level: 2
        - id: article_subtitle
          type: Paragraph
          properties:
            content: Learn how Lowdefy simplifies complex application development by replacing boilerplate code with declarative YAML configuration.
            type: secondary
        - id: article_meta
          type: Box
          layout:
            gap: 12
          blocks:
            - id: article_author
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: By Jane Smith
                icon: AiOutlineUser
                color: default
                variant: text
                size: small
            - id: article_date
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: March 12, 2026
                icon: AiOutlineCalendar
                color: default
                variant: text
                size: small

- title: Title in Dashboard Page
  blocks:
    - id: dashboard_header
      type: Box
      layout:
        gap: 0
      blocks:
        - id: dashboard_title
          type: Title
          properties:
            content: Dashboard Overview
            level: 2
        - id: dashboard_desc
          type: Paragraph
          properties:
            content: Monitor your application performance and key metrics.
            type: secondary
    - id: dashboard_cards
      type: Box
      layout:
        gap: 12
      blocks:
        - id: dashboard_stat_users
          type: Card
          layout:
            flex: 1 1 0
          properties:
            size: small
          blocks:
            - id: stat_users_label
              type: Title
              properties:
                content: Active Users
                level: 5
                type: secondary
            - id: stat_users_value
              type: Title
              properties:
                content: '12,847'
                level: 2
                type: success
        - id: dashboard_stat_errors
          type: Card
          layout:
            flex: 1 1 0
          properties:
            size: small
          blocks:
            - id: stat_errors_label
              type: Title
              properties:
                content: Error Rate
                level: 5
                type: secondary
            - id: stat_errors_value
              type: Title
              properties:
                content: 0.12%
                level: 2
                type: danger
        - id: dashboard_stat_requests
          type: Card
          layout:
            flex: 1 1 0
          properties:
            size: small
          blocks:
            - id: stat_requests_label
              type: Title
              properties:
                content: Requests / min
                level: 5
                type: secondary
            - id: stat_requests_value
              type: Title
              properties:
                content: '3,204'
                level: 2
    - id: dashboard_section_title
      type: Title
      properties:
        content: Recent Activity
        level: 4
        copyable: true
      events:
        onCopy:
          - id: copy_msg
            type: DisplayMessage
            params:
              content: Section title copied.
              status: info
