        content: 'Title with <span style="color: #1677ff">blue</span> and <span style="color: #52c41a">green</span> words'
        level: 4

- title: Copyable
  blocks:
    - id: copyable_simple
      type: Title
      properties:
        content: Copy this title
        level: 4
        copyable: true
    - id: copyable_custom_text
      type: Title
      properties:
        content: Title with custom copy
        level: 4
        copyable:
          text: Custom copied text instead of the title content.
    - id: copyable_custom_tooltips
      type: Title
      properties:
        content: Hover the copy icon
        level: 4
        copyable:
          tooltips:
            - Click to copy
            - Copied!
    - id: copyable_custom_icon
      type: Title
      properties:
        content: Custom copy icon
        level: 4
        copyable:
          icon: AiOutlineSnippets
    - id: copyable_two_icons
      type: Title
      properties:
        content: Two-state copy icons
        level: 4
        copyable:
          icon:
            - AiOutlineCopy
            - AiOutlineCheck

- title: Ellipsis (Single Line)
  blocks:
    - id: ellipsis_single
      type: Title
      properties:
        content: This is a very long title that should be truncated with an ellipsis when it overflows the available space in a single line of the container.
        level: 4
        ellipsis: true
    - id: ellipsis_single_h3
      type: Title
      properties:
        content: Another long heading that demonstrates single-line ellipsis truncation for larger text at heading level three.
        level: 3
        ellipsis: true

- title: Ellipsis (Multi-Row with Expand)
  blocks:
    - id: ellipsis_rows_2
      type: Title
      properties:
        content: This is an extremely long title text that demonstrates multi-row ellipsis truncation. When the content exceeds the specified number of rows, it will be truncated and show an ellipsis indicator at the end of the visible text.
        level: 5
        ellipsis:
          rows: 2
          expandable: true
    - id: ellipsis_rows_1_suffix
      type: Title
      properties:
        content: This title has a custom suffix appended after the ellipsis truncation point so readers know more content is available.
        level: 4
        ellipsis:
          rows: 1
          suffix: ' --Read More'

