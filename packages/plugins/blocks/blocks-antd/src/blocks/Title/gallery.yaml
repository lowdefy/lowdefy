  blocks:
    - id: html_bold_italic
      type: Title
      properties:
        content: 'Title with <b>bold</b> and <i>italic</i> words'
        level: 4
    - id: html_link
      type: Title
      properties:
        content: 'Visit the <a href="https://lowdefy.com">Lowdefy website</a>'
        level: 4
    - id: html_colored_spans
