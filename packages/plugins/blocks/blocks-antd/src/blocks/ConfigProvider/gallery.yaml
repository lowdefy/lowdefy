- title: Custom Primary Color
  fullWidth: true
  blocks:
    - id: cp_primary_color
      type: ConfigProvider
      properties:
        token:
          colorPrimary: '#722ed1'
      blocks:
        - id: cp_primary_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cp_primary_btn_solid
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Solid
                color: primary
                variant: solid
            - id: cp_primary_btn_outlined
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Outlined
                color: primary
                variant: outlined
            - id: cp_primary_btn_dashed
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Dashed
                color: primary
                variant: dashed
            - id: cp_primary_btn_text
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Text
                color: primary
                variant: text
            - id: cp_primary_btn_link
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Link
                color: primary
                variant: link
        - id: cp_primary_switch
          type: Switch
          properties:
            label:
              title: Purple themed switch
              colon: false
        - id: cp_primary_progress
          type: Progress
          properties:
            percent: 65

- title: Dark Algorithm
  fullWidth: true
  blocks:
    - id: cp_dark
      type: ConfigProvider
      properties:
        algorithm: dark
      blocks:
        - id: cp_dark_box
          type: Box
          style:
            padding: 24px
            background: '#141414'
            borderRadius: 8px
          layout:
            gap: 12
          blocks:
            - id: cp_dark_title
              type: Title
              properties:
                content: Dark Mode
                level: 4
            - id: cp_dark_text
              type: Paragraph
              properties:
                content: The dark algorithm inverts the color scheme for all child components. Backgrounds become dark and text becomes light automatically.
            - id: cp_dark_btn_row
              type: Box
              layout:
                gap: 8
              blocks:
                - id: cp_dark_btn1
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Primary
                    color: primary
                    variant: solid
                - id: cp_dark_btn2
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Default
                    color: default
                    variant: outlined
                - id: cp_dark_btn3
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Danger
                    color: danger
                    variant: solid
            - id: cp_dark_switch
              type: Switch
              properties:
                label:
                  title: Dark switch
                  colon: false

- title: Compact Algorithm
  fullWidth: true
  blocks:
    - id: cp_compact
      type: ConfigProvider
      properties:
        algorithm: compact
      blocks:
        - id: cp_compact_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cp_compact_btn1
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Compact Solid
                color: primary
                variant: solid
            - id: cp_compact_btn2
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Compact Outlined
                color: primary
                variant: outlined
        - id: cp_compact_input
          type: TextInput
          properties:
            label:
              title: Compact input
              colon: false
            placeholder: Compact sized input
        - id: cp_compact_text
          type: Paragraph
          properties:
            content: The compact algorithm reduces padding and margins for denser layouts. Useful for data-heavy dashboards and admin panels.

- title: Combined Dark + Compact
  fullWidth: true
  blocks:
    - id: cp_combined
      type: ConfigProvider
      properties:
        algorithm:
          - dark
          - compact
      blocks:
        - id: cp_combined_box
          type: Box
          style:
            padding: 24px
            background: '#141414'
            borderRadius: 8px
          layout:
            gap: 12
          blocks:
            - id: cp_combined_title
              type: Title
              properties:
                content: Dark + Compact
                level: 4
            - id: cp_combined_text
              type: Paragraph
              properties:
                content: Multiple algorithms can be combined by passing an array. Here dark and compact are used together for a dense dark-themed layout.
            - id: cp_combined_btn_row
              type: Box
              layout:
                gap: 8
              blocks:
                - id: cp_combined_btn1
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Action
                    color: primary
                    variant: solid
                - id: cp_combined_btn2
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Cancel
                    color: default
                    variant: outlined

- title: Component Size
  fullWidth: true
  blocks:
    - id: cp_size_small_label
      type: Markdown
      properties:
        content: '**Small:**'
    - id: cp_size_small
      type: ConfigProvider
      properties:
        componentSize: small
      blocks:
        - id: cp_small_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cp_small_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Small Button
                color: primary
                variant: solid
            - id: cp_small_input
              type: TextInput
              layout:
                flex: 0 1 200px
              properties:
                placeholder: Small input
                label:
                  disabled: true
    - id: cp_size_middle_label
      type: Markdown
      properties:
        content: '**Middle (default):**'
    - id: cp_size_middle
      type: ConfigProvider
      properties:
        componentSize: middle
      blocks:
        - id: cp_middle_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cp_middle_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Middle Button
                color: primary
                variant: solid
            - id: cp_middle_input
              type: TextInput
              layout:
                flex: 0 1 200px
              properties:
                placeholder: Middle input
                label:
                  disabled: true
    - id: cp_size_large_label
      type: Markdown
      properties:
        content: '**Large:**'
    - id: cp_size_large
      type: ConfigProvider
      properties:
        componentSize: large
      blocks:
        - id: cp_large_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cp_large_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Large Button
                color: primary
                variant: solid
            - id: cp_large_input
              type: TextInput
              layout:
                flex: 0 1 200px
              properties:
                placeholder: Large input
                label:
                  disabled: true

- title: Disabled All Components
  fullWidth: true
  blocks:
    - id: cp_disabled
      type: ConfigProvider
      properties:
        componentDisabled: true
      blocks:
        - id: cp_disabled_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cp_disabled_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Disabled Button
                color: primary
                variant: solid
            - id: cp_disabled_btn2
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Also Disabled
                color: default
                variant: outlined
        - id: cp_disabled_switch
          type: Switch
          properties:
            label:
              title: Disabled switch
              colon: false
        - id: cp_disabled_input
          type: TextInput
          properties:
            placeholder: Disabled input
            label:
              title: Disabled input
              colon: false
        - id: cp_disabled_text
          type: Paragraph
          properties:
            content: Setting componentDisabled to true disables all interactive child components at once, without needing to set disabled on each individual component.

- title: RTL Direction
  fullWidth: true
  blocks:
    - id: cp_rtl
      type: ConfigProvider
      properties:
        direction: rtl
      blocks:
        - id: cp_rtl_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cp_rtl_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Right-to-Left
                color: primary
                variant: solid
                icon: AiOutlineArrowLeft
        - id: cp_rtl_input
          type: TextInput
          properties:
            placeholder: RTL text input
            label:
              title: RTL Input
              colon: false
        - id: cp_rtl_text
          type: Paragraph
          properties:
            content: Setting direction to rtl enables right-to-left layout for all child components. This is essential for languages like Arabic and Hebrew.

- title: Input Variant
  fullWidth: true
  blocks:
    - id: cp_variant_outlined_label
      type: Markdown
      properties:
        content: '**Outlined (default):**'
    - id: cp_variant_outlined
      type: ConfigProvider
      properties:
        variant: outlined
      blocks:
        - id: cp_vo_input
          type: TextInput
          properties:
            placeholder: Outlined input
            label:
              title: Name
              colon: false
    - id: cp_variant_filled_label
      type: Markdown
      properties:
        content: '**Filled:**'
    - id: cp_variant_filled
      type: ConfigProvider
      properties:
        variant: filled
      blocks:
        - id: cp_vf_input
          type: TextInput
          properties:
            placeholder: Filled input
            label:
              title: Name
              colon: false
    - id: cp_variant_borderless_label
      type: Markdown
      properties:
        content: '**Borderless:**'
    - id: cp_variant_borderless
      type: ConfigProvider
      properties:
        variant: borderless
      blocks:
        - id: cp_vb_input
          type: TextInput
          properties:
            placeholder: Borderless input
            label:
              title: Name
              colon: false

- title: Component-Level Token Overrides
  fullWidth: true
  blocks:
    - id: cp_components
      type: ConfigProvider
      properties:
        components:
          Button:
            borderRadius: 20
            controlHeight: 40
          Input:
            borderRadius: 20
      blocks:
        - id: cp_components_row
          type: Box
          layout:
            gap: 8
          blocks:
            - id: cp_comp_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Pill Button
                color: primary
                variant: solid
            - id: cp_comp_btn2
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Also Pill
                color: default
                variant: outlined
        - id: cp_comp_input
          type: TextInput
          properties:
            placeholder: Rounded input
            label:
              title: Rounded input
              colon: false
        - id: cp_comp_text
          type: Paragraph
          properties:
            content: The components property allows overriding design tokens at the component level. Here, Button and Input components have custom borderRadius applied without affecting other components.

- title: Custom Design Tokens
  fullWidth: true
  blocks:
    - id: cp_tokens
      type: ConfigProvider
      properties:
        token:
          colorPrimary: '#fa541c'
          fontSize: 16
          borderRadius: 8
          colorBgContainer: '#fff7e6'
      blocks:
        - id: cp_tokens_card
          type: Card
          properties:
            title: Custom Themed Card
          blocks:
            - id: cp_tokens_text
              type: Paragraph
              properties:
                content: Global design tokens customize the look of all child components. This section uses a custom primary color (orange), larger font size, rounded borders, and a warm background color.
            - id: cp_tokens_btn_row
              type: Box
              layout:
                gap: 8
              blocks:
                - id: cp_tokens_btn1
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Primary
                    color: primary
                    variant: solid
                - id: cp_tokens_btn2
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Outlined
                    color: primary
                    variant: outlined
            - id: cp_tokens_input
              type: TextInput
              properties:
                placeholder: Themed input
                label:
                  title: Themed Input
                  colon: false
