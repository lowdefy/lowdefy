- title: Basic Sider
  fullWidth: true
  blocks:
    - id: basic_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: basic_sider
          type: Sider
          properties:
            theme: light
            width: 200
            initialCollapsed: false
            collapsible: false
          blocks:
            - id: basic_menu
              type: Menu
              properties:
                mode: inline
                theme: light
                links:
                  - id: basic_home
                    type: MenuLink
                    properties:
                      title: Home
                      icon: AiOutlineHome
                  - id: basic_users
                    type: MenuLink
                    properties:
                      title: Users
                      icon: AiOutlineUser
                  - id: basic_settings
                    type: MenuLink
                    properties:
                      title: Settings
                      icon: AiOutlineSetting
        - id: basic_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: basic_content_text
              type: Paragraph
              properties:
                content: The Sider block provides a sidebar within a Layout. It supports collapsing, themes, breakpoints, and custom widths. Place navigation menus or supplementary content inside the sider.

- title: Dark Theme
  fullWidth: true
  blocks:
    - id: dark_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: dark_sider
          type: Sider
          properties:
            theme: dark
            width: 200
            initialCollapsed: false
            collapsible: false
          blocks:
            - id: dark_menu
              type: Menu
              properties:
                mode: inline
                theme: dark
                links:
                  - id: dark_dashboard
                    type: MenuLink
                    properties:
                      title: Dashboard
                      icon: AiOutlineDashboard
                  - id: dark_analytics
                    type: MenuLink
                    properties:
                      title: Analytics
                      icon: AiOutlineBarChart
                  - id: dark_files
                    type: MenuLink
                    properties:
                      title: Files
                      icon: AiOutlineFile
        - id: dark_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: dark_content_text
              type: Paragraph
              properties:
                content: Setting theme to "dark" gives the sider a dark background with light text. Match the Menu theme to the sider theme for a consistent appearance.

- title: Collapsible Sider
  fullWidth: true
  blocks:
    - id: collapsible_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: collapsible_sider
          type: Sider
          properties:
            theme: light
            width: 220
            collapsible: true
            initialCollapsed: false
          blocks:
            - id: collapsible_menu
              type: Menu
              properties:
                mode: inline
                theme: light
                links:
                  - id: col_inbox
                    type: MenuLink
                    properties:
                      title: Inbox
                      icon: AiOutlineInbox
                  - id: col_starred
                    type: MenuLink
                    properties:
                      title: Starred
                      icon: AiOutlineStar
                  - id: col_sent
                    type: MenuLink
                    properties:
                      title: Sent
                      icon: AiOutlineSend
        - id: collapsible_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: collapsible_content_text
              type: Paragraph
              properties:
                content: With collapsible set to true a collapse trigger appears at the bottom. Toggle between expanded and collapsed states. Menu icons remain visible when collapsed.

- title: Initially Collapsed
  fullWidth: true
  blocks:
    - id: init_collapsed_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: init_collapsed_sider
          type: Sider
          properties:
            theme: light
            width: 200
            collapsible: true
            initialCollapsed: true
          blocks:
            - id: init_collapsed_menu
              type: Menu
              properties:
                mode: inline
                theme: light
                links:
                  - id: ic_overview
                    type: MenuLink
                    properties:
                      title: Overview
                      icon: AiOutlineAppstore
                  - id: ic_reports
                    type: MenuLink
                    properties:
                      title: Reports
                      icon: AiOutlineFileText
                  - id: ic_config
                    type: MenuLink
                    properties:
                      title: Configuration
                      icon: AiOutlineTool
        - id: init_collapsed_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
