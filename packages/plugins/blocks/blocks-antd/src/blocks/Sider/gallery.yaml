- title: Basic Sider
  fullWidth: true
  blocks:
    - id: sider_basic_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: sider_basic
          type: Sider
          properties:
            theme: light
            width: 200
            initialCollapsed: false
            collapsible: false
          blocks:
            - id: sider_basic_menu
              type: Menu
              properties:
                mode: inline
                theme: light
                links:
                  - id: sider_basic_home
                    type: MenuLink
                    properties:
                      title: Home
                      icon: AiOutlineHome
                  - id: sider_basic_users
                    type: MenuLink
                    properties:
                      title: Users
                      icon: AiOutlineUser
                  - id: sider_basic_settings
                    type: MenuLink
                    properties:
                      title: Settings
                      icon: AiOutlineSetting
        - id: sider_basic_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: sider_basic_content_text
              type: Paragraph
              properties:
                content: The Sider block provides a sidebar within a Layout. It supports collapsing, themes, breakpoints, and custom widths. Place navigation menus or supplementary content inside the sider.

- title: Dark Theme Sider
  fullWidth: true
  blocks:
    - id: sider_dark_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: sider_dark
          type: Sider
          properties:
            theme: dark
            width: 200
            initialCollapsed: false
            collapsible: false
          blocks:
            - id: sider_dark_menu
              type: Menu
              properties:
                mode: inline
                theme: dark
                links:
                  - id: sider_dark_dashboard
                    type: MenuLink
                    properties:
                      title: Dashboard
                      icon: AiOutlineDashboard
                  - id: sider_dark_analytics
                    type: MenuLink
                    properties:
                      title: Analytics
                      icon: AiOutlineBarChart
                  - id: sider_dark_files
                    type: MenuLink
                    properties:
                      title: Files
                      icon: AiOutlineFile
        - id: sider_dark_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
