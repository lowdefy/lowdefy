          type: Sider
          properties:
            theme: light
            width: 260
            collapsible: true
            initialCollapsed: false
            breakpoint: md
          class:
            element: border-r border-gray-200
          blocks:
            - id: docs_search
              type: TextInput
              style:
                padding: 12px 16px
              properties:
                placeholder: Search docs...
                prefixIcon: AiOutlineSearch
            - id: docs_menu
              type: Menu
              properties:
                mode: inline
                theme: light
                links:
                  - id: docs_nav_getting_started
                    type: MenuGroup
                    properties:
                      title: Getting Started
                    links:
                      - id: docs_nav_intro
                        type: MenuLink
                        properties:
                          title: Introduction
                      - id: docs_nav_install
                        type: MenuLink
                        properties:
                          title: Installation
                      - id: docs_nav_quickstart
                        type: MenuLink
                        properties:
                          title: Quick Start
                  - id: docs_nav_guides
                    type: MenuGroup
                    properties:
                      title: Guides
                    links:
                      - id: docs_nav_blocks
                        type: MenuLink
                        properties:
                          title: Blocks
                      - id: docs_nav_operators
                        type: MenuLink
                        properties:
                          title: Operators
                      - id: docs_nav_actions
                        type: MenuLink
                        properties:
                          title: Actions
        - id: docs_content
          type: Content
          style:
            padding: 32px
            background: '#fff'
          blocks:
            - id: docs_content_title
              type: Title
              properties:
                content: Introduction
                level: 3
            - id: docs_content_p1
              type: Paragraph
              properties:
                content: Welcome to the documentation. This page gives an overview of the framework and how to get started building your first application.
            - id: docs_content_p2
              type: Paragraph
              properties:
                content: Use the sidebar on the left to browse through different sections. On smaller screens the sidebar collapses automatically thanks to the breakpoint property set to "md".
