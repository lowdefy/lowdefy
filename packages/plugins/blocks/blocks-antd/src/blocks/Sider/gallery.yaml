- title: Collapsible Sider
  fullWidth: true
  blocks:
    - id: sider_collapsible_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: sider_collapsible
          type: Sider
          properties:
            theme: light
            width: 220
            collapsible: true
            initialCollapsed: false
          blocks:
            - id: sider_collapsible_menu
              type: Menu
              properties:
                mode: inline
                theme: light
                links:
                  - id: sider_col_inbox
                    type: MenuLink
                    properties:
                      title: Inbox
                      icon: AiOutlineInbox
                  - id: sider_col_starred
                    type: MenuLink
                    properties:
                      title: Starred
                      icon: AiOutlineStar
                  - id: sider_col_sent
                    type: MenuLink
                    properties:
                      title: Sent
                      icon: AiOutlineSend
        - id: sider_collapsible_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: sider_collapsible_content_text
              type: Paragraph
              properties:
                content: This sider has collapsible set to true. Use the collapse trigger at the bottom to toggle the sidebar between expanded and collapsed states. The menu icons remain visible when collapsed.

- title: Initially Collapsed Sider
  fullWidth: true
  blocks:
    - id: sider_collapsed_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: sider_collapsed
          type: Sider
          properties:
            theme: light
            width: 200
            collapsible: true
            initialCollapsed: true
          blocks:
            - id: sider_collapsed_menu
              type: Menu
              properties:
                mode: inline
                theme: light
                links:
                  - id: sider_ic_overview
                    type: MenuLink
                    properties:
                      title: Overview
                      icon: AiOutlineAppstore
                  - id: sider_ic_reports
                    type: MenuLink
                    properties:
                      title: Reports
                      icon: AiOutlineFileText
                  - id: sider_ic_config
                    type: MenuLink
                    properties:
                      title: Configuration
                      icon: AiOutlineTool
        - id: sider_collapsed_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: sider_collapsed_content_text
              type: Paragraph
              properties:
                content: This sider starts in a collapsed state with initialCollapsed set to true. Click the collapse trigger to expand it.

- title: Sider with Custom Collapsed Width
  fullWidth: true
  blocks:
    - id: sider_custom_width_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: sider_custom_width
          type: Sider
          properties:
            theme: dark
            width: 240
            collapsedWidth: 0
            collapsible: true
            initialCollapsed: true
          blocks:
            - id: sider_custom_width_menu
              type: Menu
              properties:
                mode: inline
                theme: dark
                links:
                  - id: sider_cw_projects
                    type: MenuLink
                    properties:
                      title: Projects
                      icon: AiOutlineProject
                  - id: sider_cw_tasks
                    type: MenuLink
                    properties:
                      title: Tasks
                      icon: AiOutlineCheckSquare
        - id: sider_custom_width_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: sider_custom_width_content_text
              type: Paragraph
              properties:
                content: Setting collapsedWidth to 0 completely hides the sider when collapsed and shows a special floating trigger. This is useful for mobile-friendly layouts where sidebar space needs to be fully reclaimed.

- title: Sider with Reverse Arrow
  fullWidth: true
  blocks:
    - id: sider_reverse_layout
      type: Layout
      style:
        minHeight: 300px
      blocks:
        - id: sider_reverse_content
          type: Content
          style:
            padding: 24px
            background: '#fff'
          blocks:
            - id: sider_reverse_content_text
              type: Paragraph
              properties:
                content: The Sider is on the right side of the layout with reverseArrow set to true. This flips the collapse arrow direction to match the right-side placement.
        - id: sider_reverse
          type: Sider
          properties:
            theme: light
            width: 200
            collapsible: true
            initialCollapsed: false
            reverseArrow: true
          style:
            borderLeft: 1px solid #f0f0f0
          blocks:
            - id: sider_reverse_menu
              type: Menu
              properties:
                mode: inline
                theme: light
                links:
                  - id: sider_rev_details
                    type: MenuLink
                    properties:
                      title: Details
                      icon: AiOutlineInfoCircle
                  - id: sider_rev_history
                    type: MenuLink
                    properties:
                      title: History
                      icon: AiOutlineHistory
