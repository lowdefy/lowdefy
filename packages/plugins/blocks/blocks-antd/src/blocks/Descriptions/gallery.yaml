      type: Descriptions
      properties:
        title: API Error Log
        bordered: true
        column: 3
        items:
          - label: Timestamp
            value: '2026-03-10T14:23:07Z'
          - label: Endpoint
            value: /api/v2/users/auth
          - label: Status Code
            value: 503
          - label: Stack Trace
            value: 'Error: ECONNREFUSED 10.0.1.45:5432 - Connection refused at TCPConnectWrap.afterConnect [as oncomplete] (net.js:1141:16)'
