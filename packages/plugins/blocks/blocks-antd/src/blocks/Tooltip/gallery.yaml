- title: Basic Tooltip
  blocks:
    - id: tooltip_basic
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This is a tooltip
      blocks:
        - id: tooltip_basic_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Hover me
            color: primary
            variant: solid

    - id: tooltip_html
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: '<b>Bold</b> and <em>italic</em> text'
      blocks:
        - id: tooltip_html_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: HTML content
            color: primary
            variant: outlined

    - id: tooltip_long
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This is a longer tooltip message that demonstrates how the tooltip wraps text when the content exceeds the default maximum width.
      blocks:
        - id: tooltip_long_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Long text
            color: default
            variant: outlined

