- title: Arrow Point at Center
  blocks:
    - id: tooltip_arrow_default
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Arrow at edge (default)
        placement: topLeft
        arrowPointAtCenter: false
      blocks:
        - id: tooltip_arrow_default_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Default arrow
            color: default
            variant: outlined
    - id: tooltip_arrow_center
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Arrow at center
        placement: topLeft
        arrowPointAtCenter: true
      blocks:
        - id: tooltip_arrow_center_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Arrow at center
            color: primary
            variant: solid

- title: Auto Adjust Overflow
  blocks:
    - id: tooltip_overflow_on
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip auto-adjusts when near the viewport edge
        autoAdjustOverflow: true
        placement: top
      blocks:
        - id: tooltip_overflow_on_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Auto adjust (default)
            color: primary
            variant: solid
    - id: tooltip_overflow_off
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip stays in position even near viewport edges
        autoAdjustOverflow: false
        placement: top
      blocks:
        - id: tooltip_overflow_off_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No auto adjust
            color: default
            variant: outlined

- title: Delay Settings
  blocks:
    - id: tooltip_delay_fast
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Instant tooltip
        mouseEnterDelay: 0
        mouseLeaveDelay: 0
      blocks:
        - id: tooltip_delay_fast_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No delay
            color: primary
            variant: solid
    - id: tooltip_delay_slow_enter
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip has a 1 second enter delay
        mouseEnterDelay: 1
      blocks:
        - id: tooltip_delay_slow_enter_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: 1s enter delay
            color: primary
            variant: outlined
    - id: tooltip_delay_slow_leave
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip stays 2 seconds after mouse leaves
        mouseLeaveDelay: 2
      blocks:
        - id: tooltip_delay_slow_leave_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: 2s leave delay
            color: primary
            variant: dashed

- title: Default Open
  blocks:
    - id: tooltip_default_open
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: I am open by default
        defaultOpen: true
        placement: right
      blocks:
        - id: tooltip_default_open_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Visible by default
            color: green
            variant: solid

- title: On Various Elements
  blocks:
    - id: tooltip_on_text
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Tooltip on a paragraph
      blocks:
        - id: tooltip_on_text_p
          type: Paragraph
          properties:
            content: Hover over this text to see the tooltip.
    - id: tooltip_on_tag
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Tooltip on a tag
      blocks:
        - id: tooltip_on_tag_el
          type: Tag
          properties:
            title: Hover tag
            color: blue
    - id: tooltip_on_icon_btn
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Delete this item
        placement: bottom
      blocks:
        - id: tooltip_on_icon_btn_el
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineDelete
            hideTitle: true
            color: danger
            variant: text

- title: Style Overrides
  blocks:
    - id: tooltip_style_override
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Styled tooltip
      style:
        --inner:
          backgroundColor: '#1a1a2e'
          color: '#e94560'
          borderRadius: 12
          padding: '12px 20px'
          fontSize: 16
      blocks:
        - id: tooltip_style_override_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom styled
            color: primary
            variant: solid

- title: Theme Token Overrides
  blocks:
    - id: tooltip_theme_large
      type: Tooltip
      layout:
