- title: Arrow Point at Center
  blocks:
    - id: tooltip_arrow_default
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Arrow at edge (default)
        placement: topLeft
        arrowPointAtCenter: false
      blocks:
        - id: tooltip_arrow_default_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Default arrow
            color: default
            variant: outlined
    - id: tooltip_arrow_center
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Arrow at center
        placement: topLeft
        arrowPointAtCenter: true
      blocks:
        - id: tooltip_arrow_center_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Arrow at center
            color: primary
            variant: solid

- title: Auto Adjust Overflow
  blocks:
    - id: tooltip_overflow_on
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip auto-adjusts when near the viewport edge
        autoAdjustOverflow: true
        placement: top
      blocks:
        - id: tooltip_overflow_on_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Auto adjust (default)
            color: primary
            variant: solid
    - id: tooltip_overflow_off
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip stays in position even near viewport edges
        autoAdjustOverflow: false
        placement: top
      blocks:
        - id: tooltip_overflow_off_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No auto adjust
            color: default
            variant: outlined

- title: Delay Settings
  blocks:
    - id: tooltip_delay_fast
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Instant tooltip
        mouseEnterDelay: 0
        mouseLeaveDelay: 0
      blocks:
        - id: tooltip_delay_fast_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: No delay
            color: primary
            variant: solid
    - id: tooltip_delay_slow_enter
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip has a 1 second enter delay
        mouseEnterDelay: 1
      blocks:
        - id: tooltip_delay_slow_enter_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: 1s enter delay
            color: primary
            variant: outlined
    - id: tooltip_delay_slow_leave
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip stays 2 seconds after mouse leaves
        mouseLeaveDelay: 2
      blocks:
        - id: tooltip_delay_slow_leave_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: 2s leave delay
            color: primary
            variant: dashed

- title: Default Open and Destroy on Hide
  blocks:
    - id: tooltip_default_open
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: I am open by default
        defaultOpen: true
        placement: right
      blocks:
        - id: tooltip_default_open_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Visible by default
            color: green
            variant: solid
    - id: tooltip_destroy_on_hide
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip DOM is destroyed when hidden
        destroyTooltipOnHide: true
      blocks:
        - id: tooltip_destroy_on_hide_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Destroy on hide
            color: default
            variant: outlined

- title: Z-Index
  blocks:
    - id: tooltip_zindex_high
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: High z-index tooltip (2000)
        zIndex: 2000
      blocks:
        - id: tooltip_zindex_high_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: zIndex 2000
            color: primary
            variant: solid

- title: On Various Elements
  blocks:
    - id: tooltip_on_text
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Tooltip on a paragraph
      blocks:
        - id: tooltip_on_text_p
          type: Paragraph
          properties:
            content: Hover over this text to see the tooltip.
    - id: tooltip_on_tag
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Tooltip on a tag
      blocks:
        - id: tooltip_on_tag_el
          type: Tag
          properties:
            title: Hover tag
            color: blue
    - id: tooltip_on_icon_btn
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Delete this item
        placement: bottom
      blocks:
        - id: tooltip_on_icon_btn_el
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            icon: AiOutlineDelete
            hideTitle: true
            color: danger
            variant: text

- title: onOpenChange Event
  blocks:
    - id: tooltip_event_open_change
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip fires an event on open/close
      events:
        onOpenChange:
          - id: tooltip_event_display_message
            type: DisplayMessage
            params:
              content: Tooltip visibility changed!
              duration: 2
      blocks:
        - id: tooltip_event_open_change_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Hover to trigger event
            color: primary
            variant: solid
    - id: tooltip_event_set_state
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Tracks tooltip state
        trigger: click
      events:
        onOpenChange:
          - id: tooltip_event_set_state_action
            type: SetState
            params:
              tooltip_was_toggled: true
      blocks:
        - id: tooltip_event_set_state_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Click to toggle and set state
            color: primary
            variant: outlined

- title: Overlay Style
  blocks:
    - id: tooltip_overlay_style
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Tooltip with custom overlay style
        overlayStyle:
          boxShadow: 0 4px 12px rgba(0, 0, 0, 0.3)
      blocks:
        - id: tooltip_overlay_style_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom overlay shadow
            color: primary
            variant: solid

- title: Theme Token Overrides
  blocks:
    - id: tooltip_theme_large_radius
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Large radius tooltip
        theme:
          borderRadius: 16
      blocks:
        - id: tooltip_theme_large_radius_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Large radius
            color: primary
            variant: solid
    - id: tooltip_theme_bg
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Custom background and text color
        theme:
          colorBgSpotlight: '#2d3436'
          colorTextLightSolid: '#74b9ff'
      blocks:
        - id: tooltip_theme_bg_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom colors
            color: primary
            variant: outlined
    - id: tooltip_theme_font
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Larger font size and line height
        theme:
          fontSize: 18
          lineHeight: 2
      blocks:
        - id: tooltip_theme_font_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Large font
            color: primary
            variant: dashed
    - id: tooltip_theme_wide
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: This tooltip has a wider max width so longer text can display on a single line without wrapping.
        theme:
          maxWidth: 500
      blocks:
        - id: tooltip_theme_wide_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Wide tooltip (500px)
            color: default
            variant: outlined
    - id: tooltip_theme_compact
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Compact tooltip
        theme:
          paddingXS: 4
          controlHeight: 24
          fontSize: 12
      blocks:
        - id: tooltip_theme_compact_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Compact theme
            color: default
            variant: dashed
    - id: tooltip_theme_zindex
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Custom z-index via theme
        theme:
          zIndexPopup: 2000
      blocks:
        - id: tooltip_theme_zindex_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Theme z-index
            color: default
            variant: outlined

- title: Style and CSS Classes
  blocks:
    - id: tooltip_style_element
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Styled with element CSS key
      style:
        --element:
          cursor: help
      blocks:
        - id: tooltip_style_element_p
          type: Paragraph
          properties:
            content: Hover me (help cursor via element style)
    - id: tooltip_style_inner
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Custom inner styling
      style:
        --inner:
          backgroundColor: '#1a1a2e'
          color: '#e94560'
          borderRadius: 12
          padding: '12px 20px'
          fontSize: 16
      blocks:
        - id: tooltip_style_inner_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom inner style
            color: primary
            variant: solid
    - id: tooltip_class_element
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Tailwind on element wrapper
      class:
        element: cursor-help
      blocks:
        - id: tooltip_class_element_text
          type: Paragraph
          properties:
            content: Hover me (Tailwind element class)
    - id: tooltip_class_inner
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Tailwind on inner popup
      class:
        inner: text-lg font-bold
      blocks:
        - id: tooltip_class_inner_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Tailwind inner class
            color: primary
            variant: outlined

- title: Tooltip in Data Table Header
  blocks:
    - id: tooltip_table_header_card
      type: Card
      properties:
        title: Monthly Sales Report
        size: small
      blocks:
        - id: tooltip_table_header_row
          type: Box
          layout:
            gap: 0
            direction: column
          blocks:
            - id: tooltip_table_header_labels
              type: Box
              class: bg-gray-50 px-4 py-2 border-b border-gray-200
              layout:
                gap: 0
              blocks:
                - id: tooltip_table_hdr_product
                  type: Tooltip
                  layout:
                    flex: 2 1 0
                  properties:
                    title: The product name as listed in the inventory system
                    placement: top
                  blocks:
                    - id: tooltip_table_hdr_product_text
                      type: Paragraph
                      class: font-semibold text-gray-600 text-sm m-0
                      properties:
                        content: Product
                - id: tooltip_table_hdr_revenue
                  type: Tooltip
                  layout:
                    flex: 1 1 0
                  properties:
                    title: Total revenue after discounts and returns
                    placement: top
                  blocks:
                    - id: tooltip_table_hdr_revenue_text
                      type: Paragraph
                      class: font-semibold text-gray-600 text-sm m-0
                      properties:
                        content: Revenue
                - id: tooltip_table_hdr_units
                  type: Tooltip
                  layout:
                    flex: 1 1 0
                  properties:
                    title: Number of individual units sold this month
                    placement: top
                  blocks:
                    - id: tooltip_table_hdr_units_text
                      type: Paragraph
                      class: font-semibold text-gray-600 text-sm m-0
                      properties:
                        content: Units Sold
            - id: tooltip_table_row_1
              type: Box
              class: px-4 py-2 border-b border-gray-100
              layout:
                gap: 0
              blocks:
                - id: tooltip_table_row_1_product
                  type: Paragraph
                  layout:
                    flex: 2 1 0
                  class: text-sm m-0
                  properties:
                    content: Widget Pro
                - id: tooltip_table_row_1_revenue
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  class: text-sm m-0
                  properties:
                    content: $12,450
                - id: tooltip_table_row_1_units
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  class: text-sm m-0
                  properties:
                    content: '342'
            - id: tooltip_table_row_2
              type: Box
              class: px-4 py-2
              layout:
                gap: 0
              blocks:
                - id: tooltip_table_row_2_product
                  type: Paragraph
                  layout:
                    flex: 2 1 0
                  class: text-sm m-0
                  properties:
                    content: Gadget X
                - id: tooltip_table_row_2_revenue
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  class: text-sm m-0
                  properties:
                    content: $8,230
                - id: tooltip_table_row_2_units
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  class: text-sm m-0
                  properties:
                    content: '189'

- title: Tooltip on Form Labels
  blocks:
    - id: tooltip_form_card
      type: Card
      properties:
        title: User Profile Settings
      blocks:
        - id: tooltip_form_username
          type: TextInput
          properties:
            label:
              title: Username
              extra:
                - id: tooltip_form_username_help
                  type: Tooltip
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Your unique username. Must be 3-20 characters, letters and numbers only.
                    placement: right
                  blocks:
                    - id: tooltip_form_username_icon
                      type: Icon
                      layout:
                        flex: 0 0 auto
                      properties:
                        name: AiOutlineQuestionCircle
