          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Custom theme
            color: primary
            variant: outlined
    - id: tooltip_theme_font
      type: Tooltip
      layout:
        flex: 0 0 auto
      properties:
        title: Larger font size tooltip
        theme:
          fontSize: 18
      blocks:
        - id: tooltip_theme_font_btn
          type: Button
          layout:
            flex: 0 0 auto
          properties:
            title: Large font
            color: primary
            variant: dashed
