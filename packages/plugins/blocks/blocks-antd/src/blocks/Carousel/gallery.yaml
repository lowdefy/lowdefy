- title: Slides with Cards
  blocks:
    - id: card_carousel
      type: Carousel
      properties:
        slidesToShow: 2
        slidesToScroll: 1
        arrows: true
      slots:
        card_s1:
          blocks:
            - id: card_s1
              type: Box
              style:
                padding: 12px
              blocks:
                - id: card_s1_card
                  type: Card
                  properties:
                    title: Dashboard
                    bordered: true
                  blocks:
                    - id: card_s1_card_desc
                      type: Paragraph
                      properties:
                        content: Monitor your app metrics and KPIs at a glance with customizable widgets and real-time data.
                    - id: card_s1_card_tag
                      type: Tag
                      properties:
                        title: Analytics
                        color: blue
        card_s2:
          blocks:
            - id: card_s2
              type: Box
              style:
                padding: 12px
