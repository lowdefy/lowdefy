- title: Slides with Rich Content
  blocks:
    - id: rich_carousel
      type: Carousel
      properties:
        autoplay: true
        autoplaySpeed: 4000
      slots:
        rich_s1:
          blocks:
            - id: rich_s1
              type: Box
              style:
                height: 220
                background: linear-gradient(135deg,
                display: flex
                flexDirection: column
                alignItems: center
                justifyContent: center
                padding: 24px
              blocks:
                - id: rich_s1_icon
                  type: Icon
                  properties:
                    name: AiOutlineRocket
                    size: 40
                    color: white
                - id: rich_s1_title
                  type: Title
                  properties:
                    content: Launch Fast
                    level: 3
                  style:
                    color: white
                    marginTop: 12
                    marginBottom: 0
                - id: rich_s1_desc
                  type: Paragraph
                  properties:
                    content: Build and deploy web apps in record time with config-driven development.
                  style:
                    color: rgba(255, 255, 255, 0.85)
                    textAlign: center
                    maxWidth: 400
        rich_s2:
