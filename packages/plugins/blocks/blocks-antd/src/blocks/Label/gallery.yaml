- title: Basic Label
  fullWidth: true
  blocks:
    - id: label_basic
      type: Label
      properties:
        title: Field Label
      blocks:
        - id: label_basic_input
          type: TextInput

    - id: label_no_title
      type: Label
      blocks:
        - id: label_no_title_input
          type: TextInput

- title: Colon
  fullWidth: true
  blocks:
    - id: label_colon_true
      type: Label
      properties:
        title: With Colon (default)
        colon: true
      blocks:
        - id: label_colon_true_input
          type: TextInput

    - id: label_colon_false
      type: Label
      properties:
        title: Without Colon
        colon: false
      blocks:
        - id: label_colon_false_input
          type: TextInput

- title: Extra Text
  fullWidth: true
  blocks:
    - id: label_extra_short
      type: Label
      properties:
        title: Username
        extra: Must be between 3 and 20 characters.
      blocks:
        - id: label_extra_short_input
          type: TextInput

    - id: label_extra_html
      type: Label
      properties:
        title: Website
        extra: 'Enter a full URL, e.g. <b>https://example.com</b>'
      blocks:
        - id: label_extra_html_input
          type: TextInput

- title: Required Indicator
  fullWidth: true
  blocks:
    - id: label_required
      type: Label
      required: true
      properties:
        title: Email Address
      blocks:
        - id: label_required_input
          type: TextInput

    - id: label_required_extra
      type: Label
      required: true
      properties:
        title: Password
        extra: Minimum 8 characters.
      blocks:
        - id: label_required_extra_input
          type: TextInput

- title: Disabled Label
  fullWidth: true
  blocks:
    - id: label_disabled
      type: Label
      properties:
        title: This title is hidden
        disabled: true
      blocks:
        - id: label_disabled_input
          type: TextInput

- title: Align
  fullWidth: true
  blocks:
    - id: label_align_left
      type: Label
      properties:
        title: Left Aligned (default)
        align: left
        inline: true
        span: 6
      blocks:
        - id: label_align_left_input
          type: TextInput

    - id: label_align_right
      type: Label
      properties:
        title: Right Aligned
        align: right
        inline: true
        span: 6
      blocks:
        - id: label_align_right_input
          type: TextInput

- title: Inline Layout
  fullWidth: true
  blocks:
    - id: label_inline
      type: Label
      properties:
        title: Inline Label
        inline: true
      blocks:
        - id: label_inline_input
          type: TextInput

    - id: label_inline_span
      type: Label
      properties:
        title: Custom Span (6)
        inline: true
        span: 6
      blocks:
        - id: label_inline_span_input
          type: TextInput

    - id: label_inline_span_wide
      type: Label
      properties:
        title: Wide Span (10)
        inline: true
        span: 10
      blocks:
        - id: label_inline_span_wide_input
          type: TextInput

    - id: label_inline_extra
      type: Label
      properties:
        title: Inline with Extra
        inline: true
        span: 6
        extra: Helper text shown below the input.
      blocks:
        - id: label_inline_extra_input
          type: TextInput

- title: Sizes
  fullWidth: true
  blocks:
    - id: label_size_small
      type: Label
      properties:
        title: Small
        size: small
      blocks:
        - id: label_size_small_input
          type: TextInput
          properties:
            size: small

    - id: label_size_default
      type: Label
      properties:
        title: Default
      blocks:
        - id: label_size_default_input
          type: TextInput

    - id: label_size_large
      type: Label
      properties:
        title: Large
        size: large
      blocks:
        - id: label_size_large_input
          type: TextInput
          properties:
            size: large

- title: Inline Sizes
  fullWidth: true
  blocks:
    - id: label_inline_small
      type: Label
      properties:
        title: Small Inline
        size: small
        inline: true
        span: 6
      blocks:
        - id: label_inline_small_input
          type: TextInput
          properties:
            size: small

    - id: label_inline_default
      type: Label
      properties:
        title: Default Inline
        inline: true
        span: 6
      blocks:
        - id: label_inline_default_input
          type: TextInput

    - id: label_inline_large
      type: Label
      properties:
        title: Large Inline
        size: large
        inline: true
        span: 6
      blocks:
        - id: label_inline_large_input
          type: TextInput
          properties:
            size: large

- title: HTML in Title
  fullWidth: true
  blocks:
    - id: label_html_title
      type: Label
      properties:
        title: '<span style="color: #1677ff;">Blue Label</span>'
      blocks:
        - id: label_html_title_input
          type: TextInput

    - id: label_html_bold
      type: Label
      properties:
        title: '<b>Bold</b> with <i>italic</i>'
      blocks:
        - id: label_html_bold_input
          type: TextInput

- title: Wrapping Various Input Types
  fullWidth: true
  blocks:
    - id: label_wrap_number
      type: Label
      properties:
        title: Quantity
      blocks:
        - id: label_wrap_number_input
          type: NumberInput
          properties:
            min: 0
            max: 100

    - id: label_wrap_switch
      type: Label
      properties:
        title: Enable Notifications
      blocks:
        - id: label_wrap_switch_input
          type: Switch

    - id: label_wrap_select
      type: Label
      properties:
        title: Country
      blocks:
        - id: label_wrap_select_input
          type: Selector
          properties:
            options:
              - label: United States
                value: us
              - label: United Kingdom
                value: uk
              - label: Germany
                value: de

- title: Form Layout Pattern
  fullWidth: true
  blocks:
    - id: label_form_card
      type: Card
      properties:
        title: User Registration
      blocks:
        - id: label_form_name
          type: Label
          required: true
          properties:
            title: Full Name
          blocks:
            - id: label_form_name_input
              type: TextInput

        - id: label_form_email
          type: Label
          required: true
          properties:
            title: Email
            extra: We will never share your email.
          blocks:
            - id: label_form_email_input
              type: TextInput

        - id: label_form_age
          type: Label
          properties:
            title: Age
          blocks:
            - id: label_form_age_input
              type: NumberInput
              properties:
                min: 0
                max: 150

        - id: label_form_bio
          type: Label
          properties:
            title: Bio
            extra: Optional short description about yourself.
          blocks:
            - id: label_form_bio_input
              type: TextArea
              properties:
                rows: 3

        - id: label_form_submit_row
          type: Box
          layout:
            gap: 8
            justify: flex-end
          blocks:
            - id: label_form_cancel
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Cancel
                color: default
                variant: outlined
            - id: label_form_submit
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Register
                color: primary
                variant: solid

- title: Inline Form Layout
  fullWidth: true
  blocks:
    - id: label_inline_form_card
      type: Card
      properties:
        title: Inline Form
        size: small
      blocks:
        - id: label_iform_name
          type: Label
          properties:
            title: Name
            inline: true
            span: 6
            align: right
          blocks:
            - id: label_iform_name_input
              type: TextInput

        - id: label_iform_email
          type: Label
          properties:
            title: Email
            inline: true
            span: 6
            align: right
          blocks:
            - id: label_iform_email_input
              type: TextInput

        - id: label_iform_role
          type: Label
          properties:
            title: Role
            inline: true
            span: 6
            align: right
          blocks:
            - id: label_iform_role_input
              type: Selector
              properties:
                options:
                  - label: Admin
                    value: admin
                  - label: Editor
                    value: editor
                  - label: Viewer
                    value: viewer

- title: Style Overrides
  fullWidth: true
  blocks:
    - id: label_style_label
      type: Label
      properties:
        title: Styled Label
        extra: Styled extra text
      style:
        --label:
          color: '#722ed1'
          fontWeight: bold
        --extra:
          color: '#722ed1'
          fontStyle: italic
      blocks:
        - id: label_style_label_input
          type: TextInput

    - id: label_style_element
      type: Label
      properties:
        title: Bordered Container
      style:
        --element:
          border: 1px solid #d9d9d9
          padding: 12px
          borderRadius: 8px
      blocks:
        - id: label_style_element_input
          type: TextInput

- title: Theme Token Overrides
  fullWidth: true
  blocks:
    - id: label_theme_purple
      type: Label
      properties:
        title: Purple Label Theme
        extra: Extra text inherits theme
        theme:
          labelColor: '#722ed1'
          labelFontSize: 16
          labelRequiredMarkColor: '#722ed1'
      required: true
      blocks:
        - id: label_theme_purple_input
          type: TextInput

    - id: label_theme_green
      type: Label
      properties:
        title: Green Required Mark
        theme:
          labelRequiredMarkColor: '#52c41a'
      required: true
      blocks:
        - id: label_theme_green_input
          type: TextInput

    - id: label_theme_colon_spacing
      type: Label
      properties:
        title: Wide Colon Spacing
        theme:
          labelColonMarginInlineStart: 8
          labelColonMarginInlineEnd: 16
      blocks:
        - id: label_theme_colon_input
          type: TextInput
