        height: 420px
        border: 1px solid #d9d9d9
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: editor_files
            defaultSize: 18
            min: 12
            collapsible: true
          - key: editor_main
            defaultSize: 82
      events:
        onCollapse:
          - id: editor_collapse_msg
            type: DisplayMessage
            params:
              content:
                _if:
                  test:
                    _event: collapsed
                  then: File explorer collapsed.
                  else: File explorer expanded.
              duration: 2
      slots:
        editor_files:
          blocks:
            - id: editor_files_box
              type: Box
              class: bg-slate-800 h-full p-3
              blocks:
                - id: editor_files_title
                  type: Paragraph
                  style:
                    color: '#9ca3af'
                    fontSize: 11px
                    textTransform: uppercase
                    letterSpacing: 1px
                  properties:
                    content: Explorer
                - id: editor_files_f1
                  type: Paragraph
                  style:
                    color: '#e2e8f0'
                    fontSize: 13px
                  properties:
                    content: 'src/'
                - id: editor_files_f2
                  type: Paragraph
                  style:
                    color: '#94a3b8'
                    fontSize: 13px
                    paddingLeft: 12px
                  properties:
                    content: 'index.js'
                - id: editor_files_f3
                  type: Paragraph
                  style:
                    color: '#94a3b8'
                    fontSize: 13px
                    paddingLeft: 12px
                  properties:
                    content: 'App.js'
                - id: editor_files_f4
                  type: Paragraph
                  style:
                    color: '#94a3b8'
                    fontSize: 13px
                    paddingLeft: 12px
                  properties:
                    content: 'styles.css'
                - id: editor_files_f5
                  type: Paragraph
                  style:
                    color: '#e2e8f0'
                    fontSize: 13px
                  properties:
                    content: 'package.json'
        editor_main:
          blocks:
            - id: editor_inner
              type: Splitter
              style:
                height: 100%
              properties:
                layout: vertical
                panels:
                  - key: editor_code
                    defaultSize: 65
                  - key: editor_terminal
                    defaultSize: 35
                    min: 15
                    collapsible: true
              slots:
                editor_code:
                  blocks:
                    - id: editor_code_box
                      type: Box
                      class: bg-slate-900 h-full p-4
                      blocks:
                        - id: editor_code_tab
                          type: Paragraph
                          style:
                            color: '#64748b'
                            fontSize: 12px
                            borderBottom: 1px solid #334155
                            paddingBottom: 8px
                          properties:
                            content: 'App.js'
                        - id: editor_code_content
                          type: Paragraph
                          style:
                            color: '#e2e8f0'
                            fontFamily: monospace
                            fontSize: 13px
                            lineHeight: 1.6
                          properties:
                            content: '<span style="color:#c084fc">import</span> React <span style="color:#c084fc">from</span> <span style="color:#a5d6ff">"react"</span>;<br><br><span style="color:#c084fc">function</span> <span style="color:#67e8f9">App</span>() {<br>&nbsp;&nbsp;<span style="color:#c084fc">return</span> (<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;<span style="color:#67e8f9">div</span> <span style="color:#79c0ff">className</span>=<span style="color:#a5d6ff">"app"</span>&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&lt;<span style="color:#67e8f9">h1</span>&gt;Hello World&lt;/<span style="color:#67e8f9">h1</span>&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;/<span style="color:#67e8f9">div</span>&gt;<br>&nbsp;&nbsp;);<br>}'
                editor_terminal:
                  blocks:
                    - id: editor_terminal_box
                      type: Box
                      class: bg-gray-950 h-full p-3
                      blocks:
                        - id: editor_terminal_title
                          type: Paragraph
                          style:
                            color: '#64748b'
                            fontSize: 11px
                            textTransform: uppercase
                            letterSpacing: 1px
                            borderBottom: 1px solid #1e293b
                            paddingBottom: 6px
                          properties:
                            content: Terminal
                        - id: editor_terminal_line
                          type: Paragraph
                          style:
                            color: '#22c55e'
                            fontFamily: monospace
                            fontSize: 13px
                          properties:
                            content: '$ npm start'
                        - id: editor_terminal_output
                          type: Paragraph
                          style:
                            color: '#94a3b8'
                            fontFamily: monospace
                            fontSize: 13px
                          properties:
                            content: 'Compiled successfully!'

- title: Dashboard with Sidebar and Detail Panels
  blocks:
    - id: dashboard_outer
      type: Splitter
      style:
        height: 400px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: dash_nav
            defaultSize: 22
            min: 15
            max: 35
            collapsible: true
          - key: dash_content
            defaultSize: 50
          - key: dash_detail
            defaultSize: 28
            min: 20
            collapsible: true
      events:
        onResizeEnd:
          - id: dash_resize_state
            type: SetState
            params:
              dashboard_layout:
                _event: sizes
      slots:
        dash_nav:
          blocks:
            - id: dash_nav_box
              type: Box
              class: bg-slate-50 h-full p-0
              blocks:
                - id: dash_nav_card
                  type: Card
                  properties:
                    title: Navigation
                    size: small
                    bordered: false
                  blocks:
                    - id: dash_nav_item1
                      type: Button
                      properties:
                        title: Overview
                        icon: AiOutlineDashboard
                        variant: text
                        block: true
                    - id: dash_nav_item2
                      type: Button
                      properties:
                        title: Analytics
                        icon: AiOutlineBarChart
                        variant: text
                        block: true
                    - id: dash_nav_item3
                      type: Button
                      properties:
                        title: Users
                        icon: AiOutlineTeam
                        variant: text
                        block: true
                    - id: dash_nav_item4
                      type: Button
                      properties:
                        title: Settings
                        icon: AiOutlineSetting
                        variant: text
                        block: true
        dash_content:
          blocks:
            - id: dash_content_box
              type: Box
              class: h-full p-4
              blocks:
                - id: dash_content_title
                  type: Title
                  properties:
                    content: Overview
                    level: 4
                - id: dash_stats_row
                  type: Box
                  layout:
                    gap: 16
                  blocks:
                    - id: dash_stat_users
                      type: Card
                      layout:
                        flex: 1 1 0
                      properties:
                        size: small
                      blocks:
                        - id: dash_stat_users_val
                          type: Statistic
                          properties:
                            title: Total Users
                            value: 2846
                    - id: dash_stat_revenue
                      type: Card
                      layout:
                        flex: 1 1 0
                      properties:
                        size: small
                      blocks:
                        - id: dash_stat_revenue_val
                          type: Statistic
                          properties:
                            title: Revenue
                            value: 48200
                            prefix: $
                - id: dash_progress_card
                  type: Card
                  properties:
                    title: Monthly Target
                    size: small
                  blocks:
                    - id: dash_progress_bar
                      type: Progress
                      properties:
                        percent: 72
        dash_detail:
          blocks:
            - id: dash_detail_box
              type: Box
              class: bg-gray-50 h-full p-0
              blocks:
                - id: dash_detail_card
                  type: Card
                  properties:
                    title: Recent Activity
                    size: small
                    bordered: false
                  blocks:
                    - id: dash_detail_item1
                      type: Paragraph
                      properties:
                        content: '<b>Sarah</b> updated the project plan <i>2 min ago</i>'
                    - id: dash_detail_divider1
                      type: Divider
                    - id: dash_detail_item2
                      type: Paragraph
                      properties:
                        content: '<b>James</b> added 3 team members <i>15 min ago</i>'
                    - id: dash_detail_divider2
                      type: Divider
                    - id: dash_detail_item3
                      type: Paragraph
                      properties:
                        content: '<b>System</b> completed deployment <i>1 hour ago</i>'
                    - id: dash_detail_divider3
                      type: Divider
                    - id: dash_detail_item4
                      type: Paragraph
                      properties:
                        content: '<b>Alex</b> resolved 5 support tickets <i>3 hours ago</i>'

- title: Email Client Layout
  blocks:
    - id: email_outer
      type: Splitter
      class:
        element: rounded-lg shadow-md overflow-hidden
      style:
        height: 420px
      properties:
        layout: horizontal
        panels:
          - key: email_folders
            defaultSize: 20
            min: 15
            collapsible: true
          - key: email_list
            defaultSize: 35
            min: 25
          - key: email_preview
            defaultSize: 45
      events:
        onCollapse:
          - id: email_collapse_action
            type: DisplayMessage
