- title: Nested Splitters
  blocks:
    - id: nested_outer
      type: Splitter
      style:
        height: 400px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: n_sidebar
            defaultSize: 25
            min: 15
            collapsible: true
          - key: n_main
            defaultSize: 75
      slots:
        n_sidebar:
          blocks:
            - id: nested_sidebar
              type: Box
              class: bg-slate-100 h-full p-4
              blocks:
                - id: nested_sidebar_title
                  type: Paragraph
                  properties:
                    content: '<b>Sidebar</b>'
                - id: nested_sidebar_item_1
                  type: Paragraph
                  properties:
                    content: Dashboard
                - id: nested_sidebar_item_2
                  type: Paragraph
                  properties:
                    content: Analytics
                - id: nested_sidebar_item_3
                  type: Paragraph
                  properties:
                    content: Settings
                - id: nested_sidebar_item_4
                  type: Paragraph
                  properties:
                    content: Reports
        n_main:
          blocks:
            - id: nested_inner
              type: Splitter
              style:
                height: 100%
              properties:
                layout: vertical
                panels:
                  - key: n_content
                    defaultSize: 70
                  - key: n_footer
                    defaultSize: 30
                    min: 15
                    collapsible: true
              slots:
                n_content:
                  blocks:
                    - id: nested_content
                      type: Box
                      class: bg-white h-full p-4
                      blocks:
                        - id: nested_content_title
                          type: Paragraph
                          properties:
                            content: '<b>Main Content Area</b>'
                        - id: nested_content_desc
                          type: Paragraph
                          properties:
                            content: This demonstrates a horizontal splitter with a nested vertical splitter. The sidebar splits horizontally, while the main area is split vertically into content and a bottom panel.
                n_footer:
                  blocks:
                    - id: nested_footer
                      type: Box
                      class: bg-blue-50 h-full p-4
                      blocks:
                        - id: nested_footer_title
                          type: Paragraph
                          properties:
                            content: '<b>Bottom Panel</b>'
                        - id: nested_footer_desc
                          type: Paragraph
                          properties:
                            content: Collapsible bottom panel inside the nested vertical splitter.

- title: IDE-style Layout
  blocks:
    - id: ide_outer
      type: Splitter
      style:
        height: 450px
        border: 1px solid #d9d9d9
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: ide_explorer
            defaultSize: 20
            min: 12
            collapsible: true
          - key: ide_right
            defaultSize: 80
      slots:
        ide_explorer:
          blocks:
            - id: ide_explorer_box
              type: Box
              class: bg-slate-800 h-full p-3
              blocks:
                - id: ide_explorer_title
                  type: Paragraph
                  style:
                    color: '#9ca3af'
                    fontSize: 11px
                    textTransform: uppercase
                    letterSpacing: 1px
                  properties:
                    content: Explorer
                - id: ide_explorer_f1
                  type: Paragraph
                  style:
                    color: '#e2e8f0'
                    fontSize: 13px
                  properties:
                    content: 'src/'
                - id: ide_explorer_f2
                  type: Paragraph
                  style:
                    color: '#94a3b8'
                    fontSize: 13px
                    paddingLeft: 12px
                  properties:
                    content: 'index.js'
                - id: ide_explorer_f3
                  type: Paragraph
                  style:
                    color: '#94a3b8'
                    fontSize: 13px
                    paddingLeft: 12px
                  properties:
                    content: 'App.js'
                - id: ide_explorer_f4
                  type: Paragraph
                  style:
                    color: '#94a3b8'
                    fontSize: 13px
                    paddingLeft: 12px
                  properties:
                    content: 'utils.js'
                - id: ide_explorer_f5
                  type: Paragraph
                  style:
                    color: '#e2e8f0'
                    fontSize: 13px
                  properties:
                    content: 'package.json'
        ide_right:
          blocks:
            - id: ide_inner
              type: Splitter
              style:
                height: 100%
              properties:
                layout: vertical
                panels:
                  - key: ide_editor
                    defaultSize: 65
                  - key: ide_terminal
                    defaultSize: 35
                    min: 15
                    collapsible: true
              slots:
                ide_editor:
                  blocks:
                    - id: ide_editor_box
                      type: Box
                      class: bg-slate-900 h-full p-4
                      blocks:
                        - id: ide_editor_tab
                          type: Paragraph
                          style:
                            color: '#64748b'
                            fontSize: 12px
                            borderBottom: 1px solid #334155
                            paddingBottom: 8px
                          properties:
                            content: 'App.js'
                        - id: ide_editor_code
                          type: Paragraph
                          style:
                            color: '#e2e8f0'
                            fontFamily: monospace
                            fontSize: 13px
                            lineHeight: 1.6
                          properties:
                            content: '<span style="color:#c084fc">function</span> <span style="color:#67e8f9">App</span>() {<br>&nbsp;&nbsp;<span style="color:#c084fc">return</span> (<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;<span style="color:#67e8f9">div</span>&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Hello World<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;/<span style="color:#67e8f9">div</span>&gt;<br>&nbsp;&nbsp;);<br>}'
                ide_terminal:
                  blocks:
                    - id: ide_terminal_box
                      type: Box
                      class: bg-gray-950 h-full p-3
                      blocks:
                        - id: ide_terminal_title
                          type: Paragraph
                          style:
                            color: '#64748b'
                            fontSize: 11px
                            textTransform: uppercase
                            letterSpacing: 1px
                            borderBottom: 1px solid #1e293b
                            paddingBottom: 6px
                          properties:
                            content: Terminal
                        - id: ide_terminal_line
                          type: Paragraph
                          style:
                            color: '#22c55e'
                            fontFamily: monospace
                            fontSize: 13px
                          properties:
                            content: '$ npm start'
                        - id: ide_terminal_output
                          type: Paragraph
                          style:
                            color: '#94a3b8'
                            fontFamily: monospace
                            fontSize: 13px
                          properties:
                            content: 'Compiled successfully!'

- title: Panels with Rich Content
  blocks:
    - id: rich_h
      type: Splitter
      style:
        height: 280px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: rich_left
            defaultSize: 50
          - key: rich_right
            defaultSize: 50
      slots:
        rich_left:
          blocks:
            - id: rich_left_box
              type: Box
              class: h-full p-4
              blocks:
                - id: rich_left_card
                  type: Card
                  properties:
                    title: Project Overview
                    size: small
                  blocks:
                    - id: rich_left_card_p1
                      type: Paragraph
                      properties:
                        content: This panel contains a Card block inside a Splitter panel, demonstrating that any block type can be placed within splitter panels.
                    - id: rich_left_card_tag
                      type: Tag
                      properties:
                        title: Active
                        color: success
        rich_right:
          blocks:
            - id: rich_right_box
              type: Box
              class: h-full p-4
              blocks:
                - id: rich_right_card
                  type: Card
                  properties:
                    title: Statistics
                    size: small
                  blocks:
                    - id: rich_right_stat
                      type: Statistic
                      properties:
                        title: Total Users
                        value: 1428
                    - id: rich_right_progress
                      type: Progress
                      properties:
                        percent: 72

