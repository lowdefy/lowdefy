- title: Min and Max Size Constraints
  blocks:
    - id: constrained
      type: Splitter
      style:
        height: 200px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: nav
            defaultSize: 30
            min: 20
            max: 40
          - key: main
            defaultSize: 70
      slots:
        nav:
          blocks:
            - id: constrained_nav
              type: Box
              class: bg-indigo-100 h-full p-4
              blocks:
                - id: constrained_nav_title
                  type: Paragraph
                  properties:
                    content: '<b>Navigation</b>'
                - id: constrained_nav_desc
                  type: Paragraph
                  properties:
                    content: 'Min: 20% / Max: 40%'
        main:
          blocks:
            - id: constrained_main
              type: Box
              class: bg-slate-50 h-full p-4
              blocks:
                - id: constrained_main_title
                  type: Paragraph
                  properties:
                    content: '<b>Main Content</b>'
                - id: constrained_main_desc
                  type: Paragraph
                  properties:
                    content: This panel fills the remaining space. The left panel cannot be resized smaller than 20% or larger than 40%.
    - id: constrained_both
      type: Splitter
      style:
        height: 200px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: c_left
            defaultSize: 30
            min: '100px'
            max: '400px'
          - key: c_center
            defaultSize: 40
          - key: c_right
            defaultSize: 30
            min: '100px'
            max: '300px'
      slots:
        c_left:
          blocks:
            - id: constrained_both_left
              type: Box
              class: bg-purple-50 h-full p-4 flex items-center justify-center
              blocks:
                - id: constrained_both_left_text
                  type: Paragraph
                  properties:
                    content: 'Min: 100px / Max: 400px'
        c_center:
          blocks:
            - id: constrained_both_center
              type: Box
              class: bg-gray-50 h-full p-4 flex items-center justify-center
              blocks:
                - id: constrained_both_center_text
                  type: Paragraph
                  properties:
                    content: Flexible Center
        c_right:
          blocks:
            - id: constrained_both_right
              type: Box
              class: bg-rose-50 h-full p-4 flex items-center justify-center
              blocks:
                - id: constrained_both_right_text
                  type: Paragraph
                  properties:
                    content: 'Min: 100px / Max: 300px'

- title: Collapsible Panels
  blocks:
    - id: collapsible_left
      type: Splitter
      style:
        height: 200px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: col_sidebar
            defaultSize: 30
            collapsible: true
          - key: col_body
            defaultSize: 70
      slots:
        col_sidebar:
          blocks:
            - id: collapsible_left_sidebar
              type: Box
              class: bg-blue-100 h-full p-4
              blocks:
                - id: collapsible_left_sidebar_text
                  type: Paragraph
                  properties:
                    content: '<b>Collapsible Sidebar</b>'
                - id: collapsible_left_sidebar_desc
                  type: Paragraph
                  properties:
                    content: Click the arrow on the divider to collapse this panel.
        col_body:
          blocks:
            - id: collapsible_left_body
              type: Box
              class: bg-white h-full p-4
              blocks:
                - id: collapsible_left_body_text
                  type: Paragraph
                  properties:
                    content: Main body content remains visible when the sidebar is collapsed.
    - id: collapsible_both
      type: Splitter
      style:
        height: 200px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: cb_left
            defaultSize: 25
            collapsible: true
          - key: cb_center
            defaultSize: 50
          - key: cb_right
            defaultSize: 25
            collapsible: true
      slots:
        cb_left:
          blocks:
            - id: collapsible_both_left
              type: Box
              class: bg-emerald-100 h-full p-3 flex items-center justify-center
              blocks:
                - id: collapsible_both_left_text
                  type: Paragraph
                  properties:
                    content: Left (collapsible)
        cb_center:
          blocks:
            - id: collapsible_both_center
              type: Box
              class: bg-slate-50 h-full p-3 flex items-center justify-center
              blocks:
                - id: collapsible_both_center_text
                  type: Paragraph
                  properties:
                    content: Center (fixed)
        cb_right:
          blocks:
            - id: collapsible_both_right
              type: Box
              class: bg-amber-100 h-full p-3 flex items-center justify-center
              blocks:
                - id: collapsible_both_right_text
                  type: Paragraph
                  properties:
                    content: Right (collapsible)

- title: Collapsible with Start and End
