- title: Basic Horizontal Split
  blocks:
    - id: basic_h
      type: Splitter
      style:
        height: 200px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: left
            defaultSize: 50
          - key: right
            defaultSize: 50
      slots:
        left:
          blocks:
            - id: basic_h_left
              type: Box
              class: bg-blue-50 h-full flex items-center justify-center
              blocks:
                - id: basic_h_left_text
                  type: Paragraph
                  properties:
                    content: Left Panel
        right:
          blocks:
            - id: basic_h_right
              type: Box
              class: bg-cyan-50 h-full flex items-center justify-center
              blocks:
                - id: basic_h_right_text
                  type: Paragraph
                  properties:
                    content: Right Panel

