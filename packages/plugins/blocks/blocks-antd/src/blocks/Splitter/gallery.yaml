- title: Event Actions
  blocks:
    - id: event_splitter
      type: Splitter
      style:
        height: 200px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: evt_left
            defaultSize: 50
            collapsible: true
          - key: evt_right
            defaultSize: 50
      events:
        onResizeEnd:
          - id: event_resize_msg
            type: DisplayMessage
            params:
              content:
                _string.concat:
                  - 'Resize complete. Panel sizes: '
                  - _json.stringify:
                      on:
                        _event: sizes
              duration: 2
        onCollapse:
          - id: event_collapse_msg
            type: DisplayMessage
            params:
              content:
                _if:
                  test:
                    _event: collapsed
                  then: Panel collapsed.
                  else: Panel expanded.
              duration: 2
      slots:
        evt_left:
          blocks:
            - id: event_left_box
              type: Box
              class: bg-indigo-50 h-full p-4
              blocks:
                - id: event_left_title
                  type: Paragraph
                  properties:
                    content: '<b>Collapsible Panel</b>'
                - id: event_left_desc
                  type: Paragraph
                  properties:
                    content: Collapse this panel or resize the divider to see event messages.
        evt_right:
          blocks:
            - id: event_right_box
              type: Box
              class: bg-white h-full p-4
              blocks:
                - id: event_right_desc
                  type: Paragraph
                  properties:
                    content: The onResizeEnd and onCollapse events fire DisplayMessage actions to show the current panel state.

    - id: event_state_splitter
      type: Splitter
      style:
        height: 220px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: es_left
            defaultSize: 40
          - key: es_right
            defaultSize: 60
      events:
        onResizeEnd:
          - id: event_set_state
            type: SetState
            params:
              splitter_sizes:
                _event: sizes
        onResizeStart:
          - id: event_resize_start_msg
            type: DisplayMessage
            params:
              content: Resizing started...
              duration: 1
      slots:
        es_left:
          blocks:
            - id: es_left_box
              type: Box
              class: bg-cyan-50 h-full p-4
              blocks:
                - id: es_left_title
                  type: Paragraph
                  properties:
                    content: '<b>State Tracking</b>'
                - id: es_left_desc
                  type: Paragraph
                  properties:
                    content: Resize the panels. The onResizeStart fires a message and onResizeEnd saves panel sizes to state.
        es_right:
          blocks:
            - id: es_right_box
              type: Box
              class: bg-white h-full p-4
              blocks:
                - id: es_right_title
                  type: Paragraph
                  properties:
                    content: '<b>Current sizes:</b>'
                - id: es_right_sizes
                  type: Paragraph
                  properties:
                    content:
                      _if:
                        test:
                          _state: splitter_sizes
                        then:
                          _json.stringify:
                            on:
                              _state: splitter_sizes
                        else: Resize panels to see sizes here.

- title: Nested Splitters
  blocks:
    - id: nested_outer
      type: Splitter
      style:
        height: 350px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: n_sidebar
            defaultSize: 25
            min: 15
            collapsible: true
          - key: n_main
            defaultSize: 75
      slots:
        n_sidebar:
          blocks:
            - id: nested_sidebar
              type: Box
              class: bg-slate-100 h-full p-4
              blocks:
                - id: nested_sidebar_title
                  type: Paragraph
                  properties:
                    content: '<b>Sidebar</b>'
                - id: nested_sidebar_item_1
                  type: Paragraph
                  properties:
                    content: Dashboard
                - id: nested_sidebar_item_2
                  type: Paragraph
                  properties:
                    content: Analytics
                - id: nested_sidebar_item_3
                  type: Paragraph
                  properties:
                    content: Settings
        n_main:
          blocks:
            - id: nested_inner
              type: Splitter
              style:
                height: 100%
              properties:
                layout: vertical
                panels:
                  - key: n_content
                    defaultSize: 70
                  - key: n_footer
                    defaultSize: 30
                    min: 15
                    collapsible: true
              slots:
                n_content:
                  blocks:
                    - id: nested_content
                      type: Box
                      class: bg-white h-full p-4
                      blocks:
                        - id: nested_content_title
                          type: Paragraph
                          properties:
                            content: '<b>Main Content Area</b>'
                        - id: nested_content_desc
                          type: Paragraph
                          properties:
                            content: A horizontal splitter with a nested vertical splitter. The sidebar splits horizontally, while the main area is split vertically into content and a bottom panel.
                n_footer:
                  blocks:
                    - id: nested_footer
                      type: Box
                      class: bg-blue-50 h-full p-4
                      blocks:
                        - id: nested_footer_title
                          type: Paragraph
                          properties:
                            content: '<b>Bottom Panel</b>'
                        - id: nested_footer_desc
                          type: Paragraph
                          properties:
                            content: Collapsible bottom panel inside the nested vertical splitter.

