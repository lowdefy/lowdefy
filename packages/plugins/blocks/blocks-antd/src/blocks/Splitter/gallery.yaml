- title: Min and Max Size Constraints
  blocks:
    - id: constrained
      type: Splitter
      style:
        height: 200px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: nav
            defaultSize: 30
            min: 20
            max: 40
          - key: main
            defaultSize: 70
      slots:
        nav:
          blocks:
            - id: constrained_nav
              type: Box
              class: bg-indigo-100 h-full p-4
              blocks:
                - id: constrained_nav_title
                  type: Paragraph
                  properties:
                    content: '<b>Navigation</b>'
                - id: constrained_nav_desc
                  type: Paragraph
                  properties:
                    content: 'Min: 20% / Max: 40%'
        main:
          blocks:
            - id: constrained_main
              type: Box
              class: bg-slate-50 h-full p-4
              blocks:
                - id: constrained_main_title
                  type: Paragraph
                  properties:
                    content: '<b>Main Content</b>'
                - id: constrained_main_desc
                  type: Paragraph
                  properties:
                    content: The left panel cannot be resized smaller than 20% or larger than 40%.

    - id: constrained_px
      type: Splitter
      style:
        height: 200px
        border: 1px solid #e8e8e8
        borderRadius: 8px
      properties:
        layout: horizontal
        panels:
          - key: cpx_left
            defaultSize: 30
            min: '100px'
            max: '400px'
          - key: cpx_center
            defaultSize: 40
          - key: cpx_right
            defaultSize: 30
            min: '100px'
            max: '300px'
      slots:
        cpx_left:
          blocks:
            - id: constrained_px_left
              type: Box
              class: bg-purple-50 h-full p-4 flex items-center justify-center
              blocks:
                - id: constrained_px_left_text
                  type: Paragraph
                  properties:
                    content: 'Min: 100px / Max: 400px'
        cpx_center:
          blocks:
            - id: constrained_px_center
              type: Box
              class: bg-gray-50 h-full p-4 flex items-center justify-center
              blocks:
                - id: constrained_px_center_text
                  type: Paragraph
                  properties:
                    content: Flexible Center
        cpx_right:
          blocks:
            - id: constrained_px_right
              type: Box
              class: bg-rose-50 h-full p-4 flex items-center justify-center
              blocks:
                - id: constrained_px_right_text
                  type: Paragraph
                  properties:
                    content: 'Min: 100px / Max: 300px'

