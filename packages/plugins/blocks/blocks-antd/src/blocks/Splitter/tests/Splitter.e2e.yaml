id: splitter_block
type: Box

blocks:
  # ============================================
  # BASIC RENDERING
  # ============================================

  - id: sp_basic
    type: Splitter
    style:
      minHeight: 200px
    properties:
      panels:
        - key: left
        - key: right
    slots:
      left:
        blocks:
          - id: sp_left_text
            type: Paragraph
            properties:
              content: Left Panel
      right:
        blocks:
          - id: sp_right_text
            type: Paragraph
            properties:
              content: Right Panel

  # ============================================
  # VERTICAL LAYOUT
  # ============================================

  - id: sp_vertical
    type: Splitter
    properties:
      layout: vertical
      panels:
        - key: top
        - key: bottom
    style:
      height: 300px
    slots:
      top:
        blocks:
          - id: sp_top_text
            type: Paragraph
            properties:
              content: Top Panel
      bottom:
        blocks:
          - id: sp_bottom_text
            type: Paragraph
            properties:
              content: Bottom Panel

  # ============================================
  # EVENT TESTS
  # ============================================

  - id: sp_resize
    type: Splitter
    style:
      minHeight: 200px
    properties:
      panels:
        - key: a
        - key: b
    events:
      onResizeEnd:
        - id: set_resized
          type: SetState
          params:
            sp_resized: true
    slots:
      a:
        blocks:
          - id: sp_a_text
            type: Paragraph
            properties:
              content: Panel A
      b:
        blocks:
          - id: sp_b_text
            type: Paragraph
            properties:
              content: Panel B

  - id: sp_resize_display
    type: Paragraph
    properties:
      content:
        _if:
          test:
            _eq:
              - _state: sp_resized
              - true
          then: Resize fired
          else: ''
