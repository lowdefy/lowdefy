- id: default
  type: Splitter
- id: 'properties.layout: horizontal'
  type: Splitter
  properties:
    layout: horizontal
    panels:
      - key: left
        defaultSize: 50%
      - key: right
        defaultSize: 50%
- id: 'properties.layout: vertical'
  type: Splitter
  properties:
    layout: vertical
    panels:
      - key: top
        defaultSize: 50%
      - key: bottom
        defaultSize: 50%
- id: properties.panels
  type: Splitter
  properties:
    panels:
      - key: first
        defaultSize: 200
        min: 100
        max: 400
      - key: second
        defaultSize: 300
      - key: third
        min: 50
- id: properties.panels collapsible
  type: Splitter
  properties:
    panels:
      - key: left
        collapsible: true
      - key: right
        collapsible: true
- id: 'properties.panels resizable: false'
  type: Splitter
  properties:
    panels:
      - key: left
        resizable: false
      - key: right
- id: 'properties.lazy: true'
  type: Splitter
  properties:
    lazy: true
    panels:
      - key: left
        defaultSize: 50%
      - key: right
        defaultSize: 50%
- id: 'properties.orientation: vertical'
  type: Splitter
  properties:
    orientation: vertical
    panels:
      - key: top
        defaultSize: 50%
      - key: bottom
        defaultSize: 50%
