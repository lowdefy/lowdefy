      type: TextInput
      properties:
        title: First Name
        placeholder: John
        label:
          colon: true
    - id: form_last_name
      type: TextInput
      properties:
        title: Last Name
        placeholder: Doe
        label:
          colon: true
    - id: form_email
      type: TextInput
      properties:
        title: Email Address
        type: email
        prefixIcon: AiOutlineMail
        placeholder: john@example.com
        label:
          colon: true
          extra: We will never share your email.
- title: Form-Like Layout (Inline)
  blocks:
    - id: form_inline_name
      type: TextInput
      properties:
        title: Name
        placeholder: Full Name
        label:
          inline: true
          span: 6
          align: right
          colon: true
    - id: form_inline_email
      type: TextInput
      properties:
        title: Email
        type: email
        placeholder: user@example.com
        label:
          inline: true
          span: 6
          align: right
          colon: true
    - id: form_inline_phone
      type: TextInput
      properties:
        title: Phone
        type: tel
        placeholder: (555) 123-4567
        label:
          inline: true
          span: 6
          align: right
          colon: true
- title: Style Overrides
  blocks:
    - id: style_custom_bg
      type: TextInput
      style:
        --element:
          backgroundColor: '#f0f5ff'
          borderColor: '#adc6ff'
      properties:
        title: Custom Background
        placeholder: Light blue background
        label:
          disabled: true
    - id: style_custom_border
      type: TextInput
      style:
        --element:
          borderColor: '#52c41a'
          borderWidth: 2
          borderRadius: 8
      properties:
        title: Custom Border
        placeholder: Green border, rounded
        label:
          disabled: true
    - id: style_custom_text
      type: TextInput
      style:
        --element:
          color: '#722ed1'
          fontSize: 16
      properties:
        title: Custom Text Color
        label:
          disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              style_custom_text: Purple text
    - id: style_full_custom
      type: TextInput
      style:
        --element:
          backgroundColor: '#fff7e6'
          borderColor: '#ffa940'
          borderRadius: 12
          color: '#d46b08'
          fontSize: 16
      properties:
        title: Fully Customized
        placeholder: Orange theme
        prefixIcon:
          name: AiOutlineStar
          color: '#fa8c16'
        label:
          disabled: true
- title: CSS Class Overrides
  blocks:
