    - id: ss_large_suffix
      type: TextInput
      properties:
        title: Large + Suffix
        size: large
        suffix: kg
        placeholder: Large
        label:
          disabled: true
- title: Feature Combinations
  blocks:
    - id: feat_search
      type: TextInput
      properties:
        title: Search Input
        prefixIcon: AiOutlineSearch
        allowClear: true
        placeholder: Search...
        size: large
        label:
          disabled: true
    - id: feat_email
      type: TextInput
      properties:
        title: Email Field
        type: email
        prefixIcon: AiOutlineMail
        suffix: '@company.com'
        placeholder: username
        label:
          extra: Enter your company username.
    - id: feat_url
      type: TextInput
      properties:
        title: Website URL
        prefix: https://
        suffix: .com
        prefixIcon: AiOutlineGlobal
        allowClear: true
        placeholder: example
        label:
          disabled: true
    - id: feat_bio
      type: TextInput
      properties:
        title: Short Bio
        showCount: true
        maxLength: 100
        allowClear: true
        placeholder: Tell us about yourself
        label:
          extra: Keep it brief.
    - id: feat_phone
      type: TextInput
      properties:
        title: Phone Number
        type: tel
        prefix: '+1'
        prefixIcon: AiOutlinePhone
        placeholder: (555) 123-4567
        replaceInput:
          pattern: '[^0-9()\-\s]'
          flags: g
          replacement: ''
- title: Form-Like Layout (Stacked)
  blocks:
