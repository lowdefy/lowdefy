      type: TextInput
      properties:
        title: No Radius
        placeholder: borderRadius 0
        theme:
          borderRadius: 0
        label:
          disabled: true
    - id: theme_radius_default
      type: TextInput
      properties:
        title: Default Radius
        placeholder: borderRadius 6
        theme:
          borderRadius: 6
        label:
          disabled: true
    - id: theme_radius_large
      type: TextInput
      properties:
        title: Large Radius
        placeholder: borderRadius 16
        theme:
          borderRadius: 16
        label:
          disabled: true
    - id: theme_radius_pill
      type: TextInput
      properties:
        title: Pill Shape
        placeholder: borderRadius 40
        theme:
          borderRadius: 40
        label:
          disabled: true
- title: Theme Token Overrides - Colors
  blocks:
    - id: theme_color_primary
      type: TextInput
      properties:
        title: Custom Primary Color
        placeholder: Green primary color
        theme:
          colorPrimary: '#52c41a'
        label:
          disabled: true
    - id: theme_color_bg
      type: TextInput
      properties:
        title: Custom Background
        placeholder: Light purple background
        theme:
          colorBgContainer: '#f9f0ff'
        label:
          disabled: true
    - id: theme_color_border
      type: TextInput
      properties:
        title: Custom Border Color
        placeholder: Purple border
        theme:
          colorBorder: '#b37feb'
        label:
          disabled: true
    - id: theme_color_text
      type: TextInput
      properties:
        title: Custom Text Color
        theme:
          colorText: '#531dab'
        label:
          disabled: true
