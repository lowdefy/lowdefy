        title: Info Icon
        suffixIcon: AiOutlineInfoCircle
        placeholder: Enter value
        label:
          disabled: true
    - id: suffix_icon_calendar
      type: TextInput
      properties:
        title: Calendar Icon
        suffixIcon: AiOutlineCalendar
        placeholder: Select date
        label:
          disabled: true
    - id: suffix_icon_check
      type: TextInput
      properties:
        title: Check Icon
        suffixIcon: AiOutlineCheckCircle
        placeholder: Verified
        label:
          disabled: true
- title: Custom Icon Properties
  blocks:
    - id: prefix_icon_custom_color
      type: TextInput
      properties:
        title: Custom Color Icon
        prefixIcon:
          name: AiOutlineUser
          color: '#1677ff'
        placeholder: Blue user icon
        label:
          disabled: true
    - id: suffix_icon_custom_color
      type: TextInput
      properties:
        title: Custom Color Suffix Icon
        suffixIcon:
          name: AiOutlineWarning
          color: '#faad14'
        placeholder: Warning icon
        label:
          disabled: true
    - id: both_icons
      type: TextInput
      properties:
        title: Both Icons
        prefixIcon: AiOutlineLink
        suffixIcon: AiOutlineArrowRight
        placeholder: Enter link
        label:
          disabled: true
- title: Prefix Icon + Suffix Text
  blocks:
    - id: icon_prefix_text_suffix
      type: TextInput
      properties:
        title: Mixed Prefix Icon & Suffix Text
        prefixIcon: AiOutlineGlobal
        suffix: .com
        placeholder: domain
        label:
          disabled: true
    - id: text_prefix_icon_suffix
      type: TextInput
      properties:
        title: Mixed Text Prefix & Suffix Icon
        prefix: https://
        suffixIcon: AiOutlineCopy
        placeholder: URL
        label:
          disabled: true
- title: Allow Clear
  blocks:
    - id: clear_basic
      type: TextInput
      properties:
        title: Allow Clear
        allowClear: true
        label:
          disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              clear_basic: Clearable text
    - id: clear_with_icon
      type: TextInput
      properties:
        title: Allow Clear + Prefix Icon
        allowClear: true
        prefixIcon: AiOutlineUser
        label:
          disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              clear_with_icon: Clear with icon
    - id: clear_disabled
      type: TextInput
      properties:
        title: Allow Clear (Not Set)
        allowClear: false
        placeholder: Cannot clear
        label:
          disabled: true
- title: Character Count & Max Length
  blocks:
    - id: count_with_max
      type: TextInput
      properties:
        title: Max 50 Characters
        showCount: true
        maxLength: 50
        placeholder: Up to 50 characters
    - id: count_with_max_short
      type: TextInput
      properties:
        title: Max 10 Characters
        showCount: true
        maxLength: 10
        placeholder: Short input
    - id: count_no_max
      type: TextInput
      properties:
        title: Count Without Limit
        showCount: true
        placeholder: Unlimited characters
    - id: max_no_count
      type: TextInput
      properties:
        title: Max Length Without Count
        maxLength: 20
        placeholder: Max 20 (no counter shown)
- title: Input Types
  blocks:
    - id: type_text
      type: TextInput
      properties:
        title: Text (Default)
        type: text
        placeholder: Regular text
    - id: type_email
      type: TextInput
      properties:
        title: Email
        type: email
        prefixIcon: AiOutlineMail
        placeholder: user@example.com
    - id: type_tel
      type: TextInput
      properties:
        title: Telephone
        type: tel
        prefixIcon: AiOutlinePhone
        placeholder: +1 (555) 123-4567
    - id: type_url
      type: TextInput
      properties:
        title: URL
        type: url
        prefixIcon: AiOutlineGlobal
        placeholder: https://example.com
    - id: type_number
      type: TextInput
      properties:
        title: Number
        type: number
        placeholder: '12345'
    - id: type_password
      type: TextInput
      properties:
        title: Password
        type: password
        prefixIcon: AiOutlineLock
        placeholder: Enter password
- title: Disabled State
  blocks:
    - id: disabled_empty
      type: TextInput
      properties:
        title: Disabled (Empty)
        disabled: true
        placeholder: Cannot edit
    - id: disabled_with_value
      type: TextInput
      properties:
        title: Disabled (With Value)
        disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_with_value: Existing value
    - id: disabled_with_prefix
      type: TextInput
      properties:
        title: Disabled (With Prefix)
        disabled: true
        prefixIcon: AiOutlineUser
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_with_prefix: john_doe
    - id: disabled_with_suffix
      type: TextInput
      properties:
        title: Disabled (With Suffix)
        disabled: true
        suffix: .com
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_with_suffix: example
- title: Disabled Sizes
  blocks:
    - id: disabled_small
      type: TextInput
      properties:
        title: Small Disabled
        disabled: true
        size: small
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_small: Small disabled
    - id: disabled_middle
      type: TextInput
      properties:
        title: Middle Disabled
        disabled: true
        size: middle
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_middle: Middle disabled
    - id: disabled_large
      type: TextInput
      properties:
        title: Large Disabled
        disabled: true
        size: large
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_large: Large disabled
- title: Disabled Variants
  blocks:
    - id: disabled_outlined
      type: TextInput
      properties:
        title: Disabled Outlined
        disabled: true
        placeholder: Outlined
        label:
          disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_outlined: Outlined disabled
    - id: disabled_filled
      type: TextInput
      properties:
        title: Disabled Filled
        disabled: true
        variant: filled
        label:
          disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_filled: Filled disabled
    - id: disabled_borderless
      type: TextInput
      properties:
        title: Disabled Borderless
        disabled: true
        variant: borderless
        label:
          disabled: true
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              disabled_borderless: Borderless disabled
- title: Replace Input (Sanitization)
  blocks:
    - id: replace_numbers_only
      type: TextInput
      properties:
        title: Numbers Only
        placeholder: Only digits allowed
        replaceInput:
          pattern: '[^0-9]'
          flags: g
          replacement: ''
    - id: replace_alpha_only
      type: TextInput
      properties:
        title: Letters Only
        placeholder: Only letters allowed
        replaceInput:
          pattern: '[^a-zA-Z]'
          flags: g
          replacement: ''
    - id: replace_no_spaces
      type: TextInput
      properties:
        title: No Spaces
        placeholder: Spaces removed automatically
        replaceInput:
          pattern: \s
          flags: g
          replacement: ''
    - id: replace_uppercase
      type: TextInput
      properties:
        title: Alphanumeric Only
        placeholder: Special characters stripped
        replaceInput:
          pattern: '[^a-zA-Z0-9]'
          flags: g
          replacement: ''
- title: Label - Title
  blocks:
    - id: label_title_simple
      type: TextInput
      properties:
        title: Simple Title
        placeholder: With title
    - id: label_title_html
      type: TextInput
      properties:
        title: <b>Bold</b> Title
        placeholder: HTML in title
    - id: label_title_extra
      type: TextInput
      properties:
        title: Title with Extra
        placeholder: With extra text below
        label:
          extra: This is additional helper text below the input.
- title: Label - Extra Text
  blocks:
    - id: label_extra_plain
      type: TextInput
      properties:
        title: With Extra
        placeholder: Enter value
        label:
          extra: Helper text provides guidance.
    - id: label_extra_html
      type: TextInput
      properties:
        title: HTML Extra
        placeholder: Enter value
        label:
          extra: <em>Italicized</em> helper text with <a href="#">a link</a>.
- title: Label - Colon
  blocks:
    - id: label_colon_true
      type: TextInput
      properties:
        title: With Colon
        placeholder: Colon shown (default)
        label:
          colon: true
    - id: label_colon_false
      type: TextInput
      properties:
        title: Without Colon
        placeholder: No colon
        label:
          colon: false
- title: Label - Disabled (Hidden)
  blocks:
    - id: label_visible
      type: TextInput
      properties:
        title: Label Visible
        placeholder: Label shown
        label:
          disabled: false
    - id: label_hidden
      type: TextInput
      properties:
        title: Label Hidden
        placeholder: Label hidden (label.disabled true)
        label:
          disabled: true
- title: Label - Inline
  blocks:
    - id: label_inline_left
      type: TextInput
      properties:
        title: Inline Left
        placeholder: Label inline, aligned left
        label:
          inline: true
          align: left
          span: 8
    - id: label_inline_right
      type: TextInput
      properties:
        title: Inline Right
        placeholder: Label inline, aligned right
        label:
          inline: true
          align: right
          span: 8
    - id: label_inline_span_4
      type: TextInput
      properties:
        title: Narrow Label
        placeholder: Label span 4
        label:
          inline: true
          span: 4
    - id: label_inline_span_12
      type: TextInput
      properties:
        title: Wide Label
        placeholder: Label span 12
        label:
          inline: true
          span: 12
- title: Label - Feedback
  blocks:
    - id: label_feedback_on
      type: TextInput
      properties:
        title: Feedback Enabled (Default)
        placeholder: Validation feedback shown
        label:
          hasFeedback: true
    - id: label_feedback_off
      type: TextInput
      properties:
        title: Feedback Disabled
        placeholder: Validation feedback hidden
        label:
          hasFeedback: false
