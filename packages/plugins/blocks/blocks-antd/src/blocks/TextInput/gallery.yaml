- title: Basic
  blocks:
    - id: basic_default
      type: TextInput
      properties:
        title: Default TextInput
        placeholder: Enter text here
    - id: basic_with_value
      type: TextInput
      properties:
        title: With Default Value
      events:
        onMount:
          - id: set_default
            type: SetState
            params:
              basic_with_value: Hello World
- title: Sizes
  blocks:
    - id: size_small
      type: TextInput
      properties:
        title: Small
        size: small
        placeholder: Small input
    - id: size_middle
      type: TextInput
      properties:
        title: Middle (Default)
        size: middle
        placeholder: Middle input
    - id: size_large
      type: TextInput
      properties:
        title: Large
        size: large
        placeholder: Large input
- title: Sizes Without Label
  blocks:
    - id: size_nl_small
      type: TextInput
      properties:
        size: small
        placeholder: Small - no label
        label:
          disabled: true
    - id: size_nl_middle
      type: TextInput
      properties:
        size: middle
        placeholder: Middle - no label
        label:
          disabled: true
    - id: size_nl_large
      type: TextInput
      properties:
        size: large
        placeholder: Large - no label
        label:
          disabled: true
- title: Variants
  blocks:
    - id: variant_outlined
      type: TextInput
      properties:
        title: Outlined (Default)
        placeholder: Outlined variant
        label:
          disabled: true
    - id: variant_filled
      type: TextInput
      properties:
        title: Filled
        variant: filled
        placeholder: Filled variant
        label:
          disabled: true
    - id: variant_borderless
      type: TextInput
      properties:
        title: Borderless
        variant: borderless
        placeholder: Borderless variant
        label:
          disabled: true
- title: Variants with Bordered (Legacy)
  blocks:
    - id: variant_bordered_true
      type: TextInput
      properties:
        title: Bordered (default)
        bordered: true
        placeholder:
          bordered: true
        label:
          disabled: true
    - id: variant_bordered_false
      type: TextInput
      properties:
        title: Borderless via bordered
        bordered: false
        placeholder:
          bordered: false
        label:
          disabled: true
- title: Placeholder
  blocks:
    - id: placeholder_short
      type: TextInput
      properties:
        title: Short Placeholder
        placeholder: Name
        label:
          disabled: true
    - id: placeholder_long
      type: TextInput
      properties:
        title: Long Placeholder
        placeholder: Enter your full name including middle names
        label:
          disabled: true
    - id: placeholder_none
      type: TextInput
      properties:
        title: No Placeholder
        label:
          disabled: true
- title: Prefix Text
  blocks:
    - id: prefix_https
      type: TextInput
      properties:
        title: URL Prefix
        prefix: https://
        placeholder: mysite.com
        label:
          disabled: true
    - id: prefix_currency
      type: TextInput
      properties:
        title: Currency Prefix
        prefix: $
        placeholder: '0.00'
        label:
          disabled: true
    - id: prefix_at
      type: TextInput
      properties:
        title: Username Prefix
        prefix: '@'
        placeholder: username
        label:
          disabled: true
- title: Suffix Text
  blocks:
    - id: suffix_email
      type: TextInput
      properties:
        title: Email Suffix
        suffix: '@gmail.com'
        placeholder: username
        label:
          disabled: true
    - id: suffix_unit
      type: TextInput
      properties:
        title: Unit Suffix
        suffix: kg
        placeholder: Weight
        label:
          disabled: true
    - id: suffix_domain
      type: TextInput
      properties:
        title: Domain Suffix
        suffix: .com
        placeholder: domain
        label:
          disabled: true
- title: Prefix & Suffix Combined
  blocks:
    - id: combo_url
      type: TextInput
      properties:
        title: Full URL
        prefix: https://
        suffix: .com
        placeholder: example
        label:
          disabled: true
    - id: combo_currency_unit
      type: TextInput
      properties:
        title: Currency with Unit
        prefix: $
        suffix: USD
        placeholder: Amount
        label:
          disabled: true
- title: Prefix Icons
  blocks:
    - id: prefix_icon_user
      type: TextInput
      properties:
        title: User Icon
        prefixIcon: AiOutlineUser
        placeholder: Enter username
        label:
          disabled: true
    - id: prefix_icon_search
      type: TextInput
      properties:
        title: Search Icon
        prefixIcon: AiOutlineSearch
        placeholder: Search...
        label:
          disabled: true
    - id: prefix_icon_mail
      type: TextInput
      properties:
        title: Mail Icon
        prefixIcon: AiOutlineMail
        placeholder: Enter email
        label:
          disabled: true
    - id: prefix_icon_lock
      type: TextInput
      properties:
        title: Lock Icon
        prefixIcon: AiOutlineLock
        placeholder: Enter password
        label:
          disabled: true
- title: Suffix Icons
  blocks:
