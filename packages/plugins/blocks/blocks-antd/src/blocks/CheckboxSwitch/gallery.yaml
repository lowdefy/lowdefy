- title: Basic Checkbox
  blocks:
    - id: basic_default
      type: CheckboxSwitch
      properties:
        title: Accept Terms
        label:
          disabled: true
    - id: basic_with_desc
      type: CheckboxSwitch
      properties:
        title: Notifications
        description: Enable email notifications
        label:
          disabled: true
    - id: basic_no_desc
      type: CheckboxSwitch
      properties:
        title: Dark Mode
        label:
          disabled: true
    - id: basic_simple
      type: CheckboxSwitch
      properties:
        title: Remember Me
        description: Keep me signed in on this device
        label:
          disabled: true

- title: With Description Text
  blocks:
    - id: desc_terms
      type: CheckboxSwitch
      properties:
        title: Terms & Conditions
        description: I agree to the Terms of Service and Privacy Policy
        label:
          disabled: true
    - id: desc_marketing
      type: CheckboxSwitch
      properties:
        title: Marketing
        description: Send me promotional emails and newsletters
        label:
          disabled: true
    - id: desc_remember
      type: CheckboxSwitch
      properties:
        title: Remember Me
        description: Keep me signed in on this device
        label:
          disabled: true
    - id: desc_analytics
      type: CheckboxSwitch
      properties:
        title: Analytics
        description: Allow anonymous usage data collection to improve the product
        label:
          disabled: true
    - id: desc_html
      type: CheckboxSwitch
      properties:
        title: Agreement
        description: 'I accept the <b>Terms</b> and <i>Privacy Policy</i>'
        label:
          disabled: true
    - id: desc_html_link
      type: CheckboxSwitch
      properties:
        title: Consent
        description: 'I have read the <u>data processing agreement</u> and consent to the collection of my data'
        label:
          disabled: true

- title: With Label and Title
  blocks:
    - id: label_default
      type: CheckboxSwitch
      properties:
        title: Enable Notifications
        description: Receive updates via email
    - id: label_colon
      type: CheckboxSwitch
      properties:
        title: Auto-save
        description: Save changes automatically
        label:
          colon: true
    - id: label_no_colon
      type: CheckboxSwitch
      properties:
        title: Status
        description: Set active status
        label:
          colon: false
    - id: label_custom_title
      type: CheckboxSwitch
      properties:
        title: Newsletter Subscription
        description: Subscribe to our weekly newsletter
        label:
          colon: true

- title: Label Inline
  blocks:
    - id: inline_basic
      type: CheckboxSwitch
      properties:
        title: Dark mode
        description: Enable dark theme
        label:
          inline: true
          span: 8
    - id: inline_right
      type: CheckboxSwitch
      properties:
        title: Auto-save
        description: Save changes automatically
        label:
          inline: true
          span: 8
          align: right
    - id: inline_wide_span
      type: CheckboxSwitch
      properties:
        title: Enable feature
        description: Activate the new experimental feature
        label:
          inline: true
          span: 12
    - id: inline_narrow_span
      type: CheckboxSwitch
      properties:
        title: Active
        description: Set to active
        label:
          inline: true
          span: 4
    - id: inline_no_desc
      type: CheckboxSwitch
      properties:
        title: Compact mode
        label:
          inline: true
          span: 8

- title: Label Extra
  blocks:
    - id: extra_basic
      type: CheckboxSwitch
      properties:
        title: Notifications
        description: Enable push notifications
        label:
          extra: Push notifications will be sent to your registered device.
    - id: extra_html
      type: CheckboxSwitch
      properties:
        title: Terms
        description: I agree to the terms
        label:
          extra: 'Read the full <b>Terms of Service</b> before agreeing.'
    - id: extra_long
      type: CheckboxSwitch
      properties:
        title: Data Collection
        description: Allow data collection
        label:
          extra: By enabling this option, anonymized usage data will be collected to improve the product. No personally identifiable information is stored.
    - id: extra_inline
      type: CheckboxSwitch
      properties:
        title: Marketing Emails
        description: Receive promotional content
        label:
          inline: true
          span: 10
          extra: You can unsubscribe at any time from your account settings.

- title: Label HasFeedback
  blocks:
    - id: feedback_on
      type: CheckboxSwitch
      properties:
        title: With Feedback
        description: This checkbox shows validation feedback
        label:
          hasFeedback: true
    - id: feedback_off
      type: CheckboxSwitch
      properties:
        title: Without Feedback
        description: Validation feedback is hidden
        label:
          hasFeedback: false
    - id: feedback_with_extra
      type: CheckboxSwitch
      properties:
        title: Feedback and Extra
        description: Combined feedback and extra text
        label:
          hasFeedback: true
          extra: Additional context for this field.

- title: Disabled State
  blocks:
    - id: disabled_unchecked
      type: CheckboxSwitch
      properties:
        title: Disabled (Unchecked)
        description: This checkbox is disabled
        disabled: true
        label:
          disabled: true
    - id: disabled_no_desc
      type: CheckboxSwitch
      properties:
        title: Disabled Option
        disabled: true
        label:
          disabled: true
    - id: disabled_with_label
      type: CheckboxSwitch
      properties:
        title: Disabled with Label
        description: Cannot be toggled
        disabled: true
    - id: disabled_inline
      type: CheckboxSwitch
      properties:
        title: Disabled Inline
        description: This is disabled and inline
        disabled: true
        label:
          inline: true
          span: 8

