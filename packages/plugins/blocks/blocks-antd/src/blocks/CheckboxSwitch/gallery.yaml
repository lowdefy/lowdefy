- title: No Label (Hidden)
  blocks:
    - id: no_label_desc
      type: CheckboxSwitch
      properties:
        description: Accept cookies for a better browsing experience
        label:
          disabled: true
    - id: no_label_guidelines
      type: CheckboxSwitch
      properties:
        description: I have read and understood the guidelines
        label:
          disabled: true
    - id: no_label_plain
      type: CheckboxSwitch
      properties:
        label:
          disabled: true
    - id: no_label_html
      type: CheckboxSwitch
      properties:
        description: 'I agree to the <b>Community Guidelines</b> and <i>Code of Conduct</i>'
        label:
          disabled: true

- title: Custom Style
  blocks:
    - id: style_background
      type: CheckboxSwitch
      style:
        --element:
          padding: 12px
          backgroundColor: '#f6ffed'
          borderRadius: 8px
          border: '1px solid #b7eb8f'
      properties:
        title: Styled Background
        description: Checkbox with a custom background style
        label:
          disabled: true
    - id: style_large_text
      type: CheckboxSwitch
      style:
        --element:
          fontSize: 16px
      properties:
        title: Large Description Text
        description: This description uses a larger font size
        label:
          disabled: true
    - id: style_warning_bg
      type: CheckboxSwitch
      style:
        --element:
          padding: 10px
          backgroundColor: '#fff7e6'
          borderRadius: 6px
          border: '1px solid #ffd591'
      properties:
        title: Warning Style
        description: Styled with a warning background
        label:
          disabled: true
    - id: style_info_bg
      type: CheckboxSwitch
      style:
        --element:
          padding: 10px
          backgroundColor: '#e6f4ff'
          borderRadius: 6px
          border: '1px solid #91caff'
      properties:
        title: Info Style
        description: Styled with an info background
        label:
          disabled: true
    - id: style_danger_bg
      type: CheckboxSwitch
      style:
        --element:
          padding: 10px
          backgroundColor: '#fff2f0'
          borderRadius: 6px
          border: '1px solid #ffccc7'
      properties:
        title: Danger Style
        description: Styled with a danger background
        label:
          disabled: true
    - id: style_bold_label
      type: CheckboxSwitch
      style:
        --label:
          fontWeight: bold
          color: '#1677ff'
      properties:
        title: Styled Label
        description: Label text is bold and colored
    - id: style_element_margin
      type: CheckboxSwitch
      style:
        --element:
          marginTop: 8
          marginBottom: 8
      properties:
        title: Extra Spacing
        description: Checkbox with added vertical margins
        label:
          disabled: true

- title: Custom Class (Tailwind)
  blocks:
    - id: class_blue
      type: CheckboxSwitch
      class: p-2 rounded-lg border border-blue-200 bg-blue-50
      properties:
        title: Blue Card
        description: Using Tailwind CSS classes for a blue card style
        label:
          disabled: true
    - id: class_green
      type: CheckboxSwitch
      class: p-3 rounded-xl border border-green-300 bg-green-50
      properties:
        title: Green Card
        description: Tailwind green card styling
        label:
          disabled: true
    - id: class_amber
      type: CheckboxSwitch
      class: p-2 rounded-md border border-amber-200 bg-amber-50
      properties:
        title: Amber Card
        description: Tailwind amber card styling
        label:
          disabled: true
    - id: class_red
      type: CheckboxSwitch
      class: p-2 rounded-lg border border-red-200 bg-red-50
      properties:
        title: Red Card
        description: Tailwind red card styling
        label:
          disabled: true
    - id: class_shadow
      type: CheckboxSwitch
      class: p-3 rounded-lg shadow-md bg-white
      properties:
        title: Shadow Card
        description: Elevated card with a box shadow
        label:
          disabled: true
    - id: class_gradient_border
      type: CheckboxSwitch
      class: p-3 rounded-xl border-2 border-purple-300 bg-gradient-to-r from-purple-50 to-pink-50
      properties:
        title: Gradient Card
        description: Gradient background with a purple border
        label:
          disabled: true

- title: Theme Token Overrides
  blocks:
    - id: theme_large_checkbox
      type: CheckboxSwitch
      properties:
        title: Large Checkbox
        description: Checkbox with increased size via controlInteractiveSize
        label:
          disabled: true
        theme:
          controlInteractiveSize: 24
    - id: theme_extra_large
      type: CheckboxSwitch
      properties:
        title: Extra Large Checkbox
        description: Even bigger checkbox for high-visibility use
        label:
          disabled: true
        theme:
          controlInteractiveSize: 30
          borderRadiusSM: 8
    - id: theme_custom_radius
      type: CheckboxSwitch
      properties:
        title: Rounded Checkbox
        description: Checkbox with larger border radius
        label:
          disabled: true
        theme:
          borderRadiusSM: 8
    - id: theme_circle
      type: CheckboxSwitch
      properties:
        title: Circular Checkbox
        description: Fully rounded checkbox that appears circular
        label:
          disabled: true
        theme:
          controlInteractiveSize: 20
          borderRadiusSM: 10
    - id: theme_custom_colors
      type: CheckboxSwitch
      properties:
        title: Custom Theme Colors
        description: Primary and hover colors overridden via design tokens
        label:
          disabled: true
        theme:
          colorPrimary: '#531dab'
          colorPrimaryHover: '#722ed1'
    - id: theme_warm_colors
      type: CheckboxSwitch
      properties:
        title: Warm Theme
        description: Warm orange primary with golden hover
        label:
          disabled: true
        theme:
          colorPrimary: '#d46b08'
          colorPrimaryHover: '#fa8c16'
    - id: theme_cool_colors
      type: CheckboxSwitch
      properties:
        title: Cool Theme
        description: Cool teal primary with lighter hover
        label:
          disabled: true
        theme:
          colorPrimary: '#08979c'
          colorPrimaryHover: '#13c2c2'
    - id: theme_bold_border
      type: CheckboxSwitch
      properties:
        title: Bold Border
        description: Checkbox with a thicker border
        label:
          disabled: true
        theme:
          lineWidth: 2
    - id: theme_extra_bold_border
      type: CheckboxSwitch
      properties:
        title: Extra Bold Border
        description: Checkbox with an extra thick border and checkmark stroke
        label:
          disabled: true
        theme:
          lineWidth: 3
          lineWidthBold: 3
    - id: theme_custom_border_color
      type: CheckboxSwitch
      properties:
        title: Custom Border & Background
        description: Checkbox with custom border and background colors
        label:
          disabled: true
        theme:
          colorBorder: '#d48806'
          colorBgContainer: '#fffbe6'
    - id: theme_pink_border
      type: CheckboxSwitch
      properties:
        title: Pink Border
        description: Checkbox with pink border and light pink background
        label:
          disabled: true
        theme:
          colorBorder: '#eb2f96'
          colorBgContainer: '#fff0f6'
    - id: theme_checkmark_color
      type: CheckboxSwitch
      properties:
        title: Custom Checkmark
        description: Checkbox with a different checkmark icon color
        label:
          disabled: true
        theme:
          colorWhite: '#ffd666'
          colorPrimary: '#1d39c4'
    - id: theme_wide_spacing
      type: CheckboxSwitch
      properties:
        title: Wide Label Spacing
        description: Increased padding between checkbox and label text
        label:
          disabled: true
        theme:
          paddingXS: 16
    - id: theme_disabled_colors
      type: CheckboxSwitch
      properties:
        title: Custom Disabled Colors
        description: Customized colors for the disabled state
        disabled: true
        label:
          disabled: true
        theme:
          colorBgContainerDisabled: '#f0f0f0'
          colorTextDisabled: '#bfbfbf'
    - id: theme_combined
      type: CheckboxSwitch
      properties:
        title: Combined Tokens
        description: Multiple theme tokens applied together for a unique look
        label:
          disabled: true
        theme:
          controlInteractiveSize: 22
          borderRadiusSM: 6
          colorPrimary: '#08979c'
          colorPrimaryHover: '#13c2c2'
          lineWidth: 2
          colorBorder: '#87e8de'
          colorBgContainer: '#e6fffb'

- title: Composition - Notification Preferences
  blocks:
    - id: comp_prefs_card
      type: Card
      properties:
        title: Notification Preferences
        size: small
      blocks:
        - id: comp_email
          type: CheckboxSwitch
          properties:
            title: Email Notifications
            description: Receive updates via email
            label:
              disabled: true
        - id: comp_sms
          type: CheckboxSwitch
          properties:
            title: SMS Notifications
            description: Receive updates via text message
            label:
              disabled: true
        - id: comp_push
          type: CheckboxSwitch
          properties:
            title: Push Notifications
            description: Receive in-app push notifications
            label:
              disabled: true
        - id: comp_weekly_digest
          type: CheckboxSwitch
          properties:
            title: Weekly Digest
            description: Get a weekly summary of activity
            label:
              disabled: true

