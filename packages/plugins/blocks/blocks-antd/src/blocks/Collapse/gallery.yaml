- title: Basic Collapse
  blocks:
    - id: basic_collapse
      type: Collapse
      properties:
        panels:
          - key: overview
            title: Project Overview
          - key: requirements
            title: System Requirements
          - key: timeline
            title: Project Timeline
      slots:
        overview:
          blocks:
            - id: basic_overview_text
              type: Paragraph
              properties:
                content: A web application that enables team collaboration through shared workspaces, real-time messaging, and integrated task management across departments.
            - id: basic_overview_detail
              type: Paragraph
              properties:
                content: The platform supports up to 500 concurrent users with role-based access control and end-to-end encryption for all communications.
        requirements:
          blocks:
            - id: basic_requirements_text
              type: Paragraph
              properties:
                content: Node.js 18+, PostgreSQL 15, Redis 7 for caching, and a minimum of 4GB RAM for the development environment. Docker is recommended for local setup.
        timeline:
          blocks:
            - id: basic_timeline_text
              type: Paragraph
              properties:
                content: Phase 1 launches in Q2 2026 with core messaging and workspace features. Phase 2 adds analytics, reporting dashboards, and third-party integrations in Q3 2026.

- title: Accordion Mode
  blocks:
    - id: accordion_collapse
      type: Collapse
      properties:
        accordion: true
        panels:
          - key: acc_general
            title: General Settings
          - key: acc_notifications
            title: Notification Preferences
          - key: acc_privacy
            title: Privacy & Security
          - key: acc_appearance
            title: Appearance
      slots:
        acc_general:
          blocks:
            - id: accordion_general_text
              type: Paragraph
              properties:
                content: Configure your display name, preferred language, and timezone. These settings apply across all devices linked to your account.
        acc_notifications:
          blocks:
            - id: accordion_notifications_text
              type: Paragraph
              properties:
                content: Choose which notifications you receive via email, push, or in-app messages. Set quiet hours to pause non-critical alerts.
        acc_privacy:
          blocks:
            - id: accordion_privacy_text
              type: Paragraph
              properties:
                content: Manage profile visibility, activity status display, and data sharing preferences. Enable two-factor authentication for added security.
        acc_appearance:
          blocks:
            - id: accordion_appearance_text
              type: Paragraph
              properties:
                content: Switch between light and dark themes, adjust font size, and customize the sidebar layout to match your workflow.

- title: Default Active Panel
  blocks:
    - id: default_active_collapse
      type: Collapse
      properties:
        defaultActiveKey: da_started
        panels:
          - key: da_started
            title: How do I get started?
          - key: da_pricing
            title: What are the pricing plans?
          - key: da_trial
            title: Is there a free trial?
          - key: da_support
            title: How do I contact support?
      slots:
        da_started:
          blocks:
            - id: default_active_started_text
              type: Paragraph
              properties:
                content: Sign up for a free account, complete the onboarding wizard, and deploy your first application in under five minutes using one of our starter templates.
        da_pricing:
          blocks:
            - id: default_active_pricing_text
              type: Paragraph
              properties:
                content: We offer Free, Pro ($29/month), and Enterprise tiers. The Free plan includes unlimited development environments and up to 100 monthly active users.
        da_trial:
          blocks:
            - id: default_active_trial_text
              type: Paragraph
              properties:
                content: Yes, the Pro plan includes a 14-day free trial with full access to all features. No credit card required to start.
        da_support:
          blocks:
            - id: default_active_support_text
              type: Paragraph
              properties:
                content: Reach our support team via the in-app chat widget, email us at support@example.com, or visit the community forums for peer assistance.

- title: Bordered vs Borderless
