- title: Nested Collapse
  blocks:
    - id: nested_outer
      type: Collapse
      properties:
        panels:
          - key: no_frontend
            title: Frontend Architecture
          - key: no_backend
            title: Backend Architecture
      slots:
        no_frontend:
          blocks:
            - id: nested_fe_intro
              type: Paragraph
              properties:
                content: The frontend is organized into feature modules, each with its own routing, state management, and component library.
            - id: nested_fe_inner
              type: Collapse
              properties:
                bordered: false
                panels:
                  - key: nfi_components
                    title: Component Library
                  - key: nfi_state
                    title: State Management
                  - key: nfi_routing
                    title: Routing
              slots:
                nfi_components:
                  blocks:
                    - id: nested_fe_components_text
                      type: Paragraph
                      properties:
                        content: Shared UI components built with Ant Design, organized by atomic design principles (atoms, molecules, organisms).
                nfi_state:
                  blocks:
                    - id: nested_fe_state_text
                      type: Paragraph
                      properties:
                        content: Global state managed via Redux Toolkit with RTK Query for server state synchronization and caching.
                nfi_routing:
                  blocks:
                    - id: nested_fe_routing_text
                      type: Paragraph
                      properties:
                        content: File-based routing with Next.js App Router, protected routes via middleware, and dynamic route segments.
        no_backend:
          blocks:
            - id: nested_be_intro
              type: Paragraph
              properties:
                content: The backend follows a microservices architecture with an API gateway handling authentication and rate limiting.
            - id: nested_be_inner
              type: Collapse
              properties:
                bordered: false
                panels:
                  - key: nbi_api
                    title: API Layer
                  - key: nbi_database
                    title: Database Design
                  - key: nbi_auth
                    title: Authentication
              slots:
                nbi_api:
                  blocks:
                    - id: nested_be_api_text
                      type: Paragraph
                      properties:
                        content: RESTful API with OpenAPI 3.1 documentation. GraphQL available for complex queries. Rate limited to 1000 req/min per tenant.
                nbi_database:
                  blocks:
                    - id: nested_be_database_text
                      type: Paragraph
                      properties:
                        content: PostgreSQL with read replicas for horizontal scaling. Schema migrations managed with Prisma. Automated daily backups with point-in-time recovery.
                nbi_auth:
                  blocks:
                    - id: nested_be_auth_text
                      type: Paragraph
                      properties:
                        content: OAuth 2.0 with PKCE flow, JWT access tokens (15 min TTL), and secure httpOnly refresh tokens. SAML SSO available for Enterprise.

- title: Rich Panel with Actions
  blocks:
    - id: actions_collapse
      type: Collapse
      properties:
        panels:
          - key: act_server
            title: Production Server
            extraKey: act_server_extra
          - key: act_staging
            title: Staging Environment
            extraKey: act_staging_extra
          - key: act_dev
            title: Development Environment
            extraKey: act_dev_extra
      slots:
        act_server:
          blocks:
            - id: actions_server_stats
              type: Box
              layout:
                gap: 16
              blocks:
                - id: act_server_uptime
                  type: Statistic
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Uptime
                    value: 99.97
                    suffix: '%'
                - id: act_server_latency
                  type: Statistic
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Avg Latency
                    value: 42
                    suffix: ms
                - id: act_server_rpm
                  type: Statistic
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Requests/min
                    value: 8420
            - id: actions_server_desc
              type: Paragraph
              properties:
                content: Deployed on 3 regions (us-east, eu-west, ap-southeast) with automatic failover and CDN edge caching.
            - id: actions_server_btns
              type: Box
              layout:
                gap: 8
              blocks:
                - id: act_server_btn_logs
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: View Logs
                    icon: AiOutlineFileText
                    color: primary
                    variant: outlined
                    size: small
                - id: act_server_btn_metrics
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Metrics
                    icon: AiOutlineBarChart
                    color: primary
                    variant: outlined
                    size: small
        act_server_extra:
          blocks:
            - id: act_server_status
              type: Tag
              properties:
                title: Healthy
                color: success
        act_staging:
          blocks:
            - id: actions_staging_desc
              type: Paragraph
              properties:
                content: Mirror of production with synthetic test data. Auto-deploys from the staging branch on every merge. Used for QA validation before production releases.
            - id: actions_staging_alert
              type: Alert
              properties:
                message: Last deployment was 2 hours ago. All 847 integration tests passed.
                type: success
                showIcon: true
        act_staging_extra:
          blocks:
            - id: act_staging_status
              type: Tag
              properties:
                title: Healthy
                color: success
        act_dev:
          blocks:
            - id: actions_dev_desc
              type: Paragraph
              properties:
                content: Local development environment running via Docker Compose. Hot-reload enabled for frontend and backend services with seeded test database.
            - id: actions_dev_alert
              type: Alert
              properties:
                message: 3 pending database migrations need to be applied before starting the dev server.
                type: warning
                showIcon: true
        act_dev_extra:
          blocks:
            - id: act_dev_status
              type: Tag
              properties:
                title: Needs Attention
                color: warning

- title: CSS Styling with Tailwind Classes
  blocks:
    - id: css_styled_collapse
      type: Collapse
      style:
        --element:
          background: transparent
          borderColor: '#d9d9d9'
        --header:
          fontWeight: 600
        --content:
          color: '#595959'
      properties:
        panels:
          - key: css_design
            title: Design Guidelines
          - key: css_brand
            title: Brand Colors
          - key: css_typography
            title: Typography
      slots:
        css_design:
          blocks:
            - id: css_design_text
              type: Paragraph
              properties:
                content: Follow the 8px grid system for all spacing. Use consistent border radius (8px for containers, 4px for inputs). Maintain a minimum touch target of 44x44px for mobile.
        css_brand:
          blocks:
            - id: css_brand_text
              type: Paragraph
              properties:
                content: 'Primary: #1677ff, Success: #52c41a, Warning: #faad14, Error: #ff4d4f. Always use the design token system rather than hardcoding hex values.'
            - id: css_brand_tags
              type: Box
              layout:
                gap: 6
              blocks:
                - id: css_brand_tag_primary
                  type: Tag
                  properties:
                    title: Primary
                    color: '#1677ff'
                - id: css_brand_tag_success
                  type: Tag
                  properties:
                    title: Success
                    color: '#52c41a'
                - id: css_brand_tag_warning
                  type: Tag
                  properties:
                    title: Warning
                    color: '#faad14'
                - id: css_brand_tag_error
                  type: Tag
                  properties:
                    title: Error
                    color: '#ff4d4f'
        css_typography:
          blocks:
            - id: css_typography_text
              type: Paragraph
              properties:
                content: 'Body: 14px/1.5715, Headings: 24px/1.3, Small: 12px/1.6667. Use the Inter font family for UI text and JetBrains Mono for code snippets.'

- title: Theme Token Overrides
  blocks:
    - id: theme_blue_header
      type: Collapse
      properties:
        theme:
          headerBg: '#e6f4ff'
          contentBg: '#f0f5ff'
          headerPadding: '16px 20px'
          contentPadding: '20px 20px'
        panels:
          - key: tb_overview
            title: Blue Header Theme
          - key: tb_details
            title: Expanded Padding
      slots:
        tb_overview:
          blocks:
            - id: theme_blue_overview_text
              type: Paragraph
              properties:
                content: This collapse uses a light blue header background and a slightly tinted content area, achieved by overriding the headerBg and contentBg design tokens.
        tb_details:
          blocks:
            - id: theme_blue_details_text
              type: Paragraph
              properties:
                content: The padding has been increased to 16px vertically and 20px horizontally for both header and content areas, giving a more spacious feel.
    - id: theme_dark_collapse
      type: Collapse
      properties:
        theme:
          headerBg: '#1f1f1f'
          contentBg: '#141414'
          colorText: '#ffffffd9'
          colorTextHeading: '#ffffffd9'
          colorBorder: '#424242'
        panels:
          - key: td_about
            title: Dark Theme
          - key: td_settings
            title: Configuration
      slots:
        td_about:
          blocks:
            - id: theme_dark_about_text
              type: Paragraph
              properties:
                content: A dark-themed collapse achieved entirely through design token overrides. The header, content, and border colors are all customized.
        td_settings:
          blocks:
            - id: theme_dark_settings_text
              type: Paragraph
              properties:
                content: Token overrides cascade to all child elements, making it straightforward to create themed sections without global CSS changes.
    - id: theme_rounded_collapse
      type: Collapse
      properties:
        theme:
          borderRadiusLG: 16
          headerBg: '#f6ffed'
          contentBg: '#ffffff'
        panels:
          - key: tr_one
