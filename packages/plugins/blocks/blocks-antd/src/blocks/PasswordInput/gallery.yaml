- title: Sizes
  blocks:
    - id: size_small
      type: PasswordInput
      properties:
        title: Small
        size: small
        placeholder: Enter password
    - id: size_default
      type: PasswordInput
      properties:
        title: Default
        placeholder: Enter password
    - id: size_large
      type: PasswordInput
      properties:
        title: Large
        size: large
        placeholder: Enter password

- title: Visibility Toggle
  blocks:
    - id: toggle_on
      type: PasswordInput
      properties:
        title: With Visibility Toggle (default)
        visibilityToggle: true
        placeholder: Click the eye icon to reveal
    - id: toggle_off
      type: PasswordInput
      properties:
        title: Without Visibility Toggle
        visibilityToggle: false
        placeholder: Password cannot be revealed

- title: Placeholder Variations
  blocks:
    - id: placeholder_default
      type: PasswordInput
      properties:
        title: Default Placeholder
        placeholder: Enter your password
    - id: placeholder_hint
      type: PasswordInput
      properties:
        title: Descriptive Placeholder
        placeholder: Must be at least 8 characters
    - id: placeholder_none
      type: PasswordInput
      properties:
        title: No Placeholder

- title: Disabled State
  blocks:
    - id: disabled_empty
      type: PasswordInput
      properties:
        title: Disabled (empty)
        disabled: true
        placeholder: Cannot edit
    - id: disabled_toggle
      type: PasswordInput
      properties:
        title: Disabled With Toggle
        disabled: true
        visibilityToggle: true
        placeholder: Toggle also disabled
    - id: disabled_no_toggle
      type: PasswordInput
      properties:
        title: Disabled Without Toggle
        disabled: true
        visibilityToggle: false
        placeholder: No toggle, no edit

- title: Borderless Variant
  blocks:
    - id: borderless_default
      type: PasswordInput
      properties:
        title: Borderless
        bordered: false
        placeholder: No border style
    - id: borderless_small
      type: PasswordInput
      properties:
        title: Borderless Small
        bordered: false
        size: small
        placeholder: Small borderless
    - id: borderless_large
      type: PasswordInput
      properties:
        title: Borderless Large
        bordered: false
        size: large
        placeholder: Large borderless

- title: AutoFocus
  blocks:
    - id: autofocus_on
      type: PasswordInput
      properties:
        title: AutoFocus Enabled
        autoFocus: true
        placeholder: This input is focused on load
    - id: autofocus_off
      type: PasswordInput
      properties:
        title: AutoFocus Disabled (default)
        autoFocus: false
        placeholder: Normal focus behavior

- title: Label Options
  blocks:
    - id: label_default
      type: PasswordInput
      properties:
        title: Default Label
        placeholder: Default label above
    - id: label_custom_title
      type: PasswordInput
      properties:
        title: '<b>Bold</b> Label Title'
        placeholder: Label supports html
    - id: label_no_colon
      type: PasswordInput
      properties:
        title: No Colon
        label:
          colon: false
        placeholder: Label without colon
    - id: label_right_align
      type: PasswordInput
      properties:
        title: Right Aligned
        label:
          align: right
          inline: true
          span: 8
        placeholder: Label aligned right
    - id: label_disabled
      type: PasswordInput
      properties:
        title: Hidden Label
        label:
          disabled: true
        placeholder: Label is hidden

- title: Label Inline
  blocks:
    - id: inline_default
      type: PasswordInput
      properties:
        title: Inline Label
        label:
          inline: true
          span: 6
        placeholder: Inline layout
    - id: inline_right
      type: PasswordInput
      properties:
        title: Inline Right
        label:
          inline: true
          span: 6
          align: right
        placeholder: Label aligned right
    - id: inline_wide
      type: PasswordInput
      properties:
        title: Wide Label Span
        label:
          inline: true
          span: 10
        placeholder: Wider label column

- title: Label Extra & Feedback
  blocks:
    - id: label_extra
      type: PasswordInput
      properties:
        title: With Extra Text
        label:
          extra: Use at least 8 characters with a mix of letters, numbers & symbols.
        placeholder: Enter a strong password
    - id: label_extra_html
      type: PasswordInput
      properties:
        title: Extra With HTML
        label:
          extra: '<span style="color: #888;">Tip: avoid using personal information.</span>'
        placeholder: Choose wisely
    - id: label_no_feedback
      type: PasswordInput
      properties:
        title: No Validation Feedback
        label:
          hasFeedback: false
        placeholder: Feedback text hidden

- title: All Sizes With Toggle On
  blocks:
    - id: all_small_on
      type: PasswordInput
      properties:
        title: Small + Toggle
        size: small
        visibilityToggle: true
        placeholder: Small with eye icon
    - id: all_default_on
      type: PasswordInput
      properties:
        title: Default + Toggle
        visibilityToggle: true
        placeholder: Default with eye icon
    - id: all_large_on
      type: PasswordInput
      properties:
        title: Large + Toggle
        size: large
        visibilityToggle: true
        placeholder: Large with eye icon

- title: All Sizes With Toggle Off
  blocks:
    - id: all_small_off
      type: PasswordInput
      properties:
        title: Small No Toggle
        size: small
        visibilityToggle: false
        placeholder: Small without eye icon
    - id: all_default_off
      type: PasswordInput
      properties:
        title: Default No Toggle
        visibilityToggle: false
        placeholder: Default without eye icon
    - id: all_large_off
      type: PasswordInput
      properties:
        title: Large No Toggle
        size: large
        visibilityToggle: false
        placeholder: Large without eye icon

- title: All Sizes Disabled
  blocks:
    - id: dis_small
      type: PasswordInput
      properties:
        title: Small Disabled
        size: small
        disabled: true
        placeholder: Small disabled
    - id: dis_default
      type: PasswordInput
      properties:
        title: Default Disabled
        disabled: true
        placeholder: Default disabled
    - id: dis_large
      type: PasswordInput
      properties:
        title: Large Disabled
        size: large
        disabled: true
        placeholder: Large disabled

- title: All Sizes Borderless
  blocks:
    - id: bdr_small
      type: PasswordInput
      properties:
        title: Small Borderless
        size: small
        bordered: false
        placeholder: Small borderless
    - id: bdr_default
      type: PasswordInput
      properties:
        title: Default Borderless
        bordered: false
        placeholder: Default borderless
    - id: bdr_large
      type: PasswordInput
      properties:
        title: Large Borderless
        size: large
        bordered: false
        placeholder: Large borderless

- title: CSS Styles
  blocks:
    - id: style_element
      type: PasswordInput
      properties:
        title: Custom Element Style
        placeholder: Custom border and background
      style:
        --element:
          borderColor: '#722ed1'
          backgroundColor: '#f9f0ff'
    - id: style_label
      type: PasswordInput
      properties:
        title: Custom Label Style
        placeholder: Styled label above
      style:
        --label:
          color: '#1677ff'
          fontWeight: bold
          fontSize: 16
    - id: style_extra
      type: PasswordInput
      properties:
        title: Styled Extra
        label:
          extra: This extra text is styled.
        placeholder: Enter password
      style:
        --extra:
          color: '#fa8c16'
          fontStyle: italic
    - id: style_feedback
      type: PasswordInput
      properties:
        title: Styled Feedback
        label:
          hasFeedback: true
        placeholder: Enter password
      style:
        --feedback:
          color: '#52c41a'
          fontWeight: bold

- title: CSS Class Names
  blocks:
    - id: class_element
      type: PasswordInput
      class: rounded-lg shadow-md
      properties:
        title: With Tailwind Classes
        placeholder: Rounded shadow input
    - id: class_custom
      type: PasswordInput
      class: border-2 border-blue-400
      properties:
        title: Custom Border Class
        placeholder: Blue border class

- title: Combined State Examples
  blocks:
    - id: combo_disabled_borderless
      type: PasswordInput
      properties:
        title: Disabled + Borderless
        disabled: true
        bordered: false
        placeholder: Disabled and borderless
    - id: combo_large_no_toggle
      type: PasswordInput
      properties:
        title: Large + No Toggle + Borderless
        size: large
        visibilityToggle: false
        bordered: false
        placeholder: Large borderless no toggle
    - id: combo_small_disabled_toggle
      type: PasswordInput
      properties:
        title: Small + Disabled + Toggle
        size: small
        disabled: true
        visibilityToggle: true
        placeholder: Small disabled with toggle

- title: Inline Label Sizes
  blocks:
    - id: inline_small
      type: PasswordInput
      properties:
        title: Inline Small
        size: small
        label:
          inline: true
          span: 6
        placeholder: Small inline
    - id: inline_default
      type: PasswordInput
      properties:
        title: Inline Default
        label:
          inline: true
          span: 6
        placeholder: Default inline
    - id: inline_large
      type: PasswordInput
      properties:
        title: Inline Large
        size: large
        label:
          inline: true
          span: 6
        placeholder: Large inline

- title: Form-Like Layout
  blocks:
    - id: form_username
      type: TextInput
      properties:
        title: Username
        placeholder: Enter your username
        prefixIcon: AiOutlineUser
    - id: form_password
      type: PasswordInput
      properties:
        title: Password
        placeholder: Enter your password
        visibilityToggle: true
        label:
          extra: Must be at least 8 characters.
    - id: form_confirm
      type: PasswordInput
      properties:
        title: Confirm Password
        placeholder: Re-enter your password
        visibilityToggle: true

- title: Theme Token Overrides
  blocks:
    - id: theme_large_radius
      type: PasswordInput
      properties:
        title: Large Border Radius
        placeholder: Rounded corners
        theme:
          borderRadius: 16
    - id: theme_custom_colors
      type: PasswordInput
      properties:
        title: Custom Active Color
        placeholder: Focus to see custom color
        theme:
          activeBorderColor: '#722ed1'
          activeShadow: '0 0 0 2px rgba(114, 46, 209, 0.2)'
    - id: theme_hover_color
      type: PasswordInput
      properties:
        title: Custom Hover Color
        placeholder: Hover to see custom color
        theme:
          hoverBorderColor: '#52c41a'
    - id: theme_font_size
      type: PasswordInput
      properties:
        title: Large Font
        placeholder: Larger input text
        theme:
          fontSize: 18
          fontSizeLG: 20
    - id: theme_padding
      type: PasswordInput
      properties:
        title: Extra Padding
        placeholder: More spacious input
        theme:
          paddingBlock: 8
          paddingInline: 16
    - id: theme_addon_bg
      type: PasswordInput
      properties:
        title: Custom Addon Background
        placeholder: Custom addon styling
        theme:
          addonBg: '#e6f7ff'

- title: Theme Combinations
  blocks:
    - id: theme_purple
      type: PasswordInput
      properties:
        title: Purple Theme
        placeholder: Purple accented input
        theme:
          activeBorderColor: '#722ed1'
          hoverBorderColor: '#9254de'
          activeShadow: '0 0 0 2px rgba(114, 46, 209, 0.2)'
    - id: theme_green
      type: PasswordInput
      properties:
        title: Green Theme
        placeholder: Green accented input
        theme:
          activeBorderColor: '#52c41a'
          hoverBorderColor: '#73d13d'
          activeShadow: '0 0 0 2px rgba(82, 196, 26, 0.2)'
    - id: theme_orange
      type: PasswordInput
      properties:
        title: Orange Theme
        placeholder: Orange accented input
        theme:
          activeBorderColor: '#fa8c16'
          hoverBorderColor: '#ffa940'
          activeShadow: '0 0 0 2px rgba(250, 140, 22, 0.2)'
    - id: theme_large_pill
      type: PasswordInput
      properties:
        title: Pill Input
        size: large
        placeholder: Pill shaped password input
        theme:
          borderRadius: 32
          borderRadiusLG: 32
          paddingInlineLG: 20

- title: Sized Themes
  blocks:
    - id: theme_sm
      type: PasswordInput
      properties:
        title: Small Custom Theme
        size: small
        placeholder: Small themed
        theme:
          borderRadiusSM: 12
          paddingInlineSM: 12
          fontSizeSM: 12
    - id: theme_md
      type: PasswordInput
      properties:
        title: Default Custom Theme
        placeholder: Default themed
        theme:
          borderRadius: 12
          paddingInline: 14
          fontSize: 15
    - id: theme_lg
      type: PasswordInput
      properties:
        title: Large Custom Theme
        size: large
        placeholder: Large themed
        theme:
          borderRadiusLG: 16
          paddingInlineLG: 18
          fontSizeLG: 18
          paddingBlockLG: 10

- title: Theme With Inline Label
  blocks:
    - id: theme_inline
      type: PasswordInput
      properties:
        title: Themed Inline
        label:
          inline: true
          span: 6
        placeholder: Themed inline input
        theme:
          activeBorderColor: '#1677ff'
          borderRadius: 8
    - id: theme_inline_large
      type: PasswordInput
      properties:
        title: Themed Inline Large
        size: large
        label:
          inline: true
          span: 6
        placeholder: Themed inline large
        theme:
          borderRadiusLG: 12
          fontSizeLG: 16
          activeBorderColor: '#eb2f96'
          activeShadow: '0 0 0 2px rgba(235, 47, 150, 0.2)'
