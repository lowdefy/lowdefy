name: Layout
description: Shared layout components

vars:
  site_name:
    type: string
    default: Default Site

exports:
  components:
    - id: page-wrapper

components:
  - id: page-wrapper
    type: Component
    component:
      id: layout-box
      type: Box
      blocks:
        - id: site-header
          type: Title
          properties:
            content:
              _module.var: site_name
        - _var: content
