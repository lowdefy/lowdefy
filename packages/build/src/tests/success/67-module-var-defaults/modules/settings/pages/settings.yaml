id: preferences
type: Box
blocks:
  - id: color-display
    type: Paragraph
    properties:
      content:
        _module.var:
          key: theme.primary_color
          default: gray
  - id: page-size-display
    type: Paragraph
    properties:
      content:
        _module.var:
          key: page_size
          default: 10
  - id: missing-var
    type: Paragraph
    properties:
      content:
        _module.var:
          key: nonexistent.path
          default: fallback-value
