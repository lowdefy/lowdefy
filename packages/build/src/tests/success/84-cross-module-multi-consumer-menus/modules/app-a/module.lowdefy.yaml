name: App A

dependencies:
  - id: nav

exports:
  menus:
    - id: default
  pages:
    - id: dashboard

menus:
  - id: default
    links:
      _build.array.concat:
        - _ref:
            module: nav
            menu: shared-nav
        - - id: settings
            type: MenuLink
            pageId:
              _module.pageId: settings
            properties:
              title: A Settings

pages:
  - _ref: pages/dashboard.yaml
  - id: settings
    type: Box
